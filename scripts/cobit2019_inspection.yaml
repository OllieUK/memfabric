- id: cobit-2019.edm01
  type: objective
  abbrev: EDM01
  heading: Ensured Governance Framework Setting and Maintenance
  text: 'Analyze and articulate the requirements for the governance of enterprise I&T. Put in place and maintain governance
    components with clarity of authority and responsibilities to achieve the enterprise''s mission, goals and objectives.


    Purpose: Provide a consistent approach integrated and aligned with the enterprise governance approach. I&T-related decisions
    are made in line with the enterprise''s strategies and objectives and desired value is realized. To that end, ensure that
    I&T-related processes are overseen effectively and transparently; compliance with legal, contractual and regulatory requirements
    is confirmed; and the governance requirements for board members are met.'
  purpose: Provide a consistent approach integrated and aligned with the enterprise governance approach. I&T-related decisions
    are made in line with the enterprise's strategies and objectives and desired value is realized. To that end, ensure that
    I&T-related processes are overseen effectively and transparently; compliance with legal, contractual and regulatory requirements
    is confirmed; and the governance requirements for board members are met.
  notes: ''
  parent_id: cobit-2019.edm
- id: cobit-2019.edm02
  type: objective
  abbrev: EDM02
  heading: Ensured Benefits Delivery
  text: 'Optimize the value to the business from investments in business processes, I&T services and I&T assets.


    Purpose: Secure optimal value from I&T-enabled initiatives, services and assets; cost-efficient delivery of solutions
    and services; and a reliable and accurate picture of costs and likely benefits so that business needs are supported effectively
    and efficiently.'
  purpose: Secure optimal value from I&T-enabled initiatives, services and assets; cost-efficient delivery of solutions and
    services; and a reliable and accurate picture of costs and likely benefits so that business needs are supported effectively
    and efficiently.
  notes: ''
  parent_id: cobit-2019.edm
- id: cobit-2019.edm03
  type: objective
  abbrev: EDM03
  heading: Ensured Risk Optimization
  text: 'Ensure that the enterprise''s risk appetite and tolerance are understood, articulated and communicated, and that
    risk to enterprise value related to the use of I&T is identified and managed.


    Purpose: Ensure that I&T-related enterprise risk does not exceed the enterprise''s risk appetite and risk tolerance, the
    impact of I&T risk to enterprise value is identified and managed, and the potential for compliance failures is minimized.'
  purpose: Ensure that I&T-related enterprise risk does not exceed the enterprise's risk appetite and risk tolerance, the
    impact of I&T risk to enterprise value is identified and managed, and the potential for compliance failures is minimized.
  notes: ''
  parent_id: cobit-2019.edm
- id: cobit-2019.edm04
  type: objective
  abbrev: EDM04
  heading: Ensured Resource Optimization
  text: 'Ensure that adequate and sufficient business and I&T-related resources (people, process and technology) are available
    to support enterprise objectives effectively and, at optimal cost.


    Purpose: Ensure that the resource needs of the enterprise are met in the optimal manner, I&T costs are optimized, and
    there is an increased likelihood of benefit realization and readiness for future change.'
  purpose: Ensure that the resource needs of the enterprise are met in the optimal manner, I&T costs are optimized, and there
    is an increased likelihood of benefit realization and readiness for future change.
  notes: ''
  parent_id: cobit-2019.edm
- id: cobit-2019.edm05
  type: objective
  abbrev: EDM05
  heading: Ensured Stakeholder Engagement
  text: 'Ensure that stakeholders are identified and engaged in the I&T governance system and that enterprise I&T performance
    and conformance measurement and reporting are transparent, with stakeholders approving the goals and metrics and necessary
    remedial actions.


    Purpose: Ensure that stakeholders are supportive of the I&T strategy and road map, communication to stakeholders is effective
    and timely, and the basis for reporting is established to increase performance. Identify areas for improvement, and confirm
    that I&T-related objectives and strategies are in line with the enterprise’s strategy.'
  purpose: Ensure that stakeholders are supportive of the I&T strategy and road map, communication to stakeholders is effective
    and timely, and the basis for reporting is established to increase performance. Identify areas for improvement, and confirm
    that I&T-related objectives and strategies are in line with the enterprise’s strategy.
  notes: ''
  parent_id: cobit-2019.edm
- id: cobit-2019.apo01
  type: objective
  abbrev: APO01
  heading: Managed I&T Management Framework
  text: 'Design the management system for enterprise I&T based on enterprise goals and other design factors. Based on this
    design, implement all required components of the management system.


    Purpose: Implement a consistent management approach for enterprise governance requirements to be met, covering governance
    components such as management processes; organizational structures; roles and responsibilities; reliable and repeatable
    activities; information items; policies and procedures; skills and competencies; culture and behavior; and services, infrastructure
    and applications.'
  purpose: Implement a consistent management approach for enterprise governance requirements to be met, covering governance
    components such as management processes; organizational structures; roles and responsibilities; reliable and repeatable
    activities; information items; policies and procedures; skills and competencies; culture and behavior; and services, infrastructure
    and applications.
  notes: ''
  parent_id: cobit-2019.apo
- id: cobit-2019.apo02
  type: objective
  abbrev: APO02
  heading: Managed Strategy
  text: 'Provide a holistic view of the current business and I&T environment, the future direction, and the initiatives required
    to migrate to the desired future environment. Ensure that the desired level of digitization is integral to the future
    direction and the I&T strategy. Assess the organization’s current digital maturity and develop a road map to close the
    gaps. With the business, rethink internal operations as well as customer-facing activities. Ensure focus on the transformation
    journey across the organization. Leverage enterprise architecture building blocks, governance components and the organization''s
    ecosystem, including externally provided services and related capabilities, to enable reliable but agile and efficient
    response to strategic objectives.


    Purpose: Support the digital transformation strategy of the organization and deliver the desired value through a road
    map of incremental changes. Use a holistic I&T approach, ensuring that each initiative is clearly connected to an overarching
    strategy. Enable change in all different aspects of the organization, from channels and processes to data, culture, skills,
    operating model and incentives.'
  purpose: Support the digital transformation strategy of the organization and deliver the desired value through a road map
    of incremental changes. Use a holistic I&T approach, ensuring that each initiative is clearly connected to an overarching
    strategy. Enable change in all different aspects of the organization, from channels and processes to data, culture, skills,
    operating model and incentives.
  notes: ''
  parent_id: cobit-2019.apo
- id: cobit-2019.apo03
  type: objective
  abbrev: APO03
  heading: Managed Enterprise Architecture
  text: 'Establish a common architecture consisting of business process, information, data, application and technology architecture
    layers. Create key models and practices that describe the baseline and target architectures, in line with the enterprise
    and I&T strategy. Define requirements for taxonomy, standards, guidelines, procedures, templates and tools, and provide
    a linkage for these components. Improve alignment, increase agility, improve quality of information and generate potential
    cost savings through initiatives such as re-use of building block components.


    Purpose: Represent the different building blocks that make up the enterprise and its interrelationships as well as the
    principles guiding their design and evolution over time, to enable a standard, responsive and efficient delivery of operational
    and strategic objectives.'
  purpose: Represent the different building blocks that make up the enterprise and its interrelationships as well as the principles
    guiding their design and evolution over time, to enable a standard, responsive and efficient delivery of operational and
    strategic objectives.
  notes: ''
  parent_id: cobit-2019.apo
- id: cobit-2019.apo04
  type: objective
  abbrev: APO04
  heading: Managed Innovation
  text: 'Maintain an awareness of I&T and related service trends and monitor emerging technology trends. Proactively identify
    innovation opportunities and plan how to benefit from innovation in relation to business needs and the defined I&T strategy.
    Analyze what opportunities for business innovation or improvement  can be created by emerging technologies, services or
    I&T-enabled business innovation; through existing established technologies; and by business and IT process innovation.
    Influence strategic planning and enterprise architecture decisions.


    Purpose: Achieve competitive advantage, business innovation, improved customer experience, and improved operational effectiveness
    and efficiency by exploiting I&T developments and emerging technologies.'
  purpose: Achieve competitive advantage, business innovation, improved customer experience, and improved operational effectiveness
    and efficiency by exploiting I&T developments and emerging technologies.
  notes: ''
  parent_id: cobit-2019.apo
- id: cobit-2019.apo05
  type: objective
  abbrev: APO05
  heading: Managed Portfolio
  text: 'Execute the strategic direction set for investments in line with the enterprise architecture vision and I&T road
    map. Consider the different categories of investments and the resources and funding constraints. Evaluate, prioritize
    and balance programs and services, managing demand within resource and funding constraints, based on their alignment with
    strategic objectives, enterprise worth and risk. Move selected programs into the active products or services portfolio
    for execution. Monitor the performance of the overall portfolio of products and services and programs, proposing adjustments
    as necessary in response to program, product or service performance or changing enterprise priorities.


    Purpose: Optimize the performance of the overall portfolio of programs in response to individual program, product and
    service performance and changing enterprise priorities and demand.'
  purpose: Optimize the performance of the overall portfolio of programs in response to individual program, product and service
    performance and changing enterprise priorities and demand.
  notes: ''
  parent_id: cobit-2019.apo
- id: cobit-2019.apo06
  type: objective
  abbrev: APO06
  heading: Managed Budget and Costs
  text: 'Manage the I&T-related financial activities in both the business and IT functions, covering budget, cost and benefit
    management and prioritization of spending through the use of formal budgeting practices and a fair and equitable system
    of allocating costs to the enterprise. Consult stakeholders to identify and control the total costs and benefits within
    the context of the I&T strategic and tactical plans. Initiate corrective action where needed.


    Purpose: Foster a partnership between IT and enterprise stakeholders to enable the effective and efficient use of I&T-related
    resources and provide transparency and accountability of the cost and business value of solutions and services. Enable
    the enterprise to make informed decisions regarding the use of I&T solutions and services.'
  purpose: Foster a partnership between IT and enterprise stakeholders to enable the effective and efficient use of I&T-related
    resources and provide transparency and accountability of the cost and business value of solutions and services. Enable
    the enterprise to make informed decisions regarding the use of I&T solutions and services.
  notes: ''
  parent_id: cobit-2019.apo
- id: cobit-2019.apo07
  type: objective
  abbrev: APO07
  heading: Managed Human Resources
  text: 'Provide a structured approach to ensure optimal recruitment/acquisition, planning, evaluation and development of
    human resources (both internal and external).


    Purpose: Optimize human resources capabilities to meet enterprise objectives.'
  purpose: Optimize human resources capabilities to meet enterprise objectives.
  notes: ''
  parent_id: cobit-2019.apo
- id: cobit-2019.apo08
  type: objective
  abbrev: APO08
  heading: Managed Relationships
  text: 'Manage relationships with business stakeholders in a formalized and transparent way that ensures mutual trust and
    a combined focus on achieving the strategic goals within the constraints of budgets and risk tolerance. Base relationships
    on open and transparent communication, a common language, and the willingness to take ownership and accountability for
    key decisions on both sides. Business and IT must work together to create successful enterprise outcomes in support of
    the enterprise objectives.


    Purpose: Enable the right knowledge, skills and behaviors to create improved outcomes, increased confidence, mutual trust
    and effective use of resources that stimulate a productive relationship with business stakeholders.'
  purpose: Enable the right knowledge, skills and behaviors to create improved outcomes, increased confidence, mutual trust
    and effective use of resources that stimulate a productive relationship with business stakeholders.
  notes: ''
  parent_id: cobit-2019.apo
- id: cobit-2019.apo09
  type: objective
  abbrev: APO09
  heading: Managed Service Agreements
  text: 'Align I&T-enabled products and services and service levels with enterprise needs and expectations, including identification,
    specification, design, publishing, agreement, and monitoring of I&T products and services, service levels and performance
    indicators.


    Purpose: Ensure that I&T products, services and service levels meet current and future enterprise needs.'
  purpose: Ensure that I&T products, services and service levels meet current and future enterprise needs.
  notes: ''
  parent_id: cobit-2019.apo
- id: cobit-2019.apo10
  type: objective
  abbrev: APO10
  heading: Managed Vendors
  text: 'Manage I&T-related products and services provided by all types of vendors to meet enterprise requirements. This includes
    the search for and selection of vendors, management of relationships, management of contracts, and reviewing and monitoring
    of vendor performance and vendor ecosystem (including upstream supply chain) for effectiveness and compliance.


    Purpose: Optimize available I&T capabilities to support the I&T strategy and road map, minimize the risk associated with
    nonperforming or noncompliant vendors, and ensure competitive pricing.'
  purpose: Optimize available I&T capabilities to support the I&T strategy and road map, minimize the risk associated with
    nonperforming or noncompliant vendors, and ensure competitive pricing.
  notes: ''
  parent_id: cobit-2019.apo
- id: cobit-2019.apo11
  type: objective
  abbrev: APO11
  heading: Managed Quality
  text: 'Define and communicate quality requirements in all processes, procedures and related enterprise outcomes. Enable
    controls, ongoing monitoring, and the use of proven practices and standards in continuous improvement and efficiency efforts.


    Purpose: Ensure consistent delivery of technology solutions and services to meet the quality requirements of the enterprise
    and satisfy stakeholder needs.'
  purpose: Ensure consistent delivery of technology solutions and services to meet the quality requirements of the enterprise
    and satisfy stakeholder needs.
  notes: ''
  parent_id: cobit-2019.apo
- id: cobit-2019.apo12
  type: objective
  abbrev: APO12
  heading: Managed Risk
  text: 'Continually identify, assess and reduce I&T-related risk within tolerance levels set by enterprise executive management.


    Purpose: Integrate the management of I&T-related enterprise risk with overall enterprise risk management (ERM) and balance
    the costs and benefits of managing I&T-related enterprise risk.'
  purpose: Integrate the management of I&T-related enterprise risk with overall enterprise risk management (ERM) and balance
    the costs and benefits of managing I&T-related enterprise risk.
  notes: ''
  parent_id: cobit-2019.apo
- id: cobit-2019.apo13
  type: objective
  abbrev: APO13
  heading: Managed Security
  text: 'Define, operate and monitor an information security system.


    Purpose: Keep the impact and occurrence of information security privacy incidents within the enterprise’s risk appetite
    levels.'
  purpose: Keep the impact and occurrence of information security privacy incidents within the enterprise’s risk appetite
    levels.
  notes: ''
  parent_id: cobit-2019.apo
- id: cobit-2019.apo14
  type: objective
  abbrev: APO14
  heading: Managed Data
  text: 'Achieve and sustain effective management of the enterprise data assets across the data life cycle, from creation
    through delivery, maintenance and archiving.


    Purpose: Ensure effective utilization of the critical data assets to achieve enterprise goals and objectives.'
  purpose: Ensure effective utilization of the critical data assets to achieve enterprise goals and objectives.
  notes: ''
  parent_id: cobit-2019.apo
- id: cobit-2019.bai01
  type: objective
  abbrev: BAI01
  heading: Managed Programs
  text: 'Manage all programs from the investment portfolio in alignment with enterprise strategy and in a coordinated way,
    based on a standard program management approach. Initiate, plan, control, and execute programs, and monitor expected value
    from the program.


    Purpose: Realize desired business value and reduce the risk of unexpected delays, costs and value erosion. To do so, improve
    communications to and involvement of business and end users, ensure the value and quality of program deliverables and
    follow up of projects within the programs, and maximize program contribution to the investment portfolio.'
  purpose: Realize desired business value and reduce the risk of unexpected delays, costs and value erosion. To do so, improve
    communications to and involvement of business and end users, ensure the value and quality of program deliverables and
    follow up of projects within the programs, and maximize program contribution to the investment portfolio.
  notes: ''
  parent_id: cobit-2019.bai
- id: cobit-2019.bai02
  type: objective
  abbrev: BAI02
  heading: Managed Requirements Definition
  text: 'Identify solutions and analyze requirements before acquisition or creation to ensure that they align with enterprise
    strategic requirements covering business processes, applications, information/data, infrastructure and services. Coordinate
    the review of feasible options with affected stakeholders, including relative costs and benefits, risk analysis, and approval
    of requirements and proposed solutions.


    Purpose: Create optimal solutions that meet enterprise needs while minimizing risk.'
  purpose: Create optimal solutions that meet enterprise needs while minimizing risk.
  notes: ''
  parent_id: cobit-2019.bai
- id: cobit-2019.bai03
  type: objective
  abbrev: BAI03
  heading: Managed Solutions Identification and Build
  text: 'Establish and maintain identified products and services (technology, business processes and workflows) in line with
    enterprise requirements covering design, development, procurement/sourcing and partnering with vendors. Manage configuration,
    test preparation, testing, requirements management and maintenance of business processes, applications, information/data,
    infrastructure and services.


    Purpose: Ensure agile and scalable delivery of digital products and services. Establish timely and cost-effective solutions
    (technology, business processes and workflows) capable of supporting enterprise strategic and operational objectives.'
  purpose: Ensure agile and scalable delivery of digital products and services. Establish timely and cost-effective solutions
    (technology, business processes and workflows) capable of supporting enterprise strategic and operational objectives.
  notes: ''
  parent_id: cobit-2019.bai
- id: cobit-2019.bai04
  type: objective
  abbrev: BAI04
  heading: Managed Availability and Capacity
  text: 'Balance current and future needs for availability, performance and capacity with cost-effective service provision.
    Include assessment of current capabilities, forecasting of future needs based on business requirements, analysis of business
    impacts, and assessment of risk to plan and implement actions to meet the identified requirements.


    Purpose: Maintain service availability, efficient management of resources and optimization of system performance through
    prediction of future performance and capacity requirements.'
  purpose: Maintain service availability, efficient management of resources and optimization of system performance through
    prediction of future performance and capacity requirements.
  notes: ''
  parent_id: cobit-2019.bai
- id: cobit-2019.bai05
  type: objective
  abbrev: BAI05
  heading: Managed Organizational Change
  text: 'Maximize the likelihood of successfully implementing sustainable enterprisewide organizational change quickly and
    with reduced risk. Cover the complete life cycle of the change and all affected stakeholders in the business and IT.


    Purpose: Prepare and commit stakeholders for business change and reduce the risk of failure.'
  purpose: Prepare and commit stakeholders for business change and reduce the risk of failure.
  notes: ''
  parent_id: cobit-2019.bai
- id: cobit-2019.bai06
  type: objective
  abbrev: BAI06
  heading: Managed IT Changes
  text: 'Manage all changes in a controlled manner, including standard changes and emergency maintenance relating to business
    processes, applications and infrastructure. This includes change standards and procedures, impact assessment, prioritization
    and authorization, emergency changes, tracking, reporting, closure, and documentation.


    Purpose: Enable fast and reliable delivery of change to the business. Mitigate the risk of negatively impacting the stability
    or integrity of the changed environment.'
  purpose: Enable fast and reliable delivery of change to the business. Mitigate the risk of negatively impacting the stability
    or integrity of the changed environment.
  notes: ''
  parent_id: cobit-2019.bai
- id: cobit-2019.bai07
  type: objective
  abbrev: BAI07
  heading: Managed IT Change Acceptance and Transitioning
  text: 'Formally accept and make operational new solutions. Include implementation planning, system and data conversion,
    acceptance testing, communication, release preparation, promotion to production of new or changed business processes and
    I&T services, early production support, and a post-implementation review.


    Purpose: Implement solutions safely and in line with the agreed expectations and outcomes.'
  purpose: Implement solutions safely and in line with the agreed expectations and outcomes.
  notes: ''
  parent_id: cobit-2019.bai
- id: cobit-2019.bai08
  type: objective
  abbrev: BAI08
  heading: Managed Knowledge
  text: 'Maintain the availability of relevant, current, validated and reliable knowledge and management information to support
    all process activities and to facilitate decision making related to the governance and management of enterprise I&T. Plan
    for the identification, gathering, organizing, maintaining, use and retirement of knowledge.


    Purpose: Provide the knowledge and information required to support all staff in the governance and management of enterprise
    I&T and allow for informed decision making.'
  purpose: Provide the knowledge and information required to support all staff in the governance and management of enterprise
    I&T and allow for informed decision making.
  notes: ''
  parent_id: cobit-2019.bai
- id: cobit-2019.bai09
  type: objective
  abbrev: BAI09
  heading: Managed Assets
  text: 'Manage I&T assets through their life cycle to make sure that their use delivers value at optimal cost, they remain
    operational (fit for purpose), and they are accounted for and physically protected. Ensure that those assets that are
    critical to support service capability are reliable and available. Manage software licenses to ensure that the optimal
    number are acquired, retained and deployed in relation to required business usage, and the software installed is in compliance
    with license agreements.


    Purpose: Account for all I&T assets and optimize the value provided by their use.'
  purpose: Account for all I&T assets and optimize the value provided by their use.
  notes: ''
  parent_id: cobit-2019.bai
- id: cobit-2019.bai10
  type: objective
  abbrev: BAI10
  heading: Managed Configuration
  text: 'Define and maintain descriptions and relationships among key resources and capabilities required to deliver I&T-enabled
    services. Include collecting configuration information, establishing baselines, verifying and auditing configuration information,
    and updating the configuration repository.


    Purpose: Provide sufficient information about service assets to enable the service to be effectively managed. Assess the
    impact of changes and deal with service incidents.'
  purpose: Provide sufficient information about service assets to enable the service to be effectively managed. Assess the
    impact of changes and deal with service incidents.
  notes: ''
  parent_id: cobit-2019.bai
- id: cobit-2019.bai11
  type: objective
  abbrev: BAI11
  heading: Managed Projects
  text: 'Manage all projects that are initiated within the enterprise in alignment with enterprise strategy and in a coordinated
    way based on the standard project management approach. Initiate, plan, control and execute projects, and close with a
    post-implementation review.


    Purpose: Realize defined project outcomes and reduce the risk of unexpected delays, costs and value erosion by improving
    communications to and involvement of business and end users. Ensure the value and quality of project deliverables and
    maximize their contribution to the defined programs and investment portfolio.'
  purpose: Realize defined project outcomes and reduce the risk of unexpected delays, costs and value erosion by improving
    communications to and involvement of business and end users. Ensure the value and quality of project deliverables and
    maximize their contribution to the defined programs and investment portfolio.
  notes: ''
  parent_id: cobit-2019.bai
- id: cobit-2019.dss01
  type: objective
  abbrev: DSS01
  heading: Managed Operations
  text: 'Coordinate and execute the activities and operational procedures required to deliver internal and outsourced I&T
    services. Include the execution of predefined standard operating procedures and the required monitoring activities.


    Purpose: Deliver I&T operational product and service outcomes as planned.'
  purpose: Deliver I&T operational product and service outcomes as planned.
  notes: ''
  parent_id: cobit-2019.dss
- id: cobit-2019.dss02
  type: objective
  abbrev: DSS02
  heading: Managed Service Requests and Incidents
  text: 'Provide timely and effective response to user requests and resolution of all types of incidents. Restore normal service;
    record and fulfil user requests; and record, investigate, diagnose, escalate and resolve incidents.


    Purpose: Achieve increased productivity and minimize disruptions through quick resolution of user queries and incidents.
    Assess the impact of changes and deal with service incidents. Resolve user requests and restore service in response to
    incidents.'
  purpose: Achieve increased productivity and minimize disruptions through quick resolution of user queries and incidents.
    Assess the impact of changes and deal with service incidents. Resolve user requests and restore service in response to
    incidents.
  notes: ''
  parent_id: cobit-2019.dss
- id: cobit-2019.dss03
  type: objective
  abbrev: DSS03
  heading: Managed Problems
  text: 'Identify and classify problems and their root causes. Provide timely resolution to prevent recurring incidents. Provide
    recommendations for improvements.


    Purpose: Increase availability, improve service levels, reduce costs, improve customer convenience and satisfaction by
    reducing the number of operational problems, and identify root causes as part of problem resolution.'
  purpose: Increase availability, improve service levels, reduce costs, improve customer convenience and satisfaction by reducing
    the number of operational problems, and identify root causes as part of problem resolution.
  notes: ''
  parent_id: cobit-2019.dss
- id: cobit-2019.dss04
  type: objective
  abbrev: DSS04
  heading: Managed Continuity
  text: 'Establish and maintain a plan to enable the business and IT organizations to respond to incidents and quickly adapt
    to disruptions. This will enable continued operations of critical business processes and required I&T services and maintain
    availability of resources, assets and information at a level acceptable to the enterprise.


    Purpose: Adapt rapidly, continue business operations and maintain availability of resources and information at a level
    acceptable to the enterprise in the event of a significant disruption (e.g., threats, opportunities, demands).'
  purpose: Adapt rapidly, continue business operations and maintain availability of resources and information at a level acceptable
    to the enterprise in the event of a significant disruption (e.g., threats, opportunities, demands).
  notes: ''
  parent_id: cobit-2019.dss
- id: cobit-2019.dss05
  type: objective
  abbrev: DSS05
  heading: Managed Security Services
  text: 'Protect enterprise information to maintain the level of information security risk acceptable to the enterprise in
    accordance with the security policy. Establish and maintain information security roles and access privileges. Perform
    security monitoring.


    Purpose: Minimize the business impact of operational information security vulnerabilities and incidents.'
  purpose: Minimize the business impact of operational information security vulnerabilities and incidents.
  notes: ''
  parent_id: cobit-2019.dss
- id: cobit-2019.dss06
  type: objective
  abbrev: DSS06
  heading: Managed Business Process Controls
  text: 'Define and maintain appropriate business process controls to ensure that information related to and processed by
    in-house or outsourced business processes satisfies all relevant information control requirements. Identify the relevant
    information control requirements. Manage and operate adequate input, throughput and output controls (application controls)
    to ensure that information and information processing satisfy these requirements.


    Purpose: Maintain information integrity and the security of information assets handled within business processes in the
    enterprise or its outsourced operation.'
  purpose: Maintain information integrity and the security of information assets handled within business processes in the
    enterprise or its outsourced operation.
  notes: ''
  parent_id: cobit-2019.dss
- id: cobit-2019.mea01
  type: objective
  abbrev: MEA01
  heading: Managed Performance and Conformance Monitoring
  text: 'Collect, validate and evaluate enterprise and alignment goals and metrics. Monitor that processes and practices are
    performing against agreed performance and conformance goals and metrics. Provide reporting that is systematic and timely.


    Purpose: Provide transparency of performance and conformance and drive achievement of goals.'
  purpose: Provide transparency of performance and conformance and drive achievement of goals.
  notes: ''
  parent_id: cobit-2019.mea
- id: cobit-2019.mea02
  type: objective
  abbrev: MEA02
  heading: Managed System of Internal Control
  text: 'Continuously monitor and evaluate the control environment, including self-assessments and self-awareness. Enable
    management to identify control deficiencies and inefficiencies and to initiate improvement actions. Plan, organize and
    maintain standards for internal control assessment and process control effectiveness.


    Purpose: Obtain transparency for key stakeholders on the adequacy of the system of internal controls and thus provide
    trust in operations, confidence in the achievement of enterprise objectives and an adequate understanding of residual
    risk.'
  purpose: Obtain transparency for key stakeholders on the adequacy of the system of internal controls and thus provide trust
    in operations, confidence in the achievement of enterprise objectives and an adequate understanding of residual risk.
  notes: ''
  parent_id: cobit-2019.mea
- id: cobit-2019.mea03
  type: objective
  abbrev: MEA03
  heading: Managed Compliance With External Requirements
  text: 'Evaluate that I&T processes and I&T-supported business processes are compliant with laws, regulations and contractual
    requirements. Obtain assurance that the requirements have been identified and complied with; integrate IT compliance with
    overall enterprise compliance.


    Purpose: Ensure that the enterprise is compliant with all applicable external requirements.'
  purpose: Ensure that the enterprise is compliant with all applicable external requirements.
  notes: ''
  parent_id: cobit-2019.mea
- id: cobit-2019.mea04
  type: objective
  abbrev: MEA04
  heading: Managed Assurance
  text: 'Plan, scope and execute assurance initiatives to comply with internal requirements, laws, regulations and strategic
    objectives. Enable management to deliver adequate and sustainable assurance in the enterprise by performing independent
    assurance reviews and activities.


    Purpose: Enable the organization to design and develop efficient and effective assurance initiatives, providing guidance
    on planning, scoping, executing and following up on assurance reviews, using a road map based on well-accepted assurance
    approaches.'
  purpose: Enable the organization to design and develop efficient and effective assurance initiatives, providing guidance
    on planning, scoping, executing and following up on assurance reviews, using a road map based on well-accepted assurance
    approaches.
  notes: ''
  parent_id: cobit-2019.mea
- id: cobit-2019.edm01.01
  type: practice
  abbrev: EDM01.01
  heading: Evaluate the governance system.
  text: Continually identify and engage with the enterprise's stakeholders, document an understanding of the requirements,
    and evaluate the current and future design of governance of enterprise I&T.
  notes: ''
  parent_id: cobit-2019.edm01
- id: cobit-2019.edm01.02
  type: practice
  abbrev: EDM01.02
  heading: Direct the governance system.
  text: Inform leaders on I&T governance principles and obtain their support, buy-in and commitment. Guide the structures,
    processes and practices for the governance of I&T in line with the agreed governance principles, decision-making models
    and authority levels. Define the information required for informed decision making.
  notes: ''
  parent_id: cobit-2019.edm01
- id: cobit-2019.edm01.03
  type: practice
  abbrev: EDM01.03
  heading: Monitor the governance system.
  text: Monitor the effectiveness and performance of the enterprise’s governance of I&T. Assess whether the governance system
    and implemented mechanisms (including structures, principles and processes) are operating effectively and provide appropriate
    oversight of I&T to enable value creation.
  notes: ''
  parent_id: cobit-2019.edm01
- id: cobit-2019.edm02.01
  type: practice
  abbrev: EDM02.01
  heading: Establish the target investment mix.
  text: Review and ensure clarity of the enterprise and I&T strategies and current services. Define an appropriate investment
    mix based on cost, alignment with strategy, type of benefit for the programs in the portfolio, degree of risk, and financial
    measures such as cost and expected return on investment (ROI) over the full economic life cycle. Adjust the enterprise
    and I&T strategies where necessary.
  notes: ''
  parent_id: cobit-2019.edm02
- id: cobit-2019.edm02.02
  type: practice
  abbrev: EDM02.02
  heading: Evaluate value optimization.
  text: Continually evaluate the portfolio of I&T-enabled investments, services and assets to determine the likelihood of
    achieving enterprise objectives and delivering value. Identify and evaluate any changes in direction to management that
    will optimize value creation.
  notes: ''
  parent_id: cobit-2019.edm02
- id: cobit-2019.edm02.03
  type: practice
  abbrev: EDM02.03
  heading: Direct value optimization.
  text: Direct value management principles and practices to enable optimal value realization from I&T-enabled investments
    throughout their full economic life cycle.
  notes: ''
  parent_id: cobit-2019.edm02
- id: cobit-2019.edm02.04
  type: practice
  abbrev: EDM02.04
  heading: Monitor value optimization.
  text: Monitor key goals and metrics to determine whether the enterprise receives expected value and benefit from I&T-enabled
    investments and services. Identify significant issues and consider corrective actions.
  notes: ''
  parent_id: cobit-2019.edm02
- id: cobit-2019.edm03.01
  type: practice
  abbrev: EDM03.01
  heading: Evaluate risk management.
  text: Continually examine and evaluate the effect of risk on the current and future use of I&T in the enterprise. Consider
    whether the enterprise's risk appetite is appropriate and ensure that risk to enterprise value related to the use of I&T
    is identified and managed.
  notes: ''
  parent_id: cobit-2019.edm03
- id: cobit-2019.edm03.02
  type: practice
  abbrev: EDM03.02
  heading: Direct risk management.
  text: Direct the establishment of risk management practices to provide reasonable assurance that I&T risk management practices
    are appropriate and that actual I&T risk does not exceed the board’s risk appetite.
  notes: ''
  parent_id: cobit-2019.edm03
- id: cobit-2019.edm03.03
  type: practice
  abbrev: EDM03.03
  heading: Monitor risk management.
  text: Monitor the key goals and metrics of the risk management processes. Determine how deviations or problems will be identified,
    tracked and reported for remediation.
  notes: ''
  parent_id: cobit-2019.edm03
- id: cobit-2019.edm04.01
  type: practice
  abbrev: EDM04.01
  heading: Evaluate resource management.
  text: Continually examine and evaluate the current and future need for business and I&T resources (financial and human),
    options for resourcing (including sourcing strategies), and allocation and management principles to meet the needs of
    the enterprise in the optimal manner.
  notes: ''
  parent_id: cobit-2019.edm04
- id: cobit-2019.edm04.02
  type: practice
  abbrev: EDM04.02
  heading: Direct resource management.
  text: Ensure the adoption of resource management principles to enable optimal use of business and I&T resources throughout
    their full economic life cycle.
  notes: ''
  parent_id: cobit-2019.edm04
- id: cobit-2019.edm04.03
  type: practice
  abbrev: EDM04.03
  heading: Monitor resource management.
  text: Monitor the key goals and metrics of the resource management processes. Determine how deviations or problems will
    be identified, tracked and reported for remediation.
  notes: ''
  parent_id: cobit-2019.edm04
- id: cobit-2019.edm05.01
  type: practice
  abbrev: EDM05.01
  heading: Evaluate stakeholder engagement and reporting requirements.
  text: Continually examine and evaluate current and future requirements for stakeholder engagement and reporting (including
    reporting mandated by regulatory requirements), and communication to other stakeholders. Establish principles for engaging
    and communicating with stakeholders.
  notes: ''
  parent_id: cobit-2019.edm05
- id: cobit-2019.edm05.02
  type: practice
  abbrev: EDM05.02
  heading: Direct stakeholder engagement, communication and reporting.
  text: Ensure the establishment of effective stakeholder involvement, communication and reporting, including mechanisms for
    ensuring the quality and completeness of information, overseeing mandatory reporting, and creating a communication strategy
    for stakeholders.
  notes: ''
  parent_id: cobit-2019.edm05
- id: cobit-2019.edm05.03
  type: practice
  abbrev: EDM05.03
  heading: Monitor stakeholder engagement.
  text: Monitor stakeholder engagement levels and the effectiveness of stakeholder communication. Assess mechanisms for ensuring
    accuracy, reliability and effectiveness, and ascertain whether the requirements of different stakeholders in terms of
    reporting and communication are met.
  notes: ''
  parent_id: cobit-2019.edm05
- id: cobit-2019.apo01.01
  type: practice
  abbrev: APO01.01
  heading: Design the management system for enterprise I&T.
  text: Design a management system tailored to the needs of the enterprise. Management needs of the enterprise are defined
    through the use of the goals cascade and by application of design factors. Ensure the governance components are integrated
    and aligned with the enterprise’s governance and management philosophy and operating style.
  notes: ''
  parent_id: cobit-2019.apo01
- id: cobit-2019.apo01.02
  type: practice
  abbrev: APO01.02
  heading: Communicate management objectives, direction and decisions made.
  text: Communicate awareness and promote understanding of alignment and I&T objectives to stakeholders throughout the enterprise.
    Communicate at regular intervals on important I&T-related decisions and their impact for the organization.
  notes: ''
  parent_id: cobit-2019.apo01
- id: cobit-2019.apo01.03
  type: practice
  abbrev: APO01.03
  heading: Implement management processes (to support the achievement of governance and management objectives).
  text: Define target process capability levels and implementation priority based on the management system design.
  notes: ''
  parent_id: cobit-2019.apo01
- id: cobit-2019.apo01.04
  type: practice
  abbrev: APO01.04
  heading: Define and implement the organizational structures.
  text: Put in place the required internal and extended organizational structures (e.g., committees) per the management system
    design, enabling effective and efficient decision making. Ensure that required technology and information knowledge is
    included in the composition of management structures.
  notes: ''
  parent_id: cobit-2019.apo01
- id: cobit-2019.apo01.05
  type: practice
  abbrev: APO01.05
  heading: Establish roles and responsibilities.
  text: Define and communicate roles and responsibilities for enterprise I&T, including authority levels, responsibilities
    and accountability.
  notes: ''
  parent_id: cobit-2019.apo01
- id: cobit-2019.apo01.06
  type: practice
  abbrev: APO01.06
  heading: Optimize the placement of the IT function.
  text: Position the IT capabilities in the overall organizational structure to reflect the strategic importance and operational
    dependency of IT within the enterprise. The reporting line of the CIO and representation of IT within senior management
    should be commensurate with the importance of I&T within the enterprise.
  notes: ''
  parent_id: cobit-2019.apo01
- id: cobit-2019.apo01.07
  type: practice
  abbrev: APO01.07
  heading: Define information (data) and system ownership.
  text: Define and maintain responsibilities for ownership of information (data) and information systems. Ensure that owners
    classify information and systems and protect them in line with their classification.
  notes: ''
  parent_id: cobit-2019.apo01
- id: cobit-2019.apo01.08
  type: practice
  abbrev: APO01.08
  heading: Define target skills and competencies.
  text: Define the required skills and competencies to achieve relevant management objectives.
  notes: ''
  parent_id: cobit-2019.apo01
- id: cobit-2019.apo01.09
  type: practice
  abbrev: APO01.09
  heading: Define and communicate policies and procedures.
  text: Put in place procedures to maintain compliance with and performance measurement of policies and other components of
    the control framework. Enforce the consequences of noncompliance or inadequate performance. Track trends and performance
    and consider these in the future design and improvement of the control framework.
  notes: ''
  parent_id: cobit-2019.apo01
- id: cobit-2019.apo01.10
  type: practice
  abbrev: APO01.10
  heading: Define and implement infrastructure, services and applications to support the governance and management system.
  text: Define and implement infrastructure, services and applications to support the governance and management system (e.g.,
    architecture repositories, risk management system, project management tools, cost-tracking tools and incident monitoring
    tools).
  notes: ''
  parent_id: cobit-2019.apo01
- id: cobit-2019.apo01.11
  type: practice
  abbrev: APO01.11
  heading: Manage continual improvement of the I&T management system.
  text: Continually improve processes and other management system components to ensure that they can deliver against governance
    and management objectives. Consider COBIT implementation guidance, emerging standards, compliance requirements, automation
    opportunities and the feedback of stakeholders.
  notes: ''
  parent_id: cobit-2019.apo01
- id: cobit-2019.apo02.01
  type: practice
  abbrev: APO02.01
  heading: Understand enterprise context and direction.
  text: Understand the enterprise context (industry drivers, relevant regulations, basis for competition), its current way
    of working and its ambition level in terms of digitization.
  notes: ''
  parent_id: cobit-2019.apo02
- id: cobit-2019.apo02.02
  type: practice
  abbrev: APO02.02
  heading: Assess current capabilities, performance and digital maturity of the enterprise.
  text: Assess the performance of current I&T services and develop an understanding of current business and I&T capabilities
    (both internal and external). Assess current digital maturity of the enterprise and its appetite for change.
  notes: ''
  parent_id: cobit-2019.apo02
- id: cobit-2019.apo02.03
  type: practice
  abbrev: APO02.03
  heading: Define target digital capabilities.
  text: Based on the understanding of enterprise context and direction, define the target I&T products and services and required
    capabilities. Consider reference standards, best practices and validated emerging technologies.
  notes: ''
  parent_id: cobit-2019.apo02
- id: cobit-2019.apo02.04
  type: practice
  abbrev: APO02.04
  heading: Conduct a gap analysis.
  text: Identify gaps between current and target environments and describe the high-level changes in the enterprise architecture.
  notes: ''
  parent_id: cobit-2019.apo02
- id: cobit-2019.apo02.05
  type: practice
  abbrev: APO02.05
  heading: Define the strategic plan and road map.
  text: Develop a holistic digital strategy, in cooperation with relevant stakeholders, and detail a road map that defines
    the incremental steps required to achieve the goals and objectives. Ensure focus on the transformation journey through
    the appointment of a person who helps spearhead the digital transformation and drives alignment between business and I&T.
  notes: ''
  parent_id: cobit-2019.apo02
- id: cobit-2019.apo02.06
  type: practice
  abbrev: APO02.06
  heading: Communicate the I&T strategy and direction.
  text: Create awareness and understanding of the business and I&T objectives and direction, as captured in the I&T strategy,
    through communication to appropriate stakeholders and users throughout the enterprise.
  notes: ''
  parent_id: cobit-2019.apo02
- id: cobit-2019.apo03.01
  type: practice
  abbrev: APO03.01
  heading: Develop the enterprise architecture vision.
  text: The architecture vision provides a first-cut, high-level description of the baseline and target architectures, covering
    the business, information, data, application and technology domains. The architecture vision provides the sponsor with
    a key tool to sell the benefits of the proposed capabilities to stakeholders within the enterprise. The architecture vision
    describes how the new capabilities (in line with I&T strategy and objectives) will meet enterprise goals and strategic
    objectives and address stakeholder concerns when implemented.
  notes: ''
  parent_id: cobit-2019.apo03
- id: cobit-2019.apo03.02
  type: practice
  abbrev: APO03.02
  heading: Define reference architecture.
  text: The reference architecture describes the current and target architectures for the business, information, data, application
    and technology domains.
  notes: ''
  parent_id: cobit-2019.apo03
- id: cobit-2019.apo03.03
  type: practice
  abbrev: APO03.03
  heading: Select opportunities and solutions.
  text: Rationalize the gaps between baseline and target architectures, accounting for both business and technical perspectives,
    and logically group them into project work packages. Integrate the project with any related I&T-enabled investment programs
    to ensure that the architectural initiatives are aligned with and enable these initiatives as part of overall enterprise
    change. Make this a collaborative effort with key enterprise stakeholders from business and IT to assess the enterprise's
    transformation readiness, and identify opportunities, solutions and all implementation constraints.
  notes: ''
  parent_id: cobit-2019.apo03
- id: cobit-2019.apo03.04
  type: practice
  abbrev: APO03.04
  heading: Define architecture implementation.
  text: Create a viable implementation and migration plan in alignment with the program and project portfolios. Ensure the
    plan is closely coordinated to deliver value and that the required resources are available to complete the necessary work.
  notes: ''
  parent_id: cobit-2019.apo03
- id: cobit-2019.apo03.05
  type: practice
  abbrev: APO03.05
  heading: Provide enterprise architecture services.
  text: Provide enterprise architecture services within the enterprise that include guidance to and monitoring of implementation
    projects, formalizing ways of working through architecture contracts, and measuring and communicating architecture's value
    and compliance monitoring.
  notes: ''
  parent_id: cobit-2019.apo03
- id: cobit-2019.apo04.01
  type: practice
  abbrev: APO04.01
  heading: Create an environment conducive to innovation.
  text: Create an environment that is conducive to innovation, considering methods such as culture, reward, collaboration,
    technology forums, and mechanisms to promote and capture employee ideas.
  notes: ''
  parent_id: cobit-2019.apo04
- id: cobit-2019.apo04.02
  type: practice
  abbrev: APO04.02
  heading: Maintain an understanding of the enterprise environment.
  text: Work with relevant stakeholders to understand their challenges. Maintain an adequate understanding of enterprise strategy,
    competitive environment and other constraints, so that opportunities enabled by new technologies can be identified.
  notes: ''
  parent_id: cobit-2019.apo04
- id: cobit-2019.apo04.03
  type: practice
  abbrev: APO04.03
  heading: Monitor and scan the technology environment.
  text: Set up a technology watch process to perform systematic monitoring and scanning of the enterprise's external environment
    to identify emerging technologies that have the potential to create value (e.g., by realizing the enterprise strategy,
    optimizing costs, avoiding obsolescence, and better enabling enterprise and I&T processes). Monitor the marketplace, competitive
    landscape, industry sectors, and legal and regulatory trends to be able to analyze emerging technologies or innovation
    ideas in the enterprise context.
  notes: ''
  parent_id: cobit-2019.apo04
- id: cobit-2019.apo04.04
  type: practice
  abbrev: APO04.04
  heading: Assess the potential of emerging technologies and innovative ideas.
  text: Analyze identified emerging technologies and/or other I&T innovative suggestions to understand their business potential.
    Work with stakeholders to validate assumptions on the potential of new technologies and innovation.
  notes: ''
  parent_id: cobit-2019.apo04
- id: cobit-2019.apo04.05
  type: practice
  abbrev: APO04.05
  heading: Recommend appropriate further initiatives.
  text: Evaluate and monitor the results of proof-of-concept initiatives and, if favorable, generate recommendations for further
    initiatives. Gain stakeholder support.
  notes: ''
  parent_id: cobit-2019.apo04
- id: cobit-2019.apo04.06
  type: practice
  abbrev: APO04.06
  heading: Monitor the implementation and use of innovation.
  text: Monitor the implementation and use of emerging technologies and innovations during adoption, integration and for the
    full economic life cycle to ensure that the promised benefits are realized and to identify lessons learned.
  notes: ''
  parent_id: cobit-2019.apo04
- id: cobit-2019.apo05.01
  type: practice
  abbrev: APO05.01
  heading: Determine the availability and sources of funds.
  text: Determine potential sources of funds, different funding options and the implications of the funding source on the
    investment return expectations.
  notes: ''
  parent_id: cobit-2019.apo05
- id: cobit-2019.apo05.02
  type: practice
  abbrev: APO05.02
  heading: Evaluate and select programs to fund.
  text: Based on requirements for the overall investment portfolio mix and the I&T strategic plan and road map, evaluate and
    prioritize program business cases and decide on investment proposals. Allocate funds and initiate programs.
  notes: ''
  parent_id: cobit-2019.apo05
- id: cobit-2019.apo05.03
  type: practice
  abbrev: APO05.03
  heading: Monitor, optimize and report on investment portfolio performance.
  text: On a regular basis, monitor and optimize the performance of the investment portfolio and individual programs throughout
    the entire investment life cycle. Ensure continuous follow-up on the alignment of the portfolio with I&T strategy.
  notes: ''
  parent_id: cobit-2019.apo05
- id: cobit-2019.apo05.04
  type: practice
  abbrev: APO05.04
  heading: Maintain portfolios.
  text: Maintain portfolios of investment programs and projects, I&T products and services, and I&T assets.
  notes: ''
  parent_id: cobit-2019.apo05
- id: cobit-2019.apo05.05
  type: practice
  abbrev: APO05.05
  heading: Manage benefits achievement.
  text: Monitor the benefits of providing and maintaining appropriate I&T products, services and capabilities, based on the
    agreed and current business case.
  notes: ''
  parent_id: cobit-2019.apo05
- id: cobit-2019.apo06.01
  type: practice
  abbrev: APO06.01
  heading: Manage finance and accounting.
  text: Establish and maintain a method to manage and account for all I&T-related costs, investments and depreciation as an
    integral part of enterprise financial systems and accounts. Report using the enterprise’s financial measurement systems.
  notes: ''
  parent_id: cobit-2019.apo06
- id: cobit-2019.apo06.02
  type: practice
  abbrev: APO06.02
  heading: Prioritize resource allocation.
  text: Implement a decision-making process to prioritize the allocation of resources and establish rules for discretionary
    investments by individual business units. Include the potential use of external service providers and consider the buy,
    develop and rent options.
  notes: ''
  parent_id: cobit-2019.apo06
- id: cobit-2019.apo06.03
  type: practice
  abbrev: APO06.03
  heading: Create and maintain budgets.
  text: Prepare a budget reflecting investment priorities based on the portfolio of I&T-enabled programs and I&T services.
  notes: ''
  parent_id: cobit-2019.apo06
- id: cobit-2019.apo06.04
  type: practice
  abbrev: APO06.04
  heading: Model and allocate costs.
  text: Establish and use an I&T costing model based, for example, on the service definition. This approach ensures that allocation
    of costs for services is identifiable, measurable and predictable, and encourages the responsible use of resources, including
    those provided by service providers. Regularly review and benchmark the cost/chargeback model to maintain its relevance
    and appropriateness for evolving business and IT activities.
  notes: ''
  parent_id: cobit-2019.apo06
- id: cobit-2019.apo06.05
  type: practice
  abbrev: APO06.05
  heading: Manage costs.
  text: Implement a cost management process that compares actual costs against budget. Costs should be monitored and reported.
    Deviations from budget should be identified in a timely manner and their impact on enterprise processes and services assessed.
  notes: ''
  parent_id: cobit-2019.apo06
- id: cobit-2019.apo07.01
  type: practice
  abbrev: APO07.01
  heading: Acquire and maintain adequate and appropriate staffing.
  text: Evaluate internal and external staffing requirements on a regular basis or upon major changes to the enterprise or
    operational or IT environments to ensure that the enterprise has sufficient human resources to support enterprise goals
    and objectives.
  notes: ''
  parent_id: cobit-2019.apo07
- id: cobit-2019.apo07.02
  type: practice
  abbrev: APO07.02
  heading: Identify key IT personnel.
  text: Identify key IT personnel. Use knowledge capture (documentation), knowledge sharing, succession planning and staff
    backup to minimize reliance on a single individual performing a critical job function.
  notes: ''
  parent_id: cobit-2019.apo07
- id: cobit-2019.apo07.03
  type: practice
  abbrev: APO07.03
  heading: Maintain the skills and competencies of personnel.
  text: Define and manage the skills and competencies required of personnel. Regularly verify that personnel have the competencies
    to fulfill their roles on the basis of their education, training and/or experience. Verify that these competencies are
    being maintained, using qualification and certification programs where appropriate. Provide employees with ongoing learning
    and opportunities to maintain their knowledge, skills and competencies at a level required to achieve enterprise goals.
  notes: ''
  parent_id: cobit-2019.apo07
- id: cobit-2019.apo07.04
  type: practice
  abbrev: APO07.04
  heading: Assess and recognize/reward employee job performance.
  text: Conduct timely, regular performance evaluations against individual objectives derived from enterprise goals, established
    standards, specific job responsibilities, and the skills and competency framework. Implement a remuneration/recognition
    process that rewards successful attainment of performance goals.
  notes: ''
  parent_id: cobit-2019.apo07
- id: cobit-2019.apo07.05
  type: practice
  abbrev: APO07.05
  heading: Plan and track the usage of IT and business human resources.
  text: Understand and track the current and future demand for business and IT human resources with responsibilities for enterprise
    I&T. Identify shortfalls and provide input into sourcing plans, enterprise and IT recruitment processes, and business
    and IT recruitment processes.
  notes: ''
  parent_id: cobit-2019.apo07
- id: cobit-2019.apo07.06
  type: practice
  abbrev: APO07.06
  heading: Manage contract staff.
  text: Ensure that consultants and contract personnel who support the enterprise with I&T skills know and comply with the
    organization's policies and meet agreed contractual requirements.
  notes: ''
  parent_id: cobit-2019.apo07
- id: cobit-2019.apo08.01
  type: practice
  abbrev: APO08.01
  heading: Understand business expectations.
  text: Understand current business issues, objectives and expectations for I&T. Ensure that requirements are understood,
    managed and communicated, and their status agreed and approved.
  notes: ''
  parent_id: cobit-2019.apo08
- id: cobit-2019.apo08.02
  type: practice
  abbrev: APO08.02
  heading: Align I&T strategy with business expectations and identify opportunities for IT to enhance the business.
  text: Align I&T strategies with current business objectives and expectations to enable IT to be a value-add partner for
    the business and a governance component for enhanced enterprise performance.
  notes: ''
  parent_id: cobit-2019.apo08
- id: cobit-2019.apo08.03
  type: practice
  abbrev: APO08.03
  heading: Manage the business relationship.
  text: Manage the relationship between the IT service organization and its business partners. Ensure that relationship roles
    and responsibilities are defined and assigned, and communication is facilitated.
  notes: ''
  parent_id: cobit-2019.apo08
- id: cobit-2019.apo08.04
  type: practice
  abbrev: APO08.04
  heading: Coordinate and communicate.
  text: Work with all relevant stakeholders and coordinate the end-to-end delivery of I&T services and solutions provided
    to the business.
  notes: ''
  parent_id: cobit-2019.apo08
- id: cobit-2019.apo08.05
  type: practice
  abbrev: APO08.05
  heading: Provide input to the continual improvement of services.
  text: Continually improve and evolve I&T-enabled services and service delivery to the enterprise to align with changing
    enterprise objectives and technology requirements.
  notes: ''
  parent_id: cobit-2019.apo08
- id: cobit-2019.apo09.01
  type: practice
  abbrev: APO09.01
  heading: Identify I&T services.
  text: Analyze business requirements and the degree to which I&T-enabled services and service levels support business processes.
    Discuss and agree with the business on potential services and service levels. Compare potential service levels against
    the current service portfolio; identify new or changed services or service level options.
  notes: ''
  parent_id: cobit-2019.apo09
- id: cobit-2019.apo09.02
  type: practice
  abbrev: APO09.02
  heading: Catalog I&T-enabled services.
  text: Define and maintain one or more service catalogues for relevant target groups. Publish and maintain live I&T-enabled
    services in the service catalogs.
  notes: ''
  parent_id: cobit-2019.apo09
- id: cobit-2019.apo09.03
  type: practice
  abbrev: APO09.03
  heading: Define and prepare service agreements.
  text: Define and prepare service agreements based on options in the service catalogues. Include internal operational agreements.
  notes: ''
  parent_id: cobit-2019.apo09
- id: cobit-2019.apo09.04
  type: practice
  abbrev: APO09.04
  heading: Monitor and report service levels.
  text: Monitor service levels, report on achievements and identify trends. Provide the appropriate management information
    to aid performance management.
  notes: ''
  parent_id: cobit-2019.apo09
- id: cobit-2019.apo09.05
  type: practice
  abbrev: APO09.05
  heading: Review service agreements and contracts.
  text: Conduct periodic reviews of the service agreements and revise when needed.
  notes: ''
  parent_id: cobit-2019.apo09
- id: cobit-2019.apo10.01
  type: practice
  abbrev: APO10.01
  heading: Identify and evaluate vendor relationships and contracts.
  text: Continuously search for and identify vendors and categorize them into type, significance and criticality. Establish
    criteria to evaluate vendors and contracts. Review the overall portfolio of existing and alternative vendors and contracts.
  notes: ''
  parent_id: cobit-2019.apo10
- id: cobit-2019.apo10.02
  type: practice
  abbrev: APO10.02
  heading: Select vendors.
  text: Select suppliers according to a fair and formal practice to ensure a viable best fit based on specified requirements.
    Requirements should be optimized with input from potential suppliers.
  notes: ''
  parent_id: cobit-2019.apo10
- id: cobit-2019.apo10.03
  type: practice
  abbrev: APO10.03
  heading: Manage vendor relationships and contracts.
  text: Formalize and manage the supplier relationship for each supplier. Manage, maintain and monitor contracts and service
    delivery. Ensure that new or changed contracts conform to enterprise standards and legal and regulatory requirements.
    Deal with contractual disputes.
  notes: ''
  parent_id: cobit-2019.apo10
- id: cobit-2019.apo10.04
  type: practice
  abbrev: APO10.04
  heading: Manage vendor risk.
  text: Identify and manage risk relating to vendors' ability to continually provide secure, efficient and effective service
    delivery. This also includes the subcontractors or upstream vendors that are relevant in the service delivery of the direct
    vendor.
  notes: ''
  parent_id: cobit-2019.apo10
- id: cobit-2019.apo10.05
  type: practice
  abbrev: APO10.05
  heading: Monitor vendor performance and compliance.
  text: Periodically review overall vendor performance, compliance to contract requirements and value for money. Address identified
    issues.
  notes: ''
  parent_id: cobit-2019.apo10
- id: cobit-2019.apo11.01
  type: practice
  abbrev: APO11.01
  heading: Establish a quality management system (QMS).
  text: Establish and maintain a quality management system (QMS) that provides a standard, formal and continuous approach
    to quality management of information. The QMS should enable technology and business processes to align with business requirements
    and enterprise quality management.
  notes: ''
  parent_id: cobit-2019.apo11
- id: cobit-2019.apo11.02
  type: practice
  abbrev: APO11.02
  heading: Focus quality management on customers.
  text: Focus quality management on customers by determining their requirements and ensuring integration in quality management
    practices.
  notes: ''
  parent_id: cobit-2019.apo11
- id: cobit-2019.apo11.03
  type: practice
  abbrev: APO11.03
  heading: Manage quality standards, practices and procedures and integrate quality management into key processes and solutions.
  text: Identify and maintain standards, procedures and practices for key processes to guide the enterprise in meeting the
    intent of the agreed quality management standards (QMS). This activity should align with I&T control framework requirements.
    Consider certification for key processes, organizational units, products or services.
  notes: ''
  parent_id: cobit-2019.apo11
- id: cobit-2019.apo11.04
  type: practice
  abbrev: APO11.04
  heading: Perform quality monitoring, control and reviews.
  text: Monitor the quality of processes and services on an ongoing basis, in line with quality management standards. Define,
    plan and implement measurements to monitor customer satisfaction with quality as well as the value provided by the quality
    management system (QMS). The information gathered should be used by the process owner to improve quality.
  notes: ''
  parent_id: cobit-2019.apo11
- id: cobit-2019.apo11.05
  type: practice
  abbrev: APO11.05
  heading: Maintain continuous improvement.
  text: Maintain and regularly communicate an overall quality plan that promotes continuous improvement. The plan should define
    the need for, and benefits of, continuous improvement. Collect and analyze data about the quality management system (QMS)
    and improve its effectiveness. Correct nonconformities to prevent recurrence.
  notes: ''
  parent_id: cobit-2019.apo11
- id: cobit-2019.apo12.01
  type: practice
  abbrev: APO12.01
  heading: Collect data.
  text: Identify and collect relevant data to enable effective I&T-related risk identification, analysis and reporting.
  notes: ''
  parent_id: cobit-2019.apo12
- id: cobit-2019.apo12.02
  type: practice
  abbrev: APO12.02
  heading: Analyze risk.
  text: Develop a substantiated view on actual I&T risk, in support of risk decisions.
  notes: ''
  parent_id: cobit-2019.apo12
- id: cobit-2019.apo12.03
  type: practice
  abbrev: APO12.03
  heading: Maintain a risk profile.
  text: Maintain an inventory of known risk and risk attributes, including expected frequency, potential impact and responses.
    Document related resources, capabilities and current control activities related to risk items.
  notes: ''
  parent_id: cobit-2019.apo12
- id: cobit-2019.apo12.04
  type: practice
  abbrev: APO12.04
  heading: Articulate risk.
  text: Communicate information on the current state of I&T-related exposures and opportunities in a timely manner to all
    required stakeholders for appropriate response.
  notes: ''
  parent_id: cobit-2019.apo12
- id: cobit-2019.apo12.05
  type: practice
  abbrev: APO12.05
  heading: Define a risk management action portfolio.
  text: Manage opportunities to reduce risk to an acceptable level as a portfolio.
  notes: ''
  parent_id: cobit-2019.apo12
- id: cobit-2019.apo12.06
  type: practice
  abbrev: APO12.06
  heading: Respond to risk.
  text: Respond in a timely manner to materialized risk events with effective measures to limit the magnitude of loss.
  notes: ''
  parent_id: cobit-2019.apo12
- id: cobit-2019.apo13.01
  type: practice
  abbrev: APO13.01
  heading: Establish and maintain an information security management system (ISMS).
  text: Establish and maintain an information security management system (ISMS) that provides a standard, formal and continuous
    approach to security and privacy management for information. Ensure that the system supports secure technology and business
    processes that are aligned with business requirements, enterprise security and enterprise privacy management.
  notes: ''
  parent_id: cobit-2019.apo13
- id: cobit-2019.apo13.02
  type: practice
  abbrev: APO13.02
  heading: Define and manage an information security risk treatment plan.
  text: Maintain an information security plan that describes how information security risk is to be managed and aligned with
    enterprise strategy and architecture. Ensure that recommendations for implementing security improvements are based on
    approved business cases, implemented as an integral part of services and solutions development, and operated as an integral
    part of business operation.
  notes: ''
  parent_id: cobit-2019.apo13
- id: cobit-2019.apo13.03
  type: practice
  abbrev: APO13.03
  heading: Monitor and review the information security management system (ISMS).
  text: Maintain and regularly communicate the need for, and benefits of, continuous improvement in information security.
    Collect and analyze data about the information security management system (ISMS), and improve its effectiveness. Correct
    nonconformities to prevent recurrence.
  notes: ''
  parent_id: cobit-2019.apo13
- id: cobit-2019.apo14.01
  type: practice
  abbrev: APO14.01
  heading: Define and communicate the organization's data management strategy and roles and responsibilities.
  text: Define how to manage and improve the organization's data assets, in line with enterprise strategy and objectives.
    Communicate the data management strategy to all stakeholders. Assign roles and responsibilities to ensure that corporate
    data are managed as critical assets and the data management strategy is implemented and maintained in an effective and
    sustainable manner.
  notes: ''
  parent_id: cobit-2019.apo14
- id: cobit-2019.apo14.02
  type: practice
  abbrev: APO14.02
  heading: Define and maintain a consistent business glossary.
  text: Create, approve, update and promote consistent business terms and definitions to foster shared data usage across the
    organization.
  notes: ''
  parent_id: cobit-2019.apo14
- id: cobit-2019.apo14.03
  type: practice
  abbrev: APO14.03
  heading: Establish the processes and infrastructure for metadata management.
  text: Establish the processes and infrastructure for specifying and extending metadata about the organization's data assets,
    fostering and supporting data sharing, ensuring compliant use of data, improving responsiveness to business changes and
    reducing data-related risk.
  notes: ''
  parent_id: cobit-2019.apo14
- id: cobit-2019.apo14.04
  type: practice
  abbrev: APO14.04
  heading: Define a data quality strategy.
  text: Define an integrated, organizationwide strategy to achieve and maintain the level of data quality (such as complexity,
    integrity, accuracy, completeness, validity, traceability and timeliness) required to support the business goals and objectives.
  notes: ''
  parent_id: cobit-2019.apo14
- id: cobit-2019.apo14.05
  type: practice
  abbrev: APO14.05
  heading: Establish data profiling methodologies, processes and tools.
  text: Implement standardized data profiling methodologies, processes, practices, tools and templates that can be applied
    across multiple data repositories and data stores.
  notes: ''
  parent_id: cobit-2019.apo14
- id: cobit-2019.apo14.06
  type: practice
  abbrev: APO14.06
  heading: Ensure a data quality assessment approach.
  text: Provide a systematic approach to measure and evaluate data quality according to processes and techniques, and against
    data quality rules.
  notes: ''
  parent_id: cobit-2019.apo14
- id: cobit-2019.apo14.07
  type: practice
  abbrev: APO14.07
  heading: Define the data cleansing approach.
  text: Define the mechanisms, rules, processes, and methods to validate and correct data according to predefined business
    rules.
  notes: ''
  parent_id: cobit-2019.apo14
- id: cobit-2019.apo14.08
  type: practice
  abbrev: APO14.08
  heading: Manage the life cycle of data assets.
  text: Ensure that the organization understands, maps, inventories and controls its data flows through business processes
    over the data life cycle, from creation or acquisition to retirement.
  notes: ''
  parent_id: cobit-2019.apo14
- id: cobit-2019.apo14.09
  type: practice
  abbrev: APO14.09
  heading: Support data archiving and retention.
  text: Ensure that data maintenance satisfies organizational and regulatory requirements for availability of historical data.
    Ensure that legal and regulatory requirements for data archiving and retention are met.
  notes: ''
  parent_id: cobit-2019.apo14
- id: cobit-2019.apo14.10
  type: practice
  abbrev: APO14.10
  heading: Manage data backup and restore arrangements.
  text: Manage availability of critical data to ensure operational continuity.
  notes: ''
  parent_id: cobit-2019.apo14
- id: cobit-2019.bai01.01
  type: practice
  abbrev: BAI01.01
  heading: Maintain a standard approach for program management.
  text: Maintain a standard approach for program management that enables governance and management review, decision-making
    and delivery-management activities. These activities should focus consistently on business value and goals (i.e., requirements,
    risk, costs, schedule and quality targets).
  notes: ''
  parent_id: cobit-2019.bai01
- id: cobit-2019.bai01.02
  type: practice
  abbrev: BAI01.02
  heading: Initiate a program.
  text: Initiate a program to confirm expected benefits and obtain authorization to proceed. This includes agreeing on program
    sponsorship, confirming the program mandate through approval of the conceptual business case, appointing program board
    or committee members, producing the program brief, reviewing and updating the business case, developing a benefits realization
    plan, and obtaining approval from sponsors to proceed.
  notes: ''
  parent_id: cobit-2019.bai01
- id: cobit-2019.bai01.03
  type: practice
  abbrev: BAI01.03
  heading: Manage stakeholder engagement.
  text: Manage stakeholder engagement to ensure an active exchange of accurate, consistent and timely information for all
    relevant stakeholders. This includes planning, identifying and engaging stakeholders and managing their expectations.
  notes: ''
  parent_id: cobit-2019.bai01
- id: cobit-2019.bai01.04
  type: practice
  abbrev: BAI01.04
  heading: Develop and maintain the program plan.
  text: Formulate a program to lay the initial groundwork. Position it for successful execution by formalizing the scope of
    the work and identifying deliverables that will satisfy goals and deliver value. Maintain and update the program plan
    and business case throughout the full economic life cycle of the program, ensuring alignment with strategic objectives
    and reflecting the current status and insights gained to date.
  notes: ''
  parent_id: cobit-2019.bai01
- id: cobit-2019.bai01.05
  type: practice
  abbrev: BAI01.05
  heading: Launch and execute the program.
  text: Launch and execute the program to acquire and direct the resources needed to accomplish the goals and benefits of
    the program as defined in the program plan. In accordance with stage-gate or release review criteria, prepare for stage-gate,
    iteration or release reviews to report progress and make the case for funding up to the following stage-gate or release
    review.
  notes: ''
  parent_id: cobit-2019.bai01
- id: cobit-2019.bai01.06
  type: practice
  abbrev: BAI01.06
  heading: Monitor, control and report on the program outcomes.
  text: Monitor and control performance against plan throughout the full economic life cycle of the investment, covering solution
    delivery at the program level and value/outcome at the enterprise level. Report performance to the program steering committee
    and the sponsors.
  notes: ''
  parent_id: cobit-2019.bai01
- id: cobit-2019.bai01.07
  type: practice
  abbrev: BAI01.07
  heading: Manage program quality.
  text: Prepare and execute a quality management plan, processes and practices that align with quality management standards
    (QMS). Describe the approach to program quality and implementation. The plan should be formally reviewed and agreed on
    by all parties concerned and incorporated into the integrated program plan.
  notes: ''
  parent_id: cobit-2019.bai01
- id: cobit-2019.bai01.08
  type: practice
  abbrev: BAI01.08
  heading: Manage program risk.
  text: Eliminate or minimize specific risk associated with programs through a systematic process of planning, identifying,
    analyzing, responding to, monitoring and controlling the areas or events with the potential to cause unwanted change.
    Define and record any risk faced by program management.
  notes: ''
  parent_id: cobit-2019.bai01
- id: cobit-2019.bai01.09
  type: practice
  abbrev: BAI01.09
  heading: Close a program.
  text: Remove the program from the active investment portfolio when there is agreement that the desired value has been achieved
    or when it is clear it will not be achieved within the value criteria set for the program.
  notes: ''
  parent_id: cobit-2019.bai01
- id: cobit-2019.bai02.01
  type: practice
  abbrev: BAI02.01
  heading: Define and maintain business functional and technical requirements.
  text: Based on the business case, identify, prioritize, specify and agree on business information, functional, technical
    and control requirements covering the scope/understanding of all initiatives required to achieve the expected outcomes
    of the proposed I&T-enabled business solution.
  notes: ''
  parent_id: cobit-2019.bai02
- id: cobit-2019.bai02.02
  type: practice
  abbrev: BAI02.02
  heading: Perform a feasibility study and formulate alternative solutions.
  text: Perform a feasibility study of potential alternative solutions, assess their viability and select the preferred option.
    If appropriate, implement the selected option as a pilot to determine possible improvements.
  notes: ''
  parent_id: cobit-2019.bai02
- id: cobit-2019.bai02.03
  type: practice
  abbrev: BAI02.03
  heading: Manage requirements risk.
  text: Identify, document, prioritize and mitigate functional, technical and information processing-related risk associated
    with the enterprise requirements, assumptions and proposed solution.
  notes: ''
  parent_id: cobit-2019.bai02
- id: cobit-2019.bai02.04
  type: practice
  abbrev: BAI02.04
  heading: Obtain approval of requirements and solutions.
  text: Coordinate feedback from affected stakeholders. At predetermined key stages, obtain approval and sign-off from the
    business sponsor or product owner regarding functional and technical requirements, feasibility studies, risk analyses
    and recommended solutions.
  notes: ''
  parent_id: cobit-2019.bai02
- id: cobit-2019.bai03.01
  type: practice
  abbrev: BAI03.01
  heading: Design high-level solutions.
  text: Develop and document high-level designs for the solution in terms of technology, business processes and workflows.
    Use agreed and appropriate phased or rapid Agile development techniques. Ensure alignment with the I&T strategy and enterprise
    architecture. Reassess and update the designs when significant issues occur during detailed design or building phases,
    or as the solution evolves. Apply a user-centric approach; ensure that stakeholders actively participate in the design
    and approve each version.
  notes: ''
  parent_id: cobit-2019.bai03
- id: cobit-2019.bai03.02
  type: practice
  abbrev: BAI03.02
  heading: Design detailed solution components.
  text: Develop, document and elaborate detailed designs progressively. Use agreed and appropriate phased or rapid Agile development
    techniques, addressing all components (business processes and related automated and manual controls, supporting I&T applications,
    infrastructure services and technology products, and partners/suppliers). Ensure that the detailed design includes internal
    and external service level agreements (SLAs) and operational level agreements (OLAs).
  notes: ''
  parent_id: cobit-2019.bai03
- id: cobit-2019.bai03.03
  type: practice
  abbrev: BAI03.03
  heading: Develop solution components.
  text: Develop solution components progressively in a separate environment, in accordance with detailed designs following
    standards and requirements for development and documentation, quality assurance (QA), and approval. Ensure that all control
    requirements in the business processes, supporting I&T applications and infrastructure services, services and technology
    products, and partner/vendor services are addressed.
  notes: ''
  parent_id: cobit-2019.bai03
- id: cobit-2019.bai03.04
  type: practice
  abbrev: BAI03.04
  heading: Procure solution components.
  text: Procure solution components, based on the acquisition plan, in accordance with requirements and detailed designs,
    architecture principles and standards, and the enterprise's overall procurement and contract procedures, QA requirements,
    and approval standards. Ensure that all legal and contractual requirements are identified and addressed by the vendor.
  notes: ''
  parent_id: cobit-2019.bai03
- id: cobit-2019.bai03.05
  type: practice
  abbrev: BAI03.05
  heading: Build solutions.
  text: Install and configure solutions and integrate with business process activities. During configuration and integration
    of hardware and infrastructure software, implement control, security, privacy and auditability measures to protect resources
    and ensure availability and data integrity. Update the product or services catalogue to reflect the new solutions.
  notes: ''
  parent_id: cobit-2019.bai03
- id: cobit-2019.bai03.06
  type: practice
  abbrev: BAI03.06
  heading: Perform quality assurance (QA).
  text: Develop, resource and execute a QA plan aligned with the QMS to obtain the quality specified in the requirements definition
    and in the enterprise’s quality policies and procedures.
  notes: ''
  parent_id: cobit-2019.bai03
- id: cobit-2019.bai03.07
  type: practice
  abbrev: BAI03.07
  heading: Prepare for solution testing.
  text: Establish a test plan and required environments to test the individual and integrated solution components. Include
    the business processes and supporting services, applications and infrastructure.
  notes: ''
  parent_id: cobit-2019.bai03
- id: cobit-2019.bai03.08
  type: practice
  abbrev: BAI03.08
  heading: Execute solution testing.
  text: During development, execute testing continually (including control testing), in accordance with the defined test plan
    and development practices in the appropriate environment. Engage business process owners and end users in the test team.
    Identify, log and prioritize errors and issues identified during testing.
  notes: ''
  parent_id: cobit-2019.bai03
- id: cobit-2019.bai03.09
  type: practice
  abbrev: BAI03.09
  heading: Manage changes to requirements.
  text: Track the status of individual requirements (including all rejected requirements) throughout the project life cycle.
    Manage the approval of changes to requirements.
  notes: ''
  parent_id: cobit-2019.bai03
- id: cobit-2019.bai03.10
  type: practice
  abbrev: BAI03.10
  heading: Maintain solutions.
  text: Develop and execute a plan for the maintenance of solution and infrastructure components. Include periodic reviews
    against business needs and operational requirements.
  notes: ''
  parent_id: cobit-2019.bai03
- id: cobit-2019.bai03.11
  type: practice
  abbrev: BAI03.11
  heading: Define IT products and services and maintain the service portfolio.
  text: Define and agree on new or changed IT products or services and service level options. Document new or changed product
    and service definitions and service level options to be updated in the products and services portfolio.
  notes: ''
  parent_id: cobit-2019.bai03
- id: cobit-2019.bai03.12
  type: practice
  abbrev: BAI03.12
  heading: Design solutions based on the defined development methodology.
  text: Design, develop and implement solutions with the appropriate development methodology (i.e., waterfall, Agile or bimodal
    I&T), in accordance with the overall strategy and requirements.
  notes: ''
  parent_id: cobit-2019.bai03
- id: cobit-2019.bai04.01
  type: practice
  abbrev: BAI04.01
  heading: Assess current availability, performance and capacity and create a baseline.
  text: Assess availability, performance and capacity of services and resources to ensure that cost-justifiable capacity and
    performance are available to support business needs and deliver against service level agreements (SLAs). Create availability,
    performance and capacity baselines for future comparison.
  notes: ''
  parent_id: cobit-2019.bai04
- id: cobit-2019.bai04.02
  type: practice
  abbrev: BAI04.02
  heading: Assess business impact.
  text: Identify important services to the enterprise. Map services and resources to business processes and identify business
    dependencies. Ensure that the impact of unavailable resources is fully agreed on and accepted by the customer. For vital
    business functions, ensure that availability requirements can be satisfied per service level agreement (SLA).
  notes: ''
  parent_id: cobit-2019.bai04
- id: cobit-2019.bai04.03
  type: practice
  abbrev: BAI04.03
  heading: Plan for new or changed service requirements.
  text: Plan and prioritize availability, performance and capacity implications of changing business needs and service requirements.
  notes: ''
  parent_id: cobit-2019.bai04
- id: cobit-2019.bai04.04
  type: practice
  abbrev: BAI04.04
  heading: Monitor and review availability and capacity.
  text: Monitor, measure, analyze, report and review availability, performance and capacity. Identify deviations from established
    baselines. Review trend analysis reports identifying any significant issues and variances. Initiate actions where necessary
    and ensure that all outstanding issues are addressed.
  notes: ''
  parent_id: cobit-2019.bai04
- id: cobit-2019.bai04.05
  type: practice
  abbrev: BAI04.05
  heading: Investigate and address availability, performance and capacity issues.
  text: Address deviations by investigating and resolving identified availability, performance and capacity issues.
  notes: ''
  parent_id: cobit-2019.bai04
- id: cobit-2019.bai05.01
  type: practice
  abbrev: BAI05.01
  heading: Establish the desire to change.
  text: Understand the scope and impact of the desired change. Assess stakeholder readiness and willingness to change. Identify
    actions that will motivate stakeholder acceptance and participation to make the change work successfully.
  notes: ''
  parent_id: cobit-2019.bai05
- id: cobit-2019.bai05.02
  type: practice
  abbrev: BAI05.02
  heading: Form an effective implementation team.
  text: Establish an effective implementation team by assembling appropriate members, creating trust, and establishing common
    goals and effectiveness measures.
  notes: ''
  parent_id: cobit-2019.bai05
- id: cobit-2019.bai05.03
  type: practice
  abbrev: BAI05.03
  heading: Communicate desired vision.
  text: Communicate the desired vision for the change in the language of those affected by it. The communication should be
    made by senior management and include the rationale for, and benefits of, the change; the impacts of not making the change;
    and the vision, the road map and the involvement required of the various stakeholders.
  notes: ''
  parent_id: cobit-2019.bai05
- id: cobit-2019.bai05.04
  type: practice
  abbrev: BAI05.04
  heading: Empower role players and identify short-term wins.
  text: Empower those with implementation roles by assigning accountability. Provide training and align organizational structures
    and HR processes. Identify and communicate short-term wins that are important from a change-enablement perspective.
  notes: ''
  parent_id: cobit-2019.bai05
- id: cobit-2019.bai05.05
  type: practice
  abbrev: BAI05.05
  heading: Enable operation and use.
  text: Plan and implement all technical, operational and usage aspects so all those who are involved in the future state
    environment can exercise their responsibility.
  notes: ''
  parent_id: cobit-2019.bai05
- id: cobit-2019.bai05.06
  type: practice
  abbrev: BAI05.06
  heading: Embed new approaches.
  text: Embed new approaches by tracking implemented changes, assessing the effectiveness of the operation and use plan, and
    sustaining ongoing awareness through regular communication. Take corrective measures as appropriate (which may include
    enforcing compliance).
  notes: ''
  parent_id: cobit-2019.bai05
- id: cobit-2019.bai05.07
  type: practice
  abbrev: BAI05.07
  heading: Sustain changes.
  text: Sustain changes through effective training of new staff, ongoing communication campaigns, continued commitment of
    top management, monitoring of adoption and sharing of lessons learned across the enterprise.
  notes: ''
  parent_id: cobit-2019.bai05
- id: cobit-2019.bai06.01
  type: practice
  abbrev: BAI06.01
  heading: Evaluate, prioritize and authorize change requests.
  text: Evaluate all requests for change to determine the impact on business processes and I&T services, and to assess whether
    change will adversely affect the operational environment and introduce unacceptable risk. Ensure that changes are logged,
    prioritized, categorized, assessed, authorized, planned and scheduled.
  notes: ''
  parent_id: cobit-2019.bai06
- id: cobit-2019.bai06.02
  type: practice
  abbrev: BAI06.02
  heading: Manage emergency changes.
  text: Carefully manage emergency changes to minimize further incidents. Ensure the emergency change is controlled and takes
    place securely. Verify that emergency changes are appropriately assessed and authorized after the change.
  notes: ''
  parent_id: cobit-2019.bai06
- id: cobit-2019.bai06.03
  type: practice
  abbrev: BAI06.03
  heading: Track and report change status.
  text: Maintain a tracking and reporting system to document rejected changes and communicate the status of approved, in-process
    and complete changes. Make certain that approved changes are implemented as planned.
  notes: ''
  parent_id: cobit-2019.bai06
- id: cobit-2019.bai06.04
  type: practice
  abbrev: BAI06.04
  heading: Close and document the changes.
  text: Whenever changes are implemented, update the solution, user documentation and procedures affected by the change.
  notes: ''
  parent_id: cobit-2019.bai06
- id: cobit-2019.bai07.01
  type: practice
  abbrev: BAI07.01
  heading: Establish an implementation plan.
  text: Establish an implementation plan that covers system and data conversion, acceptance testing criteria, communication,
    training, release preparation, promotion to production, early production support, a fallback/back-up plan, and a post-implementation
    review. Obtain approval from relevant parties.
  notes: ''
  parent_id: cobit-2019.bai07
- id: cobit-2019.bai07.02
  type: practice
  abbrev: BAI07.02
  heading: Plan business process, system and data conversion.
  text: Prepare for business process, I&T service data and infrastructure migration as part of the enterprise’s development
    methods. Include audit trails and a recovery plan should the migration fail.
  notes: ''
  parent_id: cobit-2019.bai07
- id: cobit-2019.bai07.03
  type: practice
  abbrev: BAI07.03
  heading: Plan acceptance tests.
  text: Establish a test plan based on enterprisewide standards that define roles, responsibilities, and entry and exit criteria.
    Ensure that the plan is approved by relevant parties.
  notes: ''
  parent_id: cobit-2019.bai07
- id: cobit-2019.bai07.04
  type: practice
  abbrev: BAI07.04
  heading: Establish a test environment.
  text: Define and establish a secure test environment representative of the planned business process and IT operations environment
    in terms of performance, capacity, security, internal controls, operational practices, data quality, privacy requirements
    and workloads.
  notes: ''
  parent_id: cobit-2019.bai07
- id: cobit-2019.bai07.05
  type: practice
  abbrev: BAI07.05
  heading: Perform acceptance tests.
  text: Test changes independently, in accordance with the defined test plan, prior to migration to the live operational environment.
  notes: ''
  parent_id: cobit-2019.bai07
- id: cobit-2019.bai07.06
  type: practice
  abbrev: BAI07.06
  heading: Promote to production and manage releases.
  text: Promote the accepted solution to the business and operations. Where appropriate, run the solution as a pilot implementation
    or in parallel with the old solution for a defined period and compare behavior and results. If significant problems occur,
    revert to the original environment based on the fallback/back-up plan. Manage releases of solution components.
  notes: ''
  parent_id: cobit-2019.bai07
- id: cobit-2019.bai07.07
  type: practice
  abbrev: BAI07.07
  heading: Provide early production support.
  text: For an agreed period of time, provide early support to users and I&T operations to resolve issues and help stabilize
    the new solution.
  notes: ''
  parent_id: cobit-2019.bai07
- id: cobit-2019.bai07.08
  type: practice
  abbrev: BAI07.08
  heading: Perform a post-implementation review.
  text: Conduct a post-implementation review to confirm outcome and results, identify lessons learned, and develop an action
    plan. Evaluate actual performance and outcomes of the new or changed service against expected performance and outcomes
    anticipated by the user or customer.
  notes: ''
  parent_id: cobit-2019.bai07
- id: cobit-2019.bai08.01
  type: practice
  abbrev: BAI08.01
  heading: Identify and classify sources of information for governance and management of I&T.
  text: Identify, validate and classify diverse sources of internal and external information required to enable governance
    and management of I&T, including strategy documents, incident reports and configuration information that progresses from
    development to operations before going live.
  notes: ''
  parent_id: cobit-2019.bai08
- id: cobit-2019.bai08.02
  type: practice
  abbrev: BAI08.02
  heading: Organize and contextualize information into knowledge.
  text: Organize information based on classification criteria. Identify and create meaningful relationships among information
    elements and enable use of information. Identify owners, and leverage and implement enterprise-defined information levels
    of access to management information and knowledge resources.
  notes: ''
  parent_id: cobit-2019.bai08
- id: cobit-2019.bai08.03
  type: practice
  abbrev: BAI08.03
  heading: Use and share knowledge.
  text: Propagate available knowledge resources to relevant stakeholders and communicate how these resources can be used to
    address different needs (e.g., problem solving, learning, strategic planning and decision making).
  notes: ''
  parent_id: cobit-2019.bai08
- id: cobit-2019.bai08.04
  type: practice
  abbrev: BAI08.04
  heading: Evaluate and update or retire information.
  text: Measure the use and evaluate the currency and relevance of information. Update information or retire obsolete information.
  notes: ''
  parent_id: cobit-2019.bai08
- id: cobit-2019.bai09.01
  type: practice
  abbrev: BAI09.01
  heading: Identify and record current assets.
  text: Maintain an up-to-date, accurate record of all I&T assets that are required to deliver services and that are owned
    or controlled by the organization with an expectation of future benefit (including resources with economic value, such
    as hardware or software). Ensure alignment with configuration management and financial management.
  notes: ''
  parent_id: cobit-2019.bai09
- id: cobit-2019.bai09.02
  type: practice
  abbrev: BAI09.02
  heading: Manage critical assets.
  text: Identify assets that are critical in providing service capability. Maximize their reliability and availability to
    support business needs.
  notes: ''
  parent_id: cobit-2019.bai09
- id: cobit-2019.bai09.03
  type: practice
  abbrev: BAI09.03
  heading: Manage the asset life cycle.
  text: Manage assets from procurement to disposal. Ensure that assets are utilized as effectively and efficiently as possible
    and are accounted for and physically protected until appropriately retired.
  notes: ''
  parent_id: cobit-2019.bai09
- id: cobit-2019.bai09.04
  type: practice
  abbrev: BAI09.04
  heading: Optimize asset value.
  text: Regularly review the overall asset base to identify ways to optimize value in alignment with business needs.
  notes: ''
  parent_id: cobit-2019.bai09
- id: cobit-2019.bai09.05
  type: practice
  abbrev: BAI09.05
  heading: Manage licenses.
  text: Manage software licenses to maintain the optimal number of licenses and support business requirements. Ensure that
    the number of licenses owned is sufficient to cover the installed software in use.
  notes: ''
  parent_id: cobit-2019.bai09
- id: cobit-2019.bai10.01
  type: practice
  abbrev: BAI10.01
  heading: Establish and maintain a configuration model.
  text: Establish and maintain a logical model of the services, assets, infrastructure and recording of configuration items
    (CIs), including the relationships among them. Include the CIs considered necessary to manage services effectively and
    to provide a single, reliable description of the assets in a service.
  notes: ''
  parent_id: cobit-2019.bai10
- id: cobit-2019.bai10.02
  type: practice
  abbrev: BAI10.02
  heading: Establish and maintain a configuration repository and baseline.
  text: Establish and maintain a configuration management repository and create controlled configuration baselines.
  notes: ''
  parent_id: cobit-2019.bai10
- id: cobit-2019.bai10.03
  type: practice
  abbrev: BAI10.03
  heading: Maintain and control configuration items.
  text: Maintain an up-to-date repository of configuration items (CIs) by populating any configuration changes.
  notes: ''
  parent_id: cobit-2019.bai10
- id: cobit-2019.bai10.04
  type: practice
  abbrev: BAI10.04
  heading: Produce status and configuration reports.
  text: Define and produce configuration reports on status changes of configuration items.
  notes: ''
  parent_id: cobit-2019.bai10
- id: cobit-2019.bai10.05
  type: practice
  abbrev: BAI10.05
  heading: Verify and review integrity of the configuration repository.
  text: Periodically review the configuration repository and verify completeness and correctness against the desired target.
  notes: ''
  parent_id: cobit-2019.bai10
- id: cobit-2019.bai11.01
  type: practice
  abbrev: BAI11.01
  heading: Maintain a standard approach for project management.
  text: Maintain a standard approach for project management that enables governance and management review, decision-making
    and delivery-management activities. These activities should focus consistently on business value and goals (i.e., requirements,
    risk, costs, schedule and quality targets).
  notes: ''
  parent_id: cobit-2019.bai11
- id: cobit-2019.bai11.02
  type: practice
  abbrev: BAI11.02
  heading: Start up and initiate a project.
  text: Define and document the nature and scope of the project to confirm and develop a common understanding of project scope
    among stakeholders. The definition should be formally approved by the project sponsors.
  notes: ''
  parent_id: cobit-2019.bai11
- id: cobit-2019.bai11.03
  type: practice
  abbrev: BAI11.03
  heading: Manage stakeholder engagement.
  text: Manage stakeholder engagement to ensure an active exchange of accurate, consistent and timely information that reaches
    all relevant stakeholders. This includes planning, identifying and engaging stakeholders and managing their expectations.
  notes: ''
  parent_id: cobit-2019.bai11
- id: cobit-2019.bai11.04
  type: practice
  abbrev: BAI11.04
  heading: Develop and maintain the project plan.
  text: Establish and maintain a formal, approved, integrated project plan (covering business and IT resources) to guide project
    execution and control throughout the life of the project. The scope of projects should be clearly defined and tied to
    building or enhancing business capability.
  notes: ''
  parent_id: cobit-2019.bai11
- id: cobit-2019.bai11.05
  type: practice
  abbrev: BAI11.05
  heading: Manage project quality.
  text: Prepare and execute a quality management plan, processes and practices that align with quality management standards
    (QMS). Describe the approach to project quality and implementation. The plan should be formally reviewed and agreed on
    by all parties concerned and incorporated into the integrated project plans.
  notes: ''
  parent_id: cobit-2019.bai11
- id: cobit-2019.bai11.06
  type: practice
  abbrev: BAI11.06
  heading: Manage project risk.
  text: Eliminate or minimize specific risk associated with projects through a systematic process of planning, identifying,
    analyzing, responding to, monitoring and controlling the areas or events with potential to cause unwanted change. Define
    and record any risk faced by project management.
  notes: ''
  parent_id: cobit-2019.bai11
- id: cobit-2019.bai11.07
  type: practice
  abbrev: BAI11.07
  heading: Monitor and control projects.
  text: Measure project performance against key project performance criteria such as schedule, quality, cost and risk. Identify
    any deviations from expected targets. Assess the impact of deviations on the project and overall program and report results
    to key stakeholders.
  notes: ''
  parent_id: cobit-2019.bai11
- id: cobit-2019.bai11.08
  type: practice
  abbrev: BAI11.08
  heading: Manage project resources and work packages.
  text: Manage project work packages by placing formal requirements on authorizing and accepting work packages and assigning
    and coordinating appropriate business and IT resources.
  notes: ''
  parent_id: cobit-2019.bai11
- id: cobit-2019.bai11.09
  type: practice
  abbrev: BAI11.09
  heading: Close a project or iteration.
  text: At the end of each project, release or iteration, require the project stakeholders to ascertain whether the project,
    release or iteration delivered the required results in terms of capabilities and contributed as expected to program benefits.
    Identify and communicate any outstanding activities required to achieve planned results of the project and/or benefits
    of the program. Identify and document lessons learned for future projects, releases, iterations and programs.
  notes: ''
  parent_id: cobit-2019.bai11
- id: cobit-2019.dss01.01
  type: practice
  abbrev: DSS01.01
  heading: Perform operational procedures.
  text: Maintain and perform operational procedures and operational tasks reliably and consistently.
  notes: ''
  parent_id: cobit-2019.dss01
- id: cobit-2019.dss01.02
  type: practice
  abbrev: DSS01.02
  heading: Manage outsourced I&T services.
  text: Manage the operation of outsourced I&T services to maintain the protection of enterprise information and reliability
    of service delivery.
  notes: ''
  parent_id: cobit-2019.dss01
- id: cobit-2019.dss01.03
  type: practice
  abbrev: DSS01.03
  heading: Monitor I&T infrastructure.
  text: Monitor the I&T infrastructure and related events. Store sufficient chronological information in operations logs to
    reconstruct and review time sequences of operations and other activities surrounding or supporting operations.
  notes: ''
  parent_id: cobit-2019.dss01
- id: cobit-2019.dss01.04
  type: practice
  abbrev: DSS01.04
  heading: Manage the environment.
  text: Maintain measures for protection against environmental factors. Install specialized equipment and devices to monitor
    and control the environment.
  notes: ''
  parent_id: cobit-2019.dss01
- id: cobit-2019.dss01.05
  type: practice
  abbrev: DSS01.05
  heading: Manage facilities.
  text: Manage facilities, including power and communications equipment, in line with laws and regulations, technical and
    business requirements, vendor specifications, and health and safety guidelines.
  notes: ''
  parent_id: cobit-2019.dss01
- id: cobit-2019.dss02.01
  type: practice
  abbrev: DSS02.01
  heading: Define classification schemes for incidents and service requests.
  text: Define classification schemes and models for incidents and service requests.
  notes: ''
  parent_id: cobit-2019.dss02
- id: cobit-2019.dss02.02
  type: practice
  abbrev: DSS02.02
  heading: Record, classify and prioritize requests and incidents.
  text: Identify, record and classify service requests and incidents and assign a priority according to business criticality
    and service agreements.
  notes: ''
  parent_id: cobit-2019.dss02
- id: cobit-2019.dss02.03
  type: practice
  abbrev: DSS02.03
  heading: Verify, approve and fulfill service requests.
  text: Select the appropriate request procedures and verify that the service requests fulfill defined request criteria. Obtain
    approval, if required, and fulfill the requests.
  notes: ''
  parent_id: cobit-2019.dss02
- id: cobit-2019.dss02.04
  type: practice
  abbrev: DSS02.04
  heading: Investigate, diagnose and allocate incidents.
  text: Identify and record incident symptoms, determine possible causes, and allocate for resolution.
  notes: ''
  parent_id: cobit-2019.dss02
- id: cobit-2019.dss02.05
  type: practice
  abbrev: DSS02.05
  heading: Resolve and recover from incidents.
  text: Document, apply and test the identified solutions or workarounds. Perform recovery actions to restore the I&T-related
    service.
  notes: ''
  parent_id: cobit-2019.dss02
- id: cobit-2019.dss02.06
  type: practice
  abbrev: DSS02.06
  heading: Close service requests and incidents.
  text: Verify satisfactory incident resolution and/or fulfilment of requests, and close.
  notes: ''
  parent_id: cobit-2019.dss02
- id: cobit-2019.dss02.07
  type: practice
  abbrev: DSS02.07
  heading: Track status and produce reports.
  text: Regularly track, analyze and report incidents and fulfilment of requests. Examine trends to provide information for
    continual improvement.
  notes: ''
  parent_id: cobit-2019.dss02
- id: cobit-2019.dss03.01
  type: practice
  abbrev: DSS03.01
  heading: Identify and classify problems.
  text: Define and implement criteria and procedures to identify and report problems. Include problem classification, categorization
    and prioritization.
  notes: ''
  parent_id: cobit-2019.dss03
- id: cobit-2019.dss03.02
  type: practice
  abbrev: DSS03.02
  heading: Investigate and diagnose problems.
  text: Investigate and diagnose problems using relevant subject matter experts to assess and analyze root causes.
  notes: ''
  parent_id: cobit-2019.dss03
- id: cobit-2019.dss03.03
  type: practice
  abbrev: DSS03.03
  heading: Raise known errors.
  text: As soon as root causes of problems are identified, create known-error records, document appropriate workarounds and
    identify potential solutions.
  notes: ''
  parent_id: cobit-2019.dss03
- id: cobit-2019.dss03.04
  type: practice
  abbrev: DSS03.04
  heading: Resolve and close problems.
  text: Identify and initiate sustainable solutions addressing the root cause. Raise change requests via the established change
    management process, if required, to resolve errors. Ensure that the personnel affected are aware of the actions taken
    and the plans developed to prevent future incidents from occurring.
  notes: ''
  parent_id: cobit-2019.dss03
- id: cobit-2019.dss03.05
  type: practice
  abbrev: DSS03.05
  heading: Perform proactive problem management.
  text: Collect and analyze operational data (especially incident and change records) to identify emerging trends that may
    indicate problems. Log problem records to enable assessment.
  notes: ''
  parent_id: cobit-2019.dss03
- id: cobit-2019.dss04.01
  type: practice
  abbrev: DSS04.01
  heading: Define the business continuity policy, objectives and scope.
  text: Define business continuity policy and scope, aligned with enterprise and stakeholder objectives, to improve business
    resilience.
  notes: ''
  parent_id: cobit-2019.dss04
- id: cobit-2019.dss04.02
  type: practice
  abbrev: DSS04.02
  heading: Maintain business resilience.
  text: Evaluate business resilience options and choose a cost-effective and viable strategy that will ensure enterprise continuity,
    disaster recovery and incident response in the face of a disaster or other major incident or disruption.
  notes: ''
  parent_id: cobit-2019.dss04
- id: cobit-2019.dss04.03
  type: practice
  abbrev: DSS04.03
  heading: Develop and implement a business continuity response.
  text: Develop a business continuity plan (BCP) and disaster recovery plan (DRP) based on the strategy. Document all procedures
    necessary for the enterprise to continue critical activities in the event of an incident.
  notes: ''
  parent_id: cobit-2019.dss04
- id: cobit-2019.dss04.04
  type: practice
  abbrev: DSS04.04
  heading: Exercise, test and review the business continuity plan (BCP) and disaster response plan (DRP).
  text: Test continuity on a regular basis to exercise plans against predetermined outcomes, uphold business resilience and
    allow innovative solutions to be developed.
  notes: ''
  parent_id: cobit-2019.dss04
- id: cobit-2019.dss04.05
  type: practice
  abbrev: DSS04.05
  heading: Review, maintain and improve the continuity plans.
  text: Conduct a management review of the continuity capability at regular intervals to ensure its continued suitability,
    adequacy and effectiveness. Manage changes to the plans in accordance with the change control process to ensure that continuity
    plans are kept up to date and continually reflect actual business requirements.
  notes: ''
  parent_id: cobit-2019.dss04
- id: cobit-2019.dss04.06
  type: practice
  abbrev: DSS04.06
  heading: Conduct continuity plan training.
  text: Provide all concerned internal and external parties with regular training sessions regarding procedures and their
    roles and responsibilities in case of disruption.
  notes: ''
  parent_id: cobit-2019.dss04
- id: cobit-2019.dss04.07
  type: practice
  abbrev: DSS04.07
  heading: Manage backup arrangements.
  text: Maintain availability of business-critical information.
  notes: ''
  parent_id: cobit-2019.dss04
- id: cobit-2019.dss04.08
  type: practice
  abbrev: DSS04.08
  heading: Conduct post-resumption review.
  text: Assess the adequacy of the business continuity plan (BCP) and disaster response plan (DRP) following successful resumption
    of business processes and services after a disruption.
  notes: ''
  parent_id: cobit-2019.dss04
- id: cobit-2019.dss05.01
  type: practice
  abbrev: DSS05.01
  heading: Protect against malicious software.
  text: Implement and maintain preventive, detective and corrective measures (especially up-to-date security patches and virus
    control) across the enterprise to protect information systems and technology from malicious software (e.g., malware, ransomware,
    viruses, worms, spyware, spam).
  notes: ''
  parent_id: cobit-2019.dss05
- id: cobit-2019.dss05.02
  type: practice
  abbrev: DSS05.02
  heading: Manage network and connectivity security.
  text: Use security measures and related management procedures to protect information over all methods of connectivity.
  notes: ''
  parent_id: cobit-2019.dss05
- id: cobit-2019.dss05.03
  type: practice
  abbrev: DSS05.03
  heading: Manage endpoint security.
  text: Ensure that endpoints (e.g., laptop, desktop, server, and other mobile and network devices or software) are secured
    at a level that is equal to or greater than the defined security and privacy requirements for the information processed,
    stored or transmitted.
  notes: ''
  parent_id: cobit-2019.dss05
- id: cobit-2019.dss05.04
  type: practice
  abbrev: DSS05.04
  heading: Manage user identity and logical access.
  text: Ensure that all users have information access rights in accordance with the business unit's privacy policy and business
    requirements. Coordinate with business units that manage their own access rights within business processes.
  notes: ''
  parent_id: cobit-2019.dss05
- id: cobit-2019.dss05.05
  type: practice
  abbrev: DSS05.05
  heading: Manage physical access to I&T assets.
  text: Define and implement procedures (including emergency procedures) to grant, limit and revoke access to premises, buildings
    and areas, according to business need. Access to premises, buildings and areas should be justified, authorized, logged
    and monitored. This requirement applies to all persons entering the premises, including staff, temporary staff, clients,
    vendors, visitors or any other third party.
  notes: ''
  parent_id: cobit-2019.dss05
- id: cobit-2019.dss05.06
  type: practice
  abbrev: DSS05.06
  heading: Manage sensitive documents and output devices.
  text: Establish appropriate physical safeguards, accounting practices and inventory management regarding sensitive I&T assets,
    such as special forms, negotiable instruments, special-purpose printers or security tokens.
  notes: ''
  parent_id: cobit-2019.dss05
- id: cobit-2019.dss05.07
  type: practice
  abbrev: DSS05.07
  heading: Manage vulnerabilities and monitor the infrastructure for security-related events.
  text: Using a portfolio of tools and technologies (e.g., intrusion detection tools), manage vulnerabilities and monitor
    the infrastructure for unauthorized access. Ensure that security tools, technologies and detection are integrated with
    general event monitoring and incident management.
  notes: ''
  parent_id: cobit-2019.dss05
- id: cobit-2019.dss06.01
  type: practice
  abbrev: DSS06.01
  heading: Align control activities embedded in business processes with enterprise objectives.
  text: Continually assess and monitor the execution of business process activities and related controls (based on enterprise
    risk), to ensure that processing controls align with business needs.
  notes: ''
  parent_id: cobit-2019.dss06
- id: cobit-2019.dss06.02
  type: practice
  abbrev: DSS06.02
  heading: Control the processing of information.
  text: Operate the execution of the business process activities and related controls, based on enterprise risk. Ensure that
    information processing is valid, complete, accurate, timely and secure (i.e., reflects legitimate and authorized business
    use).
  notes: ''
  parent_id: cobit-2019.dss06
- id: cobit-2019.dss06.03
  type: practice
  abbrev: DSS06.03
  heading: Manage roles, responsibilities, access privileges and levels of authority.
  text: Manage business roles, responsibilities, levels of authority and segregation of duties needed to support the business
    process objectives. Authorize access to all information assets related to business information processes, including those
    under the custody of the business, IT and third parties. This ensures that the business knows where the data are and who
    is handling data on its behalf.
  notes: ''
  parent_id: cobit-2019.dss06
- id: cobit-2019.dss06.04
  type: practice
  abbrev: DSS06.04
  heading: Manage errors and exceptions.
  text: Manage business process exceptions and errors and facilitate remediation, executing defined corrective actions and
    escalating as necessary. This treatment of exceptions and errors provides assurance of the accuracy and integrity of the
    business information process.
  notes: ''
  parent_id: cobit-2019.dss06
- id: cobit-2019.dss06.05
  type: practice
  abbrev: DSS06.05
  heading: Ensure traceability and accountability for information events.
  text: Ensure that business information can be traced to an originating business event and associated with accountable parties.
    This discoverability provides assurance that business information is reliable and has been processed in accordance with
    defined objectives.
  notes: ''
  parent_id: cobit-2019.dss06
- id: cobit-2019.dss06.06
  type: practice
  abbrev: DSS06.06
  heading: Secure information assets.
  text: Secure information assets accessible by the business through approved methods, including information in electronic
    form (e.g., portable media devices, user applications and storage devices, or other methods that create new assets in
    any form), information in physical form (e.g., source documents or output reports) and information during transit. This
    benefits the business by providing end-to-end safeguarding of information.
  notes: ''
  parent_id: cobit-2019.dss06
- id: cobit-2019.mea01.01
  type: practice
  abbrev: MEA01.01
  heading: Establish a monitoring approach.
  text: Engage with stakeholders to establish and maintain a monitoring approach to define the objectives, scope and method
    for measuring business solution and service delivery and contribution to enterprise objectives. Integrate this approach
    with the corporate performance management system.
  notes: ''
  parent_id: cobit-2019.mea01
- id: cobit-2019.mea01.02
  type: practice
  abbrev: MEA01.02
  heading: Set performance and conformance targets.
  text: Work with stakeholders to define, periodically review, update and approve performance and conformance targets within
    the performance measurement system.
  notes: ''
  parent_id: cobit-2019.mea01
- id: cobit-2019.mea01.03
  type: practice
  abbrev: MEA01.03
  heading: Collect and process performance and conformance data.
  text: Collect and process timely and accurate data aligned with enterprise approaches.
  notes: ''
  parent_id: cobit-2019.mea01
- id: cobit-2019.mea01.04
  type: practice
  abbrev: MEA01.04
  heading: Analyze and report performance.
  text: Periodically review and report performance against targets. Use a method that provides a succinct all-around view
    of I&T performance and fits within the enterprise monitoring system.
  notes: ''
  parent_id: cobit-2019.mea01
- id: cobit-2019.mea01.05
  type: practice
  abbrev: MEA01.05
  heading: Ensure the implementation of corrective actions.
  text: Assist stakeholders in identifying, initiating and tracking corrective actions to address anomalies.
  notes: ''
  parent_id: cobit-2019.mea01
- id: cobit-2019.mea02.01
  type: practice
  abbrev: MEA02.01
  heading: Monitor internal controls.
  text: Continuously monitor, benchmark and improve the I&T control environment and control framework to meet organizational
    objectives.
  notes: ''
  parent_id: cobit-2019.mea02
- id: cobit-2019.mea02.02
  type: practice
  abbrev: MEA02.02
  heading: Review effectiveness of business process controls.
  text: Review the operation of controls, including monitoring and test evidence, to ensure that controls within business
    processes operate effectively. Include activities to maintain evidence of the effective operation of controls through
    mechanisms such as periodic testing, continuous monitoring, independent assessments, command and control centers, and
    network operation centers. This evidence assures the enterprise that controls meet requirements related to business, regulatory
    and social responsibilities.
  notes: ''
  parent_id: cobit-2019.mea02
- id: cobit-2019.mea02.03
  type: practice
  abbrev: MEA02.03
  heading: Perform control self-assessments.
  text: Encourage management and process owners to improve controls proactively through a continuing program of self-assessment
    that evaluates the completeness and effectiveness of management’s control over processes, policies and contracts.
  notes: ''
  parent_id: cobit-2019.mea02
- id: cobit-2019.mea02.04
  type: practice
  abbrev: MEA02.04
  heading: Identify and report control deficiencies.
  text: Identify control deficiencies and analyze and identify their underlying root causes. Escalate control deficiencies
    and report to stakeholders.
  notes: ''
  parent_id: cobit-2019.mea02
- id: cobit-2019.mea03.01
  type: practice
  abbrev: MEA03.01
  heading: Identify external compliance requirements.
  text: On a continuous basis, monitor changes in local and international laws, regulations and other external requirements
    and identify mandates for compliance from an I&T perspective.
  notes: ''
  parent_id: cobit-2019.mea03
- id: cobit-2019.mea03.02
  type: practice
  abbrev: MEA03.02
  heading: Optimize response to external requirements.
  text: Review and adjust policies, principles, standards, procedures and methodologies to ensure that legal, regulatory and
    contractual requirements are addressed and communicated. Consider adopting and adapting industry standards, codes of good
    practice, and good practice guidance.
  notes: ''
  parent_id: cobit-2019.mea03
- id: cobit-2019.mea03.03
  type: practice
  abbrev: MEA03.03
  heading: Confirm external compliance.
  text: Confirm compliance of policies, principles, standards, procedures and methodologies with legal, regulatory and contractual
    requirements.
  notes: ''
  parent_id: cobit-2019.mea03
- id: cobit-2019.mea03.04
  type: practice
  abbrev: MEA03.04
  heading: Obtain assurance of external compliance.
  text: Obtain and report assurance of compliance and adherence with policies, principles, standards, procedures and methodologies.
    Confirm that corrective actions to address compliance gaps are closed in a timely manner.
  notes: ''
  parent_id: cobit-2019.mea03
- id: cobit-2019.mea04.01
  type: practice
  abbrev: MEA04.01
  heading: Ensure that assurance providers are independent and qualified.
  text: Ensure that the entities performing assurance are independent from the function, groups or organizations in scope.
    The entities performing assurance should demonstrate an appropriate attitude and appearance, competence in the skills
    and knowledge necessary to perform assurance, and adherence to codes of ethics and professional standards.
  notes: ''
  parent_id: cobit-2019.mea04
- id: cobit-2019.mea04.02
  type: practice
  abbrev: MEA04.02
  heading: Develop risk-based planning of assurance initiatives.
  text: Determine assurance objectives based on assessments of the internal and external environment and context, the risk
    of not achieving enterprise goals, and the opportunities associated achievement of the same goals.
  notes: ''
  parent_id: cobit-2019.mea04
- id: cobit-2019.mea04.03
  type: practice
  abbrev: MEA04.03
  heading: Determine the objectives of the assurance initiative.
  text: Define and agree with all stakeholders on the objectives of the assurance initiative.
  notes: ''
  parent_id: cobit-2019.mea04
- id: cobit-2019.mea04.04
  type: practice
  abbrev: MEA04.04
  heading: Define the scope of the assurance initiative.
  text: Define and agree with all stakeholders on the scope of the assurance initiative, based on the assurance objectives.
  notes: ''
  parent_id: cobit-2019.mea04
- id: cobit-2019.mea04.05
  type: practice
  abbrev: MEA04.05
  heading: Define the work program for the assurance initiative.
  text: Define a detailed work program for the assurance initiative, structured according to the management objectives and
    governance components in scope.
  notes: ''
  parent_id: cobit-2019.mea04
- id: cobit-2019.mea04.06
  type: practice
  abbrev: MEA04.06
  heading: Execute the assurance initiative, focusing on design effectiveness.
  text: Execute the planned assurance initiative. Validate and confirm the design of the internal controls in place. Additionally,
    and specifically in internal audit assignments, consider the cost-effectiveness of the governance component design.
  notes: ''
  parent_id: cobit-2019.mea04
- id: cobit-2019.mea04.07
  type: practice
  abbrev: MEA04.07
  heading: Execute the assurance initiative, focusing on operating effectiveness.
  text: Execute the planned assurance initiative. Test whether the internal controls in place are appropriate and sufficient.
    Test the outcome of the key management objectives in scope of the assurance initiative.
  notes: ''
  parent_id: cobit-2019.mea04
- id: cobit-2019.mea04.08
  type: practice
  abbrev: MEA04.08
  heading: Report and follow up on the assurance initiative.
  text: Provide positive assurance opinions, where appropriate, and recommendations for improvement relating to identified
    operational performance, external compliance and internal control weaknesses.
  notes: ''
  parent_id: cobit-2019.mea04
- id: cobit-2019.mea04.09
  type: practice
  abbrev: MEA04.09
  heading: Follow up on recommendations and actions.
  text: Agree on, follow up and implement the identified recommendations for improvement.
  notes: ''
  parent_id: cobit-2019.mea04
- id: cobit-2019.edm01.01.01
  type: activity
  abbrev: EDM01.01-1
  heading: Activity 1
  text: Analyze and identify the internal and external environmental factors (legal, regulatory and contractual obligations)
    and trends in the business environment that may influence governance design.
  notes: ''
  parent_id: cobit-2019.edm01.01
- id: cobit-2019.edm01.01.02
  type: activity
  abbrev: EDM01.01-2
  heading: Activity 2
  text: Determine the significance of I&T and its role with respect to the business.
  notes: ''
  parent_id: cobit-2019.edm01.01
- id: cobit-2019.edm01.01.03
  type: activity
  abbrev: EDM01.01-3
  heading: Activity 3
  text: Consider external regulations, laws and contractual obligations and determine how they should be applied within the
    governance of enterprise I&T.
  notes: ''
  parent_id: cobit-2019.edm01.01
- id: cobit-2019.edm01.01.04
  type: activity
  abbrev: EDM01.01-4
  heading: Activity 4
  text: Determine the implications of the overall enterprise control environment with regard to I&T.
  notes: ''
  parent_id: cobit-2019.edm01.01
- id: cobit-2019.edm01.01.05
  type: activity
  abbrev: EDM01.01-5
  heading: Activity 5
  text: Align the ethical use and processing of information and its impact on society, the natural environment, and internal
    and external stakeholder interests with the enterprise’s direction, goals and objectives.
  notes: ''
  parent_id: cobit-2019.edm01.01
- id: cobit-2019.edm01.01.06
  type: activity
  abbrev: EDM01.01-6
  heading: Activity 6
  text: Articulate principles that will guide the design of governance and decision making of I&T.
  notes: ''
  parent_id: cobit-2019.edm01.01
- id: cobit-2019.edm01.01.07
  type: activity
  abbrev: EDM01.01-7
  heading: Activity 7
  text: Determine the optimal decision-making model for I&T.
  notes: ''
  parent_id: cobit-2019.edm01.01
- id: cobit-2019.edm01.01.08
  type: activity
  abbrev: EDM01.01-8
  heading: Activity 8
  text: Determine the appropriate levels of authority delegation, including threshold rules, for I&T decisions.
  notes: ''
  parent_id: cobit-2019.edm01.01
- id: cobit-2019.edm01.02.01
  type: activity
  abbrev: EDM01.02-1
  heading: Activity 1
  text: Communicate governance of I&T principles and agree with executive management on the way to establish informed and
    committed leadership.
  notes: ''
  parent_id: cobit-2019.edm01.02
- id: cobit-2019.edm01.02.02
  type: activity
  abbrev: EDM01.02-2
  heading: Activity 2
  text: Establish or delegate the establishment of governance structures, processes and practices in line with agreed-on design
    principles.
  notes: ''
  parent_id: cobit-2019.edm01.02
- id: cobit-2019.edm01.02.03
  type: activity
  abbrev: EDM01.02-3
  heading: Activity 3
  text: Establish an I&T governance board (or equivalent) at the board level. This board should ensure that governance of
    information and technology, as part of enterprise governance, is adequately addressed; advise on strategic direction;
    and determine prioritization of I&T-enabled investment programs in line with the enterprise’s business strategy and priorities.
  notes: ''
  parent_id: cobit-2019.edm01.02
- id: cobit-2019.edm01.02.04
  type: activity
  abbrev: EDM01.02-4
  heading: Activity 4
  text: Allocate responsibility, authority and accountability for I&T decisions in line with agreed-on governance design principles,
    decision-making models and delegation.
  notes: ''
  parent_id: cobit-2019.edm01.02
- id: cobit-2019.edm01.02.05
  type: activity
  abbrev: EDM01.02-5
  heading: Activity 5
  text: Ensure that communication and reporting mechanisms provide those responsible for oversight and decision making with
    appropriate information.
  notes: ''
  parent_id: cobit-2019.edm01.02
- id: cobit-2019.edm01.02.06
  type: activity
  abbrev: EDM01.02-6
  heading: Activity 6
  text: Direct that staff follow relevant guidelines for ethical and professional behavior and ensure that consequences of
    noncompliance are known and enforced.
  notes: ''
  parent_id: cobit-2019.edm01.02
- id: cobit-2019.edm01.02.07
  type: activity
  abbrev: EDM01.02-7
  heading: Activity 7
  text: Direct the establishment of a reward system to promote desirable cultural change.
  notes: ''
  parent_id: cobit-2019.edm01.02
- id: cobit-2019.edm01.03.01
  type: activity
  abbrev: EDM01.03-1
  heading: Activity 1
  text: Assess the effectiveness and performance of those stakeholders given delegated responsibility and authority for governance
    of enterprise I&T.
  notes: ''
  parent_id: cobit-2019.edm01.03
- id: cobit-2019.edm01.03.02
  type: activity
  abbrev: EDM01.03-2
  heading: Activity 2
  text: Periodically assess whether agreed-on governance of I&T mechanisms (structures, principles, processes, etc.) are established
    and operating effectively.
  notes: ''
  parent_id: cobit-2019.edm01.03
- id: cobit-2019.edm01.03.03
  type: activity
  abbrev: EDM01.03-3
  heading: Activity 3
  text: Assess the effectiveness of the governance design and identify actions to rectify any deviations found.
  notes: ''
  parent_id: cobit-2019.edm01.03
- id: cobit-2019.edm01.03.04
  type: activity
  abbrev: EDM01.03-4
  heading: Activity 4
  text: Maintain oversight of the extent to which I&T satisfies obligations (regulatory, legislation, common law, contractual),
    internal policies, standards and professional guidelines.
  notes: ''
  parent_id: cobit-2019.edm01.03
- id: cobit-2019.edm01.03.05
  type: activity
  abbrev: EDM01.03-5
  heading: Activity 5
  text: Provide oversight of the effectiveness of, and compliance with, the enterprise’s system of control.
  notes: ''
  parent_id: cobit-2019.edm01.03
- id: cobit-2019.edm01.03.06
  type: activity
  abbrev: EDM01.03-6
  heading: Activity 6
  text: Monitor regular and routine mechanisms for ensuring that the use of I&T complies with relevant obligations (regulatory,
    legislation, common law, contractual), standards and guidelines.
  notes: ''
  parent_id: cobit-2019.edm01.03
- id: cobit-2019.edm02.01.01
  type: activity
  abbrev: EDM02.01-1
  heading: Activity 1
  text: Create and maintain portfolios of I&T-enabled investment programs, IT services and IT assets, which form the basis
    for the current IT budget and support the I&T tactical and strategic plans.
  notes: ''
  parent_id: cobit-2019.edm02.01
- id: cobit-2019.edm02.01.02
  type: activity
  abbrev: EDM02.01-2
  heading: Activity 2
  text: Obtain a common understanding between IT and the other business functions on the potential opportunities for IT to
    enable and contribute to enterprise strategy.
  notes: ''
  parent_id: cobit-2019.edm02.01
- id: cobit-2019.edm02.01.03
  type: activity
  abbrev: EDM02.01-3
  heading: Activity 3
  text: Identify the broad categories of information systems, applications, data, IT services, infrastructure, I&T assets,
    resources, skills, practices, controls and relationships needed to support the enterprise strategy.
  notes: ''
  parent_id: cobit-2019.edm02.01
- id: cobit-2019.edm02.01.04
  type: activity
  abbrev: EDM02.01-4
  heading: Activity 4
  text: Agree on I&T goals, taking into account the interrelationships between the enterprise strategy and the I&T services,
    assets and other resources. Identify and leverage synergies that can be achieved.
  notes: ''
  parent_id: cobit-2019.edm02.01
- id: cobit-2019.edm02.01.05
  type: activity
  abbrev: EDM02.01-5
  heading: Activity 5
  text: Define an investment mix that achieves the right balance among a number of dimensions, including an appropriate balance
    of short- and long-term returns, financial and nonfinancial benefits, and high- and low-risk investments.
  notes: ''
  parent_id: cobit-2019.edm02.01
- id: cobit-2019.edm02.02.01
  type: activity
  abbrev: EDM02.02-1
  heading: Activity 1
  text: Understand stakeholder requirements; strategic I&T issues, such as dependence on I&T; and technology insights and
    capabilities regarding the actual and potential significance of I&T for the enterprise’s strategy.
  notes: ''
  parent_id: cobit-2019.edm02.02
- id: cobit-2019.edm02.02.02
  type: activity
  abbrev: EDM02.02-2
  heading: Activity 2
  text: Understand the key elements of governance required for the reliable, secure and cost-effective delivery of optimal
    value from the use of existing and new I&T services, assets and resources.
  notes: ''
  parent_id: cobit-2019.edm02.02
- id: cobit-2019.edm02.02.03
  type: activity
  abbrev: EDM02.02-3
  heading: Activity 3
  text: Understand and regularly discuss the opportunities that could arise for the enterprise from changes enabled by current,
    new or emerging technologies, and optimize the value created from those opportunities.
  notes: ''
  parent_id: cobit-2019.edm02.02
- id: cobit-2019.edm02.02.04
  type: activity
  abbrev: EDM02.02-4
  heading: Activity 4
  text: Understand what constitutes value for the enterprise, and consider how well it is communicated, understood and applied
    throughout the enterprise’s processes.
  notes: ''
  parent_id: cobit-2019.edm02.02
- id: cobit-2019.edm02.02.05
  type: activity
  abbrev: EDM02.02-5
  heading: Activity 5
  text: Evaluate how effectively the enterprise and I&T strategies have been integrated and aligned within the enterprise
    and with enterprise goals for delivering value.
  notes: ''
  parent_id: cobit-2019.edm02.02
- id: cobit-2019.edm02.02.06
  type: activity
  abbrev: EDM02.02-6
  heading: Activity 6
  text: Understand and consider how effective current roles, responsibilities, accountabilities and decision-making bodies
    are in ensuring value creation from I&T-enabled investments, services and assets.
  notes: ''
  parent_id: cobit-2019.edm02.02
- id: cobit-2019.edm02.02.07
  type: activity
  abbrev: EDM02.02-7
  heading: Activity 7
  text: Consider how well the management of I&T-enabled investments, services and assets aligns with enterprise value management
    and financial management practices.
  notes: ''
  parent_id: cobit-2019.edm02.02
- id: cobit-2019.edm02.02.08
  type: activity
  abbrev: EDM02.02-8
  heading: Activity 8
  text: Evaluate the portfolio of investments, services and assets for alignment with the enterprise’s strategic objectives;
    enterprise worth, both financial and nonfinancial; risk, both delivery risk and benefits risk; business process alignment;
    effectiveness in terms of usability, availability and responsiveness; and efficiency in terms of cost, redundancy and
    technical health.
  notes: ''
  parent_id: cobit-2019.edm02.02
- id: cobit-2019.edm02.03.01
  type: activity
  abbrev: EDM02.03-1
  heading: Activity 1
  text: Define and communicate portfolio and investment types, categories, criteria and relative weightings to the criteria
    to allow for overall relative value scores.
  notes: ''
  parent_id: cobit-2019.edm02.03
- id: cobit-2019.edm02.03.02
  type: activity
  abbrev: EDM02.03-2
  heading: Activity 2
  text: Define requirements for stage-gates and other reviews for significance of the investment to the enterprise and associated
    risk, program schedules, funding plans, and the delivery of key capabilities and benefits and ongoing contribution to
    value.
  notes: ''
  parent_id: cobit-2019.edm02.03
- id: cobit-2019.edm02.03.03
  type: activity
  abbrev: EDM02.03-3
  heading: Activity 3
  text: Direct management to consider potential innovative uses of I&T that enable the enterprise to respond to new opportunities
    or challenges, undertake new business, increase competitiveness, or improve processes.
  notes: ''
  parent_id: cobit-2019.edm02.03
- id: cobit-2019.edm02.03.04
  type: activity
  abbrev: EDM02.03-4
  heading: Activity 4
  text: Direct any required changes in assignment of accountabilities and responsibilities for executing the investment portfolio
    and delivering value from business processes and services.
  notes: ''
  parent_id: cobit-2019.edm02.03
- id: cobit-2019.edm02.03.05
  type: activity
  abbrev: EDM02.03-5
  heading: Activity 5
  text: Direct any required changes to the portfolio of investments and services to realign with current and expected enterprise
    objectives and/or constraints.
  notes: ''
  parent_id: cobit-2019.edm02.03
- id: cobit-2019.edm02.03.06
  type: activity
  abbrev: EDM02.03-6
  heading: Activity 6
  text: Recommend consideration of potential innovations, organizational changes or operational improvements that could drive
    increased value for the enterprise from I&T-enabled initiatives.
  notes: ''
  parent_id: cobit-2019.edm02.03
- id: cobit-2019.edm02.03.07
  type: activity
  abbrev: EDM02.03-7
  heading: Activity 7
  text: Define and communicate enterprise-level value delivery goals and outcome measures to enable effective monitoring.
  notes: ''
  parent_id: cobit-2019.edm02.03
- id: cobit-2019.edm02.04.01
  type: activity
  abbrev: EDM02.04-1
  heading: Activity 1
  text: Define a balanced set of performance objectives, metrics, targets and benchmarks. Metrics should cover activity and
    outcome measures, including lead and lag indicators for outcomes, as well as an appropriate balance of financial and nonfinancial
    measures. Review and agree on them with IT and other business functions, and other relevant stakeholders.
  notes: ''
  parent_id: cobit-2019.edm02.04
- id: cobit-2019.edm02.04.02
  type: activity
  abbrev: EDM02.04-2
  heading: Activity 2
  text: Collect relevant, timely, complete, credible and accurate data to report on progress in delivering value against targets.
    Obtain a succinct, high-level, all-around view of portfolio, program and I&T (technical and operational capabilities)
    performance that supports decision making. Ensure that expected results are being achieved.
  notes: ''
  parent_id: cobit-2019.edm02.04
- id: cobit-2019.edm02.04.03
  type: activity
  abbrev: EDM02.04-3
  heading: Activity 3
  text: Obtain regular and relevant portfolio, program and I&T (technological and functional) performance reports. Review
    the enterprise’s progress toward identified goals and the extent to which planned objectives have been achieved, deliverables
    obtained, performance targets met and risk mitigated.
  notes: ''
  parent_id: cobit-2019.edm02.04
- id: cobit-2019.edm02.04.04
  type: activity
  abbrev: EDM02.04-4
  heading: Activity 4
  text: Upon review of reports, ensure that appropriate management corrective action is initiated and controlled.
  notes: ''
  parent_id: cobit-2019.edm02.04
- id: cobit-2019.edm02.04.05
  type: activity
  abbrev: EDM02.04-5
  heading: Activity 5
  text: Upon review of reports, take appropriate management action as required to ensure that value is optimized.
  notes: ''
  parent_id: cobit-2019.edm02.04
- id: cobit-2019.edm03.01.01
  type: activity
  abbrev: EDM03.01-1
  heading: Activity 1
  text: Understand the organization and its context related to I&T risk.
  notes: ''
  parent_id: cobit-2019.edm03.01
- id: cobit-2019.edm03.01.02
  type: activity
  abbrev: EDM03.01-2
  heading: Activity 2
  text: Determine the risk appetite of the organization, i.e., the level of I&T-related risk that the enterprise is willing
    to take in its pursuit of enterprise objectives.
  notes: ''
  parent_id: cobit-2019.edm03.01
- id: cobit-2019.edm03.01.03
  type: activity
  abbrev: EDM03.01-3
  heading: Activity 3
  text: Determine risk tolerance levels against the risk appetite, i.e., temporarily acceptable deviations from the risk appetite.
  notes: ''
  parent_id: cobit-2019.edm03.01
- id: cobit-2019.edm03.01.04
  type: activity
  abbrev: EDM03.01-4
  heading: Activity 4
  text: Determine the extent of alignment of the I&T risk strategy to the enterprise risk strategy and ensure the risk appetite
    is below the organization's risk capacity.
  notes: ''
  parent_id: cobit-2019.edm03.01
- id: cobit-2019.edm03.01.05
  type: activity
  abbrev: EDM03.01-5
  heading: Activity 5
  text: Proactively evaluate I&T risk factors in advance of pending strategic enterprise decisions and ensure that risk considerations
    are part of the strategic enterprise decision process.
  notes: ''
  parent_id: cobit-2019.edm03.01
- id: cobit-2019.edm03.01.06
  type: activity
  abbrev: EDM03.01-6
  heading: Activity 6
  text: Evaluate risk management activities to ensure alignment with the enterprise’s capacity for I&T-related loss and leadership’s
    tolerance of it.
  notes: ''
  parent_id: cobit-2019.edm03.01
- id: cobit-2019.edm03.01.07
  type: activity
  abbrev: EDM03.01-7
  heading: Activity 7
  text: Attract and maintain necessary skills and personnel for I&T Risk Management
  notes: ''
  parent_id: cobit-2019.edm03.01
- id: cobit-2019.edm03.02.01
  type: activity
  abbrev: EDM03.02-1
  heading: Activity 1
  text: Direct the translation and integration of the I&T risk strategy into risk management practices and operational activities.
  notes: ''
  parent_id: cobit-2019.edm03.02
- id: cobit-2019.edm03.02.02
  type: activity
  abbrev: EDM03.02-2
  heading: Activity 2
  text: Direct the development of risk communication plans (covering all levels of the enterprise).
  notes: ''
  parent_id: cobit-2019.edm03.02
- id: cobit-2019.edm03.02.03
  type: activity
  abbrev: EDM03.02-3
  heading: Activity 3
  text: Direct implementation of the appropriate mechanisms to respond quickly to changing risk and report immediately to
    appropriate levels of management, supported by agreed principles of escalation (what to report, when, where and how).
  notes: ''
  parent_id: cobit-2019.edm03.02
- id: cobit-2019.edm03.02.04
  type: activity
  abbrev: EDM03.02-4
  heading: Activity 4
  text: Direct that risk, opportunities, issues and concerns may be identified and reported by anyone to the appropriate party
    at any time. Risk should be managed in accordance with published policies and procedures and escalated to the relevant
    decision makers.
  notes: ''
  parent_id: cobit-2019.edm03.02
- id: cobit-2019.edm03.02.05
  type: activity
  abbrev: EDM03.02-5
  heading: Activity 5
  text: Identify key goals and metrics of the risk governance and management processes to be monitored, and approve the approaches,
    methods, techniques and processes for capturing and reporting the measurement information.
  notes: ''
  parent_id: cobit-2019.edm03.02
- id: cobit-2019.edm03.03.01
  type: activity
  abbrev: EDM03.03-1
  heading: Activity 1
  text: Report any risk management issues to the board or executive committee.
  notes: ''
  parent_id: cobit-2019.edm03.03
- id: cobit-2019.edm03.03.02
  type: activity
  abbrev: EDM03.03-2
  heading: Activity 2
  text: Monitor the extent to which the risk profile is managed within the enterprise's risk appetite and tolerance thresholds.
  notes: ''
  parent_id: cobit-2019.edm03.03
- id: cobit-2019.edm03.03.03
  type: activity
  abbrev: EDM03.03-3
  heading: Activity 3
  text: Monitor key goals and metrics of risk governance and management processes against targets, analyze the cause of any
    deviations, and initiate remedial actions to address the underlying causes.
  notes: ''
  parent_id: cobit-2019.edm03.03
- id: cobit-2019.edm03.03.04
  type: activity
  abbrev: EDM03.03-4
  heading: Activity 4
  text: Enable key stakeholders’ review of the enterprise’s progress toward identified goals.
  notes: ''
  parent_id: cobit-2019.edm03.03
- id: cobit-2019.edm04.01.01
  type: activity
  abbrev: EDM04.01-1
  heading: Activity 1
  text: Starting from the current and future strategies, examine the potential options for providing I&T-related resources
    (technology, financial and human resources), and develop capabilities to meet current and future needs (including sourcing
    options).
  notes: ''
  parent_id: cobit-2019.edm04.01
- id: cobit-2019.edm04.01.02
  type: activity
  abbrev: EDM04.01-2
  heading: Activity 2
  text: Define the key principles for resource allocation and management of resources and capabilities so I&T can meet the
    needs of the enterprise according to the agreed priorities and budgetary constraints. For example, define preferred sourcing
    options for certain services and financial boundaries per sourcing option.
  notes: ''
  parent_id: cobit-2019.edm04.01
- id: cobit-2019.edm04.01.03
  type: activity
  abbrev: EDM04.01-3
  heading: Activity 3
  text: Review and approve the resource plan and enterprise architecture strategies for delivering value and mitigating risk
    with the allocated resources.
  notes: ''
  parent_id: cobit-2019.edm04.01
- id: cobit-2019.edm04.01.04
  type: activity
  abbrev: EDM04.01-4
  heading: Activity 4
  text: Understand requirements for aligning I&T resource management with enterprise financial and human resources (HR) planning.
  notes: ''
  parent_id: cobit-2019.edm04.01
- id: cobit-2019.edm04.01.05
  type: activity
  abbrev: EDM04.01-5
  heading: Activity 5
  text: Define principles for the management and control of the enterprise architecture.
  notes: ''
  parent_id: cobit-2019.edm04.01
- id: cobit-2019.edm04.02.01
  type: activity
  abbrev: EDM04.02-1
  heading: Activity 1
  text: Assign responsibilities for executing resource management.
  notes: ''
  parent_id: cobit-2019.edm04.02
- id: cobit-2019.edm04.02.02
  type: activity
  abbrev: EDM04.02-2
  heading: Activity 2
  text: Establish principles related to safeguarding resources.
  notes: ''
  parent_id: cobit-2019.edm04.02
- id: cobit-2019.edm04.02.03
  type: activity
  abbrev: EDM04.02-3
  heading: Activity 3
  text: Communicate and drive the adoption of the resource management strategies, principles, and agreed resource plan and
    enterprise architecture strategies.
  notes: ''
  parent_id: cobit-2019.edm04.02
- id: cobit-2019.edm04.02.04
  type: activity
  abbrev: EDM04.02-4
  heading: Activity 4
  text: Align resource management with enterprise financial and HR planning.
  notes: ''
  parent_id: cobit-2019.edm04.02
- id: cobit-2019.edm04.02.05
  type: activity
  abbrev: EDM04.02-5
  heading: Activity 5
  text: Define key goals, measures and metrics for resource management.
  notes: ''
  parent_id: cobit-2019.edm04.02
- id: cobit-2019.edm04.03.01
  type: activity
  abbrev: EDM04.03-1
  heading: Activity 1
  text: Monitor the allocation and optimization of resources in accordance with enterprise objectives and priorities using
    agreed goals and metrics.
  notes: ''
  parent_id: cobit-2019.edm04.03
- id: cobit-2019.edm04.03.02
  type: activity
  abbrev: EDM04.03-2
  heading: Activity 2
  text: Monitor I&T-related sourcing strategies, enterprise architecture strategies, and business- and IT-related capabilities
    and resources to ensure that current and future needs and objectives of the enterprise can be met.
  notes: ''
  parent_id: cobit-2019.edm04.03
- id: cobit-2019.edm04.03.03
  type: activity
  abbrev: EDM04.03-3
  heading: Activity 3
  text: Monitor resource performance against targets, analyze the cause of deviations, and initiate remedial action to address
    the underlying causes.
  notes: ''
  parent_id: cobit-2019.edm04.03
- id: cobit-2019.edm05.01.01
  type: activity
  abbrev: EDM05.01-1
  heading: Activity 1
  text: Identify all relevant I&T stakeholders within and outside the enterprise. Group stakeholders in stakeholder categories
    with similar requirements.
  notes: ''
  parent_id: cobit-2019.edm05.01
- id: cobit-2019.edm05.01.02
  type: activity
  abbrev: EDM05.01-2
  heading: Activity 2
  text: Examine and make judgment on the current and future mandatory reporting requirements relating to the use of I&T within
    the enterprise (regulation, legislation, common law, contractual), including extent and frequency.
  notes: ''
  parent_id: cobit-2019.edm05.01
- id: cobit-2019.edm05.01.03
  type: activity
  abbrev: EDM05.01-3
  heading: Activity 3
  text: Examine and make judgment on the current and future communication and reporting requirements for other stakeholders
    relating to the use of I&T within the enterprise, including required level of involvement/consultation and extent of communication/level
    of detail and conditions.
  notes: ''
  parent_id: cobit-2019.edm05.01
- id: cobit-2019.edm05.01.04
  type: activity
  abbrev: EDM05.01-4
  heading: Activity 4
  text: Maintain principles for communication with external and internal stakeholders, including communication formats and
    channels, and for stakeholder acceptance and sign-off of reporting.
  notes: ''
  parent_id: cobit-2019.edm05.01
- id: cobit-2019.edm05.02.01
  type: activity
  abbrev: EDM05.02-1
  heading: Activity 1
  text: Direct the establishment of the consultation and communication strategy for external and internal stakeholders.
  notes: ''
  parent_id: cobit-2019.edm05.02
- id: cobit-2019.edm05.02.02
  type: activity
  abbrev: EDM05.02-2
  heading: Activity 2
  text: Direct the implementation of mechanisms to ensure that information meets all criteria for mandatory I&T reporting
    requirements for the enterprise.
  notes: ''
  parent_id: cobit-2019.edm05.02
- id: cobit-2019.edm05.02.03
  type: activity
  abbrev: EDM05.02-3
  heading: Activity 3
  text: Establish mechanisms for validation and approval of mandatory reporting.
  notes: ''
  parent_id: cobit-2019.edm05.02
- id: cobit-2019.edm05.02.04
  type: activity
  abbrev: EDM05.02-4
  heading: Activity 4
  text: Establish reporting escalation mechanisms.
  notes: ''
  parent_id: cobit-2019.edm05.02
- id: cobit-2019.edm05.03.01
  type: activity
  abbrev: EDM05.03-1
  heading: Activity 1
  text: Periodically assess the effectiveness of the mechanisms for ensuring the accuracy and reliability of mandatory reporting.
  notes: ''
  parent_id: cobit-2019.edm05.03
- id: cobit-2019.edm05.03.02
  type: activity
  abbrev: EDM05.03-2
  heading: Activity 2
  text: Periodically assess the effectiveness of the mechanisms for, and outcomes from, involvement of and communication with
    external and internal stakeholders.
  notes: ''
  parent_id: cobit-2019.edm05.03
- id: cobit-2019.edm05.03.03
  type: activity
  abbrev: EDM05.03-3
  heading: Activity 3
  text: Determine whether the requirements of different stakeholders are met and assess stakeholder engagement levels.
  notes: ''
  parent_id: cobit-2019.edm05.03
- id: cobit-2019.apo01.01.01
  type: activity
  abbrev: APO01.01-1
  heading: Activity 1
  text: Obtain an understanding of the enterprise vision, direction and strategy as well as the current enterprise context
    and challenges.
  notes: ''
  parent_id: cobit-2019.apo01.01
- id: cobit-2019.apo01.01.02
  type: activity
  abbrev: APO01.01-2
  heading: Activity 2
  text: Consider the enterprise’s internal environment, including management culture and philosophy, risk tolerance, security
    and privacy policy, ethical values, code of conduct, accountability, and requirements for management integrity.
  notes: ''
  parent_id: cobit-2019.apo01.01
- id: cobit-2019.apo01.01.03
  type: activity
  abbrev: APO01.01-3
  heading: Activity 3
  text: Apply the COBIT goals cascade and design factors to the enterprise strategy and context to decide on priorities for
    the management system and, thus, for implementation of management objective priorities.
  notes: ''
  parent_id: cobit-2019.apo01.01
- id: cobit-2019.apo01.01.04
  type: activity
  abbrev: APO01.01-4
  heading: Activity 4
  text: Validate selected priorities for implementation of management objectives with industry-specific good practices or
    requirements (e.g., industry-specific regulations) and with appropriate governance structures.
  notes: ''
  parent_id: cobit-2019.apo01.01
- id: cobit-2019.apo01.02.01
  type: activity
  abbrev: APO01.02-1
  heading: Activity 1
  text: Provide sufficient and skilled resources to support the communication process.
  notes: ''
  parent_id: cobit-2019.apo01.02
- id: cobit-2019.apo01.02.02
  type: activity
  abbrev: APO01.02-2
  heading: Activity 2
  text: Define ground rules for communication by identifying communication needs and implementing plans based on those needs,
    considering top-down, bottom-up and horizontal communication.
  notes: ''
  parent_id: cobit-2019.apo01.02
- id: cobit-2019.apo01.02.03
  type: activity
  abbrev: APO01.02-3
  heading: Activity 3
  text: Continuously communicate I&T objectives and direction. Ensure that communication is supported by executive management
    in actions and words, using all available channels.
  notes: ''
  parent_id: cobit-2019.apo01.02
- id: cobit-2019.apo01.02.04
  type: activity
  abbrev: APO01.02-4
  heading: Activity 4
  text: Ensure the information communicated encompasses a clearly articulated mission, service objectives, security and privacy
    policy, internal controls, quality, code of ethics/conduct, policies and procedures, roles and responsibilities, etc.
    Communicate the information at the appropriate level of detail for respective audiences within the enterprise.
  notes: ''
  parent_id: cobit-2019.apo01.02
- id: cobit-2019.apo01.03.01
  type: activity
  abbrev: APO01.03-1
  heading: Activity 1
  text: Develop the I&T governance target process model specific to the organization, based on the selection of priority management
    objectives (output of goals cascade and design factors exercise).
  notes: ''
  parent_id: cobit-2019.apo01.03
- id: cobit-2019.apo01.03.02
  type: activity
  abbrev: APO01.03-2
  heading: Activity 2
  text: Analyze the gap between the target process model for the organization and current practices and activities.
  notes: ''
  parent_id: cobit-2019.apo01.03
- id: cobit-2019.apo01.03.03
  type: activity
  abbrev: APO01.03-3
  heading: Activity 3
  text: Draft a road map for implementation of missing process practices and activities. Use practice metrics to follow up
    on successful implementation.
  notes: ''
  parent_id: cobit-2019.apo01.03
- id: cobit-2019.apo01.04.01
  type: activity
  abbrev: APO01.04-1
  heading: Activity 1
  text: Identify decisions required for the achievement of enterprise outcomes and the I&T strategy and for the management
    and execution of I&T services.
  notes: ''
  parent_id: cobit-2019.apo01.04
- id: cobit-2019.apo01.04.02
  type: activity
  abbrev: APO01.04-2
  heading: Activity 2
  text: Involve stakeholders who are critical to decision making (accountable, responsible, consulted or informed).
  notes: ''
  parent_id: cobit-2019.apo01.04
- id: cobit-2019.apo01.04.03
  type: activity
  abbrev: APO01.04-3
  heading: Activity 3
  text: Define the scope, focus, mandate and responsibilities of each function within the I&T-related organization, in line
    with governance direction.
  notes: ''
  parent_id: cobit-2019.apo01.04
- id: cobit-2019.apo01.04.04
  type: activity
  abbrev: APO01.04-4
  heading: Activity 4
  text: Define the scope of internal and external functions, internal and external roles, and capabilities and decision rights
    required to cover all practices, including those performed by third parties.
  notes: ''
  parent_id: cobit-2019.apo01.04
- id: cobit-2019.apo01.04.05
  type: activity
  abbrev: APO01.04-5
  heading: Activity 5
  text: Align the I&T-related organization with enterprise architecture organizational models.
  notes: ''
  parent_id: cobit-2019.apo01.04
- id: cobit-2019.apo01.04.06
  type: activity
  abbrev: APO01.04-6
  heading: Activity 6
  text: Establish an I&T steering committee (or equivalent) composed of executive, business and I&T management to track status
    of projects, resolve resource conflicts, and monitor service levels and service improvements.
  notes: ''
  parent_id: cobit-2019.apo01.04
- id: cobit-2019.apo01.04.07
  type: activity
  abbrev: APO01.04-7
  heading: Activity 7
  text: Provide guidelines for each management structure (including mandate, objectives, meeting attendees, timing, tracking,
    supervision and oversight) as well as required inputs for and expected outcomes of meetings.
  notes: ''
  parent_id: cobit-2019.apo01.04
- id: cobit-2019.apo01.04.08
  type: activity
  abbrev: APO01.04-8
  heading: Activity 8
  text: Regularly verify the adequacy and effectiveness of the organizational structures.
  notes: ''
  parent_id: cobit-2019.apo01.04
- id: cobit-2019.apo01.05.01
  type: activity
  abbrev: APO01.05-1
  heading: Activity 1
  text: Establish, agree on and communicate I&T-related roles and responsibilities for all personnel in the enterprise, in
    alignment with business needs and objectives. Clearly delineate responsibilities and accountabilities, especially for
    decision making and approvals.
  notes: ''
  parent_id: cobit-2019.apo01.05
- id: cobit-2019.apo01.05.02
  type: activity
  abbrev: APO01.05-2
  heading: Activity 2
  text: Consider requirements from enterprise and I&T service continuity when defining roles, including staff back-up and
    cross-training requirements.
  notes: ''
  parent_id: cobit-2019.apo01.05
- id: cobit-2019.apo01.05.03
  type: activity
  abbrev: APO01.05-3
  heading: Activity 3
  text: Provide input to the I&T service continuity process by maintaining up-to-date contact information and role descriptions
    in the enterprise.
  notes: ''
  parent_id: cobit-2019.apo01.05
- id: cobit-2019.apo01.05.04
  type: activity
  abbrev: APO01.05-4
  heading: Activity 4
  text: Include specific requirements in role and responsibility descriptions regarding adherence to management policies and
    procedures, the code of ethics, and professional practices.
  notes: ''
  parent_id: cobit-2019.apo01.05
- id: cobit-2019.apo01.05.05
  type: activity
  abbrev: APO01.05-5
  heading: Activity 5
  text: Ensure that accountability is defined through roles and responsibilities.
  notes: ''
  parent_id: cobit-2019.apo01.05
- id: cobit-2019.apo01.05.06
  type: activity
  abbrev: APO01.05-6
  heading: Activity 6
  text: Structure roles and responsibilities to reduce the possibility for a single role to compromise a critical process.
  notes: ''
  parent_id: cobit-2019.apo01.05
- id: cobit-2019.apo01.05.07
  type: activity
  abbrev: APO01.05-7
  heading: Activity 7
  text: Implement adequate supervisory practices to ensure that roles and responsibilities are properly exercised, to assess
    whether all personnel have sufficient authority and resources to execute their roles and responsibilities, and generally
    to review performance. The level of supervision should be aligned with the sensitivity of the position and extent of assigned
    responsibilities.
  notes: ''
  parent_id: cobit-2019.apo01.05
- id: cobit-2019.apo01.06.01
  type: activity
  abbrev: APO01.06-1
  heading: Activity 1
  text: Understand context for the placement of the IT function, including assessment of enterprise strategy and operating
    model (centralized, federated, decentralized, hybrid), importance of I&T, and sourcing situation and options.
  notes: ''
  parent_id: cobit-2019.apo01.06
- id: cobit-2019.apo01.06.02
  type: activity
  abbrev: APO01.06-2
  heading: Activity 2
  text: Identify, evaluate and prioritize options for organizational placement, sourcing and operating models.
  notes: ''
  parent_id: cobit-2019.apo01.06
- id: cobit-2019.apo01.06.03
  type: activity
  abbrev: APO01.06-3
  heading: Activity 3
  text: Define placement of the IT function and obtain agreement.
  notes: ''
  parent_id: cobit-2019.apo01.06
- id: cobit-2019.apo01.07.01
  type: activity
  abbrev: APO01.07-1
  heading: Activity 1
  text: Provide guidelines to ensure appropriate and consistent enterprisewide classification of information items.
  notes: ''
  parent_id: cobit-2019.apo01.07
- id: cobit-2019.apo01.07.02
  type: activity
  abbrev: APO01.07-2
  heading: Activity 2
  text: Create and maintain an inventory of information (systems and data) that includes a listing of owners, custodians and
    classifications. Include systems that are outsourced and those for which ownership should stay within the enterprise.
  notes: ''
  parent_id: cobit-2019.apo01.07
- id: cobit-2019.apo01.07.03
  type: activity
  abbrev: APO01.07-3
  heading: Activity 3
  text: Assess and distinguish between critical (high value) and noncritical data, information and systems. Ensure appropriate
    protection for each category.
  notes: ''
  parent_id: cobit-2019.apo01.07
- id: cobit-2019.apo01.08.01
  type: activity
  abbrev: APO01.08-1
  heading: Activity 1
  text: Identify the required skills and competencies to achieve selected management objectives.
  notes: ''
  parent_id: cobit-2019.apo01.08
- id: cobit-2019.apo01.08.02
  type: activity
  abbrev: APO01.08-2
  heading: Activity 2
  text: Analyze the gap between target skills and capabilities for the enterprise and current skills of the workforce. Refer
    to APO07—Managed Human Resources for skills development and management practices.
  notes: ''
  parent_id: cobit-2019.apo01.08
- id: cobit-2019.apo01.09.01
  type: activity
  abbrev: APO01.09-1
  heading: Activity 1
  text: Create a set of policies to drive IT control expectations on relevant key topics such as quality, security, privacy,
    confidentiality, internal controls, usage of I&T assets, ethics and intellectual property (IP) rights.
  notes: ''
  parent_id: cobit-2019.apo01.09
- id: cobit-2019.apo01.09.02
  type: activity
  abbrev: APO01.09-2
  heading: Activity 2
  text: Roll out and enforce I&T policies uniformly for all relevant staff so they are built into, and become integral parts
    of, enterprise operations.
  notes: ''
  parent_id: cobit-2019.apo01.09
- id: cobit-2019.apo01.09.03
  type: activity
  abbrev: APO01.09-3
  heading: Activity 3
  text: Evaluate and update the policies at least yearly to accommodate changing operating or business environments.
  notes: ''
  parent_id: cobit-2019.apo01.09
- id: cobit-2019.apo01.10.01
  type: activity
  abbrev: APO01.10-1
  heading: Activity 1
  text: Identify priority management objectives that may be achieved by automating services, applications or infrastructure.
  notes: ''
  parent_id: cobit-2019.apo01.10
- id: cobit-2019.apo01.10.02
  type: activity
  abbrev: APO01.10-2
  heading: Activity 2
  text: Select and implement the most appropriate tools and communicate to stakeholders.
  notes: ''
  parent_id: cobit-2019.apo01.10
- id: cobit-2019.apo01.10.03
  type: activity
  abbrev: APO01.10-3
  heading: Activity 3
  text: Provide training on selected tools, as required.
  notes: ''
  parent_id: cobit-2019.apo01.10
- id: cobit-2019.apo01.11.01
  type: activity
  abbrev: APO01.11-1
  heading: Activity 1
  text: Regularly assess performance of framework components and take appropriate action.
  notes: ''
  parent_id: cobit-2019.apo01.11
- id: cobit-2019.apo01.11.02
  type: activity
  abbrev: APO01.11-2
  heading: Activity 2
  text: Identify business-critical processes based on performance and conformance drivers and related risk. Assess capability
    and identify improvement targets. Analyze gaps in capability and control. Identify options for improving or redesigning
    the process.
  notes: ''
  parent_id: cobit-2019.apo01.11
- id: cobit-2019.apo01.11.03
  type: activity
  abbrev: APO01.11-3
  heading: Activity 3
  text: Prioritize initiatives for improvement based on potential benefits and costs. Implement agreed improvements, operate
    as normal business practice, and set performance goals and metrics to enable monitoring of improvements.
  notes: ''
  parent_id: cobit-2019.apo01.11
- id: cobit-2019.apo01.11.04
  type: activity
  abbrev: APO01.11-4
  heading: Activity 4
  text: Consider ways to improve efficiency and effectiveness (e.g., through training, documentation, standardization and/or
    process automation).
  notes: ''
  parent_id: cobit-2019.apo01.11
- id: cobit-2019.apo01.11.05
  type: activity
  abbrev: APO01.11-5
  heading: Activity 5
  text: Apply quality management practices to update the process.
  notes: ''
  parent_id: cobit-2019.apo01.11
- id: cobit-2019.apo01.11.06
  type: activity
  abbrev: APO01.11-6
  heading: Activity 6
  text: Retire outdated governance components (processes, information items, policies, etc.).
  notes: ''
  parent_id: cobit-2019.apo01.11
- id: cobit-2019.apo02.01.01
  type: activity
  abbrev: APO02.01-1
  heading: Activity 1
  text: Develop and maintain an understanding of the external environment of the enterprise.
  notes: ''
  parent_id: cobit-2019.apo02.01
- id: cobit-2019.apo02.01.02
  type: activity
  abbrev: APO02.01-2
  heading: Activity 2
  text: Develop and maintain an understanding of the current way of working, including the operational environment, enterprise
    architecture (business, information, data, applications and technology domains), enterprise culture and current challenges.
  notes: ''
  parent_id: cobit-2019.apo02.01
- id: cobit-2019.apo02.01.03
  type: activity
  abbrev: APO02.01-3
  heading: Activity 3
  text: Develop and maintain an understanding of future enterprise direction, including enterprise strategy, goals and objectives.
    Understand the ambition level of the enterprise in terms of digitization, which may include a range of increasingly aspirational
    goals, from cutting costs, increasing customer centricity, or getting to market faster by digitizing internal operations,
    to creating entirely new revenue streams from new business models (e.g., platform business).
  notes: ''
  parent_id: cobit-2019.apo02.01
- id: cobit-2019.apo02.01.04
  type: activity
  abbrev: APO02.01-4
  heading: Activity 4
  text: Identify key stakeholders and obtain insight on their requirements.
  notes: ''
  parent_id: cobit-2019.apo02.01
- id: cobit-2019.apo02.02.01
  type: activity
  abbrev: APO02.02-1
  heading: Activity 1
  text: Develop a baseline of current business and I&T capabilities and services. Include assessment of externally provisioned
    services, governance of I&T, and enterprisewide I&T-related skills and competencies.
  notes: ''
  parent_id: cobit-2019.apo02.02
- id: cobit-2019.apo02.02.02
  type: activity
  abbrev: APO02.02-2
  heading: Activity 2
  text: Assess digital maturity across different dimensions (e.g., ability of leadership to leverage technology, level of
    accepted technology risk, approach to innovation, culture and knowledge level of users). Assess appetite for change.
  notes: ''
  parent_id: cobit-2019.apo02.02
- id: cobit-2019.apo02.03.01
  type: activity
  abbrev: APO02.03-1
  heading: Activity 1
  text: Summarize enterprise context and direction and identify specific I&T aspects of enterprise strategy (e.g., digitizing
    processes, implementing new technology, supporting legacy architecture, applying new digital business models, developing
    digital product portfolio, etc.).
  notes: ''
  parent_id: cobit-2019.apo02.03
- id: cobit-2019.apo02.03.02
  type: activity
  abbrev: APO02.03-2
  heading: Activity 2
  text: Define high-level I&T objectives and goals and specify their contribution to enterprise objectives.
  notes: ''
  parent_id: cobit-2019.apo02.03
- id: cobit-2019.apo02.03.03
  type: activity
  abbrev: APO02.03-3
  heading: Activity 3
  text: Detail required I&T services and products to realize enterprise objectives. Consider validated emerging technology
    or innovation ideas, reference standards, competitor business and I&T capabilities, comparative benchmarks of good practice,
    and emerging I&T service provision.
  notes: ''
  parent_id: cobit-2019.apo02.03
- id: cobit-2019.apo02.03.04
  type: activity
  abbrev: APO02.03-4
  heading: Activity 4
  text: Determine I&T capabilities, methodologies and organizational approaches required to realize the defined I&T product
    and service portfolio. Consider different development methodologies (Agile, scrum, waterfall, bimodal IT), depending on
    business requirements. Consider how each could help realize I&T objectives.
  notes: ''
  parent_id: cobit-2019.apo02.03
- id: cobit-2019.apo02.04.01
  type: activity
  abbrev: APO02.04-1
  heading: Activity 1
  text: Identify all gaps and changes required to realize the target environment.
  notes: ''
  parent_id: cobit-2019.apo02.04
- id: cobit-2019.apo02.04.02
  type: activity
  abbrev: APO02.04-2
  heading: Activity 2
  text: Describe high-level changes in enterprise architecture (business, information, data, applications and technology domains).
  notes: ''
  parent_id: cobit-2019.apo02.04
- id: cobit-2019.apo02.04.03
  type: activity
  abbrev: APO02.04-3
  heading: Activity 3
  text: Consider the high-level implications of all gaps. Assess the impact of potential changes on business and I&T operating
    models, I&T research and development capabilities, and I&T investment programs.
  notes: ''
  parent_id: cobit-2019.apo02.04
- id: cobit-2019.apo02.04.04
  type: activity
  abbrev: APO02.04-4
  heading: Activity 4
  text: Consider the value of potential changes to business and IT capabilities, I&T services and enterprise architecture,
    and the implications if no changes are realized.
  notes: ''
  parent_id: cobit-2019.apo02.04
- id: cobit-2019.apo02.04.05
  type: activity
  abbrev: APO02.04-5
  heading: Activity 5
  text: Refine the target environment definition and prepare a value statement outlining benefits of the target environment.
  notes: ''
  parent_id: cobit-2019.apo02.04
- id: cobit-2019.apo02.05.01
  type: activity
  abbrev: APO02.05-1
  heading: Activity 1
  text: Define initiatives required to close gaps between current and target environments. Integrate initiatives into a coherent
    I&T strategy that aligns I&T with all aspects of the business.
  notes: ''
  parent_id: cobit-2019.apo02.05
- id: cobit-2019.apo02.05.02
  type: activity
  abbrev: APO02.05-2
  heading: Activity 2
  text: Detail a road map that defines the incremental steps required to achieve the goals and objectives of the I&T strategy.
    Ensure actions are included to train people with new skills, support adoption of new technology, sustain change throughout
    the organization, etc.
  notes: ''
  parent_id: cobit-2019.apo02.05
- id: cobit-2019.apo02.05.03
  type: activity
  abbrev: APO02.05-3
  heading: Activity 3
  text: Consider the external ecosystem (enterprise partners, suppliers, start-ups, etc.) to help support execution of the
    road map.
  notes: ''
  parent_id: cobit-2019.apo02.05
- id: cobit-2019.apo02.05.04
  type: activity
  abbrev: APO02.05-4
  heading: Activity 4
  text: Group actions into programs and/or projects with a clear goal or deliverable. For each project, identify high-level
    resource requirements, schedule, investment/operational budget, risk, change impact, etc.
  notes: ''
  parent_id: cobit-2019.apo02.05
- id: cobit-2019.apo02.05.05
  type: activity
  abbrev: APO02.05-5
  heading: Activity 5
  text: Determine dependencies, overlaps, synergies and impacts among projects, and prioritize.
  notes: ''
  parent_id: cobit-2019.apo02.05
- id: cobit-2019.apo02.05.06
  type: activity
  abbrev: APO02.05-6
  heading: Activity 6
  text: Finalize road map, indicating relative scheduling and interdependencies of projects.
  notes: ''
  parent_id: cobit-2019.apo02.05
- id: cobit-2019.apo02.05.07
  type: activity
  abbrev: APO02.05-7
  heading: Activity 7
  text: Ensure focus on the transformation journey. Appoint a champion of digital transformation and alignment between business
    and I&T (chief digital officer [CDO] or other traditional C-suite role).
  notes: ''
  parent_id: cobit-2019.apo02.05
- id: cobit-2019.apo02.05.08
  type: activity
  abbrev: APO02.05-8
  heading: Activity 8
  text: Obtain support and formal approval of plan from stakeholders.
  notes: ''
  parent_id: cobit-2019.apo02.05
- id: cobit-2019.apo02.05.09
  type: activity
  abbrev: APO02.05-9
  heading: Activity 9
  text: Translate objectives into measurable outcomes represented by metrics (what) and targets (how much). Ensure that outcomes
    and measures correlate to enterprise benefits.
  notes: ''
  parent_id: cobit-2019.apo02.05
- id: cobit-2019.apo02.06.01
  type: activity
  abbrev: APO02.06-1
  heading: Activity 1
  text: Develop a communication plan covering the required messages, target audiences, communication mechanisms/channels and
    schedules.
  notes: ''
  parent_id: cobit-2019.apo02.06
- id: cobit-2019.apo02.06.02
  type: activity
  abbrev: APO02.06-2
  heading: Activity 2
  text: Prepare a communication package that delivers the plan effectively, using available media and technologies.
  notes: ''
  parent_id: cobit-2019.apo02.06
- id: cobit-2019.apo02.06.03
  type: activity
  abbrev: APO02.06-3
  heading: Activity 3
  text: Develop and maintain a network for endorsing, supporting and driving the I&T strategy.
  notes: ''
  parent_id: cobit-2019.apo02.06
- id: cobit-2019.apo02.06.04
  type: activity
  abbrev: APO02.06-4
  heading: Activity 4
  text: Obtain feedback and update the communication plan and delivery as required.
  notes: ''
  parent_id: cobit-2019.apo02.06
- id: cobit-2019.apo03.01.01
  type: activity
  abbrev: APO03.01-1
  heading: Activity 1
  text: Identify key stakeholders and their concerns/objectives. Define key enterprise requirements to be addressed as well
    as architecture views to be developed to satisfy stakeholder requirements.
  notes: ''
  parent_id: cobit-2019.apo03.01
- id: cobit-2019.apo03.01.02
  type: activity
  abbrev: APO03.01-2
  heading: Activity 2
  text: Identify enterprise goals and strategic drivers. Define constraints that must addressed, including both enterprisewide
    and project-specific constraints (e.g., time, schedule, resources, etc.).
  notes: ''
  parent_id: cobit-2019.apo03.01
- id: cobit-2019.apo03.01.03
  type: activity
  abbrev: APO03.01-3
  heading: Activity 3
  text: Align architecture objectives with strategic program priorities.
  notes: ''
  parent_id: cobit-2019.apo03.01
- id: cobit-2019.apo03.01.04
  type: activity
  abbrev: APO03.01-4
  heading: Activity 4
  text: Understand enterprise capabilities and goals, then identify options to realize those goals.
  notes: ''
  parent_id: cobit-2019.apo03.01
- id: cobit-2019.apo03.01.05
  type: activity
  abbrev: APO03.01-5
  heading: Activity 5
  text: Assess the enterprise’s readiness for change.
  notes: ''
  parent_id: cobit-2019.apo03.01
- id: cobit-2019.apo03.01.06
  type: activity
  abbrev: APO03.01-6
  heading: Activity 6
  text: Define scope of baseline architecture and target architecture. Enumerate items that are in scope as well as those
    out of scope. (Baseline and target architecture need not be described at the same level of detail.)
  notes: ''
  parent_id: cobit-2019.apo03.01
- id: cobit-2019.apo03.01.07
  type: activity
  abbrev: APO03.01-7
  heading: Activity 7
  text: Understand current enterprise strategic goals and objectives. Work within the strategic planning process to ensure
    that I&T-related enterprise architecture opportunities are leveraged in the development of the strategic plan.
  notes: ''
  parent_id: cobit-2019.apo03.01
- id: cobit-2019.apo03.01.08
  type: activity
  abbrev: APO03.01-8
  heading: Activity 8
  text: Based on stakeholder concerns, business capability requirements, scope, constraints and principles, create the architecture
    vision (i.e., the high-level view of baseline and target architectures).
  notes: ''
  parent_id: cobit-2019.apo03.01
- id: cobit-2019.apo03.01.09
  type: activity
  abbrev: APO03.01-9
  heading: Activity 9
  text: Confirm and elaborate architecture principles, including enterprise principles. Ensure that any existing definitions
    are current. Clarify any areas of ambiguity.
  notes: ''
  parent_id: cobit-2019.apo03.01
- id: cobit-2019.apo03.01.10
  type: activity
  abbrev: APO03.01-10
  heading: Activity 10
  text: Identify enterprise change risk associated with the architecture vision. Assess the initial level of risk (e.g., critical,
    marginal or negligible). Develop a mitigation strategy for each significant risk.
  notes: ''
  parent_id: cobit-2019.apo03.01
- id: cobit-2019.apo03.01.11
  type: activity
  abbrev: APO03.01-11
  heading: Activity 11
  text: Develop an enterprise architecture concept business case and outline plans and statement of architecture work. Secure
    approval to initiate a project aligned and integrated with the enterprise strategy.
  notes: ''
  parent_id: cobit-2019.apo03.01
- id: cobit-2019.apo03.01.12
  type: activity
  abbrev: APO03.01-12
  heading: Activity 12
  text: Define the target architecture value propositions, goals and metrics.
  notes: ''
  parent_id: cobit-2019.apo03.01
- id: cobit-2019.apo03.02.01
  type: activity
  abbrev: APO03.02-1
  heading: Activity 1
  text: Maintain an architecture repository containing standards, reusable components, modeling artifacts, relationships,
    dependencies and views, to enable uniformity of architectural organization and maintenance.
  notes: ''
  parent_id: cobit-2019.apo03.02
- id: cobit-2019.apo03.02.02
  type: activity
  abbrev: APO03.02-2
  heading: Activity 2
  text: Select reference viewpoints from the architecture repository that enable the architect to demonstrate how stakeholder
    concerns are addressed in the architecture.
  notes: ''
  parent_id: cobit-2019.apo03.02
- id: cobit-2019.apo03.02.03
  type: activity
  abbrev: APO03.02-3
  heading: Activity 3
  text: For each viewpoint, select models needed to support the specific view required. Use selected tools or methods and
    the appropriate level of decomposition.
  notes: ''
  parent_id: cobit-2019.apo03.02
- id: cobit-2019.apo03.02.04
  type: activity
  abbrev: APO03.02-4
  heading: Activity 4
  text: Develop baseline architectural domain descriptions, using the scope and level of detail necessary to support the target
    architecture and, to the extent possible, identifying relevant architecture building blocks from the architecture repository.
  notes: ''
  parent_id: cobit-2019.apo03.02
- id: cobit-2019.apo03.02.05
  type: activity
  abbrev: APO03.02-5
  heading: Activity 5
  text: Maintain a process architecture model as part of the baseline and target domain descriptions. Standardize the descriptions
    and documentation of processes. Define the roles and responsibilities of the process decision makers, process owner, process
    users, process team and any other process stakeholders who should be involved.
  notes: ''
  parent_id: cobit-2019.apo03.02
- id: cobit-2019.apo03.02.06
  type: activity
  abbrev: APO03.02-6
  heading: Activity 6
  text: Maintain an information architecture model as part of baseline and target domain descriptions, consistent with enterprise
    strategy to acquire, store and use data optimally in support of decision making.
  notes: ''
  parent_id: cobit-2019.apo03.02
- id: cobit-2019.apo03.02.07
  type: activity
  abbrev: APO03.02-7
  heading: Activity 7
  text: Verify architecture models for internal consistency and accuracy. Perform a gap analysis between baseline and target.
    Prioritize gaps and define new or modified components that must be developed for the target architecture. Resolve incompatibilities,
    inconsistencies or conflicts within the target architecture.
  notes: ''
  parent_id: cobit-2019.apo03.02
- id: cobit-2019.apo03.02.08
  type: activity
  abbrev: APO03.02-8
  heading: Activity 8
  text: Conduct a formal stakeholder review by vetting proposed architecture against the original intent of the architecture
    project and the statement of architecture work.
  notes: ''
  parent_id: cobit-2019.apo03.02
- id: cobit-2019.apo03.02.09
  type: activity
  abbrev: APO03.02-9
  heading: Activity 9
  text: Finalize business, information, data, applications and technology domain architectures. Create an architecture definition
    document.
  notes: ''
  parent_id: cobit-2019.apo03.02
- id: cobit-2019.apo03.03.01
  type: activity
  abbrev: APO03.03-1
  heading: Activity 1
  text: Determine and confirm key enterprise change attributes. Consider enterprise culture, the potential impact of culture
    on implementation of architecture and the enterprise’s capabilities for transition.
  notes: ''
  parent_id: cobit-2019.apo03.03
- id: cobit-2019.apo03.03.02
  type: activity
  abbrev: APO03.03-2
  heading: Activity 2
  text: Identify any enterprise drivers that would constrain the sequence of implementation. Include a review of enterprise
    and line-of-business strategic and business plans. Consider current enterprise architecture maturity.
  notes: ''
  parent_id: cobit-2019.apo03.03
- id: cobit-2019.apo03.03.03
  type: activity
  abbrev: APO03.03-3
  heading: Activity 3
  text: Review and consolidate results of the gap analysis between baseline and target architectures. Assess implications
    with respect to potential solutions, opportunities, interdependencies and alignment with current I&T-enabled programs.
  notes: ''
  parent_id: cobit-2019.apo03.03
- id: cobit-2019.apo03.03.04
  type: activity
  abbrev: APO03.03-4
  heading: Activity 4
  text: Assess requirements, gaps, solutions and other factors to identify a minimal set of functional requirements whose
    integration into work packages would lead to a more efficient and effective implementation of target architecture.
  notes: ''
  parent_id: cobit-2019.apo03.03
- id: cobit-2019.apo03.03.05
  type: activity
  abbrev: APO03.03-5
  heading: Activity 5
  text: Reconcile the consolidated requirements with potential solutions.
  notes: ''
  parent_id: cobit-2019.apo03.03
- id: cobit-2019.apo03.03.06
  type: activity
  abbrev: APO03.03-6
  heading: Activity 6
  text: Refine initial dependencies and identify constraints on implementation and migration plans. Compile a dependency analysis
    report.
  notes: ''
  parent_id: cobit-2019.apo03.03
- id: cobit-2019.apo03.03.07
  type: activity
  abbrev: APO03.03-7
  heading: Activity 7
  text: Confirm the enterprise’s readiness for, and the risk associated with, enterprise transformation.
  notes: ''
  parent_id: cobit-2019.apo03.03
- id: cobit-2019.apo03.03.08
  type: activity
  abbrev: APO03.03-8
  heading: Activity 8
  text: Formulate high-level strategy for implementation and migration. Implement target architecture (and arrange any transition
    architecture) according to overall enterprise strategy, objectives and timelines.
  notes: ''
  parent_id: cobit-2019.apo03.03
- id: cobit-2019.apo03.03.09
  type: activity
  abbrev: APO03.03-9
  heading: Activity 9
  text: Identify and group major work packages into a coherent set of programs and projects, respecting the direction and
    approach to enterprise strategic implementation.
  notes: ''
  parent_id: cobit-2019.apo03.03
- id: cobit-2019.apo03.03.10
  type: activity
  abbrev: APO03.03-10
  heading: Activity 10
  text: Develop transition architectures where the scope of change required by the target architecture necessitates an incremental
    approach.
  notes: ''
  parent_id: cobit-2019.apo03.03
- id: cobit-2019.apo03.04.01
  type: activity
  abbrev: APO03.04-1
  heading: Activity 1
  text: Establish items required in the implementation and migration plan as part of program and project planning. Ensure
    that the plan aligns with requirements of relevant decision makers.
  notes: ''
  parent_id: cobit-2019.apo03.04
- id: cobit-2019.apo03.04.02
  type: activity
  abbrev: APO03.04-2
  heading: Activity 2
  text: Confirm increments and phases of the transition architecture. Update the architecture definition document.
  notes: ''
  parent_id: cobit-2019.apo03.04
- id: cobit-2019.apo03.04.03
  type: activity
  abbrev: APO03.04-3
  heading: Activity 3
  text: Define and complete the architecture implementation and migration plan, including relevant governance requirements.
    Integrate the plan, activities and dependencies into program and project planning.
  notes: ''
  parent_id: cobit-2019.apo03.04
- id: cobit-2019.apo03.04.04
  type: activity
  abbrev: APO03.04-4
  heading: Activity 4
  text: Communicate the defined architectural road map to relevant stakeholders. Inform stakeholders about the target architecture
    definition, architecture guidelines and principles, service portfolio, etc.
  notes: ''
  parent_id: cobit-2019.apo03.04
- id: cobit-2019.apo03.05.01
  type: activity
  abbrev: APO03.05-1
  heading: Activity 1
  text: Confirm scope and priorities and provide guidance for solution development and deployment (e.g., by using service-oriented
    architecture).
  notes: ''
  parent_id: cobit-2019.apo03.05
- id: cobit-2019.apo03.05.02
  type: activity
  abbrev: APO03.05-2
  heading: Activity 2
  text: Manage enterprise architecture requirements and support business and IT with advice and expertise on architectural
    principles, models and building blocks. Guarantee that new implementations (as well as changes to current architecture)
    align with enterprise architecture principles and requirements.
  notes: ''
  parent_id: cobit-2019.apo03.05
- id: cobit-2019.apo03.05.03
  type: activity
  abbrev: APO03.05-3
  heading: Activity 3
  text: Manage portfolio of enterprise architecture services and ensure alignment with strategic objectives and solution development.
  notes: ''
  parent_id: cobit-2019.apo03.05
- id: cobit-2019.apo03.05.04
  type: activity
  abbrev: APO03.05-4
  heading: Activity 4
  text: Identify enterprise architecture priorities. Align priorities to value drivers. Define and collect value metrics and
    measure and communicate the value of enterprise architecture.
  notes: ''
  parent_id: cobit-2019.apo03.05
- id: cobit-2019.apo03.05.05
  type: activity
  abbrev: APO03.05-5
  heading: Activity 5
  text: Establish a technology forum to provide architectural guidelines, advise projects and guide selection of technology.
    Measure compliance with standards and guidelines, including compliance with external requirements and internal business
    relevance.
  notes: ''
  parent_id: cobit-2019.apo03.05
- id: cobit-2019.apo04.01.01
  type: activity
  abbrev: APO04.01-1
  heading: Activity 1
  text: Create an innovation plan that includes risk appetite, a proposed budget for innovation initiatives and innovation
    objectives.
  notes: ''
  parent_id: cobit-2019.apo04.01
- id: cobit-2019.apo04.01.02
  type: activity
  abbrev: APO04.01-2
  heading: Activity 2
  text: Provide infrastructure that can be a governance component for innovation (e.g., collaboration tools for enhancing
    work between geographic locations and/or divisions).
  notes: ''
  parent_id: cobit-2019.apo04.01
- id: cobit-2019.apo04.01.03
  type: activity
  abbrev: APO04.01-3
  heading: Activity 3
  text: Maintain a program-enabling staff to submit innovation ideas and create an appropriate decision-making structure to
    assess and move ideas forward.
  notes: ''
  parent_id: cobit-2019.apo04.01
- id: cobit-2019.apo04.01.04
  type: activity
  abbrev: APO04.01-4
  heading: Activity 4
  text: Encourage innovation ideas from customers, suppliers and business partners.
  notes: ''
  parent_id: cobit-2019.apo04.01
- id: cobit-2019.apo04.02.01
  type: activity
  abbrev: APO04.02-1
  heading: Activity 1
  text: Maintain an understanding of industry and business drivers, enterprise and I&T strategy, and enterprise operations
    and current challenges. Apply the understanding to identify potential value-add technology and innovate I&T.
  notes: ''
  parent_id: cobit-2019.apo04.02
- id: cobit-2019.apo04.02.02
  type: activity
  abbrev: APO04.02-2
  heading: Activity 2
  text: Conduct regular meetings with business units, divisions and/or other stakeholder entities to understand current business
    problems, process bottlenecks or other constraints where emerging technologies or I&T innovation can create opportunities.
  notes: ''
  parent_id: cobit-2019.apo04.02
- id: cobit-2019.apo04.02.03
  type: activity
  abbrev: APO04.02-3
  heading: Activity 3
  text: Understand enterprise investment parameters for innovation and new technology so appropriate strategies are developed.
  notes: ''
  parent_id: cobit-2019.apo04.02
- id: cobit-2019.apo04.03.01
  type: activity
  abbrev: APO04.03-1
  heading: Activity 1
  text: Understand enterprise appetite and potential for technology innovation. Focus awareness efforts on the most opportune
    technology innovations.
  notes: ''
  parent_id: cobit-2019.apo04.03
- id: cobit-2019.apo04.03.02
  type: activity
  abbrev: APO04.03-2
  heading: Activity 2
  text: Set up a technology watch process and perform research and scanning of the external environment, including appropriate
    websites, journals and conferences, to identify emerging technologies and their potential value to the enterprise.
  notes: ''
  parent_id: cobit-2019.apo04.03
- id: cobit-2019.apo04.03.03
  type: activity
  abbrev: APO04.03-3
  heading: Activity 3
  text: Consult third-party experts as necessary to confirm research or supply information on emerging technologies.
  notes: ''
  parent_id: cobit-2019.apo04.03
- id: cobit-2019.apo04.03.04
  type: activity
  abbrev: APO04.03-4
  heading: Activity 4
  text: Capture I&T-innovation ideas from staff and review for potential implementation.
  notes: ''
  parent_id: cobit-2019.apo04.03
- id: cobit-2019.apo04.04.01
  type: activity
  abbrev: APO04.04-1
  heading: Activity 1
  text: Evaluate identified technologies, considering aspects such as time to reach maturity, inherent risk (including potential
    legal implications), fit with enterprise architecture and value potential, in line with enterprise and I&T strategy.
  notes: ''
  parent_id: cobit-2019.apo04.04
- id: cobit-2019.apo04.04.02
  type: activity
  abbrev: APO04.04-2
  heading: Activity 2
  text: Identify issues that may need to be resolved or validated through a proof-of-concept initiative.
  notes: ''
  parent_id: cobit-2019.apo04.04
- id: cobit-2019.apo04.04.03
  type: activity
  abbrev: APO04.04-3
  heading: Activity 3
  text: Scope the proof-of-concept initiative, including desired outcomes, required budget, time frames and responsibilities.
  notes: ''
  parent_id: cobit-2019.apo04.04
- id: cobit-2019.apo04.04.04
  type: activity
  abbrev: APO04.04-4
  heading: Activity 4
  text: Obtain approval for the proof-of-concept initiative.
  notes: ''
  parent_id: cobit-2019.apo04.04
- id: cobit-2019.apo04.04.05
  type: activity
  abbrev: APO04.04-5
  heading: Activity 5
  text: Conduct proof-of-concept initiatives to test emerging technologies or other innovation ideas. Identify issues and
    determine whether implementation or rollout should be considered based on feasibility and potential ROI.
  notes: ''
  parent_id: cobit-2019.apo04.04
- id: cobit-2019.apo04.05.01
  type: activity
  abbrev: APO04.05-1
  heading: Activity 1
  text: Document proof-of-concept results, including guidance and recommendations for trends and innovation programs.
  notes: ''
  parent_id: cobit-2019.apo04.05
- id: cobit-2019.apo04.05.02
  type: activity
  abbrev: APO04.05-2
  heading: Activity 2
  text: Communicate viable innovation opportunities into the I&T strategy and enterprise architecture processes.
  notes: ''
  parent_id: cobit-2019.apo04.05
- id: cobit-2019.apo04.05.03
  type: activity
  abbrev: APO04.05-3
  heading: Activity 3
  text: Analyze and communicate reasons for rejected proof-of-concept initiatives.
  notes: ''
  parent_id: cobit-2019.apo04.05
- id: cobit-2019.apo04.05.04
  type: activity
  abbrev: APO04.05-4
  heading: Activity 4
  text: Follow up on proof-of-concept initiatives to measure actual investment.
  notes: ''
  parent_id: cobit-2019.apo04.05
- id: cobit-2019.apo04.06.01
  type: activity
  abbrev: APO04.06-1
  heading: Activity 1
  text: Capture lessons learned and opportunities for improvement.
  notes: ''
  parent_id: cobit-2019.apo04.06
- id: cobit-2019.apo04.06.02
  type: activity
  abbrev: APO04.06-2
  heading: Activity 2
  text: Ensure that innovation initiatives align with enterprise and I&T strategy. Monitor alignment continuously. Adjust
    innovation plan, if required.
  notes: ''
  parent_id: cobit-2019.apo04.06
- id: cobit-2019.apo04.06.03
  type: activity
  abbrev: APO04.06-3
  heading: Activity 3
  text: Assess new technology or I&T innovations implemented as part of I&T strategy and enterprise architecture development.
    Evaluate level of adoption during program management of initiatives.
  notes: ''
  parent_id: cobit-2019.apo04.06
- id: cobit-2019.apo04.06.04
  type: activity
  abbrev: APO04.06-4
  heading: Activity 4
  text: Identify and assess potential value of innovation.
  notes: ''
  parent_id: cobit-2019.apo04.06
- id: cobit-2019.apo05.01.01
  type: activity
  abbrev: APO05.01-1
  heading: Activity 1
  text: Understand current availability and commitment of funds, current approved spend and actual spend to date.
  notes: ''
  parent_id: cobit-2019.apo05.01
- id: cobit-2019.apo05.01.02
  type: activity
  abbrev: APO05.01-2
  heading: Activity 2
  text: Identify options for additional funding of I&T-enabled investments, considering both internal and external sources.
  notes: ''
  parent_id: cobit-2019.apo05.01
- id: cobit-2019.apo05.01.03
  type: activity
  abbrev: APO05.01-3
  heading: Activity 3
  text: Determine the implications of the funding source on the investment return expectations.
  notes: ''
  parent_id: cobit-2019.apo05.01
- id: cobit-2019.apo05.02.01
  type: activity
  abbrev: APO05.02-1
  heading: Activity 1
  text: Identify and classify investment opportunities in line with investment portfolio categories. Specify expected enterprise
    outcome(s), initiatives required to achieve expected outcome(s), high-level costs, dependencies and risk. Specify methodology
    for measuring outcomes, cost and risk.
  notes: ''
  parent_id: cobit-2019.apo05.02
- id: cobit-2019.apo05.02.02
  type: activity
  abbrev: APO05.02-2
  heading: Activity 2
  text: Perform detailed assessment of all program business cases. Evaluate strategic alignment, enterprise benefit, risk
    and availability of resources.
  notes: ''
  parent_id: cobit-2019.apo05.02
- id: cobit-2019.apo05.02.03
  type: activity
  abbrev: APO05.02-3
  heading: Activity 3
  text: Assess impact of adding potential programs on overall investment portfolio, including changes that might be required
    to other programs.
  notes: ''
  parent_id: cobit-2019.apo05.02
- id: cobit-2019.apo05.02.04
  type: activity
  abbrev: APO05.02-4
  heading: Activity 4
  text: Decide which candidate programs should be moved to the active investment portfolio. Decide whether rejected programs
    should be held for future consideration or provided with seed funding to determine if business case can be improved or
    discarded.
  notes: ''
  parent_id: cobit-2019.apo05.02
- id: cobit-2019.apo05.02.05
  type: activity
  abbrev: APO05.02-5
  heading: Activity 5
  text: Determine required milestones for each selected program's full economic life cycle. Allocate and reserve total program
    funding per milestone. Move the program into the active investment portfolio.
  notes: ''
  parent_id: cobit-2019.apo05.02
- id: cobit-2019.apo05.02.06
  type: activity
  abbrev: APO05.02-6
  heading: Activity 6
  text: Establish procedures to communicate the cost, benefit and risk-related aspects of portfolios for consideration in
    budget prioritization, cost management and benefit management processes.
  notes: ''
  parent_id: cobit-2019.apo05.02
- id: cobit-2019.apo05.03.01
  type: activity
  abbrev: APO05.03-1
  heading: Activity 1
  text: Review portfolio regularly to identify and exploit synergies, eliminate duplication among programs, and identify and
    mitigate risk.
  notes: ''
  parent_id: cobit-2019.apo05.03
- id: cobit-2019.apo05.03.02
  type: activity
  abbrev: APO05.03-2
  heading: Activity 2
  text: When changes occur, reevaluate and reprioritize portfolio to ensure alignment with business and I&T strategy. Maintain
    target mix of investments so that the portfolio optimizes overall value. Programs may be changed, deferred or retired,
    and new programs may be initiated, to rebalance and optimize portfolio.
  notes: ''
  parent_id: cobit-2019.apo05.03
- id: cobit-2019.apo05.03.03
  type: activity
  abbrev: APO05.03-3
  heading: Activity 3
  text: Adjust enterprise targets, forecasts, budgets and, if required, degree of monitoring to reflect expenditures and enterprise
    benefits attributable to programs in the active investment portfolio. Charge back program expenditures. Establish flexible
    budgeting processes so that promising projects get resources to scale quickly.
  notes: ''
  parent_id: cobit-2019.apo05.03
- id: cobit-2019.apo05.03.04
  type: activity
  abbrev: APO05.03-4
  heading: Activity 4
  text: Develop metrics to measure I&T contribution to the enterprise. Establish appropriate performance targets reflecting
    required I&T and enterprise capability targets. Use guidance from external experts and benchmark data to develop metrics.
  notes: ''
  parent_id: cobit-2019.apo05.03
- id: cobit-2019.apo05.03.05
  type: activity
  abbrev: APO05.03-5
  heading: Activity 5
  text: Provide an accurate view of the performance of the investment portfolio to all stakeholders.
  notes: ''
  parent_id: cobit-2019.apo05.03
- id: cobit-2019.apo05.03.06
  type: activity
  abbrev: APO05.03-6
  heading: Activity 6
  text: Provide reports for senior management’s review of enterprise progress towards identified goals, stating what still
    needs to be spent and accomplished over given time frames.
  notes: ''
  parent_id: cobit-2019.apo05.03
- id: cobit-2019.apo05.03.07
  type: activity
  abbrev: APO05.03-7
  heading: Activity 7
  text: In regular performance monitoring, include information on the extent to which planned objectives have been achieved,
    risk mitigated, capabilities created, deliverables obtained and performance targets met.
  notes: ''
  parent_id: cobit-2019.apo05.03
- id: cobit-2019.apo05.03.08
  type: activity
  abbrev: APO05.03-8
  heading: Activity 8
  text: Identify deviations for budget vs. actual spend and expected ROI on investments.
  notes: ''
  parent_id: cobit-2019.apo05.03
- id: cobit-2019.apo05.04.01
  type: activity
  abbrev: APO05.04-1
  heading: Activity 1
  text: Create and maintain portfolios of I&T-enabled investment programs, I&T services and I&T assets, which form the basis
    for the current I&T budget and support the I&T tactical and strategic plans.
  notes: ''
  parent_id: cobit-2019.apo05.04
- id: cobit-2019.apo05.04.02
  type: activity
  abbrev: APO05.04-2
  heading: Activity 2
  text: Work with service delivery managers to maintain the service portfolios. Work with operations managers, product managers
    and architects to maintain the asset portfolios. Prioritize portfolios to support investment decisions.
  notes: ''
  parent_id: cobit-2019.apo05.04
- id: cobit-2019.apo05.04.03
  type: activity
  abbrev: APO05.04-3
  heading: Activity 3
  text: Remove a program from the active investment portfolio when the desired enterprise benefits have been achieved or when
    it is clear that benefits will not be achieved within the value criteria set for the program.
  notes: ''
  parent_id: cobit-2019.apo05.04
- id: cobit-2019.apo05.05.01
  type: activity
  abbrev: APO05.05-1
  heading: Activity 1
  text: Use the agreed metrics and track how benefits are achieved, how they evolve throughout the life cycle of programs
    and projects, how they are being delivered from I&T products and services, and how they compare to internal and industry
    benchmarks. Communicate results to stakeholders.
  notes: ''
  parent_id: cobit-2019.apo05.05
- id: cobit-2019.apo05.05.02
  type: activity
  abbrev: APO05.05-2
  heading: Activity 2
  text: Implement corrective action when achieved benefits significantly deviate from expected benefits. Update the business
    case for new initiatives and implement business process and service improvements as required.
  notes: ''
  parent_id: cobit-2019.apo05.05
- id: cobit-2019.apo05.05.03
  type: activity
  abbrev: APO05.05-3
  heading: Activity 3
  text: Consider obtaining guidance from external experts, industry leaders and comparative benchmarking data to test and
    improve the metrics and targets.
  notes: ''
  parent_id: cobit-2019.apo05.05
- id: cobit-2019.apo06.01.01
  type: activity
  abbrev: APO06.01-1
  heading: Activity 1
  text: Define processes, inputs, outputs and responsibilities for the financial management and accounting of I&T in alignment
    with the enterprise budgeting and cost accounting policies and approach. Define how to analyze and report (to whom and
    how) on the I&T budget control process.
  notes: ''
  parent_id: cobit-2019.apo06.01
- id: cobit-2019.apo06.01.02
  type: activity
  abbrev: APO06.01-2
  heading: Activity 2
  text: Define a classification scheme to identify all I&T-related cost elements (capital expenditures [capex] vs. operational
    expenses [opex], hardware, software, people, etc.). Identify how they are captured.
  notes: ''
  parent_id: cobit-2019.apo06.01
- id: cobit-2019.apo06.01.03
  type: activity
  abbrev: APO06.01-3
  heading: Activity 3
  text: Use financial information to provide input to business cases for new investments in I&T assets and services.
  notes: ''
  parent_id: cobit-2019.apo06.01
- id: cobit-2019.apo06.01.04
  type: activity
  abbrev: APO06.01-4
  heading: Activity 4
  text: Ensure that costs are maintained in the I&T assets and services portfolios.
  notes: ''
  parent_id: cobit-2019.apo06.01
- id: cobit-2019.apo06.01.05
  type: activity
  abbrev: APO06.01-5
  heading: Activity 5
  text: Establish and maintain practices for financial planning and the optimization of recurring operational costs to deliver
    maximum value to the enterprise for the least expenditure.
  notes: ''
  parent_id: cobit-2019.apo06.01
- id: cobit-2019.apo06.02.01
  type: activity
  abbrev: APO06.02-1
  heading: Activity 1
  text: Rank all I&T initiatives and budget requests based on business cases and strategic and tactical priorities. Establish
    procedures to determine budget allocations and cutoff.
  notes: ''
  parent_id: cobit-2019.apo06.02
- id: cobit-2019.apo06.02.02
  type: activity
  abbrev: APO06.02-2
  heading: Activity 2
  text: Allocate business and IT resources (including external service providers) within the high-level budget allocations
    for I&T-enabled programs, services and assets. Consider the options for buying or developing capitalized assets and services
    vs. externally utilized assets and services on a pay-for-use basis.
  notes: ''
  parent_id: cobit-2019.apo06.02
- id: cobit-2019.apo06.02.03
  type: activity
  abbrev: APO06.02-3
  heading: Activity 3
  text: Establish a procedure to communicate budget decisions and review them with the business unit budget holders.
  notes: ''
  parent_id: cobit-2019.apo06.02
- id: cobit-2019.apo06.02.04
  type: activity
  abbrev: APO06.02-4
  heading: Activity 4
  text: Identify, communicate and resolve significant impacts of budget decisions on business cases, portfolios and strategy
    plans. For example, this may include when budgets require revision due to changing enterprise circumstances or when they
    are not sufficient to support strategic objectives or business case objectives).
  notes: ''
  parent_id: cobit-2019.apo06.02
- id: cobit-2019.apo06.02.05
  type: activity
  abbrev: APO06.02-5
  heading: Activity 5
  text: Obtain ratification from the executive committee for the I&T budget implications that negatively impact the entity’s
    strategic or tactical plans. Suggest actions to resolve these impacts.
  notes: ''
  parent_id: cobit-2019.apo06.02
- id: cobit-2019.apo06.03.01
  type: activity
  abbrev: APO06.03-1
  heading: Activity 1
  text: Implement a formal I&T budget, including all expected I&T costs of I&T-enabled programs, services and assets.
  notes: ''
  parent_id: cobit-2019.apo06.03
- id: cobit-2019.apo06.03.02
  type: activity
  abbrev: APO06.03-2
  heading: Activity 2
  text: 'When creating the budget, consider the following components: alignment with the business; alignment with the sourcing
    strategy; authorized sources of funding; internal resource costs, including personnel, information assets and accommodations;
    third-party costs, including outsourcing contracts, consultants and service providers; capital and operational expenses;
    and cost elements that depend on the workload.'
  notes: ''
  parent_id: cobit-2019.apo06.03
- id: cobit-2019.apo06.03.03
  type: activity
  abbrev: APO06.03-3
  heading: Activity 3
  text: Document the rationale to justify contingencies and review them regularly.
  notes: ''
  parent_id: cobit-2019.apo06.03
- id: cobit-2019.apo06.03.04
  type: activity
  abbrev: APO06.03-4
  heading: Activity 4
  text: Instruct process, service and program owners, as well as project and asset managers, to plan budgets.
  notes: ''
  parent_id: cobit-2019.apo06.03
- id: cobit-2019.apo06.03.05
  type: activity
  abbrev: APO06.03-5
  heading: Activity 5
  text: Review the budget plans and make decisions about budget allocations. Compile and adjust the budget based on changing
    enterprise needs and financial considerations.
  notes: ''
  parent_id: cobit-2019.apo06.03
- id: cobit-2019.apo06.03.06
  type: activity
  abbrev: APO06.03-6
  heading: Activity 6
  text: Record, maintain and communicate the current I&T budget, including committed expenditures and current expenditures,
    considering I&T projects recorded in the I&T-enabled investment portfolios and operation and maintenance of asset and
    service portfolios.
  notes: ''
  parent_id: cobit-2019.apo06.03
- id: cobit-2019.apo06.03.07
  type: activity
  abbrev: APO06.03-7
  heading: Activity 7
  text: Monitor the effectiveness of the different aspects of budgeting.
  notes: ''
  parent_id: cobit-2019.apo06.03
- id: cobit-2019.apo06.03.08
  type: activity
  abbrev: APO06.03-8
  heading: Activity 8
  text: Use the monitoring results to implement improvements and ensure that future budgets are more accurate, reliable and
    cost-effective.
  notes: ''
  parent_id: cobit-2019.apo06.03
- id: cobit-2019.apo06.04.01
  type: activity
  abbrev: APO06.04-1
  heading: Activity 1
  text: Decide on a cost allocation model that enables fair, transparent, repeatable and comparable allocation of I&T-related
    costs to users. A basic allocation model example is the even spread of shared I&T-related costs. This is a very simple
    allocation model that is easy to apply; however, depending on the context of the enterprise, it is often viewed as unfair
    and it does not encourage responsible use of resources. An activity-based costing scheme, in which costs are allocated
    to IT services and charged to users of these services, enables a more transparent and comparable allocation of cost.
  notes: ''
  parent_id: cobit-2019.apo06.04
- id: cobit-2019.apo06.04.02
  type: activity
  abbrev: APO06.04-2
  heading: Activity 2
  text: Inspect service definition catalogs to identify services subject to user chargeback and those that are shared services.
  notes: ''
  parent_id: cobit-2019.apo06.04
- id: cobit-2019.apo06.04.03
  type: activity
  abbrev: APO06.04-3
  heading: Activity 3
  text: Design the cost model to be transparent enough to allow users to identify their actual usage and charges by using
    categories and cost drivers that make sense for the user (e.g., cost per help desk call, cost per software license) and
    to better enable predictability of I&T costs and efficient and effective utilization of I&T resources. Analyze cost drivers
    (time spent per activity, expenses, portion of fixed vs. variable costs, etc.). Decide on appropriate differentiation
    (e.g., different categories of users with different weights) and use cost approximations or averages when actual costs
    are highly variable in nature.
  notes: ''
  parent_id: cobit-2019.apo06.04
- id: cobit-2019.apo06.04.04
  type: activity
  abbrev: APO06.04-4
  heading: Activity 4
  text: Explain the cost model principles and outcome to key stakeholders. Obtain their feedback for further fine-tuning toward
    a transparent and comprehensive model.
  notes: ''
  parent_id: cobit-2019.apo06.04
- id: cobit-2019.apo06.04.05
  type: activity
  abbrev: APO06.04-5
  heading: Activity 5
  text: Obtain approval of key stakeholders and communicate the I&T costing model to the management of user departments.
  notes: ''
  parent_id: cobit-2019.apo06.04
- id: cobit-2019.apo06.04.06
  type: activity
  abbrev: APO06.04-6
  heading: Activity 6
  text: Communicate important changes in the cost/chargeback model principles to key stakeholders and management of user departments.
  notes: ''
  parent_id: cobit-2019.apo06.04
- id: cobit-2019.apo06.05.01
  type: activity
  abbrev: APO06.05-1
  heading: Activity 1
  text: Obtain approval of key stakeholders and communicate the I&T costing model to the management of user departments.
  notes: ''
  parent_id: cobit-2019.apo06.05
- id: cobit-2019.apo06.05.02
  type: activity
  abbrev: APO06.05-2
  heading: Activity 2
  text: Establish time scales for the operation of the cost management process in line with budgeting and accounting requirements
    and timeline.
  notes: ''
  parent_id: cobit-2019.apo06.05
- id: cobit-2019.apo06.05.03
  type: activity
  abbrev: APO06.05-3
  heading: Activity 3
  text: Define a method for the collection of relevant data to identify deviations in budget vs. actuals, investment ROI,
    service cost trends, etc.
  notes: ''
  parent_id: cobit-2019.apo06.05
- id: cobit-2019.apo06.05.04
  type: activity
  abbrev: APO06.05-4
  heading: Activity 4
  text: Define how costs are consolidated for the appropriate levels in the enterprise (central IT vs. IT budget within business
    departments) and how they will be presented to the stakeholders. The reports provide information on costs per cost category,
    budget vs. actuals status, top spending, etc., to enable the timely identification of required corrective actions.
  notes: ''
  parent_id: cobit-2019.apo06.05
- id: cobit-2019.apo06.05.05
  type: activity
  abbrev: APO06.05-5
  heading: Activity 5
  text: Instruct those responsible for cost management to capture, collect and consolidate the data, and present and report
    the data to the appropriate budget owners. Budget analysts and owners jointly analyze deviations and compare performance
    to internal and industry benchmarks. They should establish and maintain the overheads allocation method. The result of
    the analysis provides an explanation of significant deviations and the suggested corrective actions.
  notes: ''
  parent_id: cobit-2019.apo06.05
- id: cobit-2019.apo06.05.06
  type: activity
  abbrev: APO06.05-6
  heading: Activity 6
  text: Ensure that the appropriate levels of management review the results of the analysis and approve suggested corrective
    actions.
  notes: ''
  parent_id: cobit-2019.apo06.05
- id: cobit-2019.apo06.05.07
  type: activity
  abbrev: APO06.05-7
  heading: Activity 7
  text: Ensure that changes in cost structures and enterprise needs are identified and budgets and forecasts are revised as
    required.
  notes: ''
  parent_id: cobit-2019.apo06.05
- id: cobit-2019.apo06.05.08
  type: activity
  abbrev: APO06.05-8
  heading: Activity 8
  text: At regular intervals, and especially when budgets are cut due to financial constraints, identify ways to optimize
    costs and introduce efficiencies without jeopardizing services.
  notes: ''
  parent_id: cobit-2019.apo06.05
- id: cobit-2019.apo07.01.01
  type: activity
  abbrev: APO07.01-1
  heading: Activity 1
  text: Evaluate staffing requirements on a regular basis or upon major changes. Ensure that both the enterprise and the IT
    function have sufficient resources to support enterprise goals and objectives, business processes and controls, and I&T-enabled
    initiatives adequately and appropriately.
  notes: ''
  parent_id: cobit-2019.apo07.01
- id: cobit-2019.apo07.01.02
  type: activity
  abbrev: APO07.01-2
  heading: Activity 2
  text: Maintain business and IT personnel recruitment and retention processes in line with the overall enterprise’s personnel
    policies and procedures.
  notes: ''
  parent_id: cobit-2019.apo07.01
- id: cobit-2019.apo07.01.03
  type: activity
  abbrev: APO07.01-3
  heading: Activity 3
  text: Establish flexible resource arrangements, such as the use of transfers, external contractors and third-party service
    arrangements, to support changing business needs.
  notes: ''
  parent_id: cobit-2019.apo07.01
- id: cobit-2019.apo07.01.04
  type: activity
  abbrev: APO07.01-4
  heading: Activity 4
  text: Include background checks in the IT recruitment process for employees, contractors and vendors. The extent and frequency
    of these checks should depend on the sensitivity and/or criticality of the function.
  notes: ''
  parent_id: cobit-2019.apo07.01
- id: cobit-2019.apo07.02.01
  type: activity
  abbrev: APO07.02-1
  heading: Activity 1
  text: As a security precaution, provide guidelines on a minimum time of annual vacation to be taken by key individuals.
  notes: ''
  parent_id: cobit-2019.apo07.02
- id: cobit-2019.apo07.02.02
  type: activity
  abbrev: APO07.02-2
  heading: Activity 2
  text: Take appropriate actions regarding job changes, especially job terminations.
  notes: ''
  parent_id: cobit-2019.apo07.02
- id: cobit-2019.apo07.02.03
  type: activity
  abbrev: APO07.02-3
  heading: Activity 3
  text: Use knowledge capture (documentation), knowledge sharing, succession planning, staff backup, cross-training and job
    rotation initiatives to minimize reliance on a single individual performing a critical job function.
  notes: ''
  parent_id: cobit-2019.apo07.02
- id: cobit-2019.apo07.02.04
  type: activity
  abbrev: APO07.02-4
  heading: Activity 4
  text: Regularly test staff backup plans.
  notes: ''
  parent_id: cobit-2019.apo07.02
- id: cobit-2019.apo07.03.01
  type: activity
  abbrev: APO07.03-1
  heading: Activity 1
  text: Identify currently available skills and competencies of internal and external resources.
  notes: ''
  parent_id: cobit-2019.apo07.03
- id: cobit-2019.apo07.03.02
  type: activity
  abbrev: APO07.03-2
  heading: Activity 2
  text: Identify gaps between required and available skills. Develop action plans, such as training (technical and behavioral
    skills), recruitment, redeployment and changed sourcing strategies, to address the gaps on an individual and collective
    basis.
  notes: ''
  parent_id: cobit-2019.apo07.03
- id: cobit-2019.apo07.03.03
  type: activity
  abbrev: APO07.03-3
  heading: Activity 3
  text: Review training materials and programs on a regular basis. Ensure adequacy with respect to changing enterprise requirements
    and their impact on necessary knowledge, skills and abilities.
  notes: ''
  parent_id: cobit-2019.apo07.03
- id: cobit-2019.apo07.03.04
  type: activity
  abbrev: APO07.03-4
  heading: Activity 4
  text: Provide access to knowledge repositories to support the development of skills and competencies.
  notes: ''
  parent_id: cobit-2019.apo07.03
- id: cobit-2019.apo07.03.05
  type: activity
  abbrev: APO07.03-5
  heading: Activity 5
  text: Develop and deliver training programs based on organizational and process requirements, including requirements for
    enterprise knowledge, internal control, ethical conduct, security and privacy.
  notes: ''
  parent_id: cobit-2019.apo07.03
- id: cobit-2019.apo07.03.06
  type: activity
  abbrev: APO07.03-6
  heading: Activity 6
  text: Conduct regular reviews to assess the evolution of the skills and competencies of the internal and external resources.
    Review succession planning.
  notes: ''
  parent_id: cobit-2019.apo07.03
- id: cobit-2019.apo07.04.01
  type: activity
  abbrev: APO07.04-1
  heading: Activity 1
  text: Consider functional/enterprise goals as the context for setting individual goals.
  notes: ''
  parent_id: cobit-2019.apo07.04
- id: cobit-2019.apo07.04.02
  type: activity
  abbrev: APO07.04-2
  heading: Activity 2
  text: Set individual goals aligned with the relevant I&T and enterprise goals. Base goals on specific, measurable, achievable,
    relevant and time-bound (SMART) objectives that reflect core competencies, enterprise values and skills required for the
    role(s).
  notes: ''
  parent_id: cobit-2019.apo07.04
- id: cobit-2019.apo07.04.03
  type: activity
  abbrev: APO07.04-3
  heading: Activity 3
  text: Provide timely feedback regarding performance against the individual’s goals.
  notes: ''
  parent_id: cobit-2019.apo07.04
- id: cobit-2019.apo07.04.04
  type: activity
  abbrev: APO07.04-4
  heading: Activity 4
  text: Provide specific instructions for the use and storage of personal information in the evaluation process, in compliance
    with applicable personal data and employment legislation.
  notes: ''
  parent_id: cobit-2019.apo07.04
- id: cobit-2019.apo07.04.05
  type: activity
  abbrev: APO07.04-5
  heading: Activity 5
  text: Compile 360-degree performance evaluation results.
  notes: ''
  parent_id: cobit-2019.apo07.04
- id: cobit-2019.apo07.04.06
  type: activity
  abbrev: APO07.04-6
  heading: Activity 6
  text: Provide formal career planning and professional development plans based on the results of the evaluation process to
    encourage competency development and opportunities for personal advancement and to reduce dependence on key individuals.
    Provide employee coaching on performance and conduct whenever appropriate.
  notes: ''
  parent_id: cobit-2019.apo07.04
- id: cobit-2019.apo07.04.07
  type: activity
  abbrev: APO07.04-7
  heading: Activity 7
  text: Implement a remuneration/recognition process that rewards appropriate commitment, competency development and successful
    attainment of performance goals. Ensure that the process is applied consistently and in line with organizational policies.
  notes: ''
  parent_id: cobit-2019.apo07.04
- id: cobit-2019.apo07.04.08
  type: activity
  abbrev: APO07.04-8
  heading: Activity 8
  text: Implement and communicate a disciplinary process.
  notes: ''
  parent_id: cobit-2019.apo07.04
- id: cobit-2019.apo07.05.01
  type: activity
  abbrev: APO07.05-1
  heading: Activity 1
  text: Create and maintain an inventory of business and IT human resources.
  notes: ''
  parent_id: cobit-2019.apo07.05
- id: cobit-2019.apo07.05.02
  type: activity
  abbrev: APO07.05-2
  heading: Activity 2
  text: Understand the current and future demand for human resources to support the achievement of I&T objectives and to deliver
    services and solutions based on the portfolio of current I&T-related initiatives, the future investment portfolio and
    day-to-day operational needs.
  notes: ''
  parent_id: cobit-2019.apo07.05
- id: cobit-2019.apo07.05.03
  type: activity
  abbrev: APO07.05-3
  heading: Activity 3
  text: Identify shortfalls and provide input into sourcing plans as well as enterprise and IT recruitment processes. Create
    and review the staffing plan, keeping track of actual usage.
  notes: ''
  parent_id: cobit-2019.apo07.05
- id: cobit-2019.apo07.05.04
  type: activity
  abbrev: APO07.05-4
  heading: Activity 4
  text: Maintain adequate information on the time spent on different tasks, assignments, services or projects.
  notes: ''
  parent_id: cobit-2019.apo07.05
- id: cobit-2019.apo07.06.01
  type: activity
  abbrev: APO07.06-1
  heading: Activity 1
  text: Implement contract staff policies and procedures.
  notes: ''
  parent_id: cobit-2019.apo07.06
- id: cobit-2019.apo07.06.02
  type: activity
  abbrev: APO07.06-2
  heading: Activity 2
  text: At the commencement of the contract, obtain formal agreement from contractors that they are required to comply with
    the enterprise’s I&T control framework, such as policies for security clearance, physical and logical access control,
    use of facilities, information confidentiality requirements, and nondisclosure agreements.
  notes: ''
  parent_id: cobit-2019.apo07.06
- id: cobit-2019.apo07.06.03
  type: activity
  abbrev: APO07.06-3
  heading: Activity 3
  text: Advise contractors that management reserves the right to monitor and inspect all usage of IT resources, including
    email, voice communications, and all programs and data files.
  notes: ''
  parent_id: cobit-2019.apo07.06
- id: cobit-2019.apo07.06.04
  type: activity
  abbrev: APO07.06-4
  heading: Activity 4
  text: As part of their contracts, provide contractors with a clear definition of their roles and responsibilities, including
    explicit requirements to document their work to agreed standards and formats.
  notes: ''
  parent_id: cobit-2019.apo07.06
- id: cobit-2019.apo07.06.05
  type: activity
  abbrev: APO07.06-5
  heading: Activity 5
  text: Review contractors’ work and base the approval of payments on the results.
  notes: ''
  parent_id: cobit-2019.apo07.06
- id: cobit-2019.apo07.06.06
  type: activity
  abbrev: APO07.06-6
  heading: Activity 6
  text: In formal and unambiguous contracts, define all work performed by external parties.
  notes: ''
  parent_id: cobit-2019.apo07.06
- id: cobit-2019.apo07.06.07
  type: activity
  abbrev: APO07.06-7
  heading: Activity 7
  text: Conduct periodic reviews to ensure that contract staff have signed and agreed on all necessary agreements.
  notes: ''
  parent_id: cobit-2019.apo07.06
- id: cobit-2019.apo07.06.08
  type: activity
  abbrev: APO07.06-8
  heading: Activity 8
  text: Conduct periodic reviews to ensure that contractors’ roles and access rights are appropriate and in line with agreements.
  notes: ''
  parent_id: cobit-2019.apo07.06
- id: cobit-2019.apo08.01.01
  type: activity
  abbrev: APO08.01-1
  heading: Activity 1
  text: Identify business stakeholders, their interests and their areas of responsibilities.
  notes: ''
  parent_id: cobit-2019.apo08.01
- id: cobit-2019.apo08.01.02
  type: activity
  abbrev: APO08.01-2
  heading: Activity 2
  text: Review current enterprise direction, issues, strategic objectives, and alignment with enterprise architecture.
  notes: ''
  parent_id: cobit-2019.apo08.01
- id: cobit-2019.apo08.01.03
  type: activity
  abbrev: APO08.01-3
  heading: Activity 3
  text: Understand the current business environment, process constraints or issues, geographical expansion or contraction,
    and industry/regulatory drivers.
  notes: ''
  parent_id: cobit-2019.apo08.01
- id: cobit-2019.apo08.01.04
  type: activity
  abbrev: APO08.01-4
  heading: Activity 4
  text: Maintain an awareness of business processes and associated activities. Understand demand patterns that relate to service
    volumes and use.
  notes: ''
  parent_id: cobit-2019.apo08.01
- id: cobit-2019.apo08.01.05
  type: activity
  abbrev: APO08.01-5
  heading: Activity 5
  text: Manage expectations by ensuring that business units understand priorities, dependencies, financial constraints and
    the need to schedule requests.
  notes: ''
  parent_id: cobit-2019.apo08.01
- id: cobit-2019.apo08.01.06
  type: activity
  abbrev: APO08.01-6
  heading: Activity 6
  text: Clarify business expectations for I&T-enabled services and solutions. Ensure that requirements are defined with associated
    business acceptance criteria and metrics.
  notes: ''
  parent_id: cobit-2019.apo08.01
- id: cobit-2019.apo08.01.07
  type: activity
  abbrev: APO08.01-7
  heading: Activity 7
  text: Confirm that there is agreement between IT and all business departments on expectations and how they will be measured.
    Ensure that this agreement is confirmed by all stakeholders.
  notes: ''
  parent_id: cobit-2019.apo08.01
- id: cobit-2019.apo08.02.01
  type: activity
  abbrev: APO08.02-1
  heading: Activity 1
  text: Position IT as a partner to the business. Play a proactive role in identifying and communicating with key stakeholders
    on opportunities, risk and constraints. This includes current and emerging technologies, services and business process
    models.
  notes: ''
  parent_id: cobit-2019.apo08.02
- id: cobit-2019.apo08.02.02
  type: activity
  abbrev: APO08.02-2
  heading: Activity 2
  text: Collaborate on major new initiatives with portfolio, program and project management. Ensure the involvement of the
    IT organization from the start of a new initiative by providing value-add advice and recommendations (e.g., for business
    case development, requirements definition, solution design) and by taking ownership for I&T work streams.
  notes: ''
  parent_id: cobit-2019.apo08.02
- id: cobit-2019.apo08.03.01
  type: activity
  abbrev: APO08.03-1
  heading: Activity 1
  text: Assign a relationship manager as a single point of contact for each significant business unit. Ensure that a single
    counterpart is identified in the business organization and the counterpart has business understanding, sufficient technology
    awareness and the appropriate level of authority.
  notes: ''
  parent_id: cobit-2019.apo08.03
- id: cobit-2019.apo08.03.02
  type: activity
  abbrev: APO08.03-2
  heading: Activity 2
  text: Manage the relationship in a formalized and transparent way that ensures a focus on achieving a common and shared
    goal of successful enterprise outcomes in support of strategic goals and within the constraint of budgets and risk tolerance.
  notes: ''
  parent_id: cobit-2019.apo08.03
- id: cobit-2019.apo08.03.03
  type: activity
  abbrev: APO08.03-3
  heading: Activity 3
  text: Define and communicate a complaints and escalation procedure to resolve any relationship issues.
  notes: ''
  parent_id: cobit-2019.apo08.03
- id: cobit-2019.apo08.03.04
  type: activity
  abbrev: APO08.03-4
  heading: Activity 4
  text: Ensure that key decisions are agreed and approved by relevant accountable stakeholders.
  notes: ''
  parent_id: cobit-2019.apo08.03
- id: cobit-2019.apo08.03.05
  type: activity
  abbrev: APO08.03-5
  heading: Activity 5
  text: Plan specific interactions and schedules based on mutually agreed objectives and common language (service and performance
    review meetings, review of new strategies or plans, etc.).
  notes: ''
  parent_id: cobit-2019.apo08.03
- id: cobit-2019.apo08.04.01
  type: activity
  abbrev: APO08.04-1
  heading: Activity 1
  text: Coordinate and communicate changes and transition activities such as project or change plans, schedules, release policies,
    release known errors, and training awareness.
  notes: ''
  parent_id: cobit-2019.apo08.04
- id: cobit-2019.apo08.04.02
  type: activity
  abbrev: APO08.04-2
  heading: Activity 2
  text: Coordinate and communicate operational activities, roles and responsibilities, including the definition of request
    types, hierarchical escalation, major outages (planned and unplanned), and content and frequency of service reports.
  notes: ''
  parent_id: cobit-2019.apo08.04
- id: cobit-2019.apo08.04.03
  type: activity
  abbrev: APO08.04-3
  heading: Activity 3
  text: Take ownership of the response to the business for major events that may influence the relationship with the business.
    Provide direct support if required.
  notes: ''
  parent_id: cobit-2019.apo08.04
- id: cobit-2019.apo08.04.04
  type: activity
  abbrev: APO08.04-4
  heading: Activity 4
  text: Maintain an end-to-end communication plan that defines the content, frequency and recipients of service delivery information,
    including status of value delivered and any risk identified.
  notes: ''
  parent_id: cobit-2019.apo08.04
- id: cobit-2019.apo08.05.01
  type: activity
  abbrev: APO08.05-1
  heading: Activity 1
  text: Perform customer and provider satisfaction analysis. Ensure that issues are addressed; report results and status.
  notes: ''
  parent_id: cobit-2019.apo08.05
- id: cobit-2019.apo08.05.02
  type: activity
  abbrev: APO08.05-2
  heading: Activity 2
  text: Work together to identify, communicate and implement improvement initiatives.
  notes: ''
  parent_id: cobit-2019.apo08.05
- id: cobit-2019.apo08.05.03
  type: activity
  abbrev: APO08.05-3
  heading: Activity 3
  text: Work with service management and process owners to ensure that I&T-enabled services and service management processes
    are continually improved and the root causes of any issues are identified and resolved.
  notes: ''
  parent_id: cobit-2019.apo08.05
- id: cobit-2019.apo09.01.01
  type: activity
  abbrev: APO09.01-1
  heading: Activity 1
  text: Assess current I&T services and service levels to identify gaps between existing services and the business activities
    they support. Identify areas for improvement of existing services and service level options.
  notes: ''
  parent_id: cobit-2019.apo09.01
- id: cobit-2019.apo09.01.02
  type: activity
  abbrev: APO09.01-2
  heading: Activity 2
  text: Analyze, study and estimate future demand and confirm capacity of existing I&T-enabled services.
  notes: ''
  parent_id: cobit-2019.apo09.01
- id: cobit-2019.apo09.01.03
  type: activity
  abbrev: APO09.01-3
  heading: Activity 3
  text: Analyze business process activities to identify the need for new or redesigned I&T services.
  notes: ''
  parent_id: cobit-2019.apo09.01
- id: cobit-2019.apo09.01.04
  type: activity
  abbrev: APO09.01-4
  heading: Activity 4
  text: Compare identified requirements to existing service components in the portfolio. If possible, package existing service
    components (I&T services, service level options and service packages) into new service packages to meet identified business
    requirements.
  notes: ''
  parent_id: cobit-2019.apo09.01
- id: cobit-2019.apo09.01.05
  type: activity
  abbrev: APO09.01-5
  heading: Activity 5
  text: Regularly review the portfolio of I&T services with portfolio management and business relationship management to identify
    obsolete services. Agree on retirement and propose change.
  notes: ''
  parent_id: cobit-2019.apo09.01
- id: cobit-2019.apo09.01.06
  type: activity
  abbrev: APO09.01-6
  heading: Activity 6
  text: Where possible, match demands to service packages and create standardized services to obtain overall efficiencies.
  notes: ''
  parent_id: cobit-2019.apo09.01
- id: cobit-2019.apo09.02.01
  type: activity
  abbrev: APO09.02-1
  heading: Activity 1
  text: Publish in catalogues relevant live I&T-enabled services, service packages and service level options from the portfolio.
  notes: ''
  parent_id: cobit-2019.apo09.02
- id: cobit-2019.apo09.02.02
  type: activity
  abbrev: APO09.02-2
  heading: Activity 2
  text: Continually ensure that the service components in the portfolio and the related service catalogues are complete and
    up to date.
  notes: ''
  parent_id: cobit-2019.apo09.02
- id: cobit-2019.apo09.02.03
  type: activity
  abbrev: APO09.02-3
  heading: Activity 3
  text: Inform business relationship management of any updates to the service catalogues.
  notes: ''
  parent_id: cobit-2019.apo09.02
- id: cobit-2019.apo09.03.01
  type: activity
  abbrev: APO09.03-1
  heading: Activity 1
  text: Analyze requirements for new or changed service agreements received from business relationship management to ensure
    that the requirements can be matched. Consider aspects such as service times, availability, performance, capacity, security,
    privacy, continuity, compliance and regulatory issues, usability, demand constraints, and data quality.
  notes: ''
  parent_id: cobit-2019.apo09.03
- id: cobit-2019.apo09.03.02
  type: activity
  abbrev: APO09.03-2
  heading: Activity 2
  text: Draft customer service agreements based on the services, service packages and service level options in the relevant
    service catalogues.
  notes: ''
  parent_id: cobit-2019.apo09.03
- id: cobit-2019.apo09.03.03
  type: activity
  abbrev: APO09.03-3
  heading: Activity 3
  text: Finalize customer service agreements with business relationship management.
  notes: ''
  parent_id: cobit-2019.apo09.03
- id: cobit-2019.apo09.03.04
  type: activity
  abbrev: APO09.03-4
  heading: Activity 4
  text: Determine, agree on and document internal operational agreements to underpin the customer service agreements, if applicable.
  notes: ''
  parent_id: cobit-2019.apo09.03
- id: cobit-2019.apo09.03.05
  type: activity
  abbrev: APO09.03-5
  heading: Activity 5
  text: Liaise with supplier management to ensure that appropriate commercial contracts with external service providers underpin
    the customer service agreements, if applicable.
  notes: ''
  parent_id: cobit-2019.apo09.03
- id: cobit-2019.apo09.04.01
  type: activity
  abbrev: APO09.04-1
  heading: Activity 1
  text: Establish and maintain measures to monitor and collect service level data.
  notes: ''
  parent_id: cobit-2019.apo09.04
- id: cobit-2019.apo09.04.02
  type: activity
  abbrev: APO09.04-2
  heading: Activity 2
  text: Evaluate performance and provide regular and formal reporting of service agreement performance, including deviations
    from the agreed values. Distribute this report to business relationship management.
  notes: ''
  parent_id: cobit-2019.apo09.04
- id: cobit-2019.apo09.04.03
  type: activity
  abbrev: APO09.04-3
  heading: Activity 3
  text: Perform regular reviews to forecast and identify trends in service level performance. Incorporate quality management
    practices in the service monitoring.
  notes: ''
  parent_id: cobit-2019.apo09.04
- id: cobit-2019.apo09.04.04
  type: activity
  abbrev: APO09.04-4
  heading: Activity 4
  text: Provide the appropriate management information to aid performance management.
  notes: ''
  parent_id: cobit-2019.apo09.04
- id: cobit-2019.apo09.04.05
  type: activity
  abbrev: APO09.04-5
  heading: Activity 5
  text: Agree on action plans and remediations for any performance issues or negative trends.
  notes: ''
  parent_id: cobit-2019.apo09.04
- id: cobit-2019.apo09.05.01
  type: activity
  abbrev: APO09.05-1
  heading: Activity 1
  text: Regularly review service agreements according to the agreed terms to ensure that they are effective and up to date.
    When appropriate, take into account changes in requirements, I&T-enabled services, service packages or service level options.
  notes: ''
  parent_id: cobit-2019.apo09.05
- id: cobit-2019.apo09.05.02
  type: activity
  abbrev: APO09.05-2
  heading: Activity 2
  text: When needed, revise the existing service agreement with the service provider. Agree on and update the internal operational
    agreements.
  notes: ''
  parent_id: cobit-2019.apo09.05
- id: cobit-2019.apo10.01.01
  type: activity
  abbrev: APO10.01-1
  heading: Activity 1
  text: Continuously scan the enterprise landscape in search for new partners and vendors that can provide complementary capabilities
    and support the realization of the I&T strategy, road map and enterprise objectives.
  notes: ''
  parent_id: cobit-2019.apo10.01
- id: cobit-2019.apo10.01.02
  type: activity
  abbrev: APO10.01-2
  heading: Activity 2
  text: Establish and maintain criteria relating to type, significance and criticality of vendors and vendor contracts, enabling
    a focus on preferred and important vendors.
  notes: ''
  parent_id: cobit-2019.apo10.01
- id: cobit-2019.apo10.01.03
  type: activity
  abbrev: APO10.01-3
  heading: Activity 3
  text: Identify, record and categorize existing vendors and contracts according to defined criteria to maintain a detailed
    register of preferred vendors that need to be managed carefully.
  notes: ''
  parent_id: cobit-2019.apo10.01
- id: cobit-2019.apo10.01.04
  type: activity
  abbrev: APO10.01-4
  heading: Activity 4
  text: Establish and maintain vendor and contract evaluation criteria to enable overall review and comparison of vendor performance
    in a consistent way.
  notes: ''
  parent_id: cobit-2019.apo10.01
- id: cobit-2019.apo10.01.05
  type: activity
  abbrev: APO10.01-5
  heading: Activity 5
  text: Periodically evaluate and compare the performance of existing and alternative vendors to identify opportunities or
    a compelling need to reconsider current vendor contracts.
  notes: ''
  parent_id: cobit-2019.apo10.01
- id: cobit-2019.apo10.02.01
  type: activity
  abbrev: APO10.02-1
  heading: Activity 1
  text: Review all requests for information (RFIs) and requests for proposals (RFPs) to ensure that they clearly define requirements
    (e.g., enterprise requirements for security and privacy of information, operational business and I&T processing requirements,
    priorities for service delivery) and include a procedure to clarify requirements. The RFIs and RFPs should allow vendors
    sufficient time to prepare their proposals and should clearly define award criteria and the decision process.
  notes: ''
  parent_id: cobit-2019.apo10.02
- id: cobit-2019.apo10.02.02
  type: activity
  abbrev: APO10.02-2
  heading: Activity 2
  text: Evaluate RFIs and RFPs in accordance with the approved evaluation process/criteria and maintain documentary evidence
    of the evaluations. Verify the references of candidate vendors.
  notes: ''
  parent_id: cobit-2019.apo10.02
- id: cobit-2019.apo10.02.03
  type: activity
  abbrev: APO10.02-3
  heading: Activity 3
  text: Select the vendor that best fits the RFP. Document and communicate the decision, and sign the contract.
  notes: ''
  parent_id: cobit-2019.apo10.02
- id: cobit-2019.apo10.02.04
  type: activity
  abbrev: APO10.02-4
  heading: Activity 4
  text: In the specific case of software acquisition, include and enforce the rights and obligations of all parties in the
    contractual terms. These rights and obligations may include ownership and licensing of IP; maintenance; warranties; arbitration
    procedures; upgrade terms; and fit for purpose, including security, privacy, escrow and access rights.
  notes: ''
  parent_id: cobit-2019.apo10.02
- id: cobit-2019.apo10.02.05
  type: activity
  abbrev: APO10.02-5
  heading: Activity 5
  text: In the specific case of acquisition of development resources, include and enforce the rights and obligations of all
    parties in the contractual terms. These rights and obligations may include ownership and licensing of IP; fit for purpose,
    including development methodologies; testing; quality management processes, including required performance criteria; performance
    reviews; basis for payment; warranties; arbitration procedures; human resource management; and compliance with the enterprise’s
    policies.
  notes: ''
  parent_id: cobit-2019.apo10.02
- id: cobit-2019.apo10.02.06
  type: activity
  abbrev: APO10.02-6
  heading: Activity 6
  text: Obtain legal advice on resource development acquisition agreements regarding ownership and licensing of IP.
  notes: ''
  parent_id: cobit-2019.apo10.02
- id: cobit-2019.apo10.02.07
  type: activity
  abbrev: APO10.02-7
  heading: Activity 7
  text: In the specific case of acquisition of infrastructure, facilities and related services, include and enforce the rights
    and obligations of all parties in the contractual terms. These rights and obligations may include service levels, maintenance
    procedures, access controls, security, privacy, performance review, basis for payment and arbitration procedures.
  notes: ''
  parent_id: cobit-2019.apo10.02
- id: cobit-2019.apo10.03.01
  type: activity
  abbrev: APO10.03-1
  heading: Activity 1
  text: Assign relationship owners for all vendors and make them accountable for the quality of service(s) provided.
  notes: ''
  parent_id: cobit-2019.apo10.03
- id: cobit-2019.apo10.03.02
  type: activity
  abbrev: APO10.03-2
  heading: Activity 2
  text: Specify a formal communication and review process, including vendor interactions and schedules.
  notes: ''
  parent_id: cobit-2019.apo10.03
- id: cobit-2019.apo10.03.03
  type: activity
  abbrev: APO10.03-3
  heading: Activity 3
  text: Agree on, manage, maintain and renew formal contracts with the vendor. Ensure that contracts conform to enterprise
    standards and legal and regulatory requirements.
  notes: ''
  parent_id: cobit-2019.apo10.03
- id: cobit-2019.apo10.03.04
  type: activity
  abbrev: APO10.03-4
  heading: Activity 4
  text: Include provisions in contracts with key service vendors for review of the vendor site and internal practices and
    controls by management or independent third parties. Agree on independent audit and assurance controls of the operational
    environments of vendors providing outsourced services to confirm that agreed requirements are being adequately addressed.
  notes: ''
  parent_id: cobit-2019.apo10.03
- id: cobit-2019.apo10.03.05
  type: activity
  abbrev: APO10.03-5
  heading: Activity 5
  text: Use established procedures to deal with contract disputes. Whenever possible, first use effective relationships and
    communications to overcome service problems.
  notes: ''
  parent_id: cobit-2019.apo10.03
- id: cobit-2019.apo10.03.06
  type: activity
  abbrev: APO10.03-6
  heading: Activity 6
  text: Define and formalize roles and responsibilities for each service vendor. Where several vendors combine to provide
    a service, consider allocating a lead contractor role to one of the vendors to take responsibility for an overall contract.
  notes: ''
  parent_id: cobit-2019.apo10.03
- id: cobit-2019.apo10.03.07
  type: activity
  abbrev: APO10.03-7
  heading: Activity 7
  text: Evaluate the effectiveness of the relationship and identify necessary improvements.
  notes: ''
  parent_id: cobit-2019.apo10.03
- id: cobit-2019.apo10.03.08
  type: activity
  abbrev: APO10.03-8
  heading: Activity 8
  text: Define, communicate and agree on ways to implement required improvements to the relationship.
  notes: ''
  parent_id: cobit-2019.apo10.03
- id: cobit-2019.apo10.04.01
  type: activity
  abbrev: APO10.04-1
  heading: Activity 1
  text: When preparing the contract, provide for potential service risk by clearly defining service requirements, including
    software escrow agreements, alternative vendors or standby agreements to mitigate possible vendor failure; security and
    protection of IP; privacy; and any legal or regulatory requirements.
  notes: ''
  parent_id: cobit-2019.apo10.04
- id: cobit-2019.apo10.04.02
  type: activity
  abbrev: APO10.04-2
  heading: Activity 2
  text: Identify, monitor and, where appropriate, manage risk relating to the vendor’s ability to deliver service efficiently,
    effectively, securely, confidentially, reliably and continually. Integrate critical internal IT management processes with
    those of the outsourced service providers, covering, for example, performance and capacity planning, change management,
    and configuration management.
  notes: ''
  parent_id: cobit-2019.apo10.04
- id: cobit-2019.apo10.04.03
  type: activity
  abbrev: APO10.04-3
  heading: Activity 3
  text: Assess the larger ecosystem of the vendor and identify, monitor, and, where appropriate, manage risk related to the
    subcontractors and upstream vendors influencing the vendor's ability to deliver service efficiently, effectively, securely,
    reliably and continually.
  notes: ''
  parent_id: cobit-2019.apo10.04
- id: cobit-2019.apo10.05.01
  type: activity
  abbrev: APO10.05-1
  heading: Activity 1
  text: Request independent reviews of vendor internal practices and controls, if necessary.
  notes: ''
  parent_id: cobit-2019.apo10.05
- id: cobit-2019.apo10.05.02
  type: activity
  abbrev: APO10.05-2
  heading: Activity 2
  text: Define and document criteria to monitor vendor performance aligned with service level agreements. Ensure that the
    vendor regularly and transparently reports on agreed criteria.
  notes: ''
  parent_id: cobit-2019.apo10.05
- id: cobit-2019.apo10.05.03
  type: activity
  abbrev: APO10.05-3
  heading: Activity 3
  text: Monitor and review service delivery to ensure that the vendor is providing an acceptable quality of service, meeting
    requirements and adhering to contract conditions.
  notes: ''
  parent_id: cobit-2019.apo10.05
- id: cobit-2019.apo10.05.04
  type: activity
  abbrev: APO10.05-4
  heading: Activity 4
  text: Review vendor performance and value for money. Ensure that the vendor is reliable and competitive, compared with alternative
    vendors and market conditions.
  notes: ''
  parent_id: cobit-2019.apo10.05
- id: cobit-2019.apo10.05.05
  type: activity
  abbrev: APO10.05-5
  heading: Activity 5
  text: Monitor and evaluate externally available information about the vendor and the vendor's supply chain.
  notes: ''
  parent_id: cobit-2019.apo10.05
- id: cobit-2019.apo10.05.06
  type: activity
  abbrev: APO10.05-6
  heading: Activity 6
  text: Record and assess review results periodically and discuss them with the vendor to identify needs and opportunities
    for improvement.
  notes: ''
  parent_id: cobit-2019.apo10.05
- id: cobit-2019.apo11.01.01
  type: activity
  abbrev: APO11.01-1
  heading: Activity 1
  text: Ensure that the I&T control framework and the business and IT processes include a standard, formal and continuous
    approach to quality management that is aligned with enterprise requirements. Within the I&T control framework and the
    business and IT processes, identify quality requirements and criteria (e.g., based on legal requirements and requirements
    from customers).
  notes: ''
  parent_id: cobit-2019.apo11.01
- id: cobit-2019.apo11.01.02
  type: activity
  abbrev: APO11.01-2
  heading: Activity 2
  text: Define roles, tasks, decision rights and responsibilities for quality management in the organizational structure.
  notes: ''
  parent_id: cobit-2019.apo11.01
- id: cobit-2019.apo11.01.03
  type: activity
  abbrev: APO11.01-3
  heading: Activity 3
  text: Obtain input from management and external and internal stakeholders on the definition of quality requirements and
    quality management criteria.
  notes: ''
  parent_id: cobit-2019.apo11.01
- id: cobit-2019.apo11.01.04
  type: activity
  abbrev: APO11.01-4
  heading: Activity 4
  text: Regularly monitor and review the QMS against agreed acceptance criteria. Include feedback from customers, users and
    management.
  notes: ''
  parent_id: cobit-2019.apo11.01
- id: cobit-2019.apo11.01.05
  type: activity
  abbrev: APO11.01-5
  heading: Activity 5
  text: Respond to discrepancies in review results to continuously improve the QMS.
  notes: ''
  parent_id: cobit-2019.apo11.01
- id: cobit-2019.apo11.02.01
  type: activity
  abbrev: APO11.02-1
  heading: Activity 1
  text: Focus quality management on customers by determining internal and external customer requirements and ensuring alignment
    of the I&T standards and practices. Define and communicate roles and responsibilities concerning conflict resolution between
    the user/customer and the IT organization.
  notes: ''
  parent_id: cobit-2019.apo11.02
- id: cobit-2019.apo11.02.02
  type: activity
  abbrev: APO11.02-2
  heading: Activity 2
  text: Manage the business needs and expectations for each business process, IT operational service and new solutions. Maintain
    their quality acceptance criteria.
  notes: ''
  parent_id: cobit-2019.apo11.02
- id: cobit-2019.apo11.02.03
  type: activity
  abbrev: APO11.02-3
  heading: Activity 3
  text: Communicate customer requirements and expectations throughout the business and IT organization.
  notes: ''
  parent_id: cobit-2019.apo11.02
- id: cobit-2019.apo11.02.04
  type: activity
  abbrev: APO11.02-4
  heading: Activity 4
  text: Periodically obtain customer views on business process and service provisioning and IT solution delivery. Determine
    the impact on I&T standards and practices and ensure that customer expectations are met and actioned.
  notes: ''
  parent_id: cobit-2019.apo11.02
- id: cobit-2019.apo11.02.05
  type: activity
  abbrev: APO11.02-5
  heading: Activity 5
  text: Capture quality acceptance criteria for inclusion in SLAs.
  notes: ''
  parent_id: cobit-2019.apo11.02
- id: cobit-2019.apo11.03.01
  type: activity
  abbrev: APO11.03-1
  heading: Activity 1
  text: Define the quality management standards, practices and procedures in line with the I&T control framework’s requirements
    and enterprise quality management criteria and policies.
  notes: ''
  parent_id: cobit-2019.apo11.03
- id: cobit-2019.apo11.03.02
  type: activity
  abbrev: APO11.03-2
  heading: Activity 2
  text: Integrate the required quality management practices in key processes and solutions across the organization.
  notes: ''
  parent_id: cobit-2019.apo11.03
- id: cobit-2019.apo11.03.03
  type: activity
  abbrev: APO11.03-3
  heading: Activity 3
  text: Consider the benefits and costs of quality certifications.
  notes: ''
  parent_id: cobit-2019.apo11.03
- id: cobit-2019.apo11.03.04
  type: activity
  abbrev: APO11.03-4
  heading: Activity 4
  text: Effectively communicate the quality management approach (e.g., through regular, formal quality training programs).
  notes: ''
  parent_id: cobit-2019.apo11.03
- id: cobit-2019.apo11.03.05
  type: activity
  abbrev: APO11.03-5
  heading: Activity 5
  text: Record and monitor quality data. Use industry good practices for reference when improving and tailoring the enterprise's
    quality practices.
  notes: ''
  parent_id: cobit-2019.apo11.03
- id: cobit-2019.apo11.03.06
  type: activity
  abbrev: APO11.03-6
  heading: Activity 6
  text: Regularly review the continued relevance, efficiency and effectiveness of specific quality management processes. Monitor
    the achievement of quality objectives.
  notes: ''
  parent_id: cobit-2019.apo11.03
- id: cobit-2019.apo11.04.01
  type: activity
  abbrev: APO11.04-1
  heading: Activity 1
  text: Prepare and conduct quality reviews for key organizational processes and solutions.
  notes: ''
  parent_id: cobit-2019.apo11.04
- id: cobit-2019.apo11.04.02
  type: activity
  abbrev: APO11.04-2
  heading: Activity 2
  text: For these key organizational processes and solutions, monitor goal-driven quality metrics aligned to overall quality
    objectives.
  notes: ''
  parent_id: cobit-2019.apo11.04
- id: cobit-2019.apo11.04.03
  type: activity
  abbrev: APO11.04-3
  heading: Activity 3
  text: Ensure that management and process owners regularly review quality management performance against defined quality
    metrics.
  notes: ''
  parent_id: cobit-2019.apo11.04
- id: cobit-2019.apo11.04.04
  type: activity
  abbrev: APO11.04-4
  heading: Activity 4
  text: Analyze overall quality management performance results.
  notes: ''
  parent_id: cobit-2019.apo11.04
- id: cobit-2019.apo11.04.05
  type: activity
  abbrev: APO11.04-5
  heading: Activity 5
  text: Report the quality management performance review results and initiate improvements where appropriate.
  notes: ''
  parent_id: cobit-2019.apo11.04
- id: cobit-2019.apo11.05.01
  type: activity
  abbrev: APO11.05-1
  heading: Activity 1
  text: Establish a platform to share good practices and capture information on defects and mistakes to enable learning from
    them.
  notes: ''
  parent_id: cobit-2019.apo11.05
- id: cobit-2019.apo11.05.02
  type: activity
  abbrev: APO11.05-2
  heading: Activity 2
  text: Identify examples of excellent quality delivery processes that can benefit other services or projects. Share these
    with the service and project delivery teams to encourage improvement.
  notes: ''
  parent_id: cobit-2019.apo11.05
- id: cobit-2019.apo11.05.03
  type: activity
  abbrev: APO11.05-3
  heading: Activity 3
  text: Identify recurring examples of quality defects. Determine their root cause, evaluate their impact and result, and
    agree on improvement actions with the service and/or project delivery teams.
  notes: ''
  parent_id: cobit-2019.apo11.05
- id: cobit-2019.apo11.05.04
  type: activity
  abbrev: APO11.05-4
  heading: Activity 4
  text: Provide employees with training in the methods and tools of continual improvement.
  notes: ''
  parent_id: cobit-2019.apo11.05
- id: cobit-2019.apo11.05.05
  type: activity
  abbrev: APO11.05-5
  heading: Activity 5
  text: Benchmark the results of the quality reviews against internal historical data, industry guidelines, standards and
    data from similar types of enterprises.
  notes: ''
  parent_id: cobit-2019.apo11.05
- id: cobit-2019.apo12.01.01
  type: activity
  abbrev: APO12.01-1
  heading: Activity 1
  text: Establish and maintain a method for the collection, classification and analysis of I&T risk-related data.
  notes: ''
  parent_id: cobit-2019.apo12.01
- id: cobit-2019.apo12.01.02
  type: activity
  abbrev: APO12.01-2
  heading: Activity 2
  text: Record relevant and significant I&T risk-related data on the enterprise’s internal and external operating environment.
  notes: ''
  parent_id: cobit-2019.apo12.01
- id: cobit-2019.apo12.01.03
  type: activity
  abbrev: APO12.01-3
  heading: Activity 3
  text: Adopt or define a risk taxonomy for consistent definitions of risk scenarios and impact and likelihood categories.
  notes: ''
  parent_id: cobit-2019.apo12.01
- id: cobit-2019.apo12.01.04
  type: activity
  abbrev: APO12.01-4
  heading: Activity 4
  text: Record data on risk events that have caused or may cause business impacts as per the impact categories defined in
    the risk taxonomy. Capture relevant data from related issues, incidents, problems and investigations.
  notes: ''
  parent_id: cobit-2019.apo12.01
- id: cobit-2019.apo12.01.05
  type: activity
  abbrev: APO12.01-5
  heading: Activity 5
  text: Survey and analyze the historical I&T risk data and loss experience from externally available data and trends, industry
    peers through industry-based event logs, databases, and industry agreements for common event disclosure.
  notes: ''
  parent_id: cobit-2019.apo12.01
- id: cobit-2019.apo12.01.06
  type: activity
  abbrev: APO12.01-6
  heading: Activity 6
  text: For similar classes of events, organize the collected data and highlight contributing factors. Determine common contributing
    factors across multiple events.
  notes: ''
  parent_id: cobit-2019.apo12.01
- id: cobit-2019.apo12.01.07
  type: activity
  abbrev: APO12.01-7
  heading: Activity 7
  text: Determine the specific conditions that existed or were absent when risk events occurred and the way the conditions
    affected event frequency and loss magnitude.
  notes: ''
  parent_id: cobit-2019.apo12.01
- id: cobit-2019.apo12.01.08
  type: activity
  abbrev: APO12.01-8
  heading: Activity 8
  text: Perform periodic event and risk factor analysis to identify new or emerging risk issues and to gain an understanding
    of the associated internal and external risk factors.
  notes: ''
  parent_id: cobit-2019.apo12.01
- id: cobit-2019.apo12.02.01
  type: activity
  abbrev: APO12.02-1
  heading: Activity 1
  text: Define the appropriate scope of risk analysis efforts, considering all risk factors and/or the business criticality
    of assets.
  notes: ''
  parent_id: cobit-2019.apo12.02
- id: cobit-2019.apo12.02.02
  type: activity
  abbrev: APO12.02-2
  heading: Activity 2
  text: Build and regularly update I&T risk scenarios; I&T-related loss exposures; and scenarios regarding reputational risk,
    including compound scenarios of cascading and/or coincidental threat types and events. Develop expectations for specific
    control activities and capabilities to detect.
  notes: ''
  parent_id: cobit-2019.apo12.02
- id: cobit-2019.apo12.02.03
  type: activity
  abbrev: APO12.02-3
  heading: Activity 3
  text: Estimate the frequency (or likelihood) and magnitude of loss or gain associated with I&T risk scenarios. Take into
    account all applicable risk factors and evaluate known operational controls.
  notes: ''
  parent_id: cobit-2019.apo12.02
- id: cobit-2019.apo12.02.04
  type: activity
  abbrev: APO12.02-4
  heading: Activity 4
  text: Compare current risk (I&T-related loss exposure) to risk appetite and acceptable risk tolerance. Identify unacceptable
    or elevated risk.
  notes: ''
  parent_id: cobit-2019.apo12.02
- id: cobit-2019.apo12.02.05
  type: activity
  abbrev: APO12.02-5
  heading: Activity 5
  text: Propose risk responses for risk exceeding risk appetite and tolerance levels.
  notes: ''
  parent_id: cobit-2019.apo12.02
- id: cobit-2019.apo12.02.06
  type: activity
  abbrev: APO12.02-6
  heading: Activity 6
  text: Specify high-level requirements for projects or programs that will implement the selected risk responses. Identify
    requirements and expectations for appropriate key controls for risk mitigation responses.
  notes: ''
  parent_id: cobit-2019.apo12.02
- id: cobit-2019.apo12.02.07
  type: activity
  abbrev: APO12.02-7
  heading: Activity 7
  text: Validate the risk analysis and business impact analysis (BIA) results before using them in decision making. Confirm
    that the analysis aligns with enterprise requirements and verify that estimations were properly calibrated and scrutinized
    for bias.
  notes: ''
  parent_id: cobit-2019.apo12.02
- id: cobit-2019.apo12.02.08
  type: activity
  abbrev: APO12.02-8
  heading: Activity 8
  text: Analyze cost/benefit of potential risk response options such as avoid, reduce/mitigate, transfer/share, and accept
    and exploit/seize. Confirm the optimal risk response.
  notes: ''
  parent_id: cobit-2019.apo12.02
- id: cobit-2019.apo12.03.01
  type: activity
  abbrev: APO12.03-1
  heading: Activity 1
  text: Inventory business processes and document their dependency on I&T service management processes and IT infrastructure
    resources. Identify supporting personnel, applications, infrastructure, facilities, critical manual records, vendors,
    suppliers and outsourcers.
  notes: ''
  parent_id: cobit-2019.apo12.03
- id: cobit-2019.apo12.03.02
  type: activity
  abbrev: APO12.03-2
  heading: Activity 2
  text: Determine and agree on which I&T services and IT infrastructure resources are essential to sustain the operation of
    business processes. Analyze dependencies and identify weak links.
  notes: ''
  parent_id: cobit-2019.apo12.03
- id: cobit-2019.apo12.03.03
  type: activity
  abbrev: APO12.03-3
  heading: Activity 3
  text: Aggregate current risk scenarios by category, business line and functional area.
  notes: ''
  parent_id: cobit-2019.apo12.03
- id: cobit-2019.apo12.03.04
  type: activity
  abbrev: APO12.03-4
  heading: Activity 4
  text: Regularly capture all risk profile information and consolidate it into an aggregated risk profile.
  notes: ''
  parent_id: cobit-2019.apo12.03
- id: cobit-2019.apo12.03.05
  type: activity
  abbrev: APO12.03-5
  heading: Activity 5
  text: Capture information on the status of the risk action plan for inclusion in the I&T risk profile of the enterprise.
  notes: ''
  parent_id: cobit-2019.apo12.03
- id: cobit-2019.apo12.03.06
  type: activity
  abbrev: APO12.03-6
  heading: Activity 6
  text: Based on all risk profile data, define a set of risk indicators that allow the quick identification and monitoring
    of current risk and risk trends.
  notes: ''
  parent_id: cobit-2019.apo12.03
- id: cobit-2019.apo12.03.07
  type: activity
  abbrev: APO12.03-7
  heading: Activity 7
  text: Capture information on I&T risk events that have materialized for inclusion in the IT risk profile of the enterprise.
  notes: ''
  parent_id: cobit-2019.apo12.03
- id: cobit-2019.apo12.04.01
  type: activity
  abbrev: APO12.04-1
  heading: Activity 1
  text: Report the results of risk analysis to all affected stakeholders in terms and formats useful to support enterprise
    decisions. Whenever possible, include probabilities and ranges of loss or gain along with confidence levels, to enable
    management to balance risk-return.
  notes: ''
  parent_id: cobit-2019.apo12.04
- id: cobit-2019.apo12.04.02
  type: activity
  abbrev: APO12.04-2
  heading: Activity 2
  text: Provide decision makers with an understanding of worst-case and most-probable scenarios, I&T-related loss exposures
    and significant reputation, legal and regulatory considerations, or any other impact category as per the risk taxonomy.
  notes: ''
  parent_id: cobit-2019.apo12.04
- id: cobit-2019.apo12.04.03
  type: activity
  abbrev: APO12.04-3
  heading: Activity 3
  text: Report the current risk profile to all stakeholders. Include information on the effectiveness of the risk management
    process, control effectiveness, gaps, inconsistencies, redundancies, remediation status and their impacts on the risk
    profile.
  notes: ''
  parent_id: cobit-2019.apo12.04
- id: cobit-2019.apo12.04.04
  type: activity
  abbrev: APO12.04-4
  heading: Activity 4
  text: On a periodic basis, for areas with relative risk and risk capacity parity, identify I&T-related opportunities that
    would allow the acceptance of greater risk and enhanced growth and return.
  notes: ''
  parent_id: cobit-2019.apo12.04
- id: cobit-2019.apo12.04.05
  type: activity
  abbrev: APO12.04-5
  heading: Activity 5
  text: Review the results of objective third-party assessments and internal audit and quality assurance reviews. Include
    them in the risk profile. Review identified gaps and I&T-related loss exposures to determine the need for additional risk
    analysis.
  notes: ''
  parent_id: cobit-2019.apo12.04
- id: cobit-2019.apo12.05.01
  type: activity
  abbrev: APO12.05-1
  heading: Activity 1
  text: Maintain an inventory of control activities that are in place to mitigate risk and that enable risk to be taken in
    line with the risk appetite and tolerance. Classify control activities and map them to specific I&T risk scenarios and
    aggregations of I&T risk scenarios.
  notes: ''
  parent_id: cobit-2019.apo12.05
- id: cobit-2019.apo12.05.02
  type: activity
  abbrev: APO12.05-2
  heading: Activity 2
  text: Determine whether each organizational entity monitors risk and accepts accountability for operating within its individual
    and portfolio tolerance levels.
  notes: ''
  parent_id: cobit-2019.apo12.05
- id: cobit-2019.apo12.05.03
  type: activity
  abbrev: APO12.05-3
  heading: Activity 3
  text: Define a balanced set of project proposals designed to reduce risk and/or projects that enable strategic enterprise
    opportunities, considering costs, benefits, effect on current risk profile and regulations.
  notes: ''
  parent_id: cobit-2019.apo12.05
- id: cobit-2019.apo12.06.01
  type: activity
  abbrev: APO12.06-1
  heading: Activity 1
  text: Prepare, maintain and test plans that document the specific steps to take when a risk event may cause a significant
    operational or development incident with serious business impact. Ensure that plans include pathways of escalation across
    the enterprise.
  notes: ''
  parent_id: cobit-2019.apo12.06
- id: cobit-2019.apo12.06.02
  type: activity
  abbrev: APO12.06-2
  heading: Activity 2
  text: Apply the appropriate response plan to minimize the impact when risk incidents occur.
  notes: ''
  parent_id: cobit-2019.apo12.06
- id: cobit-2019.apo12.06.03
  type: activity
  abbrev: APO12.06-3
  heading: Activity 3
  text: Categorize incidents and compare I&T-related loss exposures against risk tolerance thresholds. Communicate business
    impacts to decision makers as part of reporting and update the risk profile.
  notes: ''
  parent_id: cobit-2019.apo12.06
- id: cobit-2019.apo12.06.04
  type: activity
  abbrev: APO12.06-4
  heading: Activity 4
  text: Examine past adverse events/losses and missed opportunities and determine root causes.
  notes: ''
  parent_id: cobit-2019.apo12.06
- id: cobit-2019.apo12.06.05
  type: activity
  abbrev: APO12.06-5
  heading: Activity 5
  text: Communicate root cause, additional risk response requirements and process improvements to appropriate decision makers.
    Ensure that the cause, response requirements and process improvement are included in risk governance processes.
  notes: ''
  parent_id: cobit-2019.apo12.06
- id: cobit-2019.apo13.01.01
  type: activity
  abbrev: APO13.01-1
  heading: Activity 1
  text: Define the scope and boundaries of the information security management system (ISMS) in terms of the characteristics
    of the enterprise, the organization, its location, assets and technology. Include details of, and justification for, any
    exclusions from the scope.
  notes: ''
  parent_id: cobit-2019.apo13.01
- id: cobit-2019.apo13.01.02
  type: activity
  abbrev: APO13.01-2
  heading: Activity 2
  text: Define an ISMS in accordance with enterprise policy and the context in which the enterprise operates.
  notes: ''
  parent_id: cobit-2019.apo13.01
- id: cobit-2019.apo13.01.03
  type: activity
  abbrev: APO13.01-3
  heading: Activity 3
  text: Align the ISMS with the overall enterprise approach to the management of security.
  notes: ''
  parent_id: cobit-2019.apo13.01
- id: cobit-2019.apo13.01.04
  type: activity
  abbrev: APO13.01-4
  heading: Activity 4
  text: Obtain management authorization to implement and operate or change the ISMS.
  notes: ''
  parent_id: cobit-2019.apo13.01
- id: cobit-2019.apo13.01.05
  type: activity
  abbrev: APO13.01-5
  heading: Activity 5
  text: Prepare and maintain a statement of applicability that describes the scope of the ISMS.
  notes: ''
  parent_id: cobit-2019.apo13.01
- id: cobit-2019.apo13.01.06
  type: activity
  abbrev: APO13.01-6
  heading: Activity 6
  text: Define and communicate Information security management roles and responsibilities.
  notes: ''
  parent_id: cobit-2019.apo13.01
- id: cobit-2019.apo13.01.07
  type: activity
  abbrev: APO13.01-7
  heading: Activity 7
  text: Communicate the ISMS approach.
  notes: ''
  parent_id: cobit-2019.apo13.01
- id: cobit-2019.apo13.02.01
  type: activity
  abbrev: APO13.02-1
  heading: Activity 1
  text: Formulate and maintain an information security risk treatment plan aligned with strategic objective and the enterprise
    architecture. Ensure that the plan identifies the appropriate and optimal management practices and security solutions,
    with associated resources, responsibilities and priorities for managing identified information security risk.
  notes: ''
  parent_id: cobit-2019.apo13.02
- id: cobit-2019.apo13.02.02
  type: activity
  abbrev: APO13.02-2
  heading: Activity 2
  text: Maintain as part of the enterprise architecture an inventory of solution components that are in place to manage security-related
    risk.
  notes: ''
  parent_id: cobit-2019.apo13.02
- id: cobit-2019.apo13.02.03
  type: activity
  abbrev: APO13.02-3
  heading: Activity 3
  text: Develop proposals to implement the information security risk treatment plan, supported by suitable business cases
    that include consideration of funding and allocation of roles and responsibilities.
  notes: ''
  parent_id: cobit-2019.apo13.02
- id: cobit-2019.apo13.02.04
  type: activity
  abbrev: APO13.02-4
  heading: Activity 4
  text: Provide input to the design and development of management practices and solutions selected from the information security
    risk treatment plan.
  notes: ''
  parent_id: cobit-2019.apo13.02
- id: cobit-2019.apo13.02.05
  type: activity
  abbrev: APO13.02-5
  heading: Activity 5
  text: Implement information security and privacy training and awareness programs.
  notes: ''
  parent_id: cobit-2019.apo13.02
- id: cobit-2019.apo13.02.06
  type: activity
  abbrev: APO13.02-6
  heading: Activity 6
  text: Integrate the planning, design, implementation and monitoring of information security and privacy procedures and other
    controls capable of enabling prompt prevention, detection of security events, and response to security incidents.
  notes: ''
  parent_id: cobit-2019.apo13.02
- id: cobit-2019.apo13.02.07
  type: activity
  abbrev: APO13.02-7
  heading: Activity 7
  text: Define how to measure the effectiveness of the selected management practices. Specify how these measurements are to
    be used to assess effectiveness to produce comparable and reproducible results.
  notes: ''
  parent_id: cobit-2019.apo13.02
- id: cobit-2019.apo13.03.01
  type: activity
  abbrev: APO13.03-1
  heading: Activity 1
  text: Undertake regular reviews of the effectiveness of the ISMS. Include meeting ISMS policy and objectives and reviewing
    security and privacy practices.
  notes: ''
  parent_id: cobit-2019.apo13.03
- id: cobit-2019.apo13.03.02
  type: activity
  abbrev: APO13.03-2
  heading: Activity 2
  text: Conduct ISMS audits at planned intervals.
  notes: ''
  parent_id: cobit-2019.apo13.03
- id: cobit-2019.apo13.03.03
  type: activity
  abbrev: APO13.03-3
  heading: Activity 3
  text: Undertake a management review of the ISMS on a regular basis to ensure that the scope remains adequate and improvements
    in the ISMS process are identified.
  notes: ''
  parent_id: cobit-2019.apo13.03
- id: cobit-2019.apo13.03.04
  type: activity
  abbrev: APO13.03-4
  heading: Activity 4
  text: Record actions and events that could have an impact on the effectiveness or performance of the ISMS.
  notes: ''
  parent_id: cobit-2019.apo13.03
- id: cobit-2019.apo13.03.05
  type: activity
  abbrev: APO13.03-5
  heading: Activity 5
  text: Provide input to the maintenance of the security plans to take into account the findings of monitoring and reviewing
    activities.
  notes: ''
  parent_id: cobit-2019.apo13.03
- id: cobit-2019.apo14.01.01
  type: activity
  abbrev: APO14.01-1
  heading: Activity 1
  text: Establish a data management function with responsibility for managing activities that support data management objectives.
  notes: ''
  parent_id: cobit-2019.apo14.01
- id: cobit-2019.apo14.01.02
  type: activity
  abbrev: APO14.01-2
  heading: Activity 2
  text: Specify roles and responsibilities to support the management of data and the interaction between governance and the
    data management function.
  notes: ''
  parent_id: cobit-2019.apo14.01
- id: cobit-2019.apo14.01.03
  type: activity
  abbrev: APO14.01-3
  heading: Activity 3
  text: Ensure that business and technology collaboratively develop the organization’s data management strategy. Make sure
    that data management objectives, priorities and scope reflect enterprise objectives, are consistent with data management
    policies and regulation, and are approved by all stakeholders.
  notes: ''
  parent_id: cobit-2019.apo14.01
- id: cobit-2019.apo14.01.04
  type: activity
  abbrev: APO14.01-4
  heading: Activity 4
  text: Communicate data management objectives, priorities and scope and adjust them as needed, based upon feedback.
  notes: ''
  parent_id: cobit-2019.apo14.01
- id: cobit-2019.apo14.01.05
  type: activity
  abbrev: APO14.01-5
  heading: Activity 5
  text: Use metrics to assess and monitor the achievement of objectives for data management.
  notes: ''
  parent_id: cobit-2019.apo14.01
- id: cobit-2019.apo14.01.06
  type: activity
  abbrev: APO14.01-6
  heading: Activity 6
  text: Monitor the sequence plan for implementation of the data management strategy. Update it as needed, based on progress
    reviews.
  notes: ''
  parent_id: cobit-2019.apo14.01
- id: cobit-2019.apo14.01.07
  type: activity
  abbrev: APO14.01-7
  heading: Activity 7
  text: Use statistical and other quantitative techniques to evaluate the effectiveness of strategic data management objectives
    in achieving business objectives. Make modifications as needed, based on metrics.
  notes: ''
  parent_id: cobit-2019.apo14.01
- id: cobit-2019.apo14.01.08
  type: activity
  abbrev: APO14.01-8
  heading: Activity 8
  text: Ensure that the organization researches innovative business processes and emerging regulatory requirements to ensure
    that the data management program is compatible with future business needs.
  notes: ''
  parent_id: cobit-2019.apo14.01
- id: cobit-2019.apo14.01.09
  type: activity
  abbrev: APO14.01-9
  heading: Activity 9
  text: Make contributions to industry best practices for data management strategy development and implementation.
  notes: ''
  parent_id: cobit-2019.apo14.01
- id: cobit-2019.apo14.02.01
  type: activity
  abbrev: APO14.02-1
  heading: Activity 1
  text: Ensure that standard business terms are readily available and communicated to relevant stakeholders.
  notes: ''
  parent_id: cobit-2019.apo14.02
- id: cobit-2019.apo14.02.02
  type: activity
  abbrev: APO14.02-2
  heading: Activity 2
  text: Ensure that each business term added to the business glossary has a unique name and unique definition.
  notes: ''
  parent_id: cobit-2019.apo14.02
- id: cobit-2019.apo14.02.03
  type: activity
  abbrev: APO14.02-3
  heading: Activity 3
  text: Use standard industry business terms and definitions, as appropriate, in the business glossary.
  notes: ''
  parent_id: cobit-2019.apo14.02
- id: cobit-2019.apo14.02.04
  type: activity
  abbrev: APO14.02-4
  heading: Activity 4
  text: Establish, document and follow a process to define, manage, use and maintain the business glossary. For example, new
    initiatives should apply standard business terms as part of the data requirements definition process to ensure consistency
    of language. This will help achieve comparability of the content and facilitate data sharing across the organization.
  notes: ''
  parent_id: cobit-2019.apo14.02
- id: cobit-2019.apo14.02.05
  type: activity
  abbrev: APO14.02-5
  heading: Activity 5
  text: Ensure that new development, data integration and data consolidation efforts apply standard business terms as part
    of the data requirements definition process.
  notes: ''
  parent_id: cobit-2019.apo14.02
- id: cobit-2019.apo14.02.06
  type: activity
  abbrev: APO14.02-6
  heading: Activity 6
  text: Integrate the business glossary into the organization’s metadata repository, with appropriate access permissions.
  notes: ''
  parent_id: cobit-2019.apo14.02
- id: cobit-2019.apo14.03.01
  type: activity
  abbrev: APO14.03-1
  heading: Activity 1
  text: Establish and follow a metadata management process.
  notes: ''
  parent_id: cobit-2019.apo14.03
- id: cobit-2019.apo14.03.02
  type: activity
  abbrev: APO14.03-2
  heading: Activity 2
  text: Ensure that metadata documentation captures data interdependencies.
  notes: ''
  parent_id: cobit-2019.apo14.03
- id: cobit-2019.apo14.03.03
  type: activity
  abbrev: APO14.03-3
  heading: Activity 3
  text: Establish and follow metadata categories, properties and standards.
  notes: ''
  parent_id: cobit-2019.apo14.03
- id: cobit-2019.apo14.03.04
  type: activity
  abbrev: APO14.03-4
  heading: Activity 4
  text: Develop and use metadata to perform impact analysis on potential data changes.
  notes: ''
  parent_id: cobit-2019.apo14.03
- id: cobit-2019.apo14.03.05
  type: activity
  abbrev: APO14.03-5
  heading: Activity 5
  text: Populate the organization’s metadata repository with additional categories and classifications of metadata according
    to a phased implementation plan. Link it to architecture layers.
  notes: ''
  parent_id: cobit-2019.apo14.03
- id: cobit-2019.apo14.03.06
  type: activity
  abbrev: APO14.03-6
  heading: Activity 6
  text: Validate metadata and any changes to metadata against the existing architecture.
  notes: ''
  parent_id: cobit-2019.apo14.03
- id: cobit-2019.apo14.03.07
  type: activity
  abbrev: APO14.03-7
  heading: Activity 7
  text: Ensure that the organization has developed an integrated metamodel deployed across all platforms.
  notes: ''
  parent_id: cobit-2019.apo14.03
- id: cobit-2019.apo14.03.08
  type: activity
  abbrev: APO14.03-8
  heading: Activity 8
  text: Ensure that metadata types and data definitions support consistent import, subscription and consumption practices.
  notes: ''
  parent_id: cobit-2019.apo14.03
- id: cobit-2019.apo14.03.09
  type: activity
  abbrev: APO14.03-9
  heading: Activity 9
  text: Use measures and metrics to evaluate the accuracy and adoption of metadata.
  notes: ''
  parent_id: cobit-2019.apo14.03
- id: cobit-2019.apo14.03.10
  type: activity
  abbrev: APO14.03-10
  heading: Activity 10
  text: Evaluate planned data changes for impact on the metadata repository. Continuously improve metadata capture, change
    and refinement processes.
  notes: ''
  parent_id: cobit-2019.apo14.03
- id: cobit-2019.apo14.04.01
  type: activity
  abbrev: APO14.04-1
  heading: Activity 1
  text: Define a data quality strategy in collaboration with business and technology stakeholders, approved by executive management,
    and managed. The strategy should facilitate moving from the current to the target state. It should also explicitly align
    with business objectives and the organization’s data management strategy.
  notes: ''
  parent_id: cobit-2019.apo14.04
- id: cobit-2019.apo14.04.02
  type: activity
  abbrev: APO14.04-2
  heading: Activity 2
  text: Ensure that the data quality strategy is followed across the organization and is accompanied by corresponding policies,
    processes and guidelines.
  notes: ''
  parent_id: cobit-2019.apo14.04
- id: cobit-2019.apo14.04.03
  type: activity
  abbrev: APO14.04-3
  heading: Activity 3
  text: Anchor the policies, processes and governance contained in the data quality strategy across the data life cycle. Mandate
    corresponding processes in the system development life cycle methodology.
  notes: ''
  parent_id: cobit-2019.apo14.04
- id: cobit-2019.apo14.04.04
  type: activity
  abbrev: APO14.04-4
  heading: Activity 4
  text: Develop, monitor and maintain a sequence plan for data quality improvement efforts across the organization.
  notes: ''
  parent_id: cobit-2019.apo14.04
- id: cobit-2019.apo14.04.05
  type: activity
  abbrev: APO14.04-5
  heading: Activity 5
  text: To evaluate progress, monitor plans to meet the goals and objectives of the data quality strategy.
  notes: ''
  parent_id: cobit-2019.apo14.04
- id: cobit-2019.apo14.04.06
  type: activity
  abbrev: APO14.04-6
  heading: Activity 6
  text: Systematically collect stakeholder reports of data quality issues. Include their expectations for improving data quality
    in the data quality strategy. Measure and monitor them.
  notes: ''
  parent_id: cobit-2019.apo14.04
- id: cobit-2019.apo14.05.01
  type: activity
  abbrev: APO14.05-1
  heading: Activity 1
  text: Define and standardize data profiling methodologies, processes, practices, tools and results templates. Ensure that
    profiling processes are reusable and leveraged across multiple data stores and shared data repositories.
  notes: ''
  parent_id: cobit-2019.apo14.05
- id: cobit-2019.apo14.05.02
  type: activity
  abbrev: APO14.05-2
  heading: Activity 2
  text: Engage data management to identify core shared data sets that are regularly profiled and monitored.
  notes: ''
  parent_id: cobit-2019.apo14.05
- id: cobit-2019.apo14.05.03
  type: activity
  abbrev: APO14.05-3
  heading: Activity 3
  text: In data profiling efforts, include evaluation of the conformity of data content with its approved metadata and standards.
  notes: ''
  parent_id: cobit-2019.apo14.05
- id: cobit-2019.apo14.05.04
  type: activity
  abbrev: APO14.05-4
  heading: Activity 4
  text: During a data profiling activity, compare actual issues to the statistically predicted issues, based on historical
    profiling results.
  notes: ''
  parent_id: cobit-2019.apo14.05
- id: cobit-2019.apo14.05.05
  type: activity
  abbrev: APO14.05-5
  heading: Activity 5
  text: Ensure that results are centrally stored, systematically monitored and analyzed with respect to statistics and metrics.
    Provide the resulting insight to data quality improvements over time.
  notes: ''
  parent_id: cobit-2019.apo14.05
- id: cobit-2019.apo14.05.06
  type: activity
  abbrev: APO14.05-6
  heading: Activity 6
  text: Create real-time or near real-time automated profiling reports for all critical data feeds and repositories.
  notes: ''
  parent_id: cobit-2019.apo14.05
- id: cobit-2019.apo14.06.01
  type: activity
  abbrev: APO14.06-1
  heading: Activity 1
  text: Periodically conduct data quality assessments, according to an approved frequency per the data quality assessment
    policy. Ensure that data governance determines the key set of attributes by subject area for data quality assessments.
  notes: ''
  parent_id: cobit-2019.apo14.06
- id: cobit-2019.apo14.06.02
  type: activity
  abbrev: APO14.06-2
  heading: Activity 2
  text: Include recommendations for remediation, with supporting rationale, in data quality assessment results.
  notes: ''
  parent_id: cobit-2019.apo14.06
- id: cobit-2019.apo14.06.03
  type: activity
  abbrev: APO14.06-3
  heading: Activity 3
  text: Assess data quality, using established thresholds and targets for each selected quality dimension.
  notes: ''
  parent_id: cobit-2019.apo14.06
- id: cobit-2019.apo14.06.04
  type: activity
  abbrev: APO14.06-4
  heading: Activity 4
  text: Systematically generate data quality measurement reports, based on criticality of attributes and data volatility.
  notes: ''
  parent_id: cobit-2019.apo14.06
- id: cobit-2019.apo14.06.05
  type: activity
  abbrev: APO14.06-5
  heading: Activity 5
  text: Continuously review and improve data quality assessment and reporting processes.
  notes: ''
  parent_id: cobit-2019.apo14.06
- id: cobit-2019.apo14.07.01
  type: activity
  abbrev: APO14.07-1
  heading: Activity 1
  text: Establish and maintain a data cleansing policy.
  notes: ''
  parent_id: cobit-2019.apo14.07
- id: cobit-2019.apo14.07.02
  type: activity
  abbrev: APO14.07-2
  heading: Activity 2
  text: Maintain data change history through cleansing activities.
  notes: ''
  parent_id: cobit-2019.apo14.07
- id: cobit-2019.apo14.07.03
  type: activity
  abbrev: APO14.07-3
  heading: Activity 3
  text: Establish methods for correcting the data and define those methods within a plan. Methods may include multiple repository
    comparison, verification against a valid source, logic checks, referential integrity or range tolerance.
  notes: ''
  parent_id: cobit-2019.apo14.07
- id: cobit-2019.apo14.07.04
  type: activity
  abbrev: APO14.07-4
  heading: Activity 4
  text: In service level agreements, include data quality criteria to hold data providers accountable for cleansed data.
  notes: ''
  parent_id: cobit-2019.apo14.07
- id: cobit-2019.apo14.08.01
  type: activity
  abbrev: APO14.08-1
  heading: Activity 1
  text: Map and align the requirements of data consumers and producers.
  notes: ''
  parent_id: cobit-2019.apo14.08
- id: cobit-2019.apo14.08.02
  type: activity
  abbrev: APO14.08-2
  heading: Activity 2
  text: Define business process-to-data mappings. Maintain them and periodically review them for compliance.
  notes: ''
  parent_id: cobit-2019.apo14.08
- id: cobit-2019.apo14.08.03
  type: activity
  abbrev: APO14.08-3
  heading: Activity 3
  text: Follow a defined process for collaborative agreements with respect to shared data and data usage within business processes.
  notes: ''
  parent_id: cobit-2019.apo14.08
- id: cobit-2019.apo14.08.04
  type: activity
  abbrev: APO14.08-4
  heading: Activity 4
  text: Implement data flows and full data-to-process life cycle maps for shared data for each major business process at the
    organizational level.
  notes: ''
  parent_id: cobit-2019.apo14.08
- id: cobit-2019.apo14.08.05
  type: activity
  abbrev: APO14.08-5
  heading: Activity 5
  text: Ensure that changes to shared data sets or target data sets for a specific business purpose are managed by data governance
    structures, with relevant stakeholder engagement.
  notes: ''
  parent_id: cobit-2019.apo14.08
- id: cobit-2019.apo14.08.06
  type: activity
  abbrev: APO14.08-6
  heading: Activity 6
  text: Use metrics to expand approved shared data reuse and eliminate process redundancy.
  notes: ''
  parent_id: cobit-2019.apo14.08
- id: cobit-2019.apo14.09.01
  type: activity
  abbrev: APO14.09-1
  heading: Activity 1
  text: Ensure that policies mandate management of data history, including retention, destruction and audit trail requirements.
  notes: ''
  parent_id: cobit-2019.apo14.09
- id: cobit-2019.apo14.09.02
  type: activity
  abbrev: APO14.09-2
  heading: Activity 2
  text: Ensure the existence of a defined method that guarantees accessibility to the historical data necessary to support
    business needs.
  notes: ''
  parent_id: cobit-2019.apo14.09
- id: cobit-2019.apo14.09.03
  type: activity
  abbrev: APO14.09-3
  heading: Activity 3
  text: Use policy and processes to control access, transmittal and modifications to historical and archived data.
  notes: ''
  parent_id: cobit-2019.apo14.09
- id: cobit-2019.apo14.09.04
  type: activity
  abbrev: APO14.09-4
  heading: Activity 4
  text: Ensure that the organization has a prescribed data warehouse repository that provides access to historical data for
    meeting analytics needs supporting business processes.
  notes: ''
  parent_id: cobit-2019.apo14.09
- id: cobit-2019.apo14.10.01
  type: activity
  abbrev: APO14.10-1
  heading: Activity 1
  text: Define a schedule to ensure correct backup of all critical data, taking into account frequency, type of backup, security,
    privacy and other criteria.
  notes: ''
  parent_id: cobit-2019.apo14.10
- id: cobit-2019.apo14.10.02
  type: activity
  abbrev: APO14.10-2
  heading: Activity 2
  text: Define requirements for on-site and off-site storage of backup data, taking into account volume, capacity and retention
    period, in alignment with the business requirements.
  notes: ''
  parent_id: cobit-2019.apo14.10
- id: cobit-2019.apo14.10.03
  type: activity
  abbrev: APO14.10-3
  heading: Activity 3
  text: Establish a testing schedule for backup data. Ensure that the data can be restored correctly without drastically impacting
    business.
  notes: ''
  parent_id: cobit-2019.apo14.10
- id: cobit-2019.bai01.01.01
  type: activity
  abbrev: BAI01.01-1
  heading: Activity 1
  text: Maintain and enforce a standard approach to program management, aligned to the enterprise’s specific environment and
    with good practice based on defined process and use of appropriate technology. Ensure that the approach covers the full
    life cycle and disciplines to be followed, including the management of scope, resources, risk, cost, quality, time, communication,
    stakeholder involvement, procurement, change control, integration and benefit realization.
  notes: ''
  parent_id: cobit-2019.bai01.01
- id: cobit-2019.bai01.01.02
  type: activity
  abbrev: BAI01.01-2
  heading: Activity 2
  text: Put in place a program office or project management office (PMO) that maintains the standard approach for program
    and project management across the organization. The PMO supports all programs and projects by creating and maintaining
    required project documentation templates, providing training and best practices for program/project managers, tracking
    metrics on the use of best practices for project management, etc. In some cases the PMO may also report on program/project
    progress to senior management and/or stakeholders, help prioritize projects, and ensure all projects support the overall
    business objectives of the enterprise.
  notes: ''
  parent_id: cobit-2019.bai01.01
- id: cobit-2019.bai01.01.03
  type: activity
  abbrev: BAI01.01-3
  heading: Activity 3
  text: Evaluate lessons learned based on the use of the program management approach and update the approach accordingly.
  notes: ''
  parent_id: cobit-2019.bai01.01
- id: cobit-2019.bai01.02.01
  type: activity
  abbrev: BAI01.02-1
  heading: Activity 1
  text: Agree on program sponsorship. Appoint a program board/committee with members who have strategic interest in the program,
    responsibility for investment decision making, will be significantly impacted by the program and will be required to enable
    delivery of the change.
  notes: ''
  parent_id: cobit-2019.bai01.02
- id: cobit-2019.bai01.02.02
  type: activity
  abbrev: BAI01.02-2
  heading: Activity 2
  text: Appoint a dedicated manager for the program, with the commensurate competencies and skills to manage the program effectively
    and efficiently.
  notes: ''
  parent_id: cobit-2019.bai01.02
- id: cobit-2019.bai01.02.03
  type: activity
  abbrev: BAI01.02-3
  heading: Activity 3
  text: Confirm the program mandate with sponsors and stakeholders. Articulate the strategic objectives for the program, potential
    strategies for delivery, improvement and benefits that are expected, and how the program fits with other initiatives.
  notes: ''
  parent_id: cobit-2019.bai01.02
- id: cobit-2019.bai01.02.04
  type: activity
  abbrev: BAI01.02-4
  heading: Activity 4
  text: Develop a detailed business case for a program. Involve all key stakeholders to develop and document a complete understanding
    of the expected enterprise outcomes, how they will be measured, the full scope of initiatives required, the risk involved
    and the impact on all aspects of the enterprise. Identify and assess alternative courses of action to achieve the desired
    enterprise outcomes.
  notes: ''
  parent_id: cobit-2019.bai01.02
- id: cobit-2019.bai01.02.05
  type: activity
  abbrev: BAI01.02-5
  heading: Activity 5
  text: Develop a benefits realization plan that will be managed throughout the program to ensure that planned benefits always
    have owners and are achieved, sustained and optimized.
  notes: ''
  parent_id: cobit-2019.bai01.02
- id: cobit-2019.bai01.02.06
  type: activity
  abbrev: BAI01.02-6
  heading: Activity 6
  text: Prepare the initial (conceptual) program business case, providing essential decision-making information regarding
    purpose, contribution to business objectives, expected value created, time frames, etc. Submit it for approval.
  notes: ''
  parent_id: cobit-2019.bai01.02
- id: cobit-2019.bai01.03.01
  type: activity
  abbrev: BAI01.03-1
  heading: Activity 1
  text: Plan how stakeholders inside and outside the enterprise will be identified, analyzed, engaged and managed through
    the life cycle of the projects.
  notes: ''
  parent_id: cobit-2019.bai01.03
- id: cobit-2019.bai01.03.02
  type: activity
  abbrev: BAI01.03-2
  heading: Activity 2
  text: Identify, engage and manage stakeholders by establishing and maintaining appropriate levels of coordination, communication
    and liaison to ensure that they are involved in the program.
  notes: ''
  parent_id: cobit-2019.bai01.03
- id: cobit-2019.bai01.03.03
  type: activity
  abbrev: BAI01.03-3
  heading: Activity 3
  text: Analyze stakeholder interests and requirements.
  notes: ''
  parent_id: cobit-2019.bai01.03
- id: cobit-2019.bai01.03.04
  type: activity
  abbrev: BAI01.03-4
  heading: Activity 4
  text: Follow a defined process for collaborative agreements with respect to shared data and data usage within business processes.
  notes: ''
  parent_id: cobit-2019.bai01.03
- id: cobit-2019.bai01.04.01
  type: activity
  abbrev: BAI01.04-1
  heading: Activity 1
  text: Specify funding, cost, schedule and interdependencies of multiple projects.
  notes: ''
  parent_id: cobit-2019.bai01.04
- id: cobit-2019.bai01.04.02
  type: activity
  abbrev: BAI01.04-2
  heading: Activity 2
  text: Define and document the program plan covering all projects. Include what is needed to bring about changes to the enterprise;
    its purpose, mission, vision, values, culture, products and services; business processes; people skills and numbers; relationships
    with stakeholders, customers, suppliers and others; technology needs; and organizational restructuring required to achieve
    the program's expected enterprise outcomes.
  notes: ''
  parent_id: cobit-2019.bai01.04
- id: cobit-2019.bai01.04.03
  type: activity
  abbrev: BAI01.04-3
  heading: Activity 3
  text: Ensure that there is effective communication of program plans and progress reports among all projects and with the
    overall program. Ensure that any changes made to individual plans are reflected in the other enterprise program plans.
  notes: ''
  parent_id: cobit-2019.bai01.04
- id: cobit-2019.bai01.04.04
  type: activity
  abbrev: BAI01.04-4
  heading: Activity 4
  text: Maintain the program plan to ensure that it is up to date and reflects alignment with current strategic objectives,
    actual progress and material changes to outcomes, benefits, costs and risk. Have the business drive the objectives and
    prioritize the work throughout to ensure that the program, as designed, will meet enterprise requirements. Review progress
    of individual projects and adjust the projects as necessary to meet scheduled milestones and releases.
  notes: ''
  parent_id: cobit-2019.bai01.04
- id: cobit-2019.bai01.04.05
  type: activity
  abbrev: BAI01.04-5
  heading: Activity 5
  text: Throughout the program's economic life, update and maintain the business case and a benefits register to identify
    and define key benefits arising from undertaking the program.
  notes: ''
  parent_id: cobit-2019.bai01.04
- id: cobit-2019.bai01.04.06
  type: activity
  abbrev: BAI01.04-6
  heading: Activity 6
  text: Prepare a program budget that reflects the full economic life cycle costs and the associated financial and nonfinancial
    benefits.
  notes: ''
  parent_id: cobit-2019.bai01.04
- id: cobit-2019.bai01.05.01
  type: activity
  abbrev: BAI01.05-1
  heading: Activity 1
  text: Plan, resource and commission the necessary projects required to achieve the program results, based on funding review
    and approvals at each stage-gate review.
  notes: ''
  parent_id: cobit-2019.bai01.05
- id: cobit-2019.bai01.05.02
  type: activity
  abbrev: BAI01.05-2
  heading: Activity 2
  text: Manage each program or project to ensure that decision making and delivery activities are focused on value by achieving
    benefits for the business and goals in a consistent manner, addressing risk, and achieving stakeholder requirements.
  notes: ''
  parent_id: cobit-2019.bai01.05
- id: cobit-2019.bai01.05.03
  type: activity
  abbrev: BAI01.05-3
  heading: Activity 3
  text: Establish agreed stages of the development process (development checkpoints). At the end of each stage, facilitate
    formal discussions of approved criteria with the stakeholders. After successful completion of functionality, performance
    and quality reviews, and before finalizing stage activities, obtain formal approval and sign-off from all stakeholders
    and the sponsor/business process owner.
  notes: ''
  parent_id: cobit-2019.bai01.05
- id: cobit-2019.bai01.05.04
  type: activity
  abbrev: BAI01.05-4
  heading: Activity 4
  text: Undertake a benefits realization process throughout the program to ensure that planned benefits always have owners
    and are likely to be achieved, sustained and optimized. Monitor benefits delivery and report against performance targets
    at the stage-gate or iteration and release reviews. Perform root cause analysis for deviations from the plan and identify
    and address any necessary remedial actions.
  notes: ''
  parent_id: cobit-2019.bai01.05
- id: cobit-2019.bai01.05.05
  type: activity
  abbrev: BAI01.05-5
  heading: Activity 5
  text: Plan audits, quality reviews, phase/stage-gate reviews and reviews of realized benefits.
  notes: ''
  parent_id: cobit-2019.bai01.05
- id: cobit-2019.bai01.06.01
  type: activity
  abbrev: BAI01.06-1
  heading: Activity 1
  text: Update operational I&T portfolios to reflect changes that result from the program in the relevant I&T service, asset
    or resource portfolios.
  notes: ''
  parent_id: cobit-2019.bai01.06
- id: cobit-2019.bai01.06.02
  type: activity
  abbrev: BAI01.06-2
  heading: Activity 2
  text: Monitor and control the performance of the overall program and the projects within the program, including contributions
    of the business and IT to the projects. Report in a timely, complete and accurate fashion. Reporting may include schedule,
    funding, functionality, user satisfaction, internal controls and acceptance of accountabilities.
  notes: ''
  parent_id: cobit-2019.bai01.06
- id: cobit-2019.bai01.06.03
  type: activity
  abbrev: BAI01.06-3
  heading: Activity 3
  text: Monitor and control performance against enterprise and I&T strategies and goals. Report to management on enterprise
    changes implemented, benefits realized against the benefits realization plan and the adequacy of the benefits realization
    process.
  notes: ''
  parent_id: cobit-2019.bai01.06
- id: cobit-2019.bai01.06.04
  type: activity
  abbrev: BAI01.06-4
  heading: Activity 4
  text: Monitor and control IT services, assets and resources created or changed as a result of the program. Note implementation
    and in-service dates. Report to management on performance levels, sustained service delivery and contribution to value.
  notes: ''
  parent_id: cobit-2019.bai01.06
- id: cobit-2019.bai01.06.05
  type: activity
  abbrev: BAI01.06-5
  heading: Activity 5
  text: Manage program performance against key criteria (e.g., scope, schedule, quality, benefits realization, costs, risk,
    velocity), identify deviations from the plan and take timely remedial action when required.
  notes: ''
  parent_id: cobit-2019.bai01.06
- id: cobit-2019.bai01.06.06
  type: activity
  abbrev: BAI01.06-6
  heading: Activity 6
  text: Monitor individual project performance related to delivery of the expected capabilities, schedule, benefits realization,
    costs, risk or other metric. Identify potential impacts on program performance and take timely remedial action when required.
  notes: ''
  parent_id: cobit-2019.bai01.06
- id: cobit-2019.bai01.06.07
  type: activity
  abbrev: BAI01.06-7
  heading: Activity 7
  text: In accordance with stage-gate, release or iteration review criteria, undertake reviews to report on the progress of
    the program so that management can make go/no-go or adjustment decisions and approve further funding up to the following
    stage-gate, release or iteration.
  notes: ''
  parent_id: cobit-2019.bai01.06
- id: cobit-2019.bai01.07.01
  type: activity
  abbrev: BAI01.07-1
  heading: Activity 1
  text: Identify assurance tasks and practices required to support the accreditation of new or modified systems during program
    planning, and include them in the integrated plans. Ensure that the tasks provide assurance that internal controls and
    security/privacy solutions meet the defined requirements.
  notes: ''
  parent_id: cobit-2019.bai01.07
- id: cobit-2019.bai01.07.02
  type: activity
  abbrev: BAI01.07-2
  heading: Activity 2
  text: To provide quality assurance for the program deliverables, identify ownership and responsibilities, quality review
    processes, success criteria and performance metrics.
  notes: ''
  parent_id: cobit-2019.bai01.07
- id: cobit-2019.bai01.07.03
  type: activity
  abbrev: BAI01.07-3
  heading: Activity 3
  text: Define any requirements for independent validation and verification of the quality of deliverables in the plan.
  notes: ''
  parent_id: cobit-2019.bai01.07
- id: cobit-2019.bai01.07.04
  type: activity
  abbrev: BAI01.07-4
  heading: Activity 4
  text: Perform quality assurance and control activities in accordance with the quality management plan and QMS.
  notes: ''
  parent_id: cobit-2019.bai01.07
- id: cobit-2019.bai01.08.01
  type: activity
  abbrev: BAI01.08-1
  heading: Activity 1
  text: Establish a formal risk management approach aligned with the enterprise risk management (ERM) framework. Ensure that
    the approach includes identifying, analyzing, responding to, mitigating, monitoring and controlling risk.
  notes: ''
  parent_id: cobit-2019.bai01.08
- id: cobit-2019.bai01.08.02
  type: activity
  abbrev: BAI01.08-2
  heading: Activity 2
  text: Assign to appropriately skilled personnel the responsibility for executing the enterprise’s risk management process
    within a program and ensuring that this is incorporated into the solution development practices. Consider allocating this
    role to an independent team, especially if an objective viewpoint is required or a program is considered critical.
  notes: ''
  parent_id: cobit-2019.bai01.08
- id: cobit-2019.bai01.08.03
  type: activity
  abbrev: BAI01.08-3
  heading: Activity 3
  text: Perform the risk assessment of identifying and quantifying risk continuously throughout the program. Manage and communicate
    risk appropriately within the program governance structure.
  notes: ''
  parent_id: cobit-2019.bai01.08
- id: cobit-2019.bai01.08.04
  type: activity
  abbrev: BAI01.08-4
  heading: Activity 4
  text: Identify owners for actions to avoid, accept or mitigate risk.
  notes: ''
  parent_id: cobit-2019.bai01.08
- id: cobit-2019.bai01.09.01
  type: activity
  abbrev: BAI01.09-1
  heading: Activity 1
  text: Bring the program to an orderly closure, including formal approval, disbanding of the program organization and supporting
    function, validation of deliverables, and communication of retirement.
  notes: ''
  parent_id: cobit-2019.bai01.09
- id: cobit-2019.bai01.09.02
  type: activity
  abbrev: BAI01.09-2
  heading: Activity 2
  text: Review and document lessons learned. Once the program is retired, remove it from the active investment portfolio.
    Move any resulting capabilities to an operational asset portfolio to ensure that value continues to be created and sustained.
  notes: ''
  parent_id: cobit-2019.bai01.09
- id: cobit-2019.bai01.09.03
  type: activity
  abbrev: BAI01.09-3
  heading: Activity 3
  text: Put accountability and processes in place to ensure that the enterprise continues to optimize value from the service,
    asset or resources. Additional investments may be required at some future time to ensure that this occurs.
  notes: ''
  parent_id: cobit-2019.bai01.09
- id: cobit-2019.bai02.01.01
  type: activity
  abbrev: BAI02.01-1
  heading: Activity 1
  text: Ensure that all stakeholder requirements, including relevant acceptance criteria, are considered, captured, prioritized
    and recorded in a way that is understandable to all stakeholders, recognizing that the requirements may change and will
    become more detailed as they are implemented.
  notes: ''
  parent_id: cobit-2019.bai02.01
- id: cobit-2019.bai02.01.02
  type: activity
  abbrev: BAI02.01-2
  heading: Activity 2
  text: Express business requirements in terms of how the gap between current and desired business capabilities need to be
    addressed and how the user (employee, client, etc.) will interact with and use the solution.
  notes: ''
  parent_id: cobit-2019.bai02.01
- id: cobit-2019.bai02.01.03
  type: activity
  abbrev: BAI02.01-3
  heading: Activity 3
  text: Specify and prioritize information, functional and technical requirements, based on the user experience design and
    confirmed stakeholder requirements.
  notes: ''
  parent_id: cobit-2019.bai02.01
- id: cobit-2019.bai02.01.04
  type: activity
  abbrev: BAI02.01-4
  heading: Activity 4
  text: Ensure requirements meet enterprise policies and standards, enterprise architecture, strategic and tactical I&T plans,
    in-house and outsourced business and IT processes, security requirements, regulatory requirements, people competencies,
    organizational structure, business case, and enabling technology.
  notes: ''
  parent_id: cobit-2019.bai02.01
- id: cobit-2019.bai02.01.05
  type: activity
  abbrev: BAI02.01-5
  heading: Activity 5
  text: Include information control requirements in the business processes, automated processes and I&T environments to address
    information risk and to comply with laws, regulations and commercial contracts.
  notes: ''
  parent_id: cobit-2019.bai02.01
- id: cobit-2019.bai02.01.06
  type: activity
  abbrev: BAI02.01-6
  heading: Activity 6
  text: Confirm acceptance of key aspects of the requirements, including enterprise rules, user experience, information controls,
    business continuity, legal and regulatory compliance, auditability, ergonomics, operability and usability, safety, confidentiality,
    and supporting documentation.
  notes: ''
  parent_id: cobit-2019.bai02.01
- id: cobit-2019.bai02.01.07
  type: activity
  abbrev: BAI02.01-7
  heading: Activity 7
  text: Track and control scope, requirements and changes through the life cycle of the solution as understanding of the solution
    evolves.
  notes: ''
  parent_id: cobit-2019.bai02.01
- id: cobit-2019.bai02.01.08
  type: activity
  abbrev: BAI02.01-8
  heading: Activity 8
  text: Define and implement a requirements definition and maintenance procedure and a requirements repository that are appropriate
    for the size, complexity, objectives and risk of the initiative that the enterprise is considering undertaking.
  notes: ''
  parent_id: cobit-2019.bai02.01
- id: cobit-2019.bai02.01.09
  type: activity
  abbrev: BAI02.01-9
  heading: Activity 9
  text: Validate all requirements through approaches such as peer review, model validation or operational prototyping.
  notes: ''
  parent_id: cobit-2019.bai02.01
- id: cobit-2019.bai02.02.01
  type: activity
  abbrev: BAI02.02-1
  heading: Activity 1
  text: Identify required actions for solution acquisition or development based on the enterprise architecture. Take into
    account scope and/or time and/or budget limitations.
  notes: ''
  parent_id: cobit-2019.bai02.02
- id: cobit-2019.bai02.02.02
  type: activity
  abbrev: BAI02.02-2
  heading: Activity 2
  text: Review the alternative solutions with all stakeholders. Select the most appropriate one based on feasibility criteria,
    including risk and cost.
  notes: ''
  parent_id: cobit-2019.bai02.02
- id: cobit-2019.bai02.02.03
  type: activity
  abbrev: BAI02.02-3
  heading: Activity 3
  text: Translate the preferred course of action into a high-level acquisition/development plan that identifies resources
    to be used and stages requiring a go/no-go decision.
  notes: ''
  parent_id: cobit-2019.bai02.02
- id: cobit-2019.bai02.02.04
  type: activity
  abbrev: BAI02.02-4
  heading: Activity 4
  text: Define and execute a feasibility study, pilot or basic working solution that clearly and concisely describes the alternative
    solutions and measures how these would satisfy the business and functional requirements. Include an evaluation of their
    technological and economic feasibility.
  notes: ''
  parent_id: cobit-2019.bai02.02
- id: cobit-2019.bai02.03.01
  type: activity
  abbrev: BAI02.03-1
  heading: Activity 1
  text: Identify quality, functional and technical requirements risk (due to, for example, lack of user involvement, unrealistic
    expectations, developers adding unnecessary functionality, unrealistic assumptions, etc.).
  notes: ''
  parent_id: cobit-2019.bai02.03
- id: cobit-2019.bai02.03.02
  type: activity
  abbrev: BAI02.03-2
  heading: Activity 2
  text: Determine appropriate risk response to requirements risk.
  notes: ''
  parent_id: cobit-2019.bai02.03
- id: cobit-2019.bai02.03.03
  type: activity
  abbrev: BAI02.03-3
  heading: Activity 3
  text: Analyze the identified risk by estimating probability and impact on budget and schedule. Evaluate budgetary impact
    of appropriate risk response actions.
  notes: ''
  parent_id: cobit-2019.bai02.03
- id: cobit-2019.bai02.04.01
  type: activity
  abbrev: BAI02.04-1
  heading: Activity 1
  text: Ensure that the business sponsor or product owner makes the final choice of solution, acquisition approach and high-level
    design, according to the business case. Obtain necessary approvals from affected stakeholders (e.g., business process
    owner, enterprise architect, operations manager, security, privacy officer).
  notes: ''
  parent_id: cobit-2019.bai02.04
- id: cobit-2019.bai02.04.02
  type: activity
  abbrev: BAI02.04-2
  heading: Activity 2
  text: Obtain quality reviews throughout, and at the end of, each key project stage, iteration or release. Assess the results
    against the original acceptance criteria. Have business sponsors and other stakeholders sign off on each successful quality
    review.
  notes: ''
  parent_id: cobit-2019.bai02.04
- id: cobit-2019.bai03.01.01
  type: activity
  abbrev: BAI03.01-1
  heading: Activity 1
  text: Establish a high-level design specification that translates the proposed solution into a high-level design for business
    processes, supporting services, workflows, applications, infrastructure, and information repositories capable of meeting
    business and enterprise architecture requirements.
  notes: ''
  parent_id: cobit-2019.bai03.01
- id: cobit-2019.bai03.01.02
  type: activity
  abbrev: BAI03.01-2
  heading: Activity 2
  text: Involve appropriately qualified and experienced user experience designers and IT specialists in the design process
    to make sure that the design provides a solution that optimally uses the proposed I&T capabilities to enhance the business
    process.
  notes: ''
  parent_id: cobit-2019.bai03.01
- id: cobit-2019.bai03.01.03
  type: activity
  abbrev: BAI03.01-3
  heading: Activity 3
  text: Create a design that complies with the organization's design standards. Ensure that it maintains a level of detail
    that is appropriate for the solution and development method and consistent with business, enterprise and I&T strategies,
    the enterprise architecture, security/privacy plan and applicable laws, regulations and contracts.
  notes: ''
  parent_id: cobit-2019.bai03.01
- id: cobit-2019.bai03.01.04
  type: activity
  abbrev: BAI03.01-4
  heading: Activity 4
  text: After quality assurance approval, submit the final high-level design to the project stakeholders and the sponsor/business
    process owner for approval based on agreed criteria. This design will evolve throughout the project as understanding grows.
  notes: ''
  parent_id: cobit-2019.bai03.01
- id: cobit-2019.bai03.02.01
  type: activity
  abbrev: BAI03.02-1
  heading: Activity 1
  text: Design progressively the business process activities and work flows that need to be performed in conjunction with
    the new application system to meet the enterprise objectives, including the design of the manual control activities.
  notes: ''
  parent_id: cobit-2019.bai03.02
- id: cobit-2019.bai03.02.02
  type: activity
  abbrev: BAI03.02-2
  heading: Activity 2
  text: Design the application processing steps. These steps include specification of transaction types and business processing
    rules, automated controls, data definitions/business objects, use cases, external interfaces, design constraints, and
    other requirements (e.g., licensing, legal, standards and internationalization/localization).
  notes: ''
  parent_id: cobit-2019.bai03.02
- id: cobit-2019.bai03.02.03
  type: activity
  abbrev: BAI03.02-3
  heading: Activity 3
  text: Classify data inputs and outputs according to enterprise architecture standards. Specify the source data collection
    design. Document the data inputs (regardless of source) and validation for processing transactions as well as the methods
    for validation. Design the identified outputs, including data sources.
  notes: ''
  parent_id: cobit-2019.bai03.02
- id: cobit-2019.bai03.02.04
  type: activity
  abbrev: BAI03.02-4
  heading: Activity 4
  text: Design the system/solution interface, including any automated data exchange.
  notes: ''
  parent_id: cobit-2019.bai03.02
- id: cobit-2019.bai03.02.05
  type: activity
  abbrev: BAI03.02-5
  heading: Activity 5
  text: Design data storage, location, retrieval and recoverability.
  notes: ''
  parent_id: cobit-2019.bai03.02
- id: cobit-2019.bai03.02.06
  type: activity
  abbrev: BAI03.02-6
  heading: Activity 6
  text: Design appropriate redundancy, recovery and backup.
  notes: ''
  parent_id: cobit-2019.bai03.02
- id: cobit-2019.bai03.02.07
  type: activity
  abbrev: BAI03.02-7
  heading: Activity 7
  text: Design the interface between the user and the system application so that it is easy to use and self-documenting.
  notes: ''
  parent_id: cobit-2019.bai03.02
- id: cobit-2019.bai03.02.08
  type: activity
  abbrev: BAI03.02-8
  heading: Activity 8
  text: Consider the impact of the solution’s need for infrastructure performance, being sensitive to the number of computing
    assets, bandwidth intensity and time sensitivity of the information.
  notes: ''
  parent_id: cobit-2019.bai03.02
- id: cobit-2019.bai03.02.09
  type: activity
  abbrev: BAI03.02-9
  heading: Activity 9
  text: Proactively evaluate for design weaknesses (e.g., inconsistencies, lack of clarity, potential flaws) throughout the
    life cycle. Identify improvements when required.
  notes: ''
  parent_id: cobit-2019.bai03.02
- id: cobit-2019.bai03.02.10
  type: activity
  abbrev: BAI03.02-10
  heading: Activity 10
  text: Provide an ability to audit transactions and identify root causes of processing errors.
  notes: ''
  parent_id: cobit-2019.bai03.02
- id: cobit-2019.bai03.03.01
  type: activity
  abbrev: BAI03.03-1
  heading: Activity 1
  text: Within a separate environment, develop the proposed detailed design for business processes, supporting services, applications,
    infrastructure and information repositories.
  notes: ''
  parent_id: cobit-2019.bai03.03
- id: cobit-2019.bai03.03.02
  type: activity
  abbrev: BAI03.03-2
  heading: Activity 2
  text: When third-party providers are involved with the solution development, ensure that maintenance, support, development
    standards and licensing are addressed and adhered to in contractual obligations.
  notes: ''
  parent_id: cobit-2019.bai03.03
- id: cobit-2019.bai03.03.03
  type: activity
  abbrev: BAI03.03-3
  heading: Activity 3
  text: Track change requests and design, performance and quality reviews. Ensure active participation of all impacted stakeholders.
  notes: ''
  parent_id: cobit-2019.bai03.03
- id: cobit-2019.bai03.03.04
  type: activity
  abbrev: BAI03.03-4
  heading: Activity 4
  text: Document all solution components according to defined standards. Maintain version control over all developed components
    and associated documentation.
  notes: ''
  parent_id: cobit-2019.bai03.03
- id: cobit-2019.bai03.03.05
  type: activity
  abbrev: BAI03.03-5
  heading: Activity 5
  text: Assess the impact of solution customization and configuration on the performance and efficiency of acquired solutions
    and on interoperability with existing applications, operating systems and other infrastructure. Adapt business processes
    as required to leverage the application capability.
  notes: ''
  parent_id: cobit-2019.bai03.03
- id: cobit-2019.bai03.03.06
  type: activity
  abbrev: BAI03.03-6
  heading: Activity 6
  text: Ensure that responsibilities for using high-security or restricted-access infrastructure components are clearly defined
    and understood by those who develop and integrate infrastructure components. Their use should be monitored and evaluated.
  notes: ''
  parent_id: cobit-2019.bai03.03
- id: cobit-2019.bai03.04.01
  type: activity
  abbrev: BAI03.04-1
  heading: Activity 1
  text: Create and maintain a plan for the acquisition of solution components. Consider future flexibility for capacity additions,
    transition costs, risk and upgrades over the lifetime of the project.
  notes: ''
  parent_id: cobit-2019.bai03.04
- id: cobit-2019.bai03.04.02
  type: activity
  abbrev: BAI03.04-2
  heading: Activity 2
  text: Review and approve all acquisition plans. Consider risk, costs, benefits and technical conformance with enterprise
    architecture standards.
  notes: ''
  parent_id: cobit-2019.bai03.04
- id: cobit-2019.bai03.04.03
  type: activity
  abbrev: BAI03.04-3
  heading: Activity 3
  text: Assess and document the degree to which acquired solutions require adaptation of business process to leverage the
    benefits of the acquired solution.
  notes: ''
  parent_id: cobit-2019.bai03.04
- id: cobit-2019.bai03.04.04
  type: activity
  abbrev: BAI03.04-4
  heading: Activity 4
  text: Follow required approvals at key decision points during the procurement processes.
  notes: ''
  parent_id: cobit-2019.bai03.04
- id: cobit-2019.bai03.04.05
  type: activity
  abbrev: BAI03.04-5
  heading: Activity 5
  text: Record receipt of all infrastructure and software acquisitions in an asset inventory.
  notes: ''
  parent_id: cobit-2019.bai03.04
- id: cobit-2019.bai03.05.01
  type: activity
  abbrev: BAI03.05-1
  heading: Activity 1
  text: Integrate and configure business and IT solution components and information repositories in line with detailed specifications
    and quality requirements. Consider the role of users, business stakeholders and the process owner in the configuration
    of business processes.
  notes: ''
  parent_id: cobit-2019.bai03.05
- id: cobit-2019.bai03.05.02
  type: activity
  abbrev: BAI03.05-2
  heading: Activity 2
  text: Complete and update business process and operational manuals, where necessary, to account for any customization or
    special conditions unique to the implementation.
  notes: ''
  parent_id: cobit-2019.bai03.05
- id: cobit-2019.bai03.05.03
  type: activity
  abbrev: BAI03.05-3
  heading: Activity 3
  text: Consider all relevant information control requirements in solution component integration and configuration. Include
    implementation of business controls, where appropriate, into automated application controls such that processing is accurate,
    complete, timely, authorized and auditable.
  notes: ''
  parent_id: cobit-2019.bai03.05
- id: cobit-2019.bai03.05.04
  type: activity
  abbrev: BAI03.05-4
  heading: Activity 4
  text: Implement audit trails during configuration and integration of hardware and infrastructural software to protect resources
    and ensure availability and integrity.
  notes: ''
  parent_id: cobit-2019.bai03.05
- id: cobit-2019.bai03.05.05
  type: activity
  abbrev: BAI03.05-5
  heading: Activity 5
  text: Consider when the effect of cumulative customizations and configurations (including minor changes that were not subjected
    to formal design specifications) requires a high-level reassessment of the solution and associated functionality.
  notes: ''
  parent_id: cobit-2019.bai03.05
- id: cobit-2019.bai03.05.06
  type: activity
  abbrev: BAI03.05-6
  heading: Activity 6
  text: Configure acquired application software to meet business processing requirements.
  notes: ''
  parent_id: cobit-2019.bai03.05
- id: cobit-2019.bai03.05.07
  type: activity
  abbrev: BAI03.05-7
  heading: Activity 7
  text: Define product and service catalogues for relevant internal and external target groups, based on business requirements.
  notes: ''
  parent_id: cobit-2019.bai03.05
- id: cobit-2019.bai03.05.08
  type: activity
  abbrev: BAI03.05-8
  heading: Activity 8
  text: Ensure the interoperability of solution components with supporting tests, preferably automated.
  notes: ''
  parent_id: cobit-2019.bai03.05
- id: cobit-2019.bai03.06.01
  type: activity
  abbrev: BAI03.06-1
  heading: Activity 1
  text: Define a QA plan and practices include, for example, specification of quality criteria, validation and verification
    processes, definition of how quality will be reviewed, necessary qualifications of quality reviewers, and roles and responsibilities
    for the achievement of quality.
  notes: ''
  parent_id: cobit-2019.bai03.06
- id: cobit-2019.bai03.06.02
  type: activity
  abbrev: BAI03.06-2
  heading: Activity 2
  text: Frequently monitor the solution quality based on project requirements, enterprise policies, adherence to development
    methodologies, quality management procedures and acceptance criteria.
  notes: ''
  parent_id: cobit-2019.bai03.06
- id: cobit-2019.bai03.06.03
  type: activity
  abbrev: BAI03.06-3
  heading: Activity 3
  text: Employ, as appropriate, code inspection, test-driven development practices, automated testing, continuous integration,
    walk-throughs and testing of applications. Report on outcomes of the monitoring process and testing to the application
    software development team and IT management.
  notes: ''
  parent_id: cobit-2019.bai03.06
- id: cobit-2019.bai03.06.04
  type: activity
  abbrev: BAI03.06-4
  heading: Activity 4
  text: Monitor all quality exceptions and address all corrective actions. Maintain a record of all reviews, results, exceptions
    and corrections. Repeat quality reviews, where appropriate, based on the amount of rework and corrective action.
  notes: ''
  parent_id: cobit-2019.bai03.06
- id: cobit-2019.bai03.07.01
  type: activity
  abbrev: BAI03.07-1
  heading: Activity 1
  text: Create an integrated test plan and practices commensurate with the enterprise environment and strategic technology
    plans. Ensure that the integrated test plan and practices will enable the creation of suitable testing and simulation
    environments to help verify that the solution will operate successfully in the live environment and deliver the intended
    results and that controls are adequate.
  notes: ''
  parent_id: cobit-2019.bai03.07
- id: cobit-2019.bai03.07.02
  type: activity
  abbrev: BAI03.07-2
  heading: Activity 2
  text: Create a test environment that supports the full scope of the solution. Ensure that the test environment reflects,
    as closely as possible, real-world conditions, including the business processes and procedures, range of users, transaction
    types, and deployment conditions.
  notes: ''
  parent_id: cobit-2019.bai03.07
- id: cobit-2019.bai03.07.03
  type: activity
  abbrev: BAI03.07-3
  heading: Activity 3
  text: Create test procedures that align with the plan and practices and allow evaluation of the operation of the solution
    in real-world conditions. Ensure that the test procedures evaluate the adequacy of the controls, based on enterprisewide
    standards that define roles, responsibilities and testing criteria, and are approved by project stakeholders and the sponsor/business
    process owner.
  notes: ''
  parent_id: cobit-2019.bai03.07
- id: cobit-2019.bai03.07.04
  type: activity
  abbrev: BAI03.07-4
  heading: Activity 4
  text: Document and save the test procedures, cases, controls and parameters for future testing of the application.
  notes: ''
  parent_id: cobit-2019.bai03.07
- id: cobit-2019.bai03.08.01
  type: activity
  abbrev: BAI03.08-1
  heading: Activity 1
  text: Undertake testing of solutions and their components in accordance with the testing plan. Include testers independent
    from the solution team, with representative business process owners and end users. Ensure that testing is conducted only
    within the development and test environments.
  notes: ''
  parent_id: cobit-2019.bai03.08
- id: cobit-2019.bai03.08.02
  type: activity
  abbrev: BAI03.08-2
  heading: Activity 2
  text: Use clearly defined test instructions, as defined in the test plan. Consider the appropriate balance between automated
    scripted tests and interactive user testing.
  notes: ''
  parent_id: cobit-2019.bai03.08
- id: cobit-2019.bai03.08.03
  type: activity
  abbrev: BAI03.08-3
  heading: Activity 3
  text: Undertake all tests in accordance with the test plan and practices. Include the integration of business processes
    and IT solution components and of nonfunctional requirements (e.g., security, privacy, interoperability, usability).
  notes: ''
  parent_id: cobit-2019.bai03.08
- id: cobit-2019.bai03.08.04
  type: activity
  abbrev: BAI03.08-4
  heading: Activity 4
  text: Identify, log and classify (e.g., minor, significant and mission-critical) errors during testing. Repeat tests until
    all significant errors have been resolved. Ensure that an audit trail of test results is maintained.
  notes: ''
  parent_id: cobit-2019.bai03.08
- id: cobit-2019.bai03.08.05
  type: activity
  abbrev: BAI03.08-5
  heading: Activity 5
  text: Record testing outcomes and communicate results of testing to stakeholders in accordance with the test plan.
  notes: ''
  parent_id: cobit-2019.bai03.08
- id: cobit-2019.bai03.09.01
  type: activity
  abbrev: BAI03.09-1
  heading: Activity 1
  text: Assess the impact of all solution change requests on the solution development, the original business case and the
    budget. Categorize and prioritize them accordingly.
  notes: ''
  parent_id: cobit-2019.bai03.09
- id: cobit-2019.bai03.09.02
  type: activity
  abbrev: BAI03.09-2
  heading: Activity 2
  text: Track changes to requirements, enabling all stakeholders to monitor, review and approve the changes. Ensure that the
    outcomes of the change process are fully understood and agreed on by all the stakeholders and the sponsor/business process
    owner.
  notes: ''
  parent_id: cobit-2019.bai03.09
- id: cobit-2019.bai03.09.03
  type: activity
  abbrev: BAI03.09-3
  heading: Activity 3
  text: Apply change requests, maintaining the integrity of integration and configuration of solution components. Assess the
    impact of any major solution upgrade and classify it according to agreed objective criteria (such as enterprise requirements),
    based on the outcome of analysis of the risk involved (such as impact on existing systems and processes or security/privacy),
    cost-benefit justification and other requirements.
  notes: ''
  parent_id: cobit-2019.bai03.09
- id: cobit-2019.bai03.10.01
  type: activity
  abbrev: BAI03.10-1
  heading: Activity 1
  text: Develop and execute a plan for the maintenance of solution components. Include periodic reviews against business needs
    and operational requirements such as patch management, upgrade strategies, risk, privacy, vulnerabilities assessment and
    security requirements.
  notes: ''
  parent_id: cobit-2019.bai03.10
- id: cobit-2019.bai03.10.02
  type: activity
  abbrev: BAI03.10-2
  heading: Activity 2
  text: Assess the significance of a proposed maintenance activity on current solution design, functionality and/or business
    processes. Consider risk, user impact and resource availability. Ensure that business process owners understand the effect
    of designating changes as maintenance.
  notes: ''
  parent_id: cobit-2019.bai03.10
- id: cobit-2019.bai03.10.03
  type: activity
  abbrev: BAI03.10-3
  heading: Activity 3
  text: In the event of major changes to existing solutions that result in significant change in current designs and/or functionality
    and/or business processes, follow the development process used for new systems. For maintenance updates, use the change
    management process.
  notes: ''
  parent_id: cobit-2019.bai03.10
- id: cobit-2019.bai03.10.04
  type: activity
  abbrev: BAI03.10-4
  heading: Activity 4
  text: Ensure that the pattern and volume of maintenance activities are analyzed periodically for abnormal trends that indicate
    underlying quality or performance problems, cost/benefit of major upgrade, or replacement in lieu of maintenance.
  notes: ''
  parent_id: cobit-2019.bai03.10
- id: cobit-2019.bai03.11.01
  type: activity
  abbrev: BAI03.11-1
  heading: Activity 1
  text: Propose definitions of the new or changed IT products and services to ensure that they are fit for purpose. Document
    the proposed definitions in the portfolio list of products and services to be developed.
  notes: ''
  parent_id: cobit-2019.bai03.11
- id: cobit-2019.bai03.11.02
  type: activity
  abbrev: BAI03.11-2
  heading: Activity 2
  text: Propose new or changed service level options (service times, user satisfaction, availability, performance, capacity,
    security, privacy, continuity, compliance and usability) to ensure that the IT products and services are fit for use.
    Document the proposed service options in the portfolio.
  notes: ''
  parent_id: cobit-2019.bai03.11
- id: cobit-2019.bai03.11.03
  type: activity
  abbrev: BAI03.11-3
  heading: Activity 3
  text: Interface with business relationship management and portfolio management to agree on the proposed product and service
    definitions and service level options.
  notes: ''
  parent_id: cobit-2019.bai03.11
- id: cobit-2019.bai03.11.04
  type: activity
  abbrev: BAI03.11-4
  heading: Activity 4
  text: If product or service change falls within agreed approval authority, build the new or changed IT products and services
    or service level options. Otherwise, pass the change to portfolio management for investment review.
  notes: ''
  parent_id: cobit-2019.bai03.11
- id: cobit-2019.bai03.12.01
  type: activity
  abbrev: BAI03.12-1
  heading: Activity 1
  text: Analyze and assess the impact of choosing a development methodology (i.e., waterfall, Agile, bimodal) on the available
    resources, architecture requirements, configuration settings and system rigidity.
  notes: ''
  parent_id: cobit-2019.bai03.12
- id: cobit-2019.bai03.12.02
  type: activity
  abbrev: BAI03.12-2
  heading: Activity 2
  text: Establish the appropriate development methodology and organizational approach that delivers the proposed solution
    efficiently and effectively and that is capable of meeting business, architecture and system requirements. Adapt processes
    as required to the chosen strategy.
  notes: ''
  parent_id: cobit-2019.bai03.12
- id: cobit-2019.bai03.12.03
  type: activity
  abbrev: BAI03.12-3
  heading: Activity 3
  text: Establish the needed project teams as defined by the chosen development methodology. Provide sufficient training.
  notes: ''
  parent_id: cobit-2019.bai03.12
- id: cobit-2019.bai03.12.04
  type: activity
  abbrev: BAI03.12-4
  heading: Activity 4
  text: Consider applying a dual system, if required, in which cross-functional groups (digital factories) focus on developing
    one product or process using a different technology, operational, or managerial methodology from the rest of the company.
    Embedding these groups in business units has the advantage of spreading the new culture of agile development and making
    this digital factory approach the norm.
  notes: ''
  parent_id: cobit-2019.bai03.12
- id: cobit-2019.bai04.01.01
  type: activity
  abbrev: BAI04.01-1
  heading: Activity 1
  text: 'Consider the following (current and forecasted) in the assessment of availability, performance and capacity of services
    and resources: customer requirements, business priorities, business objectives, budget impact, resource utilization, IT
    capabilities and industry trends.'
  notes: ''
  parent_id: cobit-2019.bai04.01
- id: cobit-2019.bai04.01.02
  type: activity
  abbrev: BAI04.01-2
  heading: Activity 2
  text: Identify and follow up on all incidents caused by inadequate performance or capacity.
  notes: ''
  parent_id: cobit-2019.bai04.01
- id: cobit-2019.bai04.01.03
  type: activity
  abbrev: BAI04.01-3
  heading: Activity 3
  text: Monitor actual performance and capacity usage against defined thresholds, supported, where necessary, with automated
    software.
  notes: ''
  parent_id: cobit-2019.bai04.01
- id: cobit-2019.bai04.01.04
  type: activity
  abbrev: BAI04.01-4
  heading: Activity 4
  text: Regularly evaluate the current levels of performance for all processing levels (business demand, service capacity
    and resource capacity) by comparing them against trends and SLAs. Take into account changes in the environment.
  notes: ''
  parent_id: cobit-2019.bai04.01
- id: cobit-2019.bai04.02.01
  type: activity
  abbrev: BAI04.02-1
  heading: Activity 1
  text: Identify only those solutions or services that are critical in the availability and capacity management process.
  notes: ''
  parent_id: cobit-2019.bai04.02
- id: cobit-2019.bai04.02.02
  type: activity
  abbrev: BAI04.02-2
  heading: Activity 2
  text: Map the selected solutions or services to the application(s) and infrastructure (IT and facility) on which they depend
    to enable a focus on critical resources for availability planning.
  notes: ''
  parent_id: cobit-2019.bai04.02
- id: cobit-2019.bai04.02.03
  type: activity
  abbrev: BAI04.02-3
  heading: Activity 3
  text: Collect data on availability patterns from logs of past failures and performance monitoring. Use modeling tools that
    help predict failures based on past usage trends and management expectations of new environment or user conditions.
  notes: ''
  parent_id: cobit-2019.bai04.02
- id: cobit-2019.bai04.02.04
  type: activity
  abbrev: BAI04.02-4
  heading: Activity 4
  text: Based on the collected data, create scenarios that describe future availability situations to illustrate a variety
    of potential capacity levels needed to achieve the availability performance objective.
  notes: ''
  parent_id: cobit-2019.bai04.02
- id: cobit-2019.bai04.02.05
  type: activity
  abbrev: BAI04.02-5
  heading: Activity 5
  text: Based on the scenarios, determine the likelihood that the availability performance objective will not be achieved.
  notes: ''
  parent_id: cobit-2019.bai04.02
- id: cobit-2019.bai04.02.06
  type: activity
  abbrev: BAI04.02-6
  heading: Activity 6
  text: Determine the impact of the scenarios on the business performance measures (e.g., revenue, profit, customer services).
    Engage the business-line, functional (especially finance) and regional leaders to understand their evaluation of impact.
  notes: ''
  parent_id: cobit-2019.bai04.02
- id: cobit-2019.bai04.02.07
  type: activity
  abbrev: BAI04.02-7
  heading: Activity 7
  text: Ensure that business process owners fully understand and agree to the results of this analysis. From the business
    owners, obtain a list of unacceptable risk scenarios that require a response to reduce risk to acceptable levels.
  notes: ''
  parent_id: cobit-2019.bai04.02
- id: cobit-2019.bai04.03.01
  type: activity
  abbrev: BAI04.03-1
  heading: Activity 1
  text: Identify availability and capacity implications of changing business needs and improvement opportunities. Use modeling
    techniques to validate availability, performance and capacity plans.
  notes: ''
  parent_id: cobit-2019.bai04.03
- id: cobit-2019.bai04.03.02
  type: activity
  abbrev: BAI04.03-2
  heading: Activity 2
  text: Review availability and capacity implications of service trend analysis.
  notes: ''
  parent_id: cobit-2019.bai04.03
- id: cobit-2019.bai04.03.03
  type: activity
  abbrev: BAI04.03-3
  heading: Activity 3
  text: Ensure that management performs comparisons of actual demand on resources against forecasted supply and demand to
    evaluate current forecasting techniques and make improvements where possible.
  notes: ''
  parent_id: cobit-2019.bai04.03
- id: cobit-2019.bai04.03.04
  type: activity
  abbrev: BAI04.03-4
  heading: Activity 4
  text: Prioritize needed improvements and create cost-justifiable availability and capacity plans.
  notes: ''
  parent_id: cobit-2019.bai04.03
- id: cobit-2019.bai04.03.05
  type: activity
  abbrev: BAI04.03-5
  heading: Activity 5
  text: Adjust the performance and capacity plans and SLAs based on realistic, new, proposed and/or projected business processes
    and supporting services, applications and infrastructure changes. Also include reviews of actual performance and capacity
    usage, including workload levels.
  notes: ''
  parent_id: cobit-2019.bai04.03
- id: cobit-2019.bai04.04.01
  type: activity
  abbrev: BAI04.04-1
  heading: Activity 1
  text: Provide capacity reports to the budgeting processes.
  notes: ''
  parent_id: cobit-2019.bai04.04
- id: cobit-2019.bai04.04.02
  type: activity
  abbrev: BAI04.04-2
  heading: Activity 2
  text: Establish a process for gathering data to provide management with monitoring and reporting information for availability,
    performance and capacity workload of all I&T-related resources.
  notes: ''
  parent_id: cobit-2019.bai04.04
- id: cobit-2019.bai04.04.03
  type: activity
  abbrev: BAI04.04-3
  heading: Activity 3
  text: Provide regular reporting of the results in an appropriate form for review by IT and business management and communication
    to enterprise management.
  notes: ''
  parent_id: cobit-2019.bai04.04
- id: cobit-2019.bai04.04.04
  type: activity
  abbrev: BAI04.04-4
  heading: Activity 4
  text: Integrate monitoring and reporting activities in the iterative capacity management activities (monitoring, analysis,
    tuning and implementations).
  notes: ''
  parent_id: cobit-2019.bai04.04
- id: cobit-2019.bai04.05.01
  type: activity
  abbrev: BAI04.05-1
  heading: Activity 1
  text: Obtain guidance from vendor product manuals to ensure an appropriate level of performance availability for peak processing
    and workloads.
  notes: ''
  parent_id: cobit-2019.bai04.05
- id: cobit-2019.bai04.05.02
  type: activity
  abbrev: BAI04.05-2
  heading: Activity 2
  text: Define an escalation procedure for swift resolution in case of emergency capacity and performance problems.
  notes: ''
  parent_id: cobit-2019.bai04.05
- id: cobit-2019.bai04.05.03
  type: activity
  abbrev: BAI04.05-3
  heading: Activity 3
  text: Identify performance and capacity gaps based on monitoring current and forecasted performance. Use the known availability,
    continuity and recovery specifications to classify resources and allow prioritization.
  notes: ''
  parent_id: cobit-2019.bai04.05
- id: cobit-2019.bai04.05.04
  type: activity
  abbrev: BAI04.05-4
  heading: Activity 4
  text: Define corrective actions (e.g., shifting workload, prioritizing tasks or adding resources when performance and capacity
    issues are identified).
  notes: ''
  parent_id: cobit-2019.bai04.05
- id: cobit-2019.bai04.05.05
  type: activity
  abbrev: BAI04.05-5
  heading: Activity 5
  text: Integrate required corrective actions into the appropriate planning and change management processes.
  notes: ''
  parent_id: cobit-2019.bai04.05
- id: cobit-2019.bai05.01.01
  type: activity
  abbrev: BAI05.01-1
  heading: Activity 1
  text: Assess the scope and impact of the envisioned change, the various stakeholders who are affected, the nature of the
    impact on and involvement required from each stakeholder group, and the current readiness and ability to adopt the change.
  notes: ''
  parent_id: cobit-2019.bai05.01
- id: cobit-2019.bai05.01.02
  type: activity
  abbrev: BAI05.01-2
  heading: Activity 2
  text: To establish the desire to change, identify, leverage and communicate current pain points, negative events, risk,
    customer dissatisfaction and business problems, as well as initial benefits, future opportunities and rewards, and competitive
    advantages.
  notes: ''
  parent_id: cobit-2019.bai05.01
- id: cobit-2019.bai05.01.03
  type: activity
  abbrev: BAI05.01-3
  heading: Activity 3
  text: Issue key communications from the executive committee or CEO to demonstrate commitment to the change.
  notes: ''
  parent_id: cobit-2019.bai05.01
- id: cobit-2019.bai05.01.04
  type: activity
  abbrev: BAI05.01-4
  heading: Activity 4
  text: Provide visible leadership from senior management to establish direction and to align, motivate and inspire stakeholders
    to desire the change.
  notes: ''
  parent_id: cobit-2019.bai05.01
- id: cobit-2019.bai05.02.01
  type: activity
  abbrev: BAI05.02-1
  heading: Activity 1
  text: Identify and assemble an effective core implementation team that includes appropriate members from business and IT
    with the capacity to spend the required amount of time and contribute knowledge and expertise, experience, credibility,
    and authority. Consider including external parties such as consultants to provide an independent view or to address skill
    gaps. Identify potential change agents within different parts of the enterprise with whom the core team can work to support
    the vision and cascade changes.
  notes: ''
  parent_id: cobit-2019.bai05.02
- id: cobit-2019.bai05.02.02
  type: activity
  abbrev: BAI05.02-2
  heading: Activity 2
  text: Create trust within the core implementation team through carefully planned events with effective communication and
    joint activities.
  notes: ''
  parent_id: cobit-2019.bai05.02
- id: cobit-2019.bai05.02.03
  type: activity
  abbrev: BAI05.02-3
  heading: Activity 3
  text: Develop a common vision and goals that support the enterprise objectives.
  notes: ''
  parent_id: cobit-2019.bai05.02
- id: cobit-2019.bai05.03.01
  type: activity
  abbrev: BAI05.03-1
  heading: Activity 1
  text: Develop a vision communication plan to address the core audience groups, their behavioral profiles and information
    requirements, communication channels, and principles.
  notes: ''
  parent_id: cobit-2019.bai05.03
- id: cobit-2019.bai05.03.02
  type: activity
  abbrev: BAI05.03-2
  heading: Activity 2
  text: Deliver the communication at appropriate levels of the enterprise, in accordance with the plan.
  notes: ''
  parent_id: cobit-2019.bai05.03
- id: cobit-2019.bai05.03.03
  type: activity
  abbrev: BAI05.03-3
  heading: Activity 3
  text: Reinforce the communication through multiple forums and repetition.
  notes: ''
  parent_id: cobit-2019.bai05.03
- id: cobit-2019.bai05.03.04
  type: activity
  abbrev: BAI05.03-4
  heading: Activity 4
  text: Make all levels of leadership accountable for demonstrating the vision.
  notes: ''
  parent_id: cobit-2019.bai05.03
- id: cobit-2019.bai05.03.05
  type: activity
  abbrev: BAI05.03-5
  heading: Activity 5
  text: Check understanding of the desired vision and respond to any issues highlighted by staff.
  notes: ''
  parent_id: cobit-2019.bai05.03
- id: cobit-2019.bai05.04.01
  type: activity
  abbrev: BAI05.04-1
  heading: Activity 1
  text: Plan the training opportunities staff will need to develop the appropriate skills and attitudes to feel empowered.
  notes: ''
  parent_id: cobit-2019.bai05.04
- id: cobit-2019.bai05.04.02
  type: activity
  abbrev: BAI05.04-2
  heading: Activity 2
  text: Identify, prioritize and deliver opportunities for quick wins. These could be related to current known areas of difficulty
    or external factors that need to be addressed urgently.
  notes: ''
  parent_id: cobit-2019.bai05.04
- id: cobit-2019.bai05.04.03
  type: activity
  abbrev: BAI05.04-3
  heading: Activity 3
  text: Leverage delivered quick wins by communicating the benefits to those impacted to show the vision is on track. Fine-tune
    the vision, keep leaders on board and build momentum.
  notes: ''
  parent_id: cobit-2019.bai05.04
- id: cobit-2019.bai05.04.04
  type: activity
  abbrev: BAI05.04-4
  heading: Activity 4
  text: Identify organizational structures compatible with the vision; if required, make changes to ensure alignment.
  notes: ''
  parent_id: cobit-2019.bai05.04
- id: cobit-2019.bai05.04.05
  type: activity
  abbrev: BAI05.04-5
  heading: Activity 5
  text: Align HR processes and measurement systems (e.g., performance evaluation, compensation decisions, promotion decisions,
    recruiting and hiring) to support the vision.
  notes: ''
  parent_id: cobit-2019.bai05.04
- id: cobit-2019.bai05.04.06
  type: activity
  abbrev: BAI05.04-6
  heading: Activity 6
  text: Identify and manage leaders who continue to resist needed change.
  notes: ''
  parent_id: cobit-2019.bai05.04
- id: cobit-2019.bai05.05.01
  type: activity
  abbrev: BAI05.05-1
  heading: Activity 1
  text: "Develop a plan for operation and use of the change. The plan should communicate and build on realized quick wins,\
    \ address behavioral and cultural\t aspects of the broader transition, and increase buy-in and engagement. Ensure that\
    \ the plan covers a holistic view of the change and provides documentation (e.g., procedures), mentoring, training, coaching,\
    \ knowledge transfer, enhanced immediate post-go-live support and ongoing support."
  notes: ''
  parent_id: cobit-2019.bai05.05
- id: cobit-2019.bai05.05.02
  type: activity
  abbrev: BAI05.05-2
  heading: Activity 2
  text: Implement the operation and use plan. Define and track success measures, including hard business measures and perception
    measures that indicate how people feel about a change. Take remedial action as necessary.
  notes: ''
  parent_id: cobit-2019.bai05.05
- id: cobit-2019.bai05.06.01
  type: activity
  abbrev: BAI05.06-1
  heading: Activity 1
  text: Make process owners accountable for normal day-to-day operations.
  notes: ''
  parent_id: cobit-2019.bai05.06
- id: cobit-2019.bai05.06.02
  type: activity
  abbrev: BAI05.06-2
  heading: Activity 2
  text: Celebrate successes and implement reward and recognition programs to reinforce the change.
  notes: ''
  parent_id: cobit-2019.bai05.06
- id: cobit-2019.bai05.06.03
  type: activity
  abbrev: BAI05.06-3
  heading: Activity 3
  text: Provide ongoing awareness through regular communication of the change and its adoption.
  notes: ''
  parent_id: cobit-2019.bai05.06
- id: cobit-2019.bai05.06.04
  type: activity
  abbrev: BAI05.06-4
  heading: Activity 4
  text: Use performance measurement systems to identify root causes for low adoption. Take corrective action.
  notes: ''
  parent_id: cobit-2019.bai05.06
- id: cobit-2019.bai05.06.05
  type: activity
  abbrev: BAI05.06-5
  heading: Activity 5
  text: Conduct compliance audits to identify root causes for low adoption. Recommend corrective action.
  notes: ''
  parent_id: cobit-2019.bai05.06
- id: cobit-2019.bai05.07.01
  type: activity
  abbrev: BAI05.07-1
  heading: Activity 1
  text: Sustain and reinforce the change through regular communication that demonstrates top management commitment.
  notes: ''
  parent_id: cobit-2019.bai05.07
- id: cobit-2019.bai05.07.02
  type: activity
  abbrev: BAI05.07-2
  heading: Activity 2
  text: Provide mentoring, training, coaching and knowledge transfer to new staff to sustain the change.
  notes: ''
  parent_id: cobit-2019.bai05.07
- id: cobit-2019.bai05.07.03
  type: activity
  abbrev: BAI05.07-3
  heading: Activity 3
  text: Perform periodic reviews of the operation and use of the change. Identify improvements.
  notes: ''
  parent_id: cobit-2019.bai05.07
- id: cobit-2019.bai05.07.04
  type: activity
  abbrev: BAI05.07-4
  heading: Activity 4
  text: Capture lessons learned relating to implementation of the change. Share knowledge across the enterprise.
  notes: ''
  parent_id: cobit-2019.bai05.07
- id: cobit-2019.bai06.01.01
  type: activity
  abbrev: BAI06.01-1
  heading: Activity 1
  text: Use formal change requests to enable business process owners and IT to request changes to business process, infrastructure,
    systems or applications. Make sure that all such changes arise only through the change request management process.
  notes: ''
  parent_id: cobit-2019.bai06.01
- id: cobit-2019.bai06.01.02
  type: activity
  abbrev: BAI06.01-2
  heading: Activity 2
  text: Categorize all requested changes (e.g., business process, infrastructure, operating systems, networks, application
    systems, purchased/packaged application software) and relate affected configuration items.
  notes: ''
  parent_id: cobit-2019.bai06.01
- id: cobit-2019.bai06.01.03
  type: activity
  abbrev: BAI06.01-3
  heading: Activity 3
  text: Prioritize all requested changes based on the business and technical requirements; resources required; and the legal,
    regulatory and contractual reasons for the requested change.
  notes: ''
  parent_id: cobit-2019.bai06.01
- id: cobit-2019.bai06.01.04
  type: activity
  abbrev: BAI06.01-4
  heading: Activity 4
  text: Formally approve each change by business process owners, service managers and IT technical stakeholders, as appropriate.
    Changes that are low-risk and relatively frequent should be pre-approved as standard changes.
  notes: ''
  parent_id: cobit-2019.bai06.01
- id: cobit-2019.bai06.01.05
  type: activity
  abbrev: BAI06.01-5
  heading: Activity 5
  text: Plan and schedule all approved changes.
  notes: ''
  parent_id: cobit-2019.bai06.01
- id: cobit-2019.bai06.01.06
  type: activity
  abbrev: BAI06.01-6
  heading: Activity 6
  text: Plan and evaluate all requests in a structured fashion. Include an impact analysis on business process, infrastructure,
    systems and applications, business continuity plans (BCPs) and service providers to ensure that all affected components
    have been identified. Assess the likelihood of adversely affecting the operational environment and the risk of implementing
    the change. Consider security, privacy, legal, contractual and compliance implications of the requested change. Consider
    also inter-dependencies among changes. Involve business process owners in the assessment process, as appropriate.
  notes: ''
  parent_id: cobit-2019.bai06.01
- id: cobit-2019.bai06.01.07
  type: activity
  abbrev: BAI06.01-7
  heading: Activity 7
  text: Consider the impact of contracted services providers (e.g., of outsourced business processing, infrastructure, application
    development and shared services) on the change management process. Include integration of organizational change management
    processes with change management processes of service providers and the impact on contractual terms and SLAs.
  notes: ''
  parent_id: cobit-2019.bai06.01
- id: cobit-2019.bai06.02.01
  type: activity
  abbrev: BAI06.02-1
  heading: Activity 1
  text: Define what constitutes an emergency change.
  notes: ''
  parent_id: cobit-2019.bai06.02
- id: cobit-2019.bai06.02.02
  type: activity
  abbrev: BAI06.02-2
  heading: Activity 2
  text: Ensure that a documented procedure exists to declare, assess, approve preliminarily, authorize after the change and
    record an emergency change.
  notes: ''
  parent_id: cobit-2019.bai06.02
- id: cobit-2019.bai06.02.03
  type: activity
  abbrev: BAI06.02-3
  heading: Activity 3
  text: Verify that all emergency access arrangements for changes are appropriately authorized, documented and revoked after
    the change has been applied.
  notes: ''
  parent_id: cobit-2019.bai06.02
- id: cobit-2019.bai06.02.04
  type: activity
  abbrev: BAI06.02-4
  heading: Activity 4
  text: Monitor all emergency changes and conduct post-implementation reviews involving all concerned parties. The review
    should consider and initiate corrective actions based on root causes such as problems with business process, application
    system development and maintenance, development and test environments, documentation and manuals, and data integrity.
  notes: ''
  parent_id: cobit-2019.bai06.02
- id: cobit-2019.bai06.03.01
  type: activity
  abbrev: BAI06.03-1
  heading: Activity 1
  text: Categorize change requests in the tracking process (e.g., rejected, approved but not yet initiated, approved and in
    process, and closed).
  notes: ''
  parent_id: cobit-2019.bai06.03
- id: cobit-2019.bai06.03.02
  type: activity
  abbrev: BAI06.03-2
  heading: Activity 2
  text: Implement change status reports with performance metrics to enable management review and monitoring of both the detailed
    status of changes and the overall state (e.g., aged analysis of change requests). Ensure that status reports form an audit
    trail so changes can subsequently be tracked from inception to eventual disposition.
  notes: ''
  parent_id: cobit-2019.bai06.03
- id: cobit-2019.bai06.03.03
  type: activity
  abbrev: BAI06.03-3
  heading: Activity 3
  text: Monitor open changes to ensure that all approved changes are closed in a timely fashion, depending on priority.
  notes: ''
  parent_id: cobit-2019.bai06.03
- id: cobit-2019.bai06.03.04
  type: activity
  abbrev: BAI06.03-4
  heading: Activity 4
  text: Maintain a tracking and reporting system for all change requests.
  notes: ''
  parent_id: cobit-2019.bai06.03
- id: cobit-2019.bai06.04.01
  type: activity
  abbrev: BAI06.04-1
  heading: Activity 1
  text: Include changes in the documentation within the management procedure. Examples of documentation include business and
    IT operational procedures, business continuity and disaster recovery documentation, configuration information, application
    documentation, help screens, and training materials.
  notes: ''
  parent_id: cobit-2019.bai06.04
- id: cobit-2019.bai06.04.02
  type: activity
  abbrev: BAI06.04-2
  heading: Activity 2
  text: Define an appropriate retention period for change documentation and pre- and post-change system and user documentation.
  notes: ''
  parent_id: cobit-2019.bai06.04
- id: cobit-2019.bai06.04.03
  type: activity
  abbrev: BAI06.04-3
  heading: Activity 3
  text: Subject documentation to the same level of review as the actual change.
  notes: ''
  parent_id: cobit-2019.bai06.04
- id: cobit-2019.bai07.01.01
  type: activity
  abbrev: BAI07.01-1
  heading: Activity 1
  text: Create an implementation plan that reflects the broad implementation strategy, the sequence of implementation steps,
    resource requirements, inter-dependencies, criteria for management acceptance of the production implementation, installation
    verification requirements, transition strategy for production support, and update of business continuity plans.
  notes: ''
  parent_id: cobit-2019.bai07.01
- id: cobit-2019.bai07.01.02
  type: activity
  abbrev: BAI07.01-2
  heading: Activity 2
  text: From external solution providers, obtain commitment to their involvement in each step of the implementation.
  notes: ''
  parent_id: cobit-2019.bai07.01
- id: cobit-2019.bai07.01.03
  type: activity
  abbrev: BAI07.01-3
  heading: Activity 3
  text: Identify and document the fallback and recovery processes.
  notes: ''
  parent_id: cobit-2019.bai07.01
- id: cobit-2019.bai07.01.04
  type: activity
  abbrev: BAI07.01-4
  heading: Activity 4
  text: Confirm that all implementation plans are approved by technical and business stakeholders and reviewed by internal
    audit, as appropriate.
  notes: ''
  parent_id: cobit-2019.bai07.01
- id: cobit-2019.bai07.01.05
  type: activity
  abbrev: BAI07.01-5
  heading: Activity 5
  text: Formally review the technical and business risk associated with implementation. Ensure that the key risk is considered
    and addressed in the planning process.
  notes: ''
  parent_id: cobit-2019.bai07.01
- id: cobit-2019.bai07.02.01
  type: activity
  abbrev: BAI07.02-1
  heading: Activity 1
  text: Define a business process, I&T service data and infrastructure migration plan. In developing the plan, consider, for
    example, hardware, networks, operating systems, software, transaction data, master files, backups and archives, interfaces
    with other systems (both internal and external), possible compliance requirements, business procedures, and system documentation.
  notes: ''
  parent_id: cobit-2019.bai07.02
- id: cobit-2019.bai07.02.02
  type: activity
  abbrev: BAI07.02-2
  heading: Activity 2
  text: In the business process conversion plan, consider all necessary adjustments to procedures, including revised roles
    and responsibilities and control procedures.
  notes: ''
  parent_id: cobit-2019.bai07.02
- id: cobit-2019.bai07.02.03
  type: activity
  abbrev: BAI07.02-3
  heading: Activity 3
  text: Confirm that the data conversion plan does not require changes in data values unless absolutely necessary for business
    reasons. Document changes made to data values, and secure approval from the business process data owner.
  notes: ''
  parent_id: cobit-2019.bai07.02
- id: cobit-2019.bai07.02.04
  type: activity
  abbrev: BAI07.02-4
  heading: Activity 4
  text: Plan retention of backup and archived data to conform to business needs and regulatory or compliance requirements.
  notes: ''
  parent_id: cobit-2019.bai07.02
- id: cobit-2019.bai07.02.05
  type: activity
  abbrev: BAI07.02-5
  heading: Activity 5
  text: Rehearse and test the conversion before attempting a live conversion.
  notes: ''
  parent_id: cobit-2019.bai07.02
- id: cobit-2019.bai07.02.06
  type: activity
  abbrev: BAI07.02-6
  heading: Activity 6
  text: Coordinate and verify the timing and completeness of the conversion cutover so there is a smooth, continuous transition
    with no loss of transaction data. Where necessary, in the absence of any other alternative, freeze live operations.
  notes: ''
  parent_id: cobit-2019.bai07.02
- id: cobit-2019.bai07.02.07
  type: activity
  abbrev: BAI07.02-7
  heading: Activity 7
  text: Plan to back up all systems and data taken at the point prior to conversion. Maintain audit trails to enable the conversion
    to be retraced. Ensure that there is a recovery plan that covers rollback of migration and fallback to previous processing
    should the migration fail.
  notes: ''
  parent_id: cobit-2019.bai07.02
- id: cobit-2019.bai07.02.08
  type: activity
  abbrev: BAI07.02-8
  heading: Activity 8
  text: In the data conversion plan, incorporate methods for collecting, converting and verifying data to be converted, and
    identifying and resolving any errors found during conversion. Include comparing the original and converted data for completeness
    and integrity.
  notes: ''
  parent_id: cobit-2019.bai07.02
- id: cobit-2019.bai07.02.09
  type: activity
  abbrev: BAI07.02-9
  heading: Activity 9
  text: Consider the risk of conversion problems, business continuity planning and fallback procedures in the business process,
    data and infrastructure migration plan where there are risk management, business needs or regulatory/compliance requirements.
  notes: ''
  parent_id: cobit-2019.bai07.02
- id: cobit-2019.bai07.03.01
  type: activity
  abbrev: BAI07.03-1
  heading: Activity 1
  text: Develop and document the test plan, which aligns to the program, project quality plan and relevant organizational
    standards. Communicate and consult with appropriate business process owners and IT stakeholders.
  notes: ''
  parent_id: cobit-2019.bai07.03
- id: cobit-2019.bai07.03.02
  type: activity
  abbrev: BAI07.03-2
  heading: Activity 2
  text: Ensure that the test plan reflects an assessment of risk from the project and that all functional and technical requirements
    are tested. Based on assessment of the risk of system failure and faults on implementation, include in the plan requirements
    for performance, stress, usability, pilot, security testing and privacy.
  notes: ''
  parent_id: cobit-2019.bai07.03
- id: cobit-2019.bai07.03.03
  type: activity
  abbrev: BAI07.03-3
  heading: Activity 3
  text: Ensure that the test plan addresses the potential need for internal or external accreditation of outcomes of the test
    process (e.g., financial or regulatory requirements).
  notes: ''
  parent_id: cobit-2019.bai07.03
- id: cobit-2019.bai07.03.04
  type: activity
  abbrev: BAI07.03-4
  heading: Activity 4
  text: Ensure that the test plan identifies necessary resources to execute testing and evaluate the results. Examples of
    resources may be construction of test environments and use of staff time for the test group, including potential temporary
    replacement of test staff in the production or development environments. Ensure that stakeholders are consulted on the
    resource implications of the test plan.
  notes: ''
  parent_id: cobit-2019.bai07.03
- id: cobit-2019.bai07.03.05
  type: activity
  abbrev: BAI07.03-5
  heading: Activity 5
  text: Ensure that the test plan identifies testing phases appropriate to the operational requirements and environment. Examples
    of such testing phases include unit test, system test, integration test, user acceptance test, performance test, stress
    test, data conversion test, security test, privacy test, operational readiness test, and backup and recovery tests.
  notes: ''
  parent_id: cobit-2019.bai07.03
- id: cobit-2019.bai07.03.06
  type: activity
  abbrev: BAI07.03-6
  heading: Activity 6
  text: Confirm that the test plan considers test preparation (including site preparation), training requirements, installation
    or an update of a defined test environment, planning/performing/documenting/retaining test cases, error and problem handling,
    correction and escalation, and formal approval.
  notes: ''
  parent_id: cobit-2019.bai07.03
- id: cobit-2019.bai07.03.07
  type: activity
  abbrev: BAI07.03-7
  heading: Activity 7
  text: Confirm that all test plans are approved by stakeholders, including business process owners and IT, as appropriate.
    Stakeholders may include application development managers, project managers and business process end users.
  notes: ''
  parent_id: cobit-2019.bai07.03
- id: cobit-2019.bai07.03.08
  type: activity
  abbrev: BAI07.03-8
  heading: Activity 8
  text: Ensure that the test plan establishes clear criteria for measuring the success of undertaking each testing phase.
    Consult the business process owners and IT stakeholders in defining the success criteria. Determine that the plan establishes
    remediation procedures when the success criteria are not met. For example, if there is a significant failure in a testing
    phase, the plan should provide guidance on whether to proceed to the next phase, stop testing or postpone implementation.
  notes: ''
  parent_id: cobit-2019.bai07.03
- id: cobit-2019.bai07.04.01
  type: activity
  abbrev: BAI07.04-1
  heading: Activity 1
  text: Create a database of test data that are representative of the production environment. Sanitize data used in the test
    environment from the production environment according to business needs and organizational standards. For example, consider
    whether compliance or regulatory requirements oblige the use of sanitized data.
  notes: ''
  parent_id: cobit-2019.bai07.04
- id: cobit-2019.bai07.04.02
  type: activity
  abbrev: BAI07.04-2
  heading: Activity 2
  text: Protect sensitive test data and results against disclosure, including access, retention, storage and destruction.
    Consider the effect of interaction of organizational systems with those of third parties.
  notes: ''
  parent_id: cobit-2019.bai07.04
- id: cobit-2019.bai07.04.03
  type: activity
  abbrev: BAI07.04-3
  heading: Activity 3
  text: Put in place a process to enable proper retention or disposal of test results, media and other associated documentation
    that will enable adequate review and subsequent analysis or efficient retesting as required by the test plan. Consider
    the effect of regulatory or compliance requirements.
  notes: ''
  parent_id: cobit-2019.bai07.04
- id: cobit-2019.bai07.04.04
  type: activity
  abbrev: BAI07.04-4
  heading: Activity 4
  text: Ensure that the test environment is representative of the future business and operational landscape. Include business
    process procedures and roles, likely workload stress, operating systems, necessary application software, database management
    systems, and network and computing infrastructure found in the production environment.
  notes: ''
  parent_id: cobit-2019.bai07.04
- id: cobit-2019.bai07.04.05
  type: activity
  abbrev: BAI07.04-5
  heading: Activity 5
  text: Ensure that the test environment is secure and incapable of interacting with production systems.
  notes: ''
  parent_id: cobit-2019.bai07.04
- id: cobit-2019.bai07.05.01
  type: activity
  abbrev: BAI07.05-1
  heading: Activity 1
  text: Review the categorized log of errors found in the testing process by the development team. Verify that all errors
    have been remediated or formally accepted.
  notes: ''
  parent_id: cobit-2019.bai07.05
- id: cobit-2019.bai07.05.02
  type: activity
  abbrev: BAI07.05-2
  heading: Activity 2
  text: Evaluate the final acceptance against the success criteria and interpret the final acceptance testing results. Present
    them in a form that is understandable to business process owners and IT, so an informed review and evaluation can take
    place.
  notes: ''
  parent_id: cobit-2019.bai07.05
- id: cobit-2019.bai07.05.03
  type: activity
  abbrev: BAI07.05-3
  heading: Activity 3
  text: Approve the acceptance, with formal sign-off by the business process owners, third parties (as appropriate) and IT
    stakeholders prior to promotion.
  notes: ''
  parent_id: cobit-2019.bai07.05
- id: cobit-2019.bai07.05.04
  type: activity
  abbrev: BAI07.05-4
  heading: Activity 4
  text: Ensure that testing of changes is undertaken in accordance with the testing plan. Ensure that the testing is designed
    and conducted by a test group that is independent from the development team. Consider the extent to which business process
    owners and end users are involved in the test group. Ensure that testing is conducted only within the test environment.
  notes: ''
  parent_id: cobit-2019.bai07.05
- id: cobit-2019.bai07.05.05
  type: activity
  abbrev: BAI07.05-5
  heading: Activity 5
  text: Ensure that the tests and anticipated outcomes are in accordance with the defined success criteria set out in the
    testing plan.
  notes: ''
  parent_id: cobit-2019.bai07.05
- id: cobit-2019.bai07.05.06
  type: activity
  abbrev: BAI07.05-6
  heading: Activity 6
  text: Consider using clearly defined test instructions (scripts) to implement the tests. Ensure that the independent test
    group assesses and approves each test script to confirm that it adequately addresses test success criteria set out in
    the test plan. Consider using scripts to verify the extent to which the system meets security and privacy requirements.
  notes: ''
  parent_id: cobit-2019.bai07.05
- id: cobit-2019.bai07.05.07
  type: activity
  abbrev: BAI07.05-7
  heading: Activity 7
  text: Consider the appropriate balance between automated scripted tests and interactive user testing.
  notes: ''
  parent_id: cobit-2019.bai07.05
- id: cobit-2019.bai07.05.08
  type: activity
  abbrev: BAI07.05-8
  heading: Activity 8
  text: Undertake tests of security in accordance with the test plan. Measure the extent of security weaknesses or loopholes.
    Consider the effect of security incidents since construction of the test plan. Consider the effect on access and boundary
    controls. Consider privacy.
  notes: ''
  parent_id: cobit-2019.bai07.05
- id: cobit-2019.bai07.05.09
  type: activity
  abbrev: BAI07.05-9
  heading: Activity 9
  text: Undertake tests of system and application performance in accordance with the test plan. Consider a range of performance
    metrics (e.g., end-user response times and database management system update performance).
  notes: ''
  parent_id: cobit-2019.bai07.05
- id: cobit-2019.bai07.05.10
  type: activity
  abbrev: BAI07.05-10
  heading: Activity 10
  text: When undertaking testing, ensure that the fallback and rollback elements of the test plan have been addressed.
  notes: ''
  parent_id: cobit-2019.bai07.05
- id: cobit-2019.bai07.05.11
  type: activity
  abbrev: BAI07.05-11
  heading: Activity 11
  text: Identify, log and classify (e.g., minor, significant, mission-critical) errors during testing. Ensure that an audit
    trail of test results is available. In accordance with the test plan, communicate results of testing to stakeholders to
    facilitate bug fixing and further quality enhancement.
  notes: ''
  parent_id: cobit-2019.bai07.05
- id: cobit-2019.bai07.06.01
  type: activity
  abbrev: BAI07.06-1
  heading: Activity 1
  text: Prepare for transfer of business procedures and supporting services, applications and infrastructure from testing
    to the production environment in accordance with organizational change management standards.
  notes: ''
  parent_id: cobit-2019.bai07.06
- id: cobit-2019.bai07.06.02
  type: activity
  abbrev: BAI07.06-2
  heading: Activity 2
  text: Determine the extent of pilot implementation or parallel processing of the old and new systems in line with the implementation
    plan.
  notes: ''
  parent_id: cobit-2019.bai07.06
- id: cobit-2019.bai07.06.03
  type: activity
  abbrev: BAI07.06-3
  heading: Activity 3
  text: Promptly update relevant business process and system documentation, configuration information and contingency plan
    documents, as appropriate.
  notes: ''
  parent_id: cobit-2019.bai07.06
- id: cobit-2019.bai07.06.04
  type: activity
  abbrev: BAI07.06-4
  heading: Activity 4
  text: Ensure that all media libraries are updated promptly with the version of the solution component being transferred
    from testing to the production environment. Archive the existing version and its supporting documentation. Ensure that
    promotion to production of systems, application software and infrastructure is under configuration control.
  notes: ''
  parent_id: cobit-2019.bai07.06
- id: cobit-2019.bai07.06.05
  type: activity
  abbrev: BAI07.06-5
  heading: Activity 5
  text: Where distribution of solution components is conducted electronically, control automated distribution to ensure that
    users are notified, and distribution occurs only to authorized and correctly identified destinations. In the release process,
    include backup procedures to enable the distribution of changes to be reviewed in the event of a malfunction or error.
  notes: ''
  parent_id: cobit-2019.bai07.06
- id: cobit-2019.bai07.06.06
  type: activity
  abbrev: BAI07.06-6
  heading: Activity 6
  text: Where distribution takes physical form, keep a formal log of what items have been distributed, to whom, where they
    have been implemented, and when each has been updated.
  notes: ''
  parent_id: cobit-2019.bai07.06
- id: cobit-2019.bai07.07.01
  type: activity
  abbrev: BAI07.07-1
  heading: Activity 1
  text: Provide additional resources, as required, to end users and support personnel until the release has stabilized.
  notes: ''
  parent_id: cobit-2019.bai07.07
- id: cobit-2019.bai07.07.02
  type: activity
  abbrev: BAI07.07-2
  heading: Activity 2
  text: Provide additional I&T systems resources, as required, until the release is in a stable operational environment.
  notes: ''
  parent_id: cobit-2019.bai07.07
- id: cobit-2019.bai07.08.01
  type: activity
  abbrev: BAI07.08-1
  heading: Activity 1
  text: 'Establish procedures to ensure that post-implementation reviews identify, assess and report on the extent to which
    the following events have occurred: enterprise requirements have been met; expected benefits have been realized; the system
    is considered usable; internal and external stakeholder expectations are met; unexpected impacts on the enterprise have
    occurred; key risk is mitigated; and the change management, installation and accreditation processes were performed effectively
    and efficiently.'
  notes: ''
  parent_id: cobit-2019.bai07.08
- id: cobit-2019.bai07.08.02
  type: activity
  abbrev: BAI07.08-2
  heading: Activity 2
  text: Consult business process owners and IT technical management in the choice of metrics for measurement of success and
    achievement of requirements and benefits.
  notes: ''
  parent_id: cobit-2019.bai07.08
- id: cobit-2019.bai07.08.03
  type: activity
  abbrev: BAI07.08-3
  heading: Activity 3
  text: Conduct the post-implementation review in accordance with the organizational change management process. Engage business
    process owners and third parties, as appropriate.
  notes: ''
  parent_id: cobit-2019.bai07.08
- id: cobit-2019.bai07.08.04
  type: activity
  abbrev: BAI07.08-4
  heading: Activity 4
  text: Consider requirements for post-implementation review arising from outside business and IT (e.g., internal audit, ERM,
    compliance).
  notes: ''
  parent_id: cobit-2019.bai07.08
- id: cobit-2019.bai07.08.05
  type: activity
  abbrev: BAI07.08-5
  heading: Activity 5
  text: Agree on and implement an action plan to address issues identified in the post-implementation review. Engage business
    process owners and IT technical management in the development of the action plan.
  notes: ''
  parent_id: cobit-2019.bai07.08
- id: cobit-2019.bai08.01.01
  type: activity
  abbrev: BAI08.01-1
  heading: Activity 1
  text: Identify potential knowledge users, including owners of information who may need to contribute and approve knowledge.
    Obtain knowledge requirements and sources of information from identified users.
  notes: ''
  parent_id: cobit-2019.bai08.01
- id: cobit-2019.bai08.01.02
  type: activity
  abbrev: BAI08.01-2
  heading: Activity 2
  text: Consider content types (procedures, processes, structures, concepts, policies, rules, facts, classifications), artefacts
    (documents, records, video, voice), and structured and unstructured information (experts, social media, email, voice mail,
    Rich Site Summary (RSS) feeds).
  notes: ''
  parent_id: cobit-2019.bai08.01
- id: cobit-2019.bai08.01.03
  type: activity
  abbrev: BAI08.01-3
  heading: Activity 3
  text: Classify sources of information based on a content classification scheme (e.g., information architecture model). Map
    sources of information to the classification scheme.
  notes: ''
  parent_id: cobit-2019.bai08.01
- id: cobit-2019.bai08.01.04
  type: activity
  abbrev: BAI08.01-4
  heading: Activity 4
  text: Collect, collate and validate information sources based on information validation criteria (e.g., understandability,
    relevance, importance, integrity, accuracy, consistency, confidentiality, currency and reliability).
  notes: ''
  parent_id: cobit-2019.bai08.01
- id: cobit-2019.bai08.02.01
  type: activity
  abbrev: BAI08.02-1
  heading: Activity 1
  text: Identify shared attributes and match sources of information, creating relationships among information sets (information
    tagging).
  notes: ''
  parent_id: cobit-2019.bai08.02
- id: cobit-2019.bai08.02.02
  type: activity
  abbrev: BAI08.02-2
  heading: Activity 2
  text: Create views to related data sets, considering stakeholder and organizational requirements.
  notes: ''
  parent_id: cobit-2019.bai08.02
- id: cobit-2019.bai08.02.03
  type: activity
  abbrev: BAI08.02-3
  heading: Activity 3
  text: Devise and implement a scheme to manage unstructured knowledge not available through formal sources (e.g., expert
    knowledge).
  notes: ''
  parent_id: cobit-2019.bai08.02
- id: cobit-2019.bai08.02.04
  type: activity
  abbrev: BAI08.02-4
  heading: Activity 4
  text: Publish and make knowledge accessible to relevant stakeholders, based on roles and access mechanisms.
  notes: ''
  parent_id: cobit-2019.bai08.02
- id: cobit-2019.bai08.03.01
  type: activity
  abbrev: BAI08.03-1
  heading: Activity 1
  text: Set management expectations and demonstrate appropriate attitude regarding the usefulness of knowledge and the need
    to share knowledge related to the governance and management of enterprise I&T.
  notes: ''
  parent_id: cobit-2019.bai08.03
- id: cobit-2019.bai08.03.02
  type: activity
  abbrev: BAI08.03-2
  heading: Activity 2
  text: Identify potential knowledge users by knowledge classification.
  notes: ''
  parent_id: cobit-2019.bai08.03
- id: cobit-2019.bai08.03.03
  type: activity
  abbrev: BAI08.03-3
  heading: Activity 3
  text: Transfer knowledge to knowledge users, based on a needs gap analysis and effective learning techniques. Create an
    environment, tools and artifacts that support the sharing and transfer of knowledge. Ensure appropriate access controls
    are in place, in line with defined knowledge classification.
  notes: ''
  parent_id: cobit-2019.bai08.03
- id: cobit-2019.bai08.03.04
  type: activity
  abbrev: BAI08.03-4
  heading: Activity 4
  text: Measure the use of knowledge tools and elements and evaluate the impact on governance processes.
  notes: ''
  parent_id: cobit-2019.bai08.03
- id: cobit-2019.bai08.03.05
  type: activity
  abbrev: BAI08.03-5
  heading: Activity 5
  text: Improve information and knowledge for governance processes that show knowledge gaps.
  notes: ''
  parent_id: cobit-2019.bai08.03
- id: cobit-2019.bai08.04.01
  type: activity
  abbrev: BAI08.04-1
  heading: Activity 1
  text: Define the controls for knowledge retirement and retire knowledge accordingly.
  notes: ''
  parent_id: cobit-2019.bai08.04
- id: cobit-2019.bai08.04.02
  type: activity
  abbrev: BAI08.04-2
  heading: Activity 2
  text: Evaluate the usefulness, relevance and value of knowledge elements. Update outdated information that still has relevance
    and value to the organization. Identify related information that is no longer relevant to the enterprise’s knowledge requirements
    and retire or archive according to policy.
  notes: ''
  parent_id: cobit-2019.bai08.04
- id: cobit-2019.bai09.01.01
  type: activity
  abbrev: BAI09.01-1
  heading: Activity 1
  text: Identify all owned assets in an asset register that records current status. Assets are reported on the balance sheet;
    they are bought or created to increase the value of a firm or benefit the enterprise's operations (e.g., hardware and
    software). Identify all owned assets and maintain alignment with the change management and configuration management processes,
    the configuration management system, and the financial accounting records.
  notes: ''
  parent_id: cobit-2019.bai09.01
- id: cobit-2019.bai09.01.02
  type: activity
  abbrev: BAI09.01-2
  heading: Activity 2
  text: Identify legal, regulatory or contractual requirements that need to be addressed when managing the asset.
  notes: ''
  parent_id: cobit-2019.bai09.01
- id: cobit-2019.bai09.01.03
  type: activity
  abbrev: BAI09.01-3
  heading: Activity 3
  text: Verify that the assets are fit for purpose (i.e., in a useful condition).
  notes: ''
  parent_id: cobit-2019.bai09.01
- id: cobit-2019.bai09.01.04
  type: activity
  abbrev: BAI09.01-4
  heading: Activity 4
  text: Ensure accounting for all assets.
  notes: ''
  parent_id: cobit-2019.bai09.01
- id: cobit-2019.bai09.01.05
  type: activity
  abbrev: BAI09.01-5
  heading: Activity 5
  text: Verify the existence of all owned assets by performing regular physical and logical inventory checks and reconciliation.
    Include the use of software discovery tools.
  notes: ''
  parent_id: cobit-2019.bai09.01
- id: cobit-2019.bai09.01.06
  type: activity
  abbrev: BAI09.01-6
  heading: Activity 6
  text: Determine on a regular basis whether each asset continues to provide value. If so, estimate the expected useful life
    for delivering value.
  notes: ''
  parent_id: cobit-2019.bai09.01
- id: cobit-2019.bai09.02.01
  type: activity
  abbrev: BAI09.02-1
  heading: Activity 1
  text: Identify assets that are critical in providing service capability by referencing requirements in service definitions,
    SLAs and the configuration management system.
  notes: ''
  parent_id: cobit-2019.bai09.02
- id: cobit-2019.bai09.02.02
  type: activity
  abbrev: BAI09.02-2
  heading: Activity 2
  text: On a regular basis, consider the risk of failure or need for replacement of each critical asset.
  notes: ''
  parent_id: cobit-2019.bai09.02
- id: cobit-2019.bai09.02.03
  type: activity
  abbrev: BAI09.02-3
  heading: Activity 3
  text: Communicate to affected customers and users the expected impact (e.g., performance restrictions) of maintenance activities.
  notes: ''
  parent_id: cobit-2019.bai09.02
- id: cobit-2019.bai09.02.04
  type: activity
  abbrev: BAI09.02-4
  heading: Activity 4
  text: Incorporate planned downtime in an overall production schedule. Schedule the maintenance activities to minimize the
    adverse impact on business processes.
  notes: ''
  parent_id: cobit-2019.bai09.02
- id: cobit-2019.bai09.02.05
  type: activity
  abbrev: BAI09.02-5
  heading: Activity 5
  text: Maintain the resilience of critical assets by applying regular preventive maintenance. Monitor performance and, if
    required, provide alternative and/or additional assets to minimize the likelihood of failure.
  notes: ''
  parent_id: cobit-2019.bai09.02
- id: cobit-2019.bai09.02.06
  type: activity
  abbrev: BAI09.02-6
  heading: Activity 6
  text: Establish a preventive maintenance plan for all hardware, considering cost/benefit analysis, vendor recommendations,
    risk of outage, qualified personnel and other relevant factors.
  notes: ''
  parent_id: cobit-2019.bai09.02
- id: cobit-2019.bai09.02.07
  type: activity
  abbrev: BAI09.02-7
  heading: Activity 7
  text: Establish maintenance agreements involving third-party access to organizational I&T facilities for on-site and off-site
    activities (e.g., outsourcing). Establish formal service contracts containing or referring to all necessary security and
    privacy conditions, including access authorization procedures, to ensure compliance with the organizational security/privacy
    policies and standards.
  notes: ''
  parent_id: cobit-2019.bai09.02
- id: cobit-2019.bai09.02.08
  type: activity
  abbrev: BAI09.02-8
  heading: Activity 8
  text: Ensure that remote access services and user profiles (or other means used for maintenance or diagnosis) are active
    only when required.
  notes: ''
  parent_id: cobit-2019.bai09.02
- id: cobit-2019.bai09.02.09
  type: activity
  abbrev: BAI09.02-9
  heading: Activity 9
  text: Monitor performance of critical assets by examining incident trends. Where necessary, take action to repair or replace.
  notes: ''
  parent_id: cobit-2019.bai09.02
- id: cobit-2019.bai09.03.01
  type: activity
  abbrev: BAI09.03-1
  heading: Activity 1
  text: Procure all assets based on approved requests and in accordance with the enterprise procurement policies and practices.
  notes: ''
  parent_id: cobit-2019.bai09.03
- id: cobit-2019.bai09.03.02
  type: activity
  abbrev: BAI09.03-2
  heading: Activity 2
  text: Source, receive, verify, test and record all assets in a controlled manner, including physical labeling as required.
  notes: ''
  parent_id: cobit-2019.bai09.03
- id: cobit-2019.bai09.03.03
  type: activity
  abbrev: BAI09.03-3
  heading: Activity 3
  text: Approve payments and complete the process with suppliers according to agreed contract conditions.
  notes: ''
  parent_id: cobit-2019.bai09.03
- id: cobit-2019.bai09.03.04
  type: activity
  abbrev: BAI09.03-4
  heading: Activity 4
  text: Deploy assets following the standard implementation life cycle, including change management and acceptance testing.
  notes: ''
  parent_id: cobit-2019.bai09.03
- id: cobit-2019.bai09.03.05
  type: activity
  abbrev: BAI09.03-5
  heading: Activity 5
  text: Allocate assets to users, with acceptance of responsibilities and sign-off, as appropriate.
  notes: ''
  parent_id: cobit-2019.bai09.03
- id: cobit-2019.bai09.03.06
  type: activity
  abbrev: BAI09.03-6
  heading: Activity 6
  text: Whenever possible, reallocate assets when they are no longer required due to a change of user role, redundancy within
    a service, or retirement of a service.
  notes: ''
  parent_id: cobit-2019.bai09.03
- id: cobit-2019.bai09.03.07
  type: activity
  abbrev: BAI09.03-7
  heading: Activity 7
  text: Plan, authorize and implement retirement-related activities, retaining appropriate records to meet ongoing business
    and regulatory needs.
  notes: ''
  parent_id: cobit-2019.bai09.03
- id: cobit-2019.bai09.03.08
  type: activity
  abbrev: BAI09.03-8
  heading: Activity 8
  text: Dispose of assets securely, considering, for example, the permanent deletion of any recorded data on media devices
    and potential damage to the environment.
  notes: ''
  parent_id: cobit-2019.bai09.03
- id: cobit-2019.bai09.03.09
  type: activity
  abbrev: BAI09.03-9
  heading: Activity 9
  text: Dispose of assets responsibly when they serve no useful purpose due to retirement of all related services, obsolete
    technology or lack of users with regard to environmental impact.
  notes: ''
  parent_id: cobit-2019.bai09.03
- id: cobit-2019.bai09.04.01
  type: activity
  abbrev: BAI09.04-1
  heading: Activity 1
  text: On a regular basis, review the overall asset base, considering whether it is aligned with business requirements.
  notes: ''
  parent_id: cobit-2019.bai09.04
- id: cobit-2019.bai09.04.02
  type: activity
  abbrev: BAI09.04-2
  heading: Activity 2
  text: Assess maintenance costs, consider reasonableness, and identify lower-cost options. Include, where necessary, replacement
    with new alternatives.
  notes: ''
  parent_id: cobit-2019.bai09.04
- id: cobit-2019.bai09.04.03
  type: activity
  abbrev: BAI09.04-3
  heading: Activity 3
  text: Review warranties and consider value-for-money and replacement strategies to determine lowest-cost options.
  notes: ''
  parent_id: cobit-2019.bai09.04
- id: cobit-2019.bai09.04.04
  type: activity
  abbrev: BAI09.04-4
  heading: Activity 4
  text: Use capacity and utilization statistics to identify underutilized or redundant assets that could be considered for
    disposal or replacement to reduce costs.
  notes: ''
  parent_id: cobit-2019.bai09.04
- id: cobit-2019.bai09.04.05
  type: activity
  abbrev: BAI09.04-5
  heading: Activity 5
  text: Review the overall base to identify opportunities for standardization, single sourcing, and other strategies that
    may lower procurement, support and maintenance costs.
  notes: ''
  parent_id: cobit-2019.bai09.04
- id: cobit-2019.bai09.04.06
  type: activity
  abbrev: BAI09.04-6
  heading: Activity 6
  text: Review the overall state to identify opportunities to leverage emerging technologies or alternative sourcing strategies
    to reduce costs or increase value-for-money.
  notes: ''
  parent_id: cobit-2019.bai09.04
- id: cobit-2019.bai09.05.01
  type: activity
  abbrev: BAI09.05-1
  heading: Activity 1
  text: Maintain a register of all purchased software licenses and associated license agreements.
  notes: ''
  parent_id: cobit-2019.bai09.05
- id: cobit-2019.bai09.05.02
  type: activity
  abbrev: BAI09.05-2
  heading: Activity 2
  text: On a regular basis, conduct an audit to identify all instances of installed licensed software.
  notes: ''
  parent_id: cobit-2019.bai09.05
- id: cobit-2019.bai09.05.03
  type: activity
  abbrev: BAI09.05-3
  heading: Activity 3
  text: Compare the number of installed software instances with the number of licenses owned. Ensure that the license compliance
    measurement method is compliant with the license and contractual requirements.
  notes: ''
  parent_id: cobit-2019.bai09.05
- id: cobit-2019.bai09.05.04
  type: activity
  abbrev: BAI09.05-4
  heading: Activity 4
  text: When instances are lower than the number owned, decide whether there is a need to retain or terminate licenses, considering
    the potential to save on unnecessary maintenance, training and other costs.
  notes: ''
  parent_id: cobit-2019.bai09.05
- id: cobit-2019.bai09.05.05
  type: activity
  abbrev: BAI09.05-5
  heading: Activity 5
  text: When instances are higher than the number owned, consider first the opportunity to uninstall instances that are no
    longer required or justified, and then, if necessary, purchase additional licenses to comply with the license agreement.
  notes: ''
  parent_id: cobit-2019.bai09.05
- id: cobit-2019.bai09.05.06
  type: activity
  abbrev: BAI09.05-6
  heading: Activity 6
  text: On a regular basis, consider whether better value can be obtained by upgrading products and associated licenses.
  notes: ''
  parent_id: cobit-2019.bai09.05
- id: cobit-2019.bai10.01.01
  type: activity
  abbrev: BAI10.01-1
  heading: Activity 1
  text: Define and agree on the scope and level of detail for configuration management (i.e., which services, assets and infrastructure
    configurable items to include).
  notes: ''
  parent_id: cobit-2019.bai10.01
- id: cobit-2019.bai10.01.02
  type: activity
  abbrev: BAI10.01-2
  heading: Activity 2
  text: Establish and maintain a logical model for configuration management, including information on CI types, attributes,
    relationship types, relationship attributes and status codes.
  notes: ''
  parent_id: cobit-2019.bai10.01
- id: cobit-2019.bai10.02.01
  type: activity
  abbrev: BAI10.02-1
  heading: Activity 1
  text: Identify and classify CIs and populate the repository.
  notes: ''
  parent_id: cobit-2019.bai10.02
- id: cobit-2019.bai10.02.02
  type: activity
  abbrev: BAI10.02-2
  heading: Activity 2
  text: Create, review and formally agree on configuration baselines of a service, application or infrastructure.
  notes: ''
  parent_id: cobit-2019.bai10.02
- id: cobit-2019.bai10.03.01
  type: activity
  abbrev: BAI10.03-1
  heading: Activity 1
  text: Regularly identify all changes to CIs.
  notes: ''
  parent_id: cobit-2019.bai10.03
- id: cobit-2019.bai10.03.02
  type: activity
  abbrev: BAI10.03-2
  heading: Activity 2
  text: To ensure completeness and accuracy, review proposed changes to CIs against the baseline.
  notes: ''
  parent_id: cobit-2019.bai10.03
- id: cobit-2019.bai10.03.03
  type: activity
  abbrev: BAI10.03-3
  heading: Activity 3
  text: Update configuration details for approved changes to CIs.
  notes: ''
  parent_id: cobit-2019.bai10.03
- id: cobit-2019.bai10.03.04
  type: activity
  abbrev: BAI10.03-4
  heading: Activity 4
  text: Create, review and formally agree on changes to configuration baselines whenever needed.
  notes: ''
  parent_id: cobit-2019.bai10.03
- id: cobit-2019.bai10.04.01
  type: activity
  abbrev: BAI10.04-1
  heading: Activity 1
  text: Identify status changes of CIs and report against the baseline.
  notes: ''
  parent_id: cobit-2019.bai10.04
- id: cobit-2019.bai10.04.02
  type: activity
  abbrev: BAI10.04-2
  heading: Activity 2
  text: Match all configuration changes with approved requests for change to identify any unauthorized changes. Report unauthorized
    changes to change management.
  notes: ''
  parent_id: cobit-2019.bai10.04
- id: cobit-2019.bai10.04.03
  type: activity
  abbrev: BAI10.04-3
  heading: Activity 3
  text: Identify reporting requirements from all stakeholders, including content, frequency and media. Produce reports according
    to the identified requirements.
  notes: ''
  parent_id: cobit-2019.bai10.04
- id: cobit-2019.bai10.05.01
  type: activity
  abbrev: BAI10.05-1
  heading: Activity 1
  text: Periodically verify live configuration items against the configuration repository by comparing physical and logical
    configurations and using appropriate discovery tools, as required.
  notes: ''
  parent_id: cobit-2019.bai10.05
- id: cobit-2019.bai10.05.02
  type: activity
  abbrev: BAI10.05-2
  heading: Activity 2
  text: Report and review all deviations for approved corrections or action to remove any unauthorized assets.
  notes: ''
  parent_id: cobit-2019.bai10.05
- id: cobit-2019.bai10.05.03
  type: activity
  abbrev: BAI10.05-3
  heading: Activity 3
  text: Periodically verify that all physical configuration items, as defined in the repository, physically exist. Report
    any deviations to management.
  notes: ''
  parent_id: cobit-2019.bai10.05
- id: cobit-2019.bai10.05.04
  type: activity
  abbrev: BAI10.05-4
  heading: Activity 4
  text: Set and periodically review the target for completeness of the configuration repository based on business need.
  notes: ''
  parent_id: cobit-2019.bai10.05
- id: cobit-2019.bai10.05.05
  type: activity
  abbrev: BAI10.05-5
  heading: Activity 5
  text: Periodically compare the degree of completeness and accuracy against targets and take remedial action, as necessary,
    to improve the quality of the repository data.
  notes: ''
  parent_id: cobit-2019.bai10.05
- id: cobit-2019.bai11.01.01
  type: activity
  abbrev: BAI11.01-1
  heading: Activity 1
  text: Maintain and enforce a standard approach to project management aligned to the enterprise’s specific environment and
    with good practice based on defined process and use of appropriate technology. Ensure that the approach covers the full
    life cycle and disciplines to be followed, including the management of scope, resources, risk, cost, quality, time, communication,
    stakeholder involvement, procurement, change control, integration and benefit realization.
  notes: ''
  parent_id: cobit-2019.bai11.01
- id: cobit-2019.bai11.01.02
  type: activity
  abbrev: BAI11.01-2
  heading: Activity 2
  text: Provide appropriate project management training and consider certification for project managers.
  notes: ''
  parent_id: cobit-2019.bai11.01
- id: cobit-2019.bai11.01.03
  type: activity
  abbrev: BAI11.01-3
  heading: Activity 3
  text: Put in place a project management office (PMO) that maintains the standard approach for program and project management
    across the organization. The PMO supports all projects by creating and maintaining required project documentation templates,
    providing training and best practices for project managers, tracking metrics on the use of best practices for project
    management, etc. In some cases, the PMO may also report on project progress to senior management and/or stakeholders,
    help prioritize projects, and ensure all projects support the overall business objectives of the enterprise.
  notes: ''
  parent_id: cobit-2019.bai11.01
- id: cobit-2019.bai11.01.04
  type: activity
  abbrev: BAI11.01-4
  heading: Activity 4
  text: Evaluate lessons learned on the use of the project management approach. Update the good practices, tools and templates
    accordingly.
  notes: ''
  parent_id: cobit-2019.bai11.01
- id: cobit-2019.bai11.02.01
  type: activity
  abbrev: BAI11.02-1
  heading: Activity 1
  text: To create a common understanding of project scope among stakeholders, provide them a clear written statement defining
    the nature, scope and deliverables of every project.
  notes: ''
  parent_id: cobit-2019.bai11.02
- id: cobit-2019.bai11.02.02
  type: activity
  abbrev: BAI11.02-2
  heading: Activity 2
  text: Ensure that each project has one or more sponsors with sufficient authority to manage execution of the project within
    the overall program.
  notes: ''
  parent_id: cobit-2019.bai11.02
- id: cobit-2019.bai11.02.03
  type: activity
  abbrev: BAI11.02-3
  heading: Activity 3
  text: Ensure that key stakeholders and sponsors within the enterprise (business and IT) agree on and accept the requirements
    for the project, including definition of project success (acceptance) criteria and key performance indicators (KPIs).
  notes: ''
  parent_id: cobit-2019.bai11.02
- id: cobit-2019.bai11.02.04
  type: activity
  abbrev: BAI11.02-4
  heading: Activity 4
  text: Appoint a dedicated manager for the project. Ensure that the individual has the required understanding of technology
    and business and the commensurate competencies and skills to manage the project effectively and efficiently.
  notes: ''
  parent_id: cobit-2019.bai11.02
- id: cobit-2019.bai11.02.05
  type: activity
  abbrev: BAI11.02-5
  heading: Activity 5
  text: Ensure that the project definition describes the requirements for a project communication plan that identifies internal
    and external project communications.
  notes: ''
  parent_id: cobit-2019.bai11.02
- id: cobit-2019.bai11.02.06
  type: activity
  abbrev: BAI11.02-6
  heading: Activity 6
  text: With the approval of stakeholders, maintain the project definition throughout the project, reflecting changing requirements.
  notes: ''
  parent_id: cobit-2019.bai11.02
- id: cobit-2019.bai11.02.07
  type: activity
  abbrev: BAI11.02-7
  heading: Activity 7
  text: To track the execution of a project, put in place mechanisms such as regular reporting and stage-gate, release or
    phase reviews, to occur in a timely manner and with appropriate approval.
  notes: ''
  parent_id: cobit-2019.bai11.02
- id: cobit-2019.bai11.03.01
  type: activity
  abbrev: BAI11.03-1
  heading: Activity 1
  text: Plan how stakeholders inside and outside the enterprise will be identified, analyzed, engaged and managed through
    the life cycle of the project.
  notes: ''
  parent_id: cobit-2019.bai11.03
- id: cobit-2019.bai11.03.02
  type: activity
  abbrev: BAI11.03-2
  heading: Activity 2
  text: Identify, engage and manage stakeholders by establishing and maintaining appropriate levels of co-ordination, communication
    and liaison to ensure they are involved in the project.
  notes: ''
  parent_id: cobit-2019.bai11.03
- id: cobit-2019.bai11.03.03
  type: activity
  abbrev: BAI11.03-3
  heading: Activity 3
  text: Analyze stakeholder interests, requirements and engagement. Take remedial actions as required.
  notes: ''
  parent_id: cobit-2019.bai11.03
- id: cobit-2019.bai11.04.01
  type: activity
  abbrev: BAI11.04-1
  heading: Activity 1
  text: Develop a project plan that provides information to enable management to control project progress progressively. The
    plan should include details of project deliverables and acceptance criteria, required internal and external resources
    and responsibilities, clear work breakdown structures and work packages, estimates of resources required, milestones/release
    plan/phases, key dependencies, budget and costs, and identification of a critical path.
  notes: ''
  parent_id: cobit-2019.bai11.04
- id: cobit-2019.bai11.04.02
  type: activity
  abbrev: BAI11.04-2
  heading: Activity 2
  text: Maintain the project plan and any dependent plans (e.g., risk plan, quality plan, benefits realization plan). Ensure
    that the plans are up to date and reflect actual progress and approved material changes.
  notes: ''
  parent_id: cobit-2019.bai11.04
- id: cobit-2019.bai11.04.03
  type: activity
  abbrev: BAI11.04-3
  heading: Activity 3
  text: Ensure that there is effective communication of project plans and progress reports. Ensure that any changes made to
    individual plans are reflected in other plans.
  notes: ''
  parent_id: cobit-2019.bai11.04
- id: cobit-2019.bai11.04.04
  type: activity
  abbrev: BAI11.04-4
  heading: Activity 4
  text: Determine the activities, interdependencies and required collaboration and communication within the project and among
    multiple projects within a program.
  notes: ''
  parent_id: cobit-2019.bai11.04
- id: cobit-2019.bai11.04.05
  type: activity
  abbrev: BAI11.04-5
  heading: Activity 5
  text: Ensure that each milestone is accompanied by a significant deliverable requiring review and sign-off.
  notes: ''
  parent_id: cobit-2019.bai11.04
- id: cobit-2019.bai11.04.06
  type: activity
  abbrev: BAI11.04-6
  heading: Activity 6
  text: Establish a project baseline (e.g., cost, schedule, scope, quality) that is appropriately reviewed, approved and incorporated
    into the integrated project plan.
  notes: ''
  parent_id: cobit-2019.bai11.04
- id: cobit-2019.bai11.05.01
  type: activity
  abbrev: BAI11.05-1
  heading: Activity 1
  text: To provide quality assurance for the project deliverables, identify ownership and responsibilities, quality review
    processes, success criteria and performance metrics.
  notes: ''
  parent_id: cobit-2019.bai11.05
- id: cobit-2019.bai11.05.02
  type: activity
  abbrev: BAI11.05-2
  heading: Activity 2
  text: Identify assurance tasks and practices required to support the accreditation of new or modified systems during project
    planning. Include them in the integrated plans. Ensure that the tasks provide assurance that internal controls and security
    and privacy solutions meet the defined requirements.
  notes: ''
  parent_id: cobit-2019.bai11.05
- id: cobit-2019.bai11.05.03
  type: activity
  abbrev: BAI11.05-3
  heading: Activity 3
  text: Define any requirements for independent validation and verification of the quality of deliverables in the plan.
  notes: ''
  parent_id: cobit-2019.bai11.05
- id: cobit-2019.bai11.05.04
  type: activity
  abbrev: BAI11.05-4
  heading: Activity 4
  text: Perform quality assurance and control activities in accordance with the quality management plan and QMS.
  notes: ''
  parent_id: cobit-2019.bai11.05
- id: cobit-2019.bai11.06.01
  type: activity
  abbrev: BAI11.06-1
  heading: Activity 1
  text: Establish a formal project risk management approach aligned with the ERM framework. Ensure that the approach includes
    identifying, analyzing, responding to, mitigating, monitoring and controlling risk.
  notes: ''
  parent_id: cobit-2019.bai11.06
- id: cobit-2019.bai11.06.02
  type: activity
  abbrev: BAI11.06-2
  heading: Activity 2
  text: Assign to appropriately skilled personnel the responsibility for executing the enterprise’s project risk management
    process within a project and ensure that this is incorporated into the solution development practices. Consider allocating
    this role to an independent team, especially if an objective viewpoint is required or a project is considered critical.
  notes: ''
  parent_id: cobit-2019.bai11.06
- id: cobit-2019.bai11.06.03
  type: activity
  abbrev: BAI11.06-3
  heading: Activity 3
  text: Identify owners for actions to avoid, accept or mitigate risk.
  notes: ''
  parent_id: cobit-2019.bai11.06
- id: cobit-2019.bai11.06.04
  type: activity
  abbrev: BAI11.06-4
  heading: Activity 4
  text: Perform the project risk assessment of identifying and quantifying risk continuously throughout the project. Manage
    and communicate risk appropriately within the project governance structure.
  notes: ''
  parent_id: cobit-2019.bai11.06
- id: cobit-2019.bai11.06.05
  type: activity
  abbrev: BAI11.06-5
  heading: Activity 5
  text: Reassess project risk periodically, including at initiation of each major project phase and as part of major change
    request assessments.
  notes: ''
  parent_id: cobit-2019.bai11.06
- id: cobit-2019.bai11.06.06
  type: activity
  abbrev: BAI11.06-6
  heading: Activity 6
  text: Maintain and review a project risk register of all potential project risk and a risk mitigation log of all project
    issues and their resolution. Analyze the log periodically for trends and recurring problems to ensure that root causes
    are corrected.
  notes: ''
  parent_id: cobit-2019.bai11.06
- id: cobit-2019.bai11.07.01
  type: activity
  abbrev: BAI11.07-1
  heading: Activity 1
  text: Establish and use a set of project criteria including, but not limited to, scope, expected business benefit, schedule,
    quality, cost and level of risk.
  notes: ''
  parent_id: cobit-2019.bai11.07
- id: cobit-2019.bai11.07.02
  type: activity
  abbrev: BAI11.07-2
  heading: Activity 2
  text: Report to identified key stakeholders project progress within the project, deviations from established key project
    performance criteria (such as, but not limited to, the expected business benefits), and potential positive and negative
    effects on the project.
  notes: ''
  parent_id: cobit-2019.bai11.07
- id: cobit-2019.bai11.07.03
  type: activity
  abbrev: BAI11.07-3
  heading: Activity 3
  text: Document and submit any necessary changes to the project’s key stakeholders for their approval before adoption. Communicate
    revised criteria to project managers for use in future performance reports.
  notes: ''
  parent_id: cobit-2019.bai11.07
- id: cobit-2019.bai11.07.04
  type: activity
  abbrev: BAI11.07-4
  heading: Activity 4
  text: For the deliverables produced in each iteration, release or project phase, gain approval and sign-off from designated
    managers and users in the affected business and IT functions.
  notes: ''
  parent_id: cobit-2019.bai11.07
- id: cobit-2019.bai11.07.05
  type: activity
  abbrev: BAI11.07-5
  heading: Activity 5
  text: Base the approval process on clearly defined acceptance criteria agreed on by key stakeholders before work commences
    on the project phase or iteration deliverable.
  notes: ''
  parent_id: cobit-2019.bai11.07
- id: cobit-2019.bai11.07.06
  type: activity
  abbrev: BAI11.07-6
  heading: Activity 6
  text: Assess the project at agreed major stage-gates, releases or iterations. Make formal go/no-go decisions based on predetermined
    critical success criteria.
  notes: ''
  parent_id: cobit-2019.bai11.07
- id: cobit-2019.bai11.07.07
  type: activity
  abbrev: BAI11.07-7
  heading: Activity 7
  text: Establish and operate a change control system for the project so that all changes to the project baseline (e.g., scope,
    expected business benefits, schedule, quality, cost, risk level) are appropriately reviewed, approved and incorporated
    into the integrated project plan in line with the program and project governance framework.
  notes: ''
  parent_id: cobit-2019.bai11.07
- id: cobit-2019.bai11.07.08
  type: activity
  abbrev: BAI11.07-8
  heading: Activity 8
  text: Measure project performance against key project performance criteria. Analyze deviations from established key project
    performance criteria for cause and assess positive and negative effects on the project.
  notes: ''
  parent_id: cobit-2019.bai11.07
- id: cobit-2019.bai11.07.09
  type: activity
  abbrev: BAI11.07-9
  heading: Activity 9
  text: Monitor changes to the project and review existing key project performance criteria to determine whether they still
    represent valid measures of progress.
  notes: ''
  parent_id: cobit-2019.bai11.07
- id: cobit-2019.bai11.07.10
  type: activity
  abbrev: BAI11.07-10
  heading: Activity 10
  text: Recommend and monitor remedial action, when required, in line with the project governance framework.
  notes: ''
  parent_id: cobit-2019.bai11.07
- id: cobit-2019.bai11.08.01
  type: activity
  abbrev: BAI11.08-1
  heading: Activity 1
  text: Identify business and IT resource needs for the project and clearly map appropriate roles and responsibilities, with
    escalation and decision-making authorities agreed and understood.
  notes: ''
  parent_id: cobit-2019.bai11.08
- id: cobit-2019.bai11.08.02
  type: activity
  abbrev: BAI11.08-2
  heading: Activity 2
  text: Identify required skills and time requirements for all individuals involved in the project phases in relation to defined
    roles. Staff the roles based on available skills information (e.g., IT skills matrix).
  notes: ''
  parent_id: cobit-2019.bai11.08
- id: cobit-2019.bai11.08.03
  type: activity
  abbrev: BAI11.08-3
  heading: Activity 3
  text: Utilize experienced project management and team leader resources with skills appropriate to the size, complexity and
    risk of the project.
  notes: ''
  parent_id: cobit-2019.bai11.08
- id: cobit-2019.bai11.08.04
  type: activity
  abbrev: BAI11.08-4
  heading: Activity 4
  text: Consider and clearly define the roles and responsibilities of other involved parties, including finance, legal, procurement,
    HR, internal audit and compliance.
  notes: ''
  parent_id: cobit-2019.bai11.08
- id: cobit-2019.bai11.08.05
  type: activity
  abbrev: BAI11.08-5
  heading: Activity 5
  text: Clearly define and agree on the responsibility for procurement and management of third-party products and services,
    and manage the relationships.
  notes: ''
  parent_id: cobit-2019.bai11.08
- id: cobit-2019.bai11.08.06
  type: activity
  abbrev: BAI11.08-6
  heading: Activity 6
  text: Identify and authorize the execution of the work according to the project plan.
  notes: ''
  parent_id: cobit-2019.bai11.08
- id: cobit-2019.bai11.08.07
  type: activity
  abbrev: BAI11.08-7
  heading: Activity 7
  text: Identify project plan gaps and provide feedback to the project manager to remediate.
  notes: ''
  parent_id: cobit-2019.bai11.08
- id: cobit-2019.bai11.09.01
  type: activity
  abbrev: BAI11.09-1
  heading: Activity 1
  text: Obtain stakeholder acceptance of project deliverables and transfer ownership.
  notes: ''
  parent_id: cobit-2019.bai11.09
- id: cobit-2019.bai11.09.02
  type: activity
  abbrev: BAI11.09-2
  heading: Activity 2
  text: Define and apply key steps for project closure, including post-implementation reviews that assess whether a project
    attained desired results.
  notes: ''
  parent_id: cobit-2019.bai11.09
- id: cobit-2019.bai11.09.03
  type: activity
  abbrev: BAI11.09-3
  heading: Activity 3
  text: Plan and execute post-implementation reviews to determine whether projects delivered expected results. Improve the
    project management and system development process methodology.
  notes: ''
  parent_id: cobit-2019.bai11.09
- id: cobit-2019.bai11.09.04
  type: activity
  abbrev: BAI11.09-4
  heading: Activity 4
  text: Identify, assign, communicate and track any uncompleted activities required to ensure the project delivered the required
    results in terms of capabilities and the results contributed as expected to the program benefits.
  notes: ''
  parent_id: cobit-2019.bai11.09
- id: cobit-2019.bai11.09.05
  type: activity
  abbrev: BAI11.09-5
  heading: Activity 5
  text: Regularly, and upon completion of the project, collect lessons learned from the project participants. Review them
    and the key activities that led to delivered benefits and value. Analyze the data and make recommendations for improving
    the current project and the project management method for future projects.
  notes: ''
  parent_id: cobit-2019.bai11.09
- id: cobit-2019.dss01.01.01
  type: activity
  abbrev: DSS01.01-1
  heading: Activity 1
  text: Develop and maintain operational procedures and related activities to support all delivered services.
  notes: ''
  parent_id: cobit-2019.dss01.01
- id: cobit-2019.dss01.01.02
  type: activity
  abbrev: DSS01.01-2
  heading: Activity 2
  text: Maintain a schedule of operational activities and perform the activities.
  notes: ''
  parent_id: cobit-2019.dss01.01
- id: cobit-2019.dss01.01.03
  type: activity
  abbrev: DSS01.01-3
  heading: Activity 3
  text: Verify that all data expected for processing are received and processed completely, accurately and in a timely manner.
    Deliver output in accordance with enterprise requirements. Support restart and reprocessing needs. Ensure that users are
    receiving the right outputs in a secure and timely manner.
  notes: ''
  parent_id: cobit-2019.dss01.01
- id: cobit-2019.dss01.01.04
  type: activity
  abbrev: DSS01.01-4
  heading: Activity 4
  text: Manage the performance and throughput of the scheduled activities.
  notes: ''
  parent_id: cobit-2019.dss01.01
- id: cobit-2019.dss01.01.05
  type: activity
  abbrev: DSS01.01-5
  heading: Activity 5
  text: Monitor incidents and problems dealing with operational procedures and take appropriate action to improve reliability
    of operational tasks performed.
  notes: ''
  parent_id: cobit-2019.dss01.01
- id: cobit-2019.dss01.02.01
  type: activity
  abbrev: DSS01.02-1
  heading: Activity 1
  text: Ensure that the enterprise’s requirements for security of information processes adhere to contracts and SLAs with
    third parties hosting or providing services.
  notes: ''
  parent_id: cobit-2019.dss01.02
- id: cobit-2019.dss01.02.02
  type: activity
  abbrev: DSS01.02-2
  heading: Activity 2
  text: Ensure that the enterprise’s operational business and IT processing requirements and priorities for service delivery
    adhere to contracts and SLAs with third parties hosting or providing services.
  notes: ''
  parent_id: cobit-2019.dss01.02
- id: cobit-2019.dss01.02.03
  type: activity
  abbrev: DSS01.02-3
  heading: Activity 3
  text: Integrate critical internal IT management processes with those of outsourced service providers. This should cover,
    for example, performance and capacity planning, change management, configuration management, service request and incident
    management, problem management, security management, business continuity, and the monitoring of process performance and
    reporting.
  notes: ''
  parent_id: cobit-2019.dss01.02
- id: cobit-2019.dss01.02.04
  type: activity
  abbrev: DSS01.02-4
  heading: Activity 4
  text: Plan for independent audit and assurance of the operational environments of outsourced providers to confirm that agreed
    requirements are being adequately addressed.
  notes: ''
  parent_id: cobit-2019.dss01.02
- id: cobit-2019.dss01.03.01
  type: activity
  abbrev: DSS01.03-1
  heading: Activity 1
  text: Log events. Identify the level of information to be recorded, based on a consideration of risk and performance.
  notes: ''
  parent_id: cobit-2019.dss01.03
- id: cobit-2019.dss01.03.02
  type: activity
  abbrev: DSS01.03-2
  heading: Activity 2
  text: Identify and maintain a list of infrastructure assets that need to be monitored, based on service criticality and
    the relationship between configuration items and services that depend on them.
  notes: ''
  parent_id: cobit-2019.dss01.03
- id: cobit-2019.dss01.03.03
  type: activity
  abbrev: DSS01.03-3
  heading: Activity 3
  text: Define and implement rules that identify and record threshold breaches and event conditions. Find a balance between
    generating spurious minor events and significant events so event logs are not overloaded with unnecessary information.
  notes: ''
  parent_id: cobit-2019.dss01.03
- id: cobit-2019.dss01.03.04
  type: activity
  abbrev: DSS01.03-4
  heading: Activity 4
  text: Produce event logs and retain them for an appropriate period to assist in future investigations.
  notes: ''
  parent_id: cobit-2019.dss01.03
- id: cobit-2019.dss01.03.05
  type: activity
  abbrev: DSS01.03-5
  heading: Activity 5
  text: Ensure that incident tickets are created in a timely manner when monitoring identified deviations from defined thresholds.
  notes: ''
  parent_id: cobit-2019.dss01.03
- id: cobit-2019.dss01.03.06
  type: activity
  abbrev: DSS01.03-6
  heading: Activity 6
  text: Establish procedures for monitoring event logs. Conduct regular reviews.
  notes: ''
  parent_id: cobit-2019.dss01.03
- id: cobit-2019.dss01.04.01
  type: activity
  abbrev: DSS01.04-1
  heading: Activity 1
  text: Identify natural and man-made disasters that might occur in the area where the IT facilities are located. Assess the
    potential effect on the IT facilities.
  notes: ''
  parent_id: cobit-2019.dss01.04
- id: cobit-2019.dss01.04.02
  type: activity
  abbrev: DSS01.04-2
  heading: Activity 2
  text: Identify how I&T equipment, including mobile and off-site equipment, is protected against environmental threats. Ensure
    that the policy limits or excludes eating, drinking and smoking in sensitive areas, and prohibits storage of stationery
    and other supplies that pose a fire hazard within computer rooms.
  notes: ''
  parent_id: cobit-2019.dss01.04
- id: cobit-2019.dss01.04.03
  type: activity
  abbrev: DSS01.04-3
  heading: Activity 3
  text: Keep the IT sites and server rooms clean and in a safe condition at all times (i.e., no mess, no paper or cardboard
    boxes, no filled dustbins, no flammable chemicals or materials).
  notes: ''
  parent_id: cobit-2019.dss01.04
- id: cobit-2019.dss01.04.04
  type: activity
  abbrev: DSS01.04-4
  heading: Activity 4
  text: Situate and construct IT facilities to minimize and mitigate susceptibility to environmental threats (e.g., theft,
    air, fire, smoke, water, vibration, terror, vandalism, chemicals, explosives). Consider specific security zones and/or
    fireproof cells (e.g., locating production and development environments/servers away from each other).
  notes: ''
  parent_id: cobit-2019.dss01.04
- id: cobit-2019.dss01.04.05
  type: activity
  abbrev: DSS01.04-5
  heading: Activity 5
  text: Compare measures and contingency plans against insurance policy requirements and report results. Address points of
    noncompliance in a timely manner.
  notes: ''
  parent_id: cobit-2019.dss01.04
- id: cobit-2019.dss01.04.06
  type: activity
  abbrev: DSS01.04-6
  heading: Activity 6
  text: Respond to environmental alarms and other notifications. Document and test procedures, which should include prioritization
    of alarms and contact with local emergency response authorities. Train personnel in these procedures.
  notes: ''
  parent_id: cobit-2019.dss01.04
- id: cobit-2019.dss01.04.07
  type: activity
  abbrev: DSS01.04-7
  heading: Activity 7
  text: Regularly monitor and maintain devices that proactively detect environmental threats (e.g., fire, water, smoke, humidity).
  notes: ''
  parent_id: cobit-2019.dss01.04
- id: cobit-2019.dss01.05.01
  type: activity
  abbrev: DSS01.05-1
  heading: Activity 1
  text: Examine the IT facilities’ requirement for protection against power fluctuations and outages, in conjunction with
    other business continuity planning requirements. Procure suitable uninterruptible supply equipment (e.g., batteries, generators)
    to support business continuity planning.
  notes: ''
  parent_id: cobit-2019.dss01.05
- id: cobit-2019.dss01.05.02
  type: activity
  abbrev: DSS01.05-2
  heading: Activity 2
  text: Regularly test the uninterruptible power supply’s mechanisms. Ensure that power can be switched to the supply without
    any significant effect on business operations.
  notes: ''
  parent_id: cobit-2019.dss01.05
- id: cobit-2019.dss01.05.03
  type: activity
  abbrev: DSS01.05-3
  heading: Activity 3
  text: Ensure that the facilities housing the I&T systems have more than one source for dependent utilities (e.g., power,
    telecommunications, water, gas). Separate the physical entrance of each utility.
  notes: ''
  parent_id: cobit-2019.dss01.05
- id: cobit-2019.dss01.05.04
  type: activity
  abbrev: DSS01.05-4
  heading: Activity 4
  text: Confirm that cabling external to the IT site is located underground or has suitable alternative protection. Determine
    that cabling within the IT site is contained within secured conduits, and access to wiring cabinets is restricted to authorized
    personnel. Properly protect cabling against damage caused by fire, smoke, water, interception and interference.
  notes: ''
  parent_id: cobit-2019.dss01.05
- id: cobit-2019.dss01.05.05
  type: activity
  abbrev: DSS01.05-5
  heading: Activity 5
  text: Ensure that cabling and physical patching (data and phone) are structured and organized. Cabling and conduit structures
    should be documented (e.g., blueprint building plan and wiring diagrams).
  notes: ''
  parent_id: cobit-2019.dss01.05
- id: cobit-2019.dss01.05.06
  type: activity
  abbrev: DSS01.05-6
  heading: Activity 6
  text: On regular basis, educate personnel on health and safety laws, regulations, and relevant guidelines. Educate personnel
    on fire and rescue drills to ensure knowledge and actions taken in case of fire or similar incidents.
  notes: ''
  parent_id: cobit-2019.dss01.05
- id: cobit-2019.dss01.05.07
  type: activity
  abbrev: DSS01.05-7
  heading: Activity 7
  text: Ensure that IT sites and equipment are maintained according to the supplier’s recommended service intervals and specifications.
    Ensure that maintenance is carried out only by authorized personnel.
  notes: ''
  parent_id: cobit-2019.dss01.05
- id: cobit-2019.dss01.05.08
  type: activity
  abbrev: DSS01.05-8
  heading: Activity 8
  text: Analyze the facilities housing’s high-availability systems for redundancy and fail-over cabling requirements (external
    and internal).
  notes: ''
  parent_id: cobit-2019.dss01.05
- id: cobit-2019.dss01.05.09
  type: activity
  abbrev: DSS01.05-9
  heading: Activity 9
  text: Ensure that IT sites and facilities are in ongoing compliance with relevant health and safety laws, regulations, guidelines,
    and vendor specifications.
  notes: ''
  parent_id: cobit-2019.dss01.05
- id: cobit-2019.dss01.05.10
  type: activity
  abbrev: DSS01.05-10
  heading: Activity 10
  text: Record, monitor, manage and resolve facilities incidents in line with the I&T incident management process. Make available
    reports on facilities incidents for which disclosure is required by laws and regulations.
  notes: ''
  parent_id: cobit-2019.dss01.05
- id: cobit-2019.dss01.05.11
  type: activity
  abbrev: DSS01.05-11
  heading: Activity 11
  text: Analyze physical alterations to IT sites or premises to reassess the environmental risk (e.g., fire or water damage).
    Report results of this analysis to business continuity and facilities management.
  notes: ''
  parent_id: cobit-2019.dss01.05
- id: cobit-2019.dss02.01.01
  type: activity
  abbrev: DSS02.01-1
  heading: Activity 1
  text: Define incident and service request classification and prioritization schemes, and criteria for problem registration.
    Use this information to ensure consistent approaches for handling and informing users about problems and conducting trend
    analysis.
  notes: ''
  parent_id: cobit-2019.dss02.01
- id: cobit-2019.dss02.01.02
  type: activity
  abbrev: DSS02.01-2
  heading: Activity 2
  text: Define incident models for known errors to enable efficient and effective resolution.
  notes: ''
  parent_id: cobit-2019.dss02.01
- id: cobit-2019.dss02.01.03
  type: activity
  abbrev: DSS02.01-3
  heading: Activity 3
  text: Define service request models according to service request type to enable self-help and efficient service for standard
    requests.
  notes: ''
  parent_id: cobit-2019.dss02.01
- id: cobit-2019.dss02.01.04
  type: activity
  abbrev: DSS02.01-4
  heading: Activity 4
  text: Define incident escalation rules and procedures, especially for major incidents and security incidents.
  notes: ''
  parent_id: cobit-2019.dss02.01
- id: cobit-2019.dss02.01.05
  type: activity
  abbrev: DSS02.01-5
  heading: Activity 5
  text: Define knowledge sources on incidents and requests and describe how to use them.
  notes: ''
  parent_id: cobit-2019.dss02.01
- id: cobit-2019.dss02.02.01
  type: activity
  abbrev: DSS02.02-1
  heading: Activity 1
  text: Log all service requests and incidents, recording all relevant information, so they can be handled effectively and
    a full historical record can be maintained.
  notes: ''
  parent_id: cobit-2019.dss02.02
- id: cobit-2019.dss02.02.02
  type: activity
  abbrev: DSS02.02-2
  heading: Activity 2
  text: To enable trend analysis, classify service requests and incidents by identifying type and category.
  notes: ''
  parent_id: cobit-2019.dss02.02
- id: cobit-2019.dss02.02.03
  type: activity
  abbrev: DSS02.02-3
  heading: Activity 3
  text: Prioritize service requests and incidents based on the SLA service definition of business impact and urgency.
  notes: ''
  parent_id: cobit-2019.dss02.02
- id: cobit-2019.dss02.03.01
  type: activity
  abbrev: DSS02.03-1
  heading: Activity 1
  text: Verify entitlement for service requests using, where possible, a predefined process flow and standard changes.
  notes: ''
  parent_id: cobit-2019.dss02.03
- id: cobit-2019.dss02.03.02
  type: activity
  abbrev: DSS02.03-2
  heading: Activity 2
  text: Obtain financial and functional approval or sign-off, if required, or predefined approvals for agreed standard changes.
  notes: ''
  parent_id: cobit-2019.dss02.03
- id: cobit-2019.dss02.03.03
  type: activity
  abbrev: DSS02.03-3
  heading: Activity 3
  text: Fulfill the requests by performing the selected request procedure. Where possible, use self-help automated menus and
    predefined request models for frequently requested items.
  notes: ''
  parent_id: cobit-2019.dss02.03
- id: cobit-2019.dss02.04.01
  type: activity
  abbrev: DSS02.04-1
  heading: Activity 1
  text: Identify and describe relevant symptoms to establish the most probable causes of the incidents. Reference available
    knowledge resources (including known errors and problems) to identify possible incident resolutions (temporary workarounds
    and/or permanent solutions).
  notes: ''
  parent_id: cobit-2019.dss02.04
- id: cobit-2019.dss02.04.02
  type: activity
  abbrev: DSS02.04-2
  heading: Activity 2
  text: If a related problem or known error does not already exist and if the incident satisfies agreed criteria for problem
    registration, log a new problem.
  notes: ''
  parent_id: cobit-2019.dss02.04
- id: cobit-2019.dss02.04.03
  type: activity
  abbrev: DSS02.04-3
  heading: Activity 3
  text: Assign incidents to specialist functions if deeper expertise is needed. Engage the appropriate level of management,
    where and if needed.
  notes: ''
  parent_id: cobit-2019.dss02.04
- id: cobit-2019.dss02.05.01
  type: activity
  abbrev: DSS02.05-1
  heading: Activity 1
  text: Select and apply the most appropriate incident resolutions (temporary workaround and/or permanent solution).
  notes: ''
  parent_id: cobit-2019.dss02.05
- id: cobit-2019.dss02.05.02
  type: activity
  abbrev: DSS02.05-2
  heading: Activity 2
  text: Record whether workarounds were used for incident resolution.
  notes: ''
  parent_id: cobit-2019.dss02.05
- id: cobit-2019.dss02.05.03
  type: activity
  abbrev: DSS02.05-3
  heading: Activity 3
  text: Perform recovery actions, if required.
  notes: ''
  parent_id: cobit-2019.dss02.05
- id: cobit-2019.dss02.05.04
  type: activity
  abbrev: DSS02.05-4
  heading: Activity 4
  text: Document incident resolution and assess if the resolution can be used as a future knowledge source.
  notes: ''
  parent_id: cobit-2019.dss02.05
- id: cobit-2019.dss02.06.01
  type: activity
  abbrev: DSS02.06-1
  heading: Activity 1
  text: Verify with the affected users that the service request has been fulfilled satisfactorily or the incident has been
    resolved satisfactorily and within an agreed/acceptable period of time.
  notes: ''
  parent_id: cobit-2019.dss02.06
- id: cobit-2019.dss02.06.02
  type: activity
  abbrev: DSS02.06-2
  heading: Activity 2
  text: Close service requests and incidents.
  notes: ''
  parent_id: cobit-2019.dss02.06
- id: cobit-2019.dss02.07.01
  type: activity
  abbrev: DSS02.07-1
  heading: Activity 1
  text: Monitor and track incident escalations and resolutions and request handling procedures to progress toward resolution
    or completion.
  notes: ''
  parent_id: cobit-2019.dss02.07
- id: cobit-2019.dss02.07.02
  type: activity
  abbrev: DSS02.07-2
  heading: Activity 2
  text: Identify information stakeholders and their needs for data or reports. Identify reporting frequency and medium.
  notes: ''
  parent_id: cobit-2019.dss02.07
- id: cobit-2019.dss02.07.03
  type: activity
  abbrev: DSS02.07-3
  heading: Activity 3
  text: Produce and distribute timely reports or provide controlled access to online data.
  notes: ''
  parent_id: cobit-2019.dss02.07
- id: cobit-2019.dss02.07.04
  type: activity
  abbrev: DSS02.07-4
  heading: Activity 4
  text: Analyze incidents and service requests by category and type. Establish trends and identify patterns of recurring issues,
    SLA breaches or inefficiencies.
  notes: ''
  parent_id: cobit-2019.dss02.07
- id: cobit-2019.dss02.07.05
  type: activity
  abbrev: DSS02.07-5
  heading: Activity 5
  text: Use the information as input to continual improvement planning.
  notes: ''
  parent_id: cobit-2019.dss02.07
- id: cobit-2019.dss03.01.01
  type: activity
  abbrev: DSS03.01-1
  heading: Activity 1
  text: Identify problems through the correlation of incident reports, error logs and other problem identification resources.
  notes: ''
  parent_id: cobit-2019.dss03.01
- id: cobit-2019.dss03.01.02
  type: activity
  abbrev: DSS03.01-2
  heading: Activity 2
  text: Handle all problems formally with access to all relevant data. Include information from the IT change management system
    and IT configuration/asset and incident details.
  notes: ''
  parent_id: cobit-2019.dss03.01
- id: cobit-2019.dss03.01.03
  type: activity
  abbrev: DSS03.01-3
  heading: Activity 3
  text: Define appropriate support groups to assist with problem identification, root cause analysis and solution determination
    to support problem management. Determine support groups based on predefined categories, such as hardware, network, software,
    applications and support software.
  notes: ''
  parent_id: cobit-2019.dss03.01
- id: cobit-2019.dss03.01.04
  type: activity
  abbrev: DSS03.01-4
  heading: Activity 4
  text: Define priority levels through consultation with the business to ensure that problem identification and root cause
    analysis are handled in a timely manner according to the agreed SLAs. Base priority levels on business impact and urgency.
  notes: ''
  parent_id: cobit-2019.dss03.01
- id: cobit-2019.dss03.01.05
  type: activity
  abbrev: DSS03.01-5
  heading: Activity 5
  text: Report the status of identified problems to the service desk so customers and IT management can be kept informed.
  notes: ''
  parent_id: cobit-2019.dss03.01
- id: cobit-2019.dss03.01.06
  type: activity
  abbrev: DSS03.01-6
  heading: Activity 6
  text: Maintain a single problem management catalog to register and report problems identified. Use the catalog to establish
    audit trails of the problem management processes, including the status of each problem (i.e., open, reopen, in progress
    or closed).
  notes: ''
  parent_id: cobit-2019.dss03.01
- id: cobit-2019.dss03.02.01
  type: activity
  abbrev: DSS03.02-1
  heading: Activity 1
  text: Identify problems that may be known errors by comparing incident data with the database of known and suspected errors
    (e.g., those communicated by external vendors). Classify problems as known errors.
  notes: ''
  parent_id: cobit-2019.dss03.02
- id: cobit-2019.dss03.02.02
  type: activity
  abbrev: DSS03.02-2
  heading: Activity 2
  text: Associate the affected configuration items to the established/known error.
  notes: ''
  parent_id: cobit-2019.dss03.02
- id: cobit-2019.dss03.02.03
  type: activity
  abbrev: DSS03.02-3
  heading: Activity 3
  text: Produce reports to communicate the progress in resolving problems and to monitor the continuing impact of problems
    not solved. Monitor the status of the problem-handling process throughout its life cycle, including input from IT change
    and configuration management.
  notes: ''
  parent_id: cobit-2019.dss03.02
- id: cobit-2019.dss03.03.01
  type: activity
  abbrev: DSS03.03-1
  heading: Activity 1
  text: As soon as the root causes of problems are identified, create known-error records and develop a suitable workaround.
  notes: ''
  parent_id: cobit-2019.dss03.03
- id: cobit-2019.dss03.03.02
  type: activity
  abbrev: DSS03.03-2
  heading: Activity 2
  text: Identify, evaluate, prioritize and process (via IT change management) solutions to known errors, based on a cost/benefit
    business case and business impact and urgency.
  notes: ''
  parent_id: cobit-2019.dss03.03
- id: cobit-2019.dss03.04.01
  type: activity
  abbrev: DSS03.04-1
  heading: Activity 1
  text: Close problem records either after confirmation of successful elimination of the known error or after agreement with
    the business on how to alternatively handle the problem.
  notes: ''
  parent_id: cobit-2019.dss03.04
- id: cobit-2019.dss03.04.02
  type: activity
  abbrev: DSS03.04-2
  heading: Activity 2
  text: Inform the service desk of the schedule for problem closure (e.g., the schedule for fixing the known errors, the possible
    workaround or the fact that the problem will remain until the change is implemented) and the consequences of the approach
    taken. Keep affected users and customers informed as appropriate.
  notes: ''
  parent_id: cobit-2019.dss03.04
- id: cobit-2019.dss03.04.03
  type: activity
  abbrev: DSS03.04-3
  heading: Activity 3
  text: Throughout the resolution process, obtain regular reports from IT change management on progress in resolving problems
    and errors.
  notes: ''
  parent_id: cobit-2019.dss03.04
- id: cobit-2019.dss03.04.04
  type: activity
  abbrev: DSS03.04-4
  heading: Activity 4
  text: Monitor the continuing impact of problems and known errors on services.
  notes: ''
  parent_id: cobit-2019.dss03.04
- id: cobit-2019.dss03.04.05
  type: activity
  abbrev: DSS03.04-5
  heading: Activity 5
  text: Review and confirm the success of resolutions of major problems.
  notes: ''
  parent_id: cobit-2019.dss03.04
- id: cobit-2019.dss03.04.06
  type: activity
  abbrev: DSS03.04-6
  heading: Activity 6
  text: Make sure the knowledge learned from the review is incorporated into a service review meeting with the business customer.
  notes: ''
  parent_id: cobit-2019.dss03.04
- id: cobit-2019.dss03.05.01
  type: activity
  abbrev: DSS03.05-1
  heading: Activity 1
  text: Capture problem information related to I&T changes and incidents and communicate it to key stakeholders. Communicate
    via reports and periodic meetings among incident, problem, change and configuration management process owners to consider
    recent problems and potential corrective actions.
  notes: ''
  parent_id: cobit-2019.dss03.05
- id: cobit-2019.dss03.05.02
  type: activity
  abbrev: DSS03.05-2
  heading: Activity 2
  text: Ensure that process owners and managers from incident, problem, change and configuration management meet regularly
    to discuss known problems and future planned changes.
  notes: ''
  parent_id: cobit-2019.dss03.05
- id: cobit-2019.dss03.05.03
  type: activity
  abbrev: DSS03.05-3
  heading: Activity 3
  text: Identify and initiate sustainable solutions (permanent fixes) addressing the root cause. Raise change requests via
    the established change management processes.
  notes: ''
  parent_id: cobit-2019.dss03.05
- id: cobit-2019.dss03.05.04
  type: activity
  abbrev: DSS03.05-4
  heading: Activity 4
  text: To enable the enterprise to monitor the total costs of problems, capture change efforts resulting from problem management
    process activities (e.g., fixes to problems and known errors) and report on them.
  notes: ''
  parent_id: cobit-2019.dss03.05
- id: cobit-2019.dss03.05.05
  type: activity
  abbrev: DSS03.05-5
  heading: Activity 5
  text: Produce reports to monitor problem resolution against the business requirements and SLAs. Ensure the proper escalation
    of problems, such as escalating to a higher management level according to agreed criteria, contacting external vendors,
    or referring to the change advisory board to increase the priority of an urgent request for change (RFC) to implement
    a temporary workaround.
  notes: ''
  parent_id: cobit-2019.dss03.05
- id: cobit-2019.dss03.05.06
  type: activity
  abbrev: DSS03.05-6
  heading: Activity 6
  text: To optimize the use of resources and reduce workarounds, track problem trends.
  notes: ''
  parent_id: cobit-2019.dss03.05
- id: cobit-2019.dss04.01.01
  type: activity
  abbrev: DSS04.01-1
  heading: Activity 1
  text: Identify internal and outsourced business processes and service activities that are critical to the enterprise operations
    or necessary to meet legal and/or contractual obligations.
  notes: ''
  parent_id: cobit-2019.dss04.01
- id: cobit-2019.dss04.01.02
  type: activity
  abbrev: DSS04.01-2
  heading: Activity 2
  text: Identify key stakeholders and roles and responsibilities for defining and agreeing on continuity policy and scope.
  notes: ''
  parent_id: cobit-2019.dss04.01
- id: cobit-2019.dss04.01.03
  type: activity
  abbrev: DSS04.01-3
  heading: Activity 3
  text: Define and document the agreed minimum policy objectives and scope for business resilience.
  notes: ''
  parent_id: cobit-2019.dss04.01
- id: cobit-2019.dss04.01.04
  type: activity
  abbrev: DSS04.01-4
  heading: Activity 4
  text: Identify essential supporting business processes and related I&T services.
  notes: ''
  parent_id: cobit-2019.dss04.01
- id: cobit-2019.dss04.02.01
  type: activity
  abbrev: DSS04.02-1
  heading: Activity 1
  text: Identify potential scenarios likely to give rise to events that could cause significant disruptive incidents.
  notes: ''
  parent_id: cobit-2019.dss04.02
- id: cobit-2019.dss04.02.02
  type: activity
  abbrev: DSS04.02-2
  heading: Activity 2
  text: Conduct a business impact analysis to evaluate the impact over time of a disruption to critical business functions
    and the effect that a disruption would have on them.
  notes: ''
  parent_id: cobit-2019.dss04.02
- id: cobit-2019.dss04.02.03
  type: activity
  abbrev: DSS04.02-3
  heading: Activity 3
  text: Establish the minimum time required to recover a business process and supporting I&T, based on an acceptable length
    of business interruption and maximum tolerable outage.
  notes: ''
  parent_id: cobit-2019.dss04.02
- id: cobit-2019.dss04.02.04
  type: activity
  abbrev: DSS04.02-4
  heading: Activity 4
  text: Determine the conditions and owners of key decisions that will cause the continuity plans to be invoked.
  notes: ''
  parent_id: cobit-2019.dss04.02
- id: cobit-2019.dss04.02.05
  type: activity
  abbrev: DSS04.02-5
  heading: Activity 5
  text: Assess the likelihood of threats that could cause loss of business continuity. Identify measures that will reduce
    the likelihood and impact through improved prevention and increased resilience.
  notes: ''
  parent_id: cobit-2019.dss04.02
- id: cobit-2019.dss04.02.06
  type: activity
  abbrev: DSS04.02-6
  heading: Activity 6
  text: Analyze continuity requirements to identify possible strategic business and technical options.
  notes: ''
  parent_id: cobit-2019.dss04.02
- id: cobit-2019.dss04.02.07
  type: activity
  abbrev: DSS04.02-7
  heading: Activity 7
  text: Identify resource requirements and costs for each strategic technical option and make strategic recommendations.
  notes: ''
  parent_id: cobit-2019.dss04.02
- id: cobit-2019.dss04.02.08
  type: activity
  abbrev: DSS04.02-8
  heading: Activity 8
  text: Obtain executive business approval for selected strategic options.
  notes: ''
  parent_id: cobit-2019.dss04.02
- id: cobit-2019.dss04.03.01
  type: activity
  abbrev: DSS04.03-1
  heading: Activity 1
  text: Define the incident response actions and communications to be taken in the event of disruption. Define related roles
    and responsibilities, including accountability for policy and implementation.
  notes: ''
  parent_id: cobit-2019.dss04.03
- id: cobit-2019.dss04.03.02
  type: activity
  abbrev: DSS04.03-2
  heading: Activity 2
  text: Ensure that key suppliers and outsource partners have effective continuity plans in place. Obtain audited evidence
    as required.
  notes: ''
  parent_id: cobit-2019.dss04.03
- id: cobit-2019.dss04.03.03
  type: activity
  abbrev: DSS04.03-3
  heading: Activity 3
  text: Define the conditions and recovery procedures that would enable resumption of business processing. Include updating
    and reconciliation of information databases to preserve information integrity.
  notes: ''
  parent_id: cobit-2019.dss04.03
- id: cobit-2019.dss04.03.04
  type: activity
  abbrev: DSS04.03-4
  heading: Activity 4
  text: Develop and maintain operational BCPs and DRPs that contain the procedures to be followed to enable continued operation
    of critical business processes and/or temporary processing arrangements. Include links to plans of outsourced service
    providers.
  notes: ''
  parent_id: cobit-2019.dss04.03
- id: cobit-2019.dss04.03.05
  type: activity
  abbrev: DSS04.03-5
  heading: Activity 5
  text: Define and document the resources required to support the continuity and recovery procedures, considering people,
    facilities and IT infrastructure.
  notes: ''
  parent_id: cobit-2019.dss04.03
- id: cobit-2019.dss04.03.06
  type: activity
  abbrev: DSS04.03-6
  heading: Activity 6
  text: Define and document the information backup requirements required to support the plans. Include plans and paper documents
    as well as data files. Consider the need for security and off-site storage.
  notes: ''
  parent_id: cobit-2019.dss04.03
- id: cobit-2019.dss04.03.07
  type: activity
  abbrev: DSS04.03-7
  heading: Activity 7
  text: Determine required skills for individuals involved in executing the plan and procedures.
  notes: ''
  parent_id: cobit-2019.dss04.03
- id: cobit-2019.dss04.03.08
  type: activity
  abbrev: DSS04.03-8
  heading: Activity 8
  text: Distribute the plans and supporting documentation securely to appropriately authorized interested parties. Make sure
    the plans and documentation are accessible under all disaster scenarios.
  notes: ''
  parent_id: cobit-2019.dss04.03
- id: cobit-2019.dss04.04.01
  type: activity
  abbrev: DSS04.04-1
  heading: Activity 1
  text: Define objectives for exercising and testing the business, technical, logistical, administrative, procedural and operational
    systems of the plan to verify completeness of the BCP and DRP in meeting business risk.
  notes: ''
  parent_id: cobit-2019.dss04.04
- id: cobit-2019.dss04.04.02
  type: activity
  abbrev: DSS04.04-2
  heading: Activity 2
  text: Define and agree on stakeholder exercises that are realistic and validate continuity procedures. Include roles and
    responsibilities and data retention arrangements that cause minimum disruption to business processes.
  notes: ''
  parent_id: cobit-2019.dss04.04
- id: cobit-2019.dss04.04.03
  type: activity
  abbrev: DSS04.04-3
  heading: Activity 3
  text: Assign roles and responsibilities for performing continuity plan exercises and tests.
  notes: ''
  parent_id: cobit-2019.dss04.04
- id: cobit-2019.dss04.04.04
  type: activity
  abbrev: DSS04.04-4
  heading: Activity 4
  text: Schedule exercises and test activities as defined in the continuity plans.
  notes: ''
  parent_id: cobit-2019.dss04.04
- id: cobit-2019.dss04.04.05
  type: activity
  abbrev: DSS04.04-5
  heading: Activity 5
  text: Conduct a post-exercise debriefing and analysis to consider the achievement.
  notes: ''
  parent_id: cobit-2019.dss04.04
- id: cobit-2019.dss04.04.06
  type: activity
  abbrev: DSS04.04-6
  heading: Activity 6
  text: Based on the results of the review, develop recommendations for improving the current continuity plans.
  notes: ''
  parent_id: cobit-2019.dss04.04
- id: cobit-2019.dss04.05.01
  type: activity
  abbrev: DSS04.05-1
  heading: Activity 1
  text: On a regular basis, review the continuity plans and capability against any assumptions made and current business operational
    and strategic objectives.
  notes: ''
  parent_id: cobit-2019.dss04.05
- id: cobit-2019.dss04.05.02
  type: activity
  abbrev: DSS04.05-2
  heading: Activity 2
  text: On a regular basis, review the continuity plans to consider the impact of new or major changes to enterprise organization,
    business processes, outsourcing arrangements, technologies, infrastructure, operating systems and application systems.
  notes: ''
  parent_id: cobit-2019.dss04.05
- id: cobit-2019.dss04.05.03
  type: activity
  abbrev: DSS04.05-3
  heading: Activity 3
  text: Consider whether a revised business impact assessment may be required, depending on the nature of the change.
  notes: ''
  parent_id: cobit-2019.dss04.05
- id: cobit-2019.dss04.05.04
  type: activity
  abbrev: DSS04.05-4
  heading: Activity 4
  text: Recommend changes in policy, plans, procedures, infrastructure, and roles and responsibilities. Communicate them as
    appropriate for management approval and processing via the IT change management process.
  notes: ''
  parent_id: cobit-2019.dss04.05
- id: cobit-2019.dss04.06.01
  type: activity
  abbrev: DSS04.06-1
  heading: Activity 1
  text: Roll out BCP and DRP awareness and training.
  notes: ''
  parent_id: cobit-2019.dss04.06
- id: cobit-2019.dss04.06.02
  type: activity
  abbrev: DSS04.06-2
  heading: Activity 2
  text: Define and maintain training requirements and plans for those performing continuity planning, impact assessments,
    risk assessments, media communication and incident response. Ensure that the training plans consider frequency of training
    and training delivery mechanisms.
  notes: ''
  parent_id: cobit-2019.dss04.06
- id: cobit-2019.dss04.06.03
  type: activity
  abbrev: DSS04.06-3
  heading: Activity 3
  text: Develop competencies based on practical training, including participation in exercises and tests.
  notes: ''
  parent_id: cobit-2019.dss04.06
- id: cobit-2019.dss04.06.04
  type: activity
  abbrev: DSS04.06-4
  heading: Activity 4
  text: Based on the exercise and test results, monitor skills and competencies.
  notes: ''
  parent_id: cobit-2019.dss04.06
- id: cobit-2019.dss04.07.01
  type: activity
  abbrev: DSS04.07-1
  heading: Activity 1
  text: Back up systems, applications, data and documentation according to a defined schedule. Consider frequency (monthly,
    weekly, daily, etc.), mode of backup (e.g., disk mirroring for real-time backups vs. DVD-ROM for long-term retention),
    type of backup (e.g., full vs. incremental), and type of media. Consider also automated online backups, data types (e.g.,
    voice, optical), creation of logs, critical end-user computing data (e.g., spreadsheets), physical and logical location
    of data sources, security and access rights, and encryption.
  notes: ''
  parent_id: cobit-2019.dss04.07
- id: cobit-2019.dss04.07.02
  type: activity
  abbrev: DSS04.07-2
  heading: Activity 2
  text: Define requirements for on-site and off-site storage of backup data that meet the business requirements. Consider
    the accessibility required to back up data.
  notes: ''
  parent_id: cobit-2019.dss04.07
- id: cobit-2019.dss04.07.03
  type: activity
  abbrev: DSS04.07-3
  heading: Activity 3
  text: Periodically test and refresh archived and backup data.
  notes: ''
  parent_id: cobit-2019.dss04.07
- id: cobit-2019.dss04.07.04
  type: activity
  abbrev: DSS04.07-4
  heading: Activity 4
  text: Ensure that systems, applications, data and documentation maintained or processed by third parties are adequately
    backed up or otherwise secured. Consider requiring return of backups from third parties. Consider escrow or deposit arrangements.
  notes: ''
  parent_id: cobit-2019.dss04.07
- id: cobit-2019.dss04.08.01
  type: activity
  abbrev: DSS04.08-1
  heading: Activity 1
  text: Assess adherence to the documented BCP and DRP.
  notes: ''
  parent_id: cobit-2019.dss04.08
- id: cobit-2019.dss04.08.02
  type: activity
  abbrev: DSS04.08-2
  heading: Activity 2
  text: Determine the effectiveness of the plans, continuity capabilities, roles and responsibilities, skills and competencies,
    resilience to the incident, technical infrastructure, and organizational structures and relationships.
  notes: ''
  parent_id: cobit-2019.dss04.08
- id: cobit-2019.dss04.08.03
  type: activity
  abbrev: DSS04.08-3
  heading: Activity 3
  text: Identify weaknesses or omissions in the plans and capabilities and make recommendations for improvement. Obtain management
    approval for any changes to the plans and apply via the enterprise change control process.
  notes: ''
  parent_id: cobit-2019.dss04.08
- id: cobit-2019.dss05.01.01
  type: activity
  abbrev: DSS05.01-1
  heading: Activity 1
  text: Install and activate malicious software protection tools on all processing facilities, with malicious software definition
    files that are updated as required (automatically or semi-automatically).
  notes: ''
  parent_id: cobit-2019.dss05.01
- id: cobit-2019.dss05.01.02
  type: activity
  abbrev: DSS05.01-2
  heading: Activity 2
  text: Filter incoming traffic, such as email and downloads, to protect against unsolicited information (e.g., spyware, phishing
    emails).
  notes: ''
  parent_id: cobit-2019.dss05.01
- id: cobit-2019.dss05.01.03
  type: activity
  abbrev: DSS05.01-3
  heading: Activity 3
  text: Communicate malicious software awareness and enforce prevention procedures and responsibilities. Conduct periodic
    training about malware in email and Internet usage. Train users to not open, but report, suspicious emails and to not
    install shared or unapproved software.
  notes: ''
  parent_id: cobit-2019.dss05.01
- id: cobit-2019.dss05.01.04
  type: activity
  abbrev: DSS05.01-4
  heading: Activity 4
  text: Distribute all protection software centrally (version and patch-level) using centralized configuration and IT change
    management.
  notes: ''
  parent_id: cobit-2019.dss05.01
- id: cobit-2019.dss05.01.05
  type: activity
  abbrev: DSS05.01-5
  heading: Activity 5
  text: Regularly review and evaluate information on new potential threats (e.g., reviewing vendors’ products and services
    security advisories).
  notes: ''
  parent_id: cobit-2019.dss05.01
- id: cobit-2019.dss05.02.01
  type: activity
  abbrev: DSS05.02-1
  heading: Activity 1
  text: Allow only authorized devices to have access to corporate information and the enterprise network. Configure these
    devices to force password entry.
  notes: ''
  parent_id: cobit-2019.dss05.02
- id: cobit-2019.dss05.02.02
  type: activity
  abbrev: DSS05.02-2
  heading: Activity 2
  text: Implement network filtering mechanisms, such as firewalls and intrusion detection software. Enforce appropriate policies
    to control inbound and outbound traffic.
  notes: ''
  parent_id: cobit-2019.dss05.02
- id: cobit-2019.dss05.02.03
  type: activity
  abbrev: DSS05.02-3
  heading: Activity 3
  text: Apply approved security protocols to network connectivity.
  notes: ''
  parent_id: cobit-2019.dss05.02
- id: cobit-2019.dss05.02.04
  type: activity
  abbrev: DSS05.02-4
  heading: Activity 4
  text: Configure network equipment in a secure manner.
  notes: ''
  parent_id: cobit-2019.dss05.02
- id: cobit-2019.dss05.02.05
  type: activity
  abbrev: DSS05.02-5
  heading: Activity 5
  text: Encrypt information in transit according to its classification.
  notes: ''
  parent_id: cobit-2019.dss05.02
- id: cobit-2019.dss05.02.06
  type: activity
  abbrev: DSS05.02-6
  heading: Activity 6
  text: Based on risk assessments and business requirements, establish and maintain a policy for security of connectivity.
  notes: ''
  parent_id: cobit-2019.dss05.02
- id: cobit-2019.dss05.02.07
  type: activity
  abbrev: DSS05.02-7
  heading: Activity 7
  text: Establish trusted mechanisms to support the secure transmission and receipt of information.
  notes: ''
  parent_id: cobit-2019.dss05.02
- id: cobit-2019.dss05.02.08
  type: activity
  abbrev: DSS05.02-8
  heading: Activity 8
  text: Carry out periodic penetration testing to determine adequacy of network protection.
  notes: ''
  parent_id: cobit-2019.dss05.02
- id: cobit-2019.dss05.02.09
  type: activity
  abbrev: DSS05.02-9
  heading: Activity 9
  text: Carry out periodic testing of system security to determine adequacy of system protection.
  notes: ''
  parent_id: cobit-2019.dss05.02
- id: cobit-2019.dss05.03.01
  type: activity
  abbrev: DSS05.03-1
  heading: Activity 1
  text: Configure operating systems in a secure manner.
  notes: ''
  parent_id: cobit-2019.dss05.03
- id: cobit-2019.dss05.03.02
  type: activity
  abbrev: DSS05.03-2
  heading: Activity 2
  text: Implement device lockdown mechanisms.
  notes: ''
  parent_id: cobit-2019.dss05.03
- id: cobit-2019.dss05.03.03
  type: activity
  abbrev: DSS05.03-3
  heading: Activity 3
  text: Manage remote access and control (e.g., mobile devices, teleworking).
  notes: ''
  parent_id: cobit-2019.dss05.03
- id: cobit-2019.dss05.03.04
  type: activity
  abbrev: DSS05.03-4
  heading: Activity 4
  text: Manage network configuration in a secure manner.
  notes: ''
  parent_id: cobit-2019.dss05.03
- id: cobit-2019.dss05.03.05
  type: activity
  abbrev: DSS05.03-5
  heading: Activity 5
  text: Implement network traffic filtering on endpoint devices.
  notes: ''
  parent_id: cobit-2019.dss05.03
- id: cobit-2019.dss05.03.06
  type: activity
  abbrev: DSS05.03-6
  heading: Activity 6
  text: Protect system integrity.
  notes: ''
  parent_id: cobit-2019.dss05.03
- id: cobit-2019.dss05.03.07
  type: activity
  abbrev: DSS05.03-7
  heading: Activity 7
  text: Provide physical protection of endpoint devices.
  notes: ''
  parent_id: cobit-2019.dss05.03
- id: cobit-2019.dss05.03.08
  type: activity
  abbrev: DSS05.03-8
  heading: Activity 8
  text: Dispose of endpoint devices securely.
  notes: ''
  parent_id: cobit-2019.dss05.03
- id: cobit-2019.dss05.03.09
  type: activity
  abbrev: DSS05.03-9
  heading: Activity 9
  text: Manage malicious access through email and web browsers. For example, block certain websites and deactivate click-through
    on links for smartphones.
  notes: ''
  parent_id: cobit-2019.dss05.03
- id: cobit-2019.dss05.03.10
  type: activity
  abbrev: DSS05.03-10
  heading: Activity 10
  text: Encrypt information in storage according to its classification.
  notes: ''
  parent_id: cobit-2019.dss05.03
- id: cobit-2019.dss05.04.01
  type: activity
  abbrev: DSS05.04-1
  heading: Activity 1
  text: Maintain user access rights in accordance with business function, process requirements and security policies. Align
    the management of identities and access rights to the defined roles and responsibilities, based on least-privilege, need-to-have
    and need-to-know principles.
  notes: ''
  parent_id: cobit-2019.dss05.04
- id: cobit-2019.dss05.04.02
  type: activity
  abbrev: DSS05.04-2
  heading: Activity 2
  text: Administer all changes to access rights (creation, modifications and deletions) in a timely manner based only on approved
    and documented transactions authorized by designated management individuals.
  notes: ''
  parent_id: cobit-2019.dss05.04
- id: cobit-2019.dss05.04.03
  type: activity
  abbrev: DSS05.04-3
  heading: Activity 3
  text: Segregate, reduce to the minimum number necessary and actively manage privileged user accounts. Ensure monitoring
    on all activity on these accounts.
  notes: ''
  parent_id: cobit-2019.dss05.04
- id: cobit-2019.dss05.04.04
  type: activity
  abbrev: DSS05.04-4
  heading: Activity 4
  text: Uniquely identify all information processing activities by functional roles. Coordinate with business units to ensure
    that all roles are consistently defined, including roles that are defined by the business itself within business process
    applications.
  notes: ''
  parent_id: cobit-2019.dss05.04
- id: cobit-2019.dss05.04.05
  type: activity
  abbrev: DSS05.04-5
  heading: Activity 5
  text: Authenticate all access to information assets based on the individual's role or business rules. Coordinate with business
    units that manage authentication within applications used in business processes to ensure that authentication controls
    have been properly administered.
  notes: ''
  parent_id: cobit-2019.dss05.04
- id: cobit-2019.dss05.04.06
  type: activity
  abbrev: DSS05.04-6
  heading: Activity 6
  text: Ensure that all users (internal, external and temporary) and their activity on IT systems (business application, IT
    infrastructure, system operations, development and maintenance) are uniquely identifiable.
  notes: ''
  parent_id: cobit-2019.dss05.04
- id: cobit-2019.dss05.04.07
  type: activity
  abbrev: DSS05.04-7
  heading: Activity 7
  text: Maintain an audit trail of access to information dependent upon its sensitivity and regulatory requirements.
  notes: ''
  parent_id: cobit-2019.dss05.04
- id: cobit-2019.dss05.04.08
  type: activity
  abbrev: DSS05.04-8
  heading: Activity 8
  text: Perform regular management review of all accounts and related privileges.
  notes: ''
  parent_id: cobit-2019.dss05.04
- id: cobit-2019.dss05.05.01
  type: activity
  abbrev: DSS05.05-1
  heading: Activity 1
  text: Log and monitor all entry points to IT sites. Register all visitors, including contractors and vendors, to the site.
  notes: ''
  parent_id: cobit-2019.dss05.05
- id: cobit-2019.dss05.05.02
  type: activity
  abbrev: DSS05.05-2
  heading: Activity 2
  text: Ensure all personnel display properly approved identification at all times.
  notes: ''
  parent_id: cobit-2019.dss05.05
- id: cobit-2019.dss05.05.03
  type: activity
  abbrev: DSS05.05-3
  heading: Activity 3
  text: Require visitors to be escorted at all times while on-site.
  notes: ''
  parent_id: cobit-2019.dss05.05
- id: cobit-2019.dss05.05.04
  type: activity
  abbrev: DSS05.05-4
  heading: Activity 4
  text: Restrict and monitor access to sensitive IT sites by establishing perimeter restrictions, such as fences, walls, and
    security devices on interior and exterior doors.
  notes: ''
  parent_id: cobit-2019.dss05.05
- id: cobit-2019.dss05.05.05
  type: activity
  abbrev: DSS05.05-5
  heading: Activity 5
  text: Manage requests to allow appropriately authorized access to the computing facilities.
  notes: ''
  parent_id: cobit-2019.dss05.05
- id: cobit-2019.dss05.05.06
  type: activity
  abbrev: DSS05.05-6
  heading: Activity 6
  text: Ensure that access profiles remain current. Base access to IT sites (server rooms, buildings, areas or zones) on job
    function and responsibilities.
  notes: ''
  parent_id: cobit-2019.dss05.05
- id: cobit-2019.dss05.05.07
  type: activity
  abbrev: DSS05.05-7
  heading: Activity 7
  text: Conduct regular physical information security awareness training.
  notes: ''
  parent_id: cobit-2019.dss05.05
- id: cobit-2019.dss05.06.01
  type: activity
  abbrev: DSS05.06-1
  heading: Activity 1
  text: Establish procedures to govern the receipt, use, removal and disposal of sensitive documents and output devices into,
    within, and outside of the enterprise.
  notes: ''
  parent_id: cobit-2019.dss05.06
- id: cobit-2019.dss05.06.02
  type: activity
  abbrev: DSS05.06-2
  heading: Activity 2
  text: Ensure cryptographic controls are in place to protect sensitive electronically stored information.
  notes: ''
  parent_id: cobit-2019.dss05.06
- id: cobit-2019.dss05.06.03
  type: activity
  abbrev: DSS05.06-3
  heading: Activity 3
  text: Assign access privileges to sensitive documents and output devices based on the least-privilege principle, balancing
    risk and business requirements.
  notes: ''
  parent_id: cobit-2019.dss05.06
- id: cobit-2019.dss05.06.04
  type: activity
  abbrev: DSS05.06-4
  heading: Activity 4
  text: Establish an inventory of sensitive documents and output devices, and conduct regular reconciliations.
  notes: ''
  parent_id: cobit-2019.dss05.06
- id: cobit-2019.dss05.06.05
  type: activity
  abbrev: DSS05.06-5
  heading: Activity 5
  text: Establish appropriate physical safeguards over sensitive documents.
  notes: ''
  parent_id: cobit-2019.dss05.06
- id: cobit-2019.dss05.06.06
  type: activity
  abbrev: DSS05.06-6
  heading: Activity 6
  text: Put cryptographic controls in place to ensure the protection of sensitive information (confidentiality, authenticity,
    integrity).
  notes: ''
  parent_id: cobit-2019.dss05.06
- id: cobit-2019.dss05.07.01
  type: activity
  abbrev: DSS05.07-1
  heading: Activity 1
  text: Continually use a portfolio of supported technologies, services and assets (e.g., vulnerability scanners, fuzzers
    and sniffers, protocol analyzers) to identify information security vulnerabilities.
  notes: ''
  parent_id: cobit-2019.dss05.07
- id: cobit-2019.dss05.07.02
  type: activity
  abbrev: DSS05.07-2
  heading: Activity 2
  text: Define and communicate risk scenarios so they can be easily recognized and the likelihood and impacts understood.
  notes: ''
  parent_id: cobit-2019.dss05.07
- id: cobit-2019.dss05.07.03
  type: activity
  abbrev: DSS05.07-3
  heading: Activity 3
  text: Regularly review the event logs for potential incidents.
  notes: ''
  parent_id: cobit-2019.dss05.07
- id: cobit-2019.dss05.07.04
  type: activity
  abbrev: DSS05.07-4
  heading: Activity 4
  text: Ensure that security-related incident tickets are created in a timely manner when monitoring identifies potential
    incidents.
  notes: ''
  parent_id: cobit-2019.dss05.07
- id: cobit-2019.dss05.07.05
  type: activity
  abbrev: DSS05.07-5
  heading: Activity 5
  text: Log security-related events and retain records for appropriate period.
  notes: ''
  parent_id: cobit-2019.dss05.07
- id: cobit-2019.dss06.01.01
  type: activity
  abbrev: DSS06.01-1
  heading: Activity 1
  text: Identify and document the necessary control activities for key business processes to satisfy control requirements
    for strategic, operational, reporting and compliance objectives.
  notes: ''
  parent_id: cobit-2019.dss06.01
- id: cobit-2019.dss06.01.02
  type: activity
  abbrev: DSS06.01-2
  heading: Activity 2
  text: Prioritize control activities based on the inherent risk to the business. Identify key controls.
  notes: ''
  parent_id: cobit-2019.dss06.01
- id: cobit-2019.dss06.01.03
  type: activity
  abbrev: DSS06.01-3
  heading: Activity 3
  text: Ensure ownership of key control activities.
  notes: ''
  parent_id: cobit-2019.dss06.01
- id: cobit-2019.dss06.01.04
  type: activity
  abbrev: DSS06.01-4
  heading: Activity 4
  text: Implement automated controls.
  notes: ''
  parent_id: cobit-2019.dss06.01
- id: cobit-2019.dss06.01.05
  type: activity
  abbrev: DSS06.01-5
  heading: Activity 5
  text: Continually monitor control activities on an end-to-end basis to identify opportunities for improvement.
  notes: ''
  parent_id: cobit-2019.dss06.01
- id: cobit-2019.dss06.01.06
  type: activity
  abbrev: DSS06.01-6
  heading: Activity 6
  text: Continually improve the design and operation of business process controls.
  notes: ''
  parent_id: cobit-2019.dss06.01
- id: cobit-2019.dss06.02.01
  type: activity
  abbrev: DSS06.02-1
  heading: Activity 1
  text: Authenticate the originator of transactions and verify that the individual has the authority to originate the transaction.
  notes: ''
  parent_id: cobit-2019.dss06.02
- id: cobit-2019.dss06.02.02
  type: activity
  abbrev: DSS06.02-2
  heading: Activity 2
  text: Ensure adequate segregation of duties regarding the origination and approval of transactions.
  notes: ''
  parent_id: cobit-2019.dss06.02
- id: cobit-2019.dss06.02.03
  type: activity
  abbrev: DSS06.02-3
  heading: Activity 3
  text: Verify that transactions are accurate, complete and valid. Controls may include sequence, limit, range, validity,
    reasonableness, table look-ups, existence, key verification, check digit, completeness, duplicate and logical relationship
    checks, and time edits. Validation criteria and parameters should be subject to periodic reviews and confirmations. Validate
    input data and edit or, where applicable, send back for correction as close to the point of origination as possible.
  notes: ''
  parent_id: cobit-2019.dss06.02
- id: cobit-2019.dss06.02.04
  type: activity
  abbrev: DSS06.02-4
  heading: Activity 4
  text: Without compromising original transaction authorization levels, correct and resubmit data that were erroneously input.
    Where appropriate for reconstruction, retain original source documents for the appropriate amount of time.
  notes: ''
  parent_id: cobit-2019.dss06.02
- id: cobit-2019.dss06.02.05
  type: activity
  abbrev: DSS06.02-5
  heading: Activity 5
  text: Maintain the integrity and validity of data throughout the processing cycle. Ensure that detection of erroneous transactions
    does not disrupt processing of valid transactions.
  notes: ''
  parent_id: cobit-2019.dss06.02
- id: cobit-2019.dss06.02.06
  type: activity
  abbrev: DSS06.02-6
  heading: Activity 6
  text: Handle output in an authorized manner, deliver it to the appropriate recipient and protect the information during
    transmission. Verify the accuracy and completeness of the output.
  notes: ''
  parent_id: cobit-2019.dss06.02
- id: cobit-2019.dss06.02.07
  type: activity
  abbrev: DSS06.02-7
  heading: Activity 7
  text: Maintain the integrity of data during unexpected interruptions in business processing. Confirm data integrity after
    processing failures.
  notes: ''
  parent_id: cobit-2019.dss06.02
- id: cobit-2019.dss06.02.08
  type: activity
  abbrev: DSS06.02-8
  heading: Activity 8
  text: Before passing transaction data between internal applications and business/operational functions (inside or outside
    the enterprise), check for proper addressing, authenticity of origin and integrity of content. Maintain authenticity and
    integrity during transmission or transport.
  notes: ''
  parent_id: cobit-2019.dss06.02
- id: cobit-2019.dss06.03.01
  type: activity
  abbrev: DSS06.03-1
  heading: Activity 1
  text: Allocate roles and responsibilities based on approved job descriptions and business process activities.
  notes: ''
  parent_id: cobit-2019.dss06.03
- id: cobit-2019.dss06.03.02
  type: activity
  abbrev: DSS06.03-2
  heading: Activity 2
  text: Allocate levels of authority for approval of transactions, transaction limits and any other decisions relating to
    the business process, based on approved job roles.
  notes: ''
  parent_id: cobit-2019.dss06.03
- id: cobit-2019.dss06.03.03
  type: activity
  abbrev: DSS06.03-3
  heading: Activity 3
  text: Allocate roles for sensitive activities so there is a clear segregation of duties.
  notes: ''
  parent_id: cobit-2019.dss06.03
- id: cobit-2019.dss06.03.04
  type: activity
  abbrev: DSS06.03-4
  heading: Activity 4
  text: Allocate access rights and privileges based on the minimum that is required to perform job activities, based on pre-defined
    job roles. Remove or revise access rights immediately if the job role changes or a staff member leaves the business process
    area. Periodically review to ensure that the access is appropriate for the current threats, risk, technology and business
    need.
  notes: ''
  parent_id: cobit-2019.dss06.03
- id: cobit-2019.dss06.03.05
  type: activity
  abbrev: DSS06.03-5
  heading: Activity 5
  text: On a regular basis, provide awareness and training regarding roles and responsibilities so that everyone understands
    their responsibilities; the importance of controls; and the security, integrity, confidentiality and privacy of company
    information in all its forms.
  notes: ''
  parent_id: cobit-2019.dss06.03
- id: cobit-2019.dss06.03.06
  type: activity
  abbrev: DSS06.03-6
  heading: Activity 6
  text: Ensure administrative privileges are sufficiently and effectively secured, tracked and controlled to prevent misuse.
  notes: ''
  parent_id: cobit-2019.dss06.03
- id: cobit-2019.dss06.03.07
  type: activity
  abbrev: DSS06.03-7
  heading: Activity 7
  text: Periodically review access control definitions, logs and exception reports. Ensure that all access privileges are
    valid and aligned with current staff members and their allocated roles.
  notes: ''
  parent_id: cobit-2019.dss06.03
- id: cobit-2019.dss06.04.01
  type: activity
  abbrev: DSS06.04-1
  heading: Activity 1
  text: Review errors, exceptions and deviations.
  notes: ''
  parent_id: cobit-2019.dss06.04
- id: cobit-2019.dss06.04.02
  type: activity
  abbrev: DSS06.04-2
  heading: Activity 2
  text: Follow up, correct, approve and resubmit source documents and transactions.
  notes: ''
  parent_id: cobit-2019.dss06.04
- id: cobit-2019.dss06.04.03
  type: activity
  abbrev: DSS06.04-3
  heading: Activity 3
  text: Maintain evidence of remedial actions.
  notes: ''
  parent_id: cobit-2019.dss06.04
- id: cobit-2019.dss06.04.04
  type: activity
  abbrev: DSS06.04-4
  heading: Activity 4
  text: Define and maintain procedures to assign ownership for errors and exceptions, correct errors, override errors and
    handle out-of-balance conditions.
  notes: ''
  parent_id: cobit-2019.dss06.04
- id: cobit-2019.dss06.04.05
  type: activity
  abbrev: DSS06.04-5
  heading: Activity 5
  text: Report relevant business information process errors in a timely manner to perform root cause and trending analysis.
  notes: ''
  parent_id: cobit-2019.dss06.04
- id: cobit-2019.dss06.05.01
  type: activity
  abbrev: DSS06.05-1
  heading: Activity 1
  text: Capture source information, supporting evidence and the record of transactions.
  notes: ''
  parent_id: cobit-2019.dss06.05
- id: cobit-2019.dss06.05.02
  type: activity
  abbrev: DSS06.05-2
  heading: Activity 2
  text: Define retention requirements, based on business requirements, to meet operational, financial reporting and compliance
    needs.
  notes: ''
  parent_id: cobit-2019.dss06.05
- id: cobit-2019.dss06.05.03
  type: activity
  abbrev: DSS06.05-3
  heading: Activity 3
  text: Dispose of source information, supporting evidence and the record of transactions in accordance with the retention
    policy.
  notes: ''
  parent_id: cobit-2019.dss06.05
- id: cobit-2019.dss06.06.01
  type: activity
  abbrev: DSS06.06-1
  heading: Activity 1
  text: Restrict use, distribution and physical access of information according to its classification.
  notes: ''
  parent_id: cobit-2019.dss06.06
- id: cobit-2019.dss06.06.02
  type: activity
  abbrev: DSS06.06-2
  heading: Activity 2
  text: Provide acceptable use awareness and training.
  notes: ''
  parent_id: cobit-2019.dss06.06
- id: cobit-2019.dss06.06.03
  type: activity
  abbrev: DSS06.06-3
  heading: Activity 3
  text: Apply data classification and acceptable use and security policies and procedures to protect information assets under
    the control of the business.
  notes: ''
  parent_id: cobit-2019.dss06.06
- id: cobit-2019.dss06.06.04
  type: activity
  abbrev: DSS06.06-4
  heading: Activity 4
  text: Identify and implement processes, tools and techniques to reasonably verify compliance.
  notes: ''
  parent_id: cobit-2019.dss06.06
- id: cobit-2019.dss06.06.05
  type: activity
  abbrev: DSS06.06-5
  heading: Activity 5
  text: Report to business and other stakeholders on violations and deviations.
  notes: ''
  parent_id: cobit-2019.dss06.06
- id: cobit-2019.mea01.01.01
  type: activity
  abbrev: MEA01.01-1
  heading: Activity 1
  text: Identify stakeholders (e.g., management, process owners and users).
  notes: ''
  parent_id: cobit-2019.mea01.01
- id: cobit-2019.mea01.01.02
  type: activity
  abbrev: MEA01.01-2
  heading: Activity 2
  text: Engage with stakeholders and communicate the enterprise requirements and objectives for monitoring, aggregating and
    reporting, using common definitions (e.g., business glossary, metadata and taxonomy), baselining and benchmarking.
  notes: ''
  parent_id: cobit-2019.mea01.01
- id: cobit-2019.mea01.01.03
  type: activity
  abbrev: MEA01.01-3
  heading: Activity 3
  text: Align and continually maintain the monitoring and evaluation approach with the enterprise approach and the tools to
    be used for data gathering and enterprise reporting (e.g., business intelligence applications).
  notes: ''
  parent_id: cobit-2019.mea01.01
- id: cobit-2019.mea01.01.04
  type: activity
  abbrev: MEA01.01-4
  heading: Activity 4
  text: Agree on the types of goals and metrics (e.g., conformance, performance, value, risk), taxonomy (classification and
    relationships between goals and metrics) and data (evidence) retention.
  notes: ''
  parent_id: cobit-2019.mea01.01
- id: cobit-2019.mea01.01.05
  type: activity
  abbrev: MEA01.01-5
  heading: Activity 5
  text: Request, prioritize and allocate resources for monitoring, consider appropriateness, efficiency, effectiveness and
    confidentiality.
  notes: ''
  parent_id: cobit-2019.mea01.01
- id: cobit-2019.mea01.01.06
  type: activity
  abbrev: MEA01.01-6
  heading: Activity 6
  text: Periodically validate the approach used and identify new or changed stakeholders, requirements and resources.
  notes: ''
  parent_id: cobit-2019.mea01.01
- id: cobit-2019.mea01.01.07
  type: activity
  abbrev: MEA01.01-7
  heading: Activity 7
  text: Agree on a life cycle management and change control process for monitoring and reporting. Include improvement opportunities
    for reporting, metrics, approach, baselining and benchmarking.
  notes: ''
  parent_id: cobit-2019.mea01.01
- id: cobit-2019.mea01.02.01
  type: activity
  abbrev: MEA01.02-1
  heading: Activity 1
  text: Define the goals and metrics. Periodically review them with stakeholders to identify any significant missing items
    and define reasonableness of targets and tolerances.
  notes: ''
  parent_id: cobit-2019.mea01.02
- id: cobit-2019.mea01.02.02
  type: activity
  abbrev: MEA01.02-2
  heading: Activity 2
  text: Evaluate whether the goals and metrics are adequate, that is, specific, measurable, achievable, relevant and time-bound
    (SMART).
  notes: ''
  parent_id: cobit-2019.mea01.02
- id: cobit-2019.mea01.02.03
  type: activity
  abbrev: MEA01.02-3
  heading: Activity 3
  text: Communicate proposed changes to performance and conformance targets and tolerances (relating to metrics) with key
    due diligence stakeholders (e.g., legal, audit, HR, ethics, compliance, finance).
  notes: ''
  parent_id: cobit-2019.mea01.02
- id: cobit-2019.mea01.02.04
  type: activity
  abbrev: MEA01.02-4
  heading: Activity 4
  text: Publish changed targets and tolerances to users of this information.
  notes: ''
  parent_id: cobit-2019.mea01.02
- id: cobit-2019.mea01.03.01
  type: activity
  abbrev: MEA01.03-1
  heading: Activity 1
  text: Collect data from defined processes (automated, where possible).
  notes: ''
  parent_id: cobit-2019.mea01.03
- id: cobit-2019.mea01.03.02
  type: activity
  abbrev: MEA01.03-2
  heading: Activity 2
  text: Assess efficiency (effort in relation to insight provided) and appropriateness (usefulness and meaning) of collected
    data and validate the data's integrity (accuracy and completeness).
  notes: ''
  parent_id: cobit-2019.mea01.03
- id: cobit-2019.mea01.03.03
  type: activity
  abbrev: MEA01.03-3
  heading: Activity 3
  text: Aggregate data to support measurement of agreed metrics.
  notes: ''
  parent_id: cobit-2019.mea01.03
- id: cobit-2019.mea01.03.04
  type: activity
  abbrev: MEA01.03-4
  heading: Activity 4
  text: Align aggregated data to the enterprise reporting approach and objectives.
  notes: ''
  parent_id: cobit-2019.mea01.03
- id: cobit-2019.mea01.03.05
  type: activity
  abbrev: MEA01.03-5
  heading: Activity 5
  text: Use suitable tools and systems for the processing and analysis of data.
  notes: ''
  parent_id: cobit-2019.mea01.03
- id: cobit-2019.mea01.04.01
  type: activity
  abbrev: MEA01.04-1
  heading: Activity 1
  text: Design process performance reports that are concise, easy to understand, and tailored to various management needs
    and audiences. Facilitate effective, timely decision making (e.g., scorecards, traffic light reports). Ensure that the
    cause and effect between goals and metrics are communicated in an understandable manner.
  notes: ''
  parent_id: cobit-2019.mea01.04
- id: cobit-2019.mea01.04.02
  type: activity
  abbrev: MEA01.04-2
  heading: Activity 2
  text: Distribute reports to the relevant stakeholders.
  notes: ''
  parent_id: cobit-2019.mea01.04
- id: cobit-2019.mea01.04.03
  type: activity
  abbrev: MEA01.04-3
  heading: Activity 3
  text: Analyze the cause of deviations against targets, initiate remedial actions, assign responsibilities for remediation,
    and follow up. At appropriate times, review all deviations and search for root causes, where necessary. Document the issues
    for further guidance if the problem recurs. Document results.
  notes: ''
  parent_id: cobit-2019.mea01.04
- id: cobit-2019.mea01.04.04
  type: activity
  abbrev: MEA01.04-4
  heading: Activity 4
  text: Where feasible, integrate performance and compliance into individual staff members’ performance objectives and link
    achievement of performance targets to the organizational reward compensation system.
  notes: ''
  parent_id: cobit-2019.mea01.04
- id: cobit-2019.mea01.04.05
  type: activity
  abbrev: MEA01.04-5
  heading: Activity 5
  text: Compare the performance values to internal targets and benchmarks and, where possible, to external benchmarks (industry
    and key competitors).
  notes: ''
  parent_id: cobit-2019.mea01.04
- id: cobit-2019.mea01.04.06
  type: activity
  abbrev: MEA01.04-6
  heading: Activity 6
  text: Analyze trends in performance and compliance and take appropriate action.
  notes: ''
  parent_id: cobit-2019.mea01.04
- id: cobit-2019.mea01.04.07
  type: activity
  abbrev: MEA01.04-7
  heading: Activity 7
  text: Recommend changes to the goals and metrics, where appropriate.
  notes: ''
  parent_id: cobit-2019.mea01.04
- id: cobit-2019.mea01.05.01
  type: activity
  abbrev: MEA01.05-1
  heading: Activity 1
  text: Review management responses, options and recommendations to address issues and major deviations.
  notes: ''
  parent_id: cobit-2019.mea01.05
- id: cobit-2019.mea01.05.02
  type: activity
  abbrev: MEA01.05-2
  heading: Activity 2
  text: Ensure that the assignment of responsibility for corrective action is maintained.
  notes: ''
  parent_id: cobit-2019.mea01.05
- id: cobit-2019.mea01.05.03
  type: activity
  abbrev: MEA01.05-3
  heading: Activity 3
  text: Track the results of actions committed.
  notes: ''
  parent_id: cobit-2019.mea01.05
- id: cobit-2019.mea01.05.04
  type: activity
  abbrev: MEA01.05-4
  heading: Activity 4
  text: Report the results to the stakeholders.
  notes: ''
  parent_id: cobit-2019.mea01.05
- id: cobit-2019.mea02.01.01
  type: activity
  abbrev: MEA02.01-1
  heading: Activity 1
  text: Identify the boundaries of the internal control system. For example, consider how organizational internal controls
    take into account outsourced and/or offshore development or production activities.
  notes: ''
  parent_id: cobit-2019.mea02.01
- id: cobit-2019.mea02.01.02
  type: activity
  abbrev: MEA02.01-2
  heading: Activity 2
  text: Assess the status of external service providers’ internal controls. Confirm that service providers comply with legal
    and regulatory requirements and contractual obligations.
  notes: ''
  parent_id: cobit-2019.mea02.01
- id: cobit-2019.mea02.01.03
  type: activity
  abbrev: MEA02.01-3
  heading: Activity 3
  text: Perform internal control monitoring and evaluation activities based on organizational governance standards and industry-accepted
    frameworks and practices. Also include monitoring and evaluation of the efficiency and effectiveness of managerial supervisory
    activities.
  notes: ''
  parent_id: cobit-2019.mea02.01
- id: cobit-2019.mea02.01.04
  type: activity
  abbrev: MEA02.01-4
  heading: Activity 4
  text: Ensure that control exceptions are promptly reported, followed up and analyzed, and appropriate corrective actions
    are prioritized and implemented according to the risk management profile (e.g., classify certain exceptions as a key risk
    and others as a non-key risk).
  notes: ''
  parent_id: cobit-2019.mea02.01
- id: cobit-2019.mea02.01.05
  type: activity
  abbrev: MEA02.01-5
  heading: Activity 5
  text: Consider independent evaluations of the internal control system (e.g., by internal audit or peers).
  notes: ''
  parent_id: cobit-2019.mea02.01
- id: cobit-2019.mea02.01.06
  type: activity
  abbrev: MEA02.01-6
  heading: Activity 6
  text: Maintain the internal control system, considering ongoing changes in business and I&T risk, the organizational control
    environment, and relevant business and I&T processes. If gaps exist, evaluate and recommend changes.
  notes: ''
  parent_id: cobit-2019.mea02.01
- id: cobit-2019.mea02.01.07
  type: activity
  abbrev: MEA02.01-7
  heading: Activity 7
  text: Regularly evaluate the performance of the control framework, benchmarking against industry accepted standards and
    good practices. Consider formal adoption of a continuous improvement approach to internal control monitoring.
  notes: ''
  parent_id: cobit-2019.mea02.01
- id: cobit-2019.mea02.02.01
  type: activity
  abbrev: MEA02.02-1
  heading: Activity 1
  text: Understand and prioritize risk to organizational objectives.
  notes: ''
  parent_id: cobit-2019.mea02.02
- id: cobit-2019.mea02.02.02
  type: activity
  abbrev: MEA02.02-2
  heading: Activity 2
  text: Identify key controls and develop a strategy suitable for validating controls.
  notes: ''
  parent_id: cobit-2019.mea02.02
- id: cobit-2019.mea02.02.03
  type: activity
  abbrev: MEA02.02-3
  heading: Activity 3
  text: Identify information that will indicate whether the internal control environment is operating effectively.
  notes: ''
  parent_id: cobit-2019.mea02.02
- id: cobit-2019.mea02.02.04
  type: activity
  abbrev: MEA02.02-4
  heading: Activity 4
  text: Maintain evidence of control effectiveness.
  notes: ''
  parent_id: cobit-2019.mea02.02
- id: cobit-2019.mea02.02.05
  type: activity
  abbrev: MEA02.02-5
  heading: Activity 5
  text: Develop and implement cost-effective procedures to obtain this information in line with applicable information quality
    criteria.
  notes: ''
  parent_id: cobit-2019.mea02.02
- id: cobit-2019.mea02.03.01
  type: activity
  abbrev: MEA02.03-1
  heading: Activity 1
  text: Define an agreed, consistent approach for performing control self-assessments and coordinating with internal and external
    auditors.
  notes: ''
  parent_id: cobit-2019.mea02.03
- id: cobit-2019.mea02.03.02
  type: activity
  abbrev: MEA02.03-2
  heading: Activity 2
  text: Maintain evaluation plans, and scope and identify evaluation criteria for conducting self-assessments. Plan the communication
    of results of the self-assessment process to business, IT and general management and the board. Consider internal audit
    standards in the design of self-assessments.
  notes: ''
  parent_id: cobit-2019.mea02.03
- id: cobit-2019.mea02.03.03
  type: activity
  abbrev: MEA02.03-3
  heading: Activity 3
  text: Determine the frequency of periodic self-assessments, considering the overall effectiveness and efficiency of ongoing
    monitoring.
  notes: ''
  parent_id: cobit-2019.mea02.03
- id: cobit-2019.mea02.03.04
  type: activity
  abbrev: MEA02.03-4
  heading: Activity 4
  text: Assign responsibility for self-assessment to appropriate individuals to ensure objectivity and competence.
  notes: ''
  parent_id: cobit-2019.mea02.03
- id: cobit-2019.mea02.03.05
  type: activity
  abbrev: MEA02.03-5
  heading: Activity 5
  text: Provide for independent reviews to ensure objectivity of the self-assessment and enable the sharing of internal control
    good practices from other enterprises.
  notes: ''
  parent_id: cobit-2019.mea02.03
- id: cobit-2019.mea02.03.06
  type: activity
  abbrev: MEA02.03-6
  heading: Activity 6
  text: Compare the results of the self-assessments against industry standards and good practices.
  notes: ''
  parent_id: cobit-2019.mea02.03
- id: cobit-2019.mea02.03.07
  type: activity
  abbrev: MEA02.03-7
  heading: Activity 7
  text: Summarize and report outcomes of self-assessments and benchmarking for remedial actions.
  notes: ''
  parent_id: cobit-2019.mea02.03
- id: cobit-2019.mea02.04.01
  type: activity
  abbrev: MEA02.04-1
  heading: Activity 1
  text: Communicate procedures for escalation of control exceptions, root cause analysis, and reporting to process owners
    and I&T stakeholders.
  notes: ''
  parent_id: cobit-2019.mea02.04
- id: cobit-2019.mea02.04.02
  type: activity
  abbrev: MEA02.04-2
  heading: Activity 2
  text: Consider related enterprise risk to establish thresholds for escalation of control exceptions and breakdowns.
  notes: ''
  parent_id: cobit-2019.mea02.04
- id: cobit-2019.mea02.04.03
  type: activity
  abbrev: MEA02.04-3
  heading: Activity 3
  text: Identify, report and log control exceptions. Assign responsibility for resolving them and reporting on the status.
  notes: ''
  parent_id: cobit-2019.mea02.04
- id: cobit-2019.mea02.04.04
  type: activity
  abbrev: MEA02.04-4
  heading: Activity 4
  text: Decide which control exceptions should be communicated to the individual responsible for the function and which exceptions
    should be escalated. Inform affected process owners and stakeholders.
  notes: ''
  parent_id: cobit-2019.mea02.04
- id: cobit-2019.mea02.04.05
  type: activity
  abbrev: MEA02.04-5
  heading: Activity 5
  text: Follow up on all exceptions to ensure that agreed-on actions have been addressed.
  notes: ''
  parent_id: cobit-2019.mea02.04
- id: cobit-2019.mea02.04.06
  type: activity
  abbrev: MEA02.04-6
  heading: Activity 6
  text: Identify, initiate, track and implement remedial actions arising from control assessments and reporting.
  notes: ''
  parent_id: cobit-2019.mea02.04
- id: cobit-2019.mea03.01.01
  type: activity
  abbrev: MEA03.01-1
  heading: Activity 1
  text: Assign responsibility for identifying and monitoring any changes of legal, regulatory and other external contractual
    requirements relevant to the use of IT resources and the processing of information within the business and IT operations
    of the enterprise.
  notes: ''
  parent_id: cobit-2019.mea03.01
- id: cobit-2019.mea03.01.02
  type: activity
  abbrev: MEA03.01-2
  heading: Activity 2
  text: Identify and assess all potential compliance requirements and the impact on I&T activities in areas such as data flow,
    privacy, internal controls, financial reporting, industry-specific regulations, intellectual property, health and safety.
  notes: ''
  parent_id: cobit-2019.mea03.01
- id: cobit-2019.mea03.01.03
  type: activity
  abbrev: MEA03.01-3
  heading: Activity 3
  text: Assess the impact of I&T-related legal and regulatory requirements on third-party contracts related to IT operations,
    service providers and business trading partners.
  notes: ''
  parent_id: cobit-2019.mea03.01
- id: cobit-2019.mea03.01.04
  type: activity
  abbrev: MEA03.01-4
  heading: Activity 4
  text: Define the consequences of noncompliance.
  notes: ''
  parent_id: cobit-2019.mea03.01
- id: cobit-2019.mea03.01.05
  type: activity
  abbrev: MEA03.01-5
  heading: Activity 5
  text: Obtain independent counsel, where appropriate, on changes to applicable laws, regulations and standards.
  notes: ''
  parent_id: cobit-2019.mea03.01
- id: cobit-2019.mea03.01.06
  type: activity
  abbrev: MEA03.01-6
  heading: Activity 6
  text: Maintain an up-to-date log of all relevant legal, regulatory and contractual requirements; their impact and required
    actions.
  notes: ''
  parent_id: cobit-2019.mea03.01
- id: cobit-2019.mea03.01.07
  type: activity
  abbrev: MEA03.01-7
  heading: Activity 7
  text: Maintain a harmonized and integrated overall register of external compliance requirements for the enterprise.
  notes: ''
  parent_id: cobit-2019.mea03.01
- id: cobit-2019.mea03.02.01
  type: activity
  abbrev: MEA03.02-1
  heading: Activity 1
  text: Regularly review and adjust policies, principles, standards, procedures and methodologies for their effectiveness
    in ensuring necessary compliance and addressing enterprise risk. Use internal and external experts, as required.
  notes: ''
  parent_id: cobit-2019.mea03.02
- id: cobit-2019.mea03.02.02
  type: activity
  abbrev: MEA03.02-2
  heading: Activity 2
  text: Communicate new and changed requirements to all relevant personnel.
  notes: ''
  parent_id: cobit-2019.mea03.02
- id: cobit-2019.mea03.03.01
  type: activity
  abbrev: MEA03.03-1
  heading: Activity 1
  text: Regularly evaluate organizational policies, standards, procedures and methodologies in all functions of the enterprise
    to ensure compliance with relevant legal and regulatory requirements in relation to the processing of information.
  notes: ''
  parent_id: cobit-2019.mea03.03
- id: cobit-2019.mea03.03.02
  type: activity
  abbrev: MEA03.03-2
  heading: Activity 2
  text: Address compliance gaps in policies, standards and procedures on a timely basis.
  notes: ''
  parent_id: cobit-2019.mea03.03
- id: cobit-2019.mea03.03.03
  type: activity
  abbrev: MEA03.03-3
  heading: Activity 3
  text: Periodically evaluate business and IT processes and activities to ensure adherence to applicable legal, regulatory
    and contractual requirements.
  notes: ''
  parent_id: cobit-2019.mea03.03
- id: cobit-2019.mea03.03.04
  type: activity
  abbrev: MEA03.03-4
  heading: Activity 4
  text: Regularly review for recurring patterns of compliance failures and assess lessons learned.
  notes: ''
  parent_id: cobit-2019.mea03.03
- id: cobit-2019.mea03.03.05
  type: activity
  abbrev: MEA03.03-5
  heading: Activity 5
  text: Based on review and lessons learned, improve policies, standards, procedures, methodologies, and associated processes
    and activities.
  notes: ''
  parent_id: cobit-2019.mea03.03
- id: cobit-2019.mea03.04.01
  type: activity
  abbrev: MEA03.04-1
  heading: Activity 1
  text: Obtain regular confirmation of compliance with internal policies from business and IT process owners and unit heads.
  notes: ''
  parent_id: cobit-2019.mea03.04
- id: cobit-2019.mea03.04.02
  type: activity
  abbrev: MEA03.04-2
  heading: Activity 2
  text: Perform regular (and, where appropriate, independent) internal and external reviews to assess levels of compliance.
  notes: ''
  parent_id: cobit-2019.mea03.04
- id: cobit-2019.mea03.04.03
  type: activity
  abbrev: MEA03.04-3
  heading: Activity 3
  text: If required, obtain assertions from third-party I&T service providers on levels of their compliance with applicable
    laws and regulations.
  notes: ''
  parent_id: cobit-2019.mea03.04
- id: cobit-2019.mea03.04.04
  type: activity
  abbrev: MEA03.04-4
  heading: Activity 4
  text: If required, obtain assertions from business partners on levels of their compliance with applicable laws and regulations
    as they relate to intercompany electronic transactions.
  notes: ''
  parent_id: cobit-2019.mea03.04
- id: cobit-2019.mea03.04.05
  type: activity
  abbrev: MEA03.04-5
  heading: Activity 5
  text: Integrate reporting on legal, regulatory and contractual requirements at an enterprisewide level, involving all business
    units.
  notes: ''
  parent_id: cobit-2019.mea03.04
- id: cobit-2019.mea03.04.06
  type: activity
  abbrev: MEA03.04-6
  heading: Activity 6
  text: Monitor and report on noncompliance issues and, where necessary, investigate the root cause.
  notes: ''
  parent_id: cobit-2019.mea03.04
- id: cobit-2019.mea04.01.01
  type: activity
  abbrev: MEA04.01-1
  heading: Activity 1
  text: Establish adherence to applicable codes of ethics and standards (e.g., Code of Professional Ethics of ISACA) and (industry-
    and geography-specific) assurance standards (e.g., IT Audit and Assurance Standards of ISACA and the International Auditing
    and Assurance Standards Board’s [IAASB’s] International Framework for Assurance Engagements [IAASB Assurance Framework]).
  notes: ''
  parent_id: cobit-2019.mea04.01
- id: cobit-2019.mea04.01.02
  type: activity
  abbrev: MEA04.01-2
  heading: Activity 2
  text: Establish independence of assurance providers.
  notes: ''
  parent_id: cobit-2019.mea04.01
- id: cobit-2019.mea04.01.03
  type: activity
  abbrev: MEA04.01-3
  heading: Activity 3
  text: Establish competency and qualification of assurance providers.
  notes: ''
  parent_id: cobit-2019.mea04.01
- id: cobit-2019.mea04.02.01
  type: activity
  abbrev: MEA04.02-1
  heading: Activity 1
  text: Understand the enterprise strategy and priorities.
  notes: ''
  parent_id: cobit-2019.mea04.02
- id: cobit-2019.mea04.02.02
  type: activity
  abbrev: MEA04.02-2
  heading: Activity 2
  text: Understand the internal context of the enterprise. This understanding will help the assurance professional to better
    assess the enterprise goals and the relative importance of enterprise and alignment goals, as well as the most important
    threats to these goals. In turn, this will assist in defining a better and more relevant scope for the assurance engagement.
  notes: ''
  parent_id: cobit-2019.mea04.02
- id: cobit-2019.mea04.02.03
  type: activity
  abbrev: MEA04.02-3
  heading: Activity 3
  text: Understand the external context of the enterprise. This understanding will help the assurance professional to better
    understand the enterprise goals and the relative importance of enterprise and alignment goals, as well as the most important
    threats to these goals. In turn, this will assist in defining a better and more relevant scope for the assurance engagement.
  notes: ''
  parent_id: cobit-2019.mea04.02
- id: cobit-2019.mea04.02.04
  type: activity
  abbrev: MEA04.02-4
  heading: Activity 4
  text: Develop an overall yearly plan for assurance initiatives containing the consolidated assurance objectives.
  notes: ''
  parent_id: cobit-2019.mea04.02
- id: cobit-2019.mea04.03.01
  type: activity
  abbrev: MEA04.03-1
  heading: Activity 1
  text: Define the assurance objective of the assurance initiative by identifying the stakeholders of the assurance initiative
    and their interests.
  notes: ''
  parent_id: cobit-2019.mea04.03
- id: cobit-2019.mea04.03.02
  type: activity
  abbrev: MEA04.03-2
  heading: Activity 2
  text: Agree on the high-level objectives and the organizational boundaries of the assurance engagement.
  notes: ''
  parent_id: cobit-2019.mea04.03
- id: cobit-2019.mea04.03.03
  type: activity
  abbrev: MEA04.03-3
  heading: Activity 3
  text: Consider the use of the COBIT Goals Cascade and its different levels to express the assurance objective.
  notes: ''
  parent_id: cobit-2019.mea04.03
- id: cobit-2019.mea04.03.04
  type: activity
  abbrev: MEA04.03-4
  heading: Activity 4
  text: 'Ensure that the objectives of the assurance engagement consider all three value objective components: delivering
    benefits that support strategic objectives, optimizing the risk that strategic objectives are not achieved and optimizing
    resource levels required to achieve the strategic objectives.'
  notes: ''
  parent_id: cobit-2019.mea04.03
- id: cobit-2019.mea04.04.01
  type: activity
  abbrev: MEA04.04-1
  heading: Activity 1
  text: Define all governance components in scope of the review, that is, the principles, policies and frameworks; processes;
    organizational structures; culture, ethics and behavior; information; services, infrastructure and applications; people,
    skills and competences
  notes: ''
  parent_id: cobit-2019.mea04.04
- id: cobit-2019.mea04.04.02
  type: activity
  abbrev: MEA04.04-2
  heading: Activity 2
  text: Based on the scope definition, define an engagement plan, considering information to be collected and stakeholders
    to be interviewed.
  notes: ''
  parent_id: cobit-2019.mea04.04
- id: cobit-2019.mea04.04.03
  type: activity
  abbrev: MEA04.04-3
  heading: Activity 3
  text: Confirm and refine the scope based on an understanding of the enterprise architecture.
  notes: ''
  parent_id: cobit-2019.mea04.04
- id: cobit-2019.mea04.04.04
  type: activity
  abbrev: MEA04.04-4
  heading: Activity 4
  text: Refine the scope of the assurance engagement, based on available resources.
  notes: ''
  parent_id: cobit-2019.mea04.04
- id: cobit-2019.mea04.05.01
  type: activity
  abbrev: MEA04.05-1
  heading: Activity 1
  text: Define detailed steps for collecting and evaluating information from management controls within scope. Focus on assessing
    the definition and application of good practices, related to control design, and achievement of control objectives, related
    to control effectiveness.
  notes: ''
  parent_id: cobit-2019.mea04.05
- id: cobit-2019.mea04.05.02
  type: activity
  abbrev: MEA04.05-2
  heading: Activity 2
  text: Understand the context of the management objectives and the supporting management controls that are put in place.
    Understand how these management controls contribute to the achievement of the alignment goals and enterprise goals.
  notes: ''
  parent_id: cobit-2019.mea04.05
- id: cobit-2019.mea04.05.03
  type: activity
  abbrev: MEA04.05-3
  heading: Activity 3
  text: Understand all stakeholders and their interests.
  notes: ''
  parent_id: cobit-2019.mea04.05
- id: cobit-2019.mea04.05.04
  type: activity
  abbrev: MEA04.05-4
  heading: Activity 4
  text: Agree on the expected good practices for the management controls.
  notes: ''
  parent_id: cobit-2019.mea04.05
- id: cobit-2019.mea04.05.05
  type: activity
  abbrev: MEA04.05-5
  heading: Activity 5
  text: Should a management control be weak, define practices to identify residual risk (in preparation for reporting).
  notes: ''
  parent_id: cobit-2019.mea04.05
- id: cobit-2019.mea04.05.06
  type: activity
  abbrev: MEA04.05-6
  heading: Activity 6
  text: Understand the life cycle stage of the management controls and agree on expected values.
  notes: ''
  parent_id: cobit-2019.mea04.05
- id: cobit-2019.mea04.06.01
  type: activity
  abbrev: MEA04.06-1
  heading: Activity 1
  text: Refine the understanding of the IT assurance subject.
  notes: ''
  parent_id: cobit-2019.mea04.06
- id: cobit-2019.mea04.06.02
  type: activity
  abbrev: MEA04.06-2
  heading: Activity 2
  text: Refine the scope of the IT assurance subject.
  notes: ''
  parent_id: cobit-2019.mea04.06
- id: cobit-2019.mea04.06.03
  type: activity
  abbrev: MEA04.06-3
  heading: Activity 3
  text: Observe/inspect and review the management control approach. Validate the design with the control owner for completeness,
    relevancy, timeliness and measurability.
  notes: ''
  parent_id: cobit-2019.mea04.06
- id: cobit-2019.mea04.06.04
  type: activity
  abbrev: MEA04.06-4
  heading: Activity 4
  text: Ask the control owner whether the responsibilities for the governance component and overall accountability have been
    assigned. Confirm the response. Test whether accountability and responsibilities are understood and accepted. Verify that
    the right skills and the necessary resources are available.
  notes: ''
  parent_id: cobit-2019.mea04.06
- id: cobit-2019.mea04.06.05
  type: activity
  abbrev: MEA04.06-5
  heading: Activity 5
  text: Reconsider the balance of prevention vs. detection and correction types of management control activities.
  notes: ''
  parent_id: cobit-2019.mea04.06
- id: cobit-2019.mea04.06.06
  type: activity
  abbrev: MEA04.06-6
  heading: Activity 6
  text: Consider the effort spent in maintaining the management controls and the associated cost/effectiveness.
  notes: ''
  parent_id: cobit-2019.mea04.06
- id: cobit-2019.mea04.07.01
  type: activity
  abbrev: MEA04.07-1
  heading: Activity 1
  text: Assess whether the expected outcomes for each of the management controls in scope are achieved. That is, assess the
    effectiveness of the management control (control effectiveness).
  notes: ''
  parent_id: cobit-2019.mea04.07
- id: cobit-2019.mea04.07.02
  type: activity
  abbrev: MEA04.07-2
  heading: Activity 2
  text: Ensure that the assurance professional tests the outcome or effectiveness of the management control by looking for
    direct and indirect evidence of the impact on the management controls goals. This implies the direct and indirect substantiation
    of measurable contribution of the management goals to the alignment goals, thereby recording direct and indirect evidence
    of actually achieving the expected outcomes.
  notes: ''
  parent_id: cobit-2019.mea04.07
- id: cobit-2019.mea04.07.03
  type: activity
  abbrev: MEA04.07-3
  heading: Activity 3
  text: Determine whether the assurance professional obtains direct or indirect evidence for selected items/periods by applying
    a selection of testing techniques to ensure that the management control under review is working effectively. Ensure that
    the assurance professional also performs a limited review of the adequacy of the management control results and determines
    the level of substantive testing and additional work needed to provide assurance that the management control performance
    is adequate.
  notes: ''
  parent_id: cobit-2019.mea04.07
- id: cobit-2019.mea04.07.04
  type: activity
  abbrev: MEA04.07-4
  heading: Activity 4
  text: Investigate whether a management control can be made more efficient and if its design can be more effective by optimizing
    steps or looking for synergies with other management controls.
  notes: ''
  parent_id: cobit-2019.mea04.07
- id: cobit-2019.mea04.08.01
  type: activity
  abbrev: MEA04.08-1
  heading: Activity 1
  text: Document the impact of control weaknesses.
  notes: ''
  parent_id: cobit-2019.mea04.08
- id: cobit-2019.mea04.08.02
  type: activity
  abbrev: MEA04.08-2
  heading: Activity 2
  text: Communicate with management during execution of the initiative so there is a clear understanding of the work performed
    and agreement on and acceptance of the preliminary findings and recommendations.
  notes: ''
  parent_id: cobit-2019.mea04.08
- id: cobit-2019.mea04.08.03
  type: activity
  abbrev: MEA04.08-3
  heading: Activity 3
  text: Provide management with a report (aligned with the terms of reference, scope and agreed reporting standards) that
    supports the results of the initiative and enables a clear focus on key issues and important actions.
  notes: ''
  parent_id: cobit-2019.mea04.08
- id: cobit-2019.mea04.08.04
  type: activity
  abbrev: MEA04.08-4
  heading: Activity 4
  text: Supervise the assurance activities and make sure the work done is complete, meets objectives and is of an acceptable
    quality. Revise the approach or detailed steps if quality gaps occur.
  notes: ''
  parent_id: cobit-2019.mea04.08
- id: cobit-2019.mea04.09.01
  type: activity
  abbrev: MEA04.09-1
  heading: Activity 1
  text: Agree on and implement internally, within the organization, the necessary actions that need to be taken to resolve
    identified weaknesses and gaps.
  notes: ''
  parent_id: cobit-2019.mea04.09
- id: cobit-2019.mea04.09.02
  type: activity
  abbrev: MEA04.09-2
  heading: Activity 2
  text: Follow up, within the organization, to determine whether corrective actions were taken and internal control weaknesses
    were resolved.
  notes: ''
  parent_id: cobit-2019.mea04.09
