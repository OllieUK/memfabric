- id: cobit-2019
  type: framework
  abbrev: COBIT2019
  heading: COBIT 2019
  text: COBIT 2019 is a framework for the governance and management of enterprise information and technology, providing organizations
    with the needed tools to build effective information and technology governance and management.
  notes: ''
