- id: 9.3.3
  heading: Management review outputs
  type: clause
  suggested_control_id: iso-22301-2019.9.3.3
  notes: ''
  text: '9.3.3.1 The outputs of the management review shall include decisions related to continual improvement opportunities
    and any need for changes to the BCMSto improve its efficiency and effectiveness, including the following:

    a) variations to the scope of the BCMS;

    b) update of the business impact analysis, risk assessment, business continuity strategies and solutions, and business
    continuity plans;

    c) modification of procedures and controls to respond to internal or external issues that may impact the BCMS;

    d) how the effectiveness of controls will be measured. 9.3.3.2 The organization shall retain documented information as
    evidence of the results of management reviews. It shall:

    a) communicate the results of the management review to relevant interested parties;

    b) take appropriate action relating to those results.'
