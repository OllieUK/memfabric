- id: '9.2'
  heading: Internal audit
  type: clause
  suggested_control_id: iso-22301-2019.9.2
  notes: ''
  text: ''
- id: 9.2.1
  heading: General
  type: clause
  suggested_control_id: iso-22301-2019.9.2.1
  notes: ''
  text: 'The organization shall conduct internal audits at planned intervals to provide information on whether the BCMS:

    a) conforms to:

    1) the organization’s own requirements for its BCMS;

    2) the requirements of this document;

    b) is effectively implemented and maintained.'
  statements:
  - id: iso-22301-2019.9.2.1.a
    label: a)
    body: The organization shall conduct internal audits at planned intervals to provide information on whether the BCMS conforms
      to.
    notes: ''
    statements:
    - id: iso-22301-2019.9.2.1.a.1
      label: 1)
      body: The organization shall conduct internal audits at planned intervals to provide information on whether the BCMS
        conforms to the organization’s own requirements for its BCMS.
      notes: ''
    - id: iso-22301-2019.9.2.1.a.2
      label: 2)
      body: The organization shall conduct internal audits at planned intervals to provide information on whether the BCMS
        conforms to the requirements of this document.
      notes: ''
  - id: iso-22301-2019.9.2.1.b
    label: b)
    body: The organization shall conduct internal audits at planned intervals to provide information on whether the BCMS is
      effectively implemented and maintained.
    notes: ''
- id: 9.2.2
  heading: Audit programme(s)
  type: clause
  suggested_control_id: iso-22301-2019.9.2.2
  notes: ''
  text: 'The organization shall:

    a) plan, establish, implement and maintain an audit programme(s) including the frequency, methods, responsibilities, planning
    requirements and reporting, which shall take into consideration the importance of the processes concerned and the results
    of previous audits;

    b) define the audit criteria and scope for each audit;

    c) select auditors and conduct audits to ensure objectivity and the impartiality of the audit process;

    d) ensure that the results of the audits are reported to relevant managers;

    e) retain documented information as evidence of the implementation of the audit programme(s) and the audit results;

    f) ensure that any necessary corrective actions are taken without undue delay to eliminate detected nonconformities and
    their causes;

    g) ensure that follow-up audit actions include the verification of the actions taken and the reporting of verification
    results.'
