- id: 8.4.5
  heading: Recovery
  type: clause
  suggested_control_id: iso-22301-2019.8.4.5
  notes: ''
  text: The organization shall have documented processes to restore and return business activities from the temporary measures
    adopted during and after a disruption.
- id: '8.5'
  heading: Exercise programme
  type: clause
  suggested_control_id: iso-22301-2019.8.5
  notes: ''
  text: 'The organization shall implement and maintain a programme of exercising and testing to validate over time the effectiveness
    of its business continuity strategies and solutions. The organization shall conduct exercises and tests that:

    a) are consistent with its business continuity objectives;

    b) are based on appropriate scenarios that are well planned with clearly defined aims and objectives;

    c) develop teamwork, competence, confidence and knowledge for those who have roles to perform in relation to disruptions;

    d) taken together over time, validate its business continuity strategies and solutions;

    e) produce formalized post-exercise reports that contain outcomes, recommendations and actions to implement improvements;

    f) are reviewed within the context of promoting continual improvement;

    g) are performed at planned intervals and when there are significant changes within the organization or the context in
    which it operates. The organization shall act on the results of its exercising and testing to implement changes and improvements.'
  statements:
  - id: iso-22301-2019.8.5.a
    label: a)
    body: The organization shall implement and maintain a programme of exercising and testing to validate over time the effectiveness
      of its business continuity strategies and solutions. The organization shall conduct exercises and tests that are consistent
      with its business continuity objectives.
