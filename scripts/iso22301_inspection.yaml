- id: 8.4.2
  heading: Response structure
  type: clause
  suggested_control_id: iso-22301-2019.8.4.2
  notes: ''
  text: '8.4.2.1 The organization shall implement and maintain a structure, identifying one or more teams responsible for
    responding to disruptions. 8.4.2.2 The roles and responsibilities of each team and the relationships between the teams
    shall be clearly stated. 8.4.2.3 Collectively, the teams shall be competent to:

    a) assess the nature and extent of a disruption and its potential impact;

    b) assess the impact against pre-defined thresholds that justify initiation of a formal response;

    c) activate an appropriate business continuity response;

    d) plan actions that need to be undertaken;

    e) establish priorities (using life safety as the first priority);

    f) monitor the effects of the disruption and the organization’s response;

    g) activate the business continuity solutions;

    h) communicate with relevant interested parties, authorities and the media. 8.4.2.4 For each team there shall be:

    a) identified personnel and their alternates with the necessary responsibility, authority and competence to perform their
    designated role;

    b) documented procedures to guide their actions (see 8.4.4), including those for the activation, operation, coordination
    and communication of the response.'
