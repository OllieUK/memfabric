    needed.
- id: '8.4'
  heading: Business continuity plans and procedures
  type: clause
  suggested_control_id: iso-22301-2019.8.4
  notes: ''
  text: ''
- id: 8.4.1
  heading: General
  type: clause
  suggested_control_id: iso-22301-2019.8.4.1
  notes: ''
  text: 'The organization shall implement and maintain a response structure that will enable timely warning and communication
    to relevant interested parties. It shall provide plans and procedures to manage the organization during a disruption.
    The plans and procedures shall be used when required to activate business continuity solutions.

    NOTE There are different types of procedures that comprise business continuity plans. The organization shall identify
    and document business continuity plans and procedures based on the output of the selected strategies and solutions. Copyright
    International Organization for Standardization Provided by IHS Markit under license with ANSI Licensee=PTT PLC Bangkok/5970713002,
    User=Krasaephol, Siwaporn No reproduction or networking permitted without license from IHS Not for Resale, 04/20/2020
    21:43:33 MDT The procedures shall:

    a) be specific regarding the immediate steps that are to be taken during a disruption;

    b) be flexible to respond to the changing internal and external conditions of a disruption;

    c) focus on the impact of incidents that potentially lead to disruption;

    d) be effective in minimizing the impact through the implementation of appropriate solutions;

    e) assign roles and responsibilities for tasks within them.'
  statements:
