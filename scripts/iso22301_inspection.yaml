- id: '10.2'
  heading: Continual improvement
  type: clause
  suggested_control_id: iso-22301-2019.10.2
  notes: ''
  text: 'The organization shall continually improve the suitability, adequacy and effectiveness of the BCMS, based on qualitative
    and quantitative measures. The organization shall consider the results of analysis and evaluation, and the outputs from
    management review, to determine if there are needs or opportunities, relating to the business, or to the BCMS, that shall
    be addressed as part of continual improvement.

    NOTE The organization can use the processes of the BCMS, such as leadership, planning and performance evaluation, to achieve
