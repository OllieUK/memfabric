- id: 5.2.2
  heading: Communicating the business continuity policy
  type: clause
  suggested_control_id: iso-22301-2019.5.2.2
  notes: ''
  text: 'The business continuity policy shall:

    a) be available as documented information;

    b) be communicated within the organization;

    c) be available to interested parties, as appropriate.'
  statements:
  - id: iso-22301-2019.5.2.2.a
    label: a)
