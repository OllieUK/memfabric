- id: 5.2.1
  heading: Establishing the business continuity policy
  type: clause
  suggested_control_id: iso-22301-2019.5.2.1
  notes: ''
  text: 'Top management shall establish a business continuity policy that:

    a) is appropriate to the purpose of the organization;

    b) provides a framework for setting business continuity objectives;

    c) includes a commitment to satisfy applicable requirements; Copyright International Organization for Standardization
