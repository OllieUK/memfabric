- id: '4'
  heading: Context of the organization
  type: clause
  suggested_control_id: iso-22301-2019.4
  notes: ''
  text: ''
- id: '4.1'
  heading: Understanding the organization and its context
  type: clause
  suggested_control_id: iso-22301-2019.4.1
  notes: ''
  text: 'The organization shall determine external and internal issues that are relevant to its purpose and that affect its
    ability to achieve the intended outcome(s) of its BCMS.

    NOTE These issues will be influenced by the organization’s overall objectives, its products and services and the amount
    and type of risk that it may or may not take.'
- id: '4.2'
  heading: Understanding the needs and expectations of interested parties
  type: clause
  suggested_control_id: iso-22301-2019.4.2
  notes: ''
  text: ''
- id: 4.2.1
  heading: General
  type: clause
  suggested_control_id: iso-22301-2019.4.2.1
  notes: ''
  text: 'When establishing its BCMS, the organization shall determine:

    a) the interested parties that are relevant to the BCMS;

    b) the relevant requirements of these interested parties.'
  statements:
  - id: iso-22301-2019.4.2.1.a
    label: a)
    body: When establishing its BCMS, the organization shall determine the interested parties that are relevant to the BCMS.
    notes: ''
  - id: iso-22301-2019.4.2.1.b
    label: b)
    body: When establishing its BCMS, the organization shall determine the relevant requirements of these interested parties.
    notes: ''
- id: 4.2.2
  heading: Legal and regulatory requirements
  type: clause
  suggested_control_id: iso-22301-2019.4.2.2
  notes: ''
  text: 'The organization shall:

    a) implement and maintain a process to identify, have access to, and assess the applicable legal and regulatory requirements
    related to the continuity of its products and services, activities and resources;

    b) ensure that these applicable legal, regulatory and other requirements are taken into account in implementing and maintaining
    its BCMS;

    c) document this information and keep it up to date.'
  statements:
  - id: iso-22301-2019.4.2.2.a
    label: a)
    body: The organization shall implement and maintain a process to identify, have access to, and assess the applicable legal
      and regulatory requirements related to the continuity of its products and services, activities and resources.
    notes: ''
  - id: iso-22301-2019.4.2.2.b
    label: b)
    body: The organization shall ensure that these applicable legal, regulatory and other requirements are taken into account
      in implementing and maintaining its BCMS.
    notes: ''
  - id: iso-22301-2019.4.2.2.c
    label: c)
    body: The organization shall document this information and keep it up to date.
    notes: ''
- id: '4.3'
  heading: Determining the scope of the business continuity management system
  type: clause
  suggested_control_id: iso-22301-2019.4.3
  notes: ''
  text: ''
- id: 4.3.1
  heading: General
  type: clause
  suggested_control_id: iso-22301-2019.4.3.1
  notes: ''
  text: 'The organization shall determine the boundaries and applicability of the BCMSto establish its scope. When determining
    this scope, the organization shall consider:

    a) the external and internal issues referred to in 4.1;

    b) the requirements referred to in 4.2;

    c) its mission, goals, and internal and external obligations. Copyright International Organization for Standardization
    Provided by IHS Markit under license with ANSI Licensee=PTT PLC Bangkok/5970713002, User=Krasaephol, Siwaporn No reproduction
    or lic Not for Resale, 04/20/2020 21:43:33 MDT network©ing pIeSrmOit te2d0 w1ith9ou t– Aenlsle rfroimg hIHtSs reserved
    The scope shall be available as documented information.'
  statements:
  - id: iso-22301-2019.4.3.1.a
    label: a)
    body: The organization shall determine the boundaries and applicability of the BCMSto establish its scope. When determining
      this scope, the organization shall consider the external and internal issues referred to in 4.1.
    notes: ''
  - id: iso-22301-2019.4.3.1.b
    label: b)
    body: The organization shall determine the boundaries and applicability of the BCMSto establish its scope. When determining
      this scope, the organization shall consider the requirements referred to in 4.2.
    notes: ''
  - id: iso-22301-2019.4.3.1.c
    label: c)
    body: The organization shall determine the boundaries and applicability of the BCMSto establish its scope. When determining
      this scope, the organization shall consider its mission, goals, and internal and external obligations.
    notes: ''
- id: 4.3.2
  heading: Scope of the business continuity management system
  type: clause
  suggested_control_id: iso-22301-2019.4.3.2
  notes: ''
  text: 'The organization shall:

    a) establish the parts of the organization to be included in the BCMS, taking into account its location(s), size, nature
    and complexity;

    b) identify products and services to be included in the BCMS. When defining the scope, the organization shall document
    and explain exclusions. They shall not affect the organization’s ability and responsibility to provide business continuity,
    as determined by the business impact analysis or risk assessment and applicable legal or regulatory requirements.'
  statements:
  - id: iso-22301-2019.4.3.2.a
    label: a)
    body: The organization shall establish the parts of the organization to be included in the BCMS, taking into account its
      location(s), size, nature and complexity.
    notes: ''
  - id: iso-22301-2019.4.3.2.b
    label: b)
    body: The organization shall identify products and services to be included in the BCMS.
    notes: ''
- id: '4.4'
  heading: Business continuity management system
  type: clause
  suggested_control_id: iso-22301-2019.4.4
  notes: ''
  text: The organization shall establish, implement, maintain and continually improve a BCMS, including the processes needed
    and their interactions, in accordance with the requirements of this document.
- id: '5'
  heading: Leadership
  type: clause
  suggested_control_id: iso-22301-2019.5
  notes: ''
  text: ''
- id: '5.1'
  heading: Leadership and commitment
  type: clause
  suggested_control_id: iso-22301-2019.5.1
  notes: ''
  text: 'Top management shall demonstrate leadership and commitment with respect to the BCMSby:

    a) ensuring that the business continuity policy and business continuity objectives are established and are compatible
    with the strategic direction of the organization;

    b) ensuring the integration of the BCMSrequirements into the organization’s business processes;

    c) ensuring that the resources needed for the BCMSare available;

    d) communicating the importance of effective business continuity and of conforming to the BCMS requirements;

    e) ensuring that the BCMSachieves its intended outcome(s);

    f) directing and supporting persons to contribute to the effectiveness of the BCMS;

    g) promoting continual improvement;

    h) supporting other relevant managerial roles to demonstrate their leadership and commitment as it applies to their areas
    of responsibility.

    NOTE Reference to “business” in this document can be interpreted broadly to mean those activities that are core to the
    purposes of the organization’s existence.'
  statements:
  - id: iso-22301-2019.5.1.a
    label: a)
    body: Top management shall demonstrate leadership and commitment with respect to the BCMSby ensuring that the business
      continuity policy and business continuity objectives are established and are compatible with the strategic direction
      of the organization.
    notes: ''
  - id: iso-22301-2019.5.1.b
    label: b)
    body: Top management shall demonstrate leadership and commitment with respect to the BCMSby ensuring the integration of
      the BCMSrequirements into the organization’s business processes.
    notes: ''
  - id: iso-22301-2019.5.1.c
    label: c)
    body: Top management shall demonstrate leadership and commitment with respect to the BCMSby ensuring that the resources
      needed for the BCMSare available.
    notes: ''
  - id: iso-22301-2019.5.1.d
    label: d)
    body: Top management shall demonstrate leadership and commitment with respect to the BCMSby communicating the importance
      of effective business continuity and of conforming to the BCMS requirements.
    notes: ''
  - id: iso-22301-2019.5.1.e
    label: e)
    body: Top management shall demonstrate leadership and commitment with respect to the BCMSby ensuring that the BCMSachieves
      its intended outcome(s).
    notes: ''
  - id: iso-22301-2019.5.1.f
    label: f)
    body: Top management shall demonstrate leadership and commitment with respect to the BCMSby directing and supporting persons
      to contribute to the effectiveness of the BCMS.
    notes: ''
  - id: iso-22301-2019.5.1.g
    label: g)
    body: Top management shall demonstrate leadership and commitment with respect to the BCMSby promoting continual improvement.
    notes: ''
  - id: iso-22301-2019.5.1.h
    label: h)
    body: Top management shall demonstrate leadership and commitment with respect to the BCMSby supporting other relevant
      managerial roles to demonstrate their leadership and commitment as it applies to their areas of responsibility.
    notes: ''
