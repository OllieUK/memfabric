- id: '8.6'
  heading: Evaluation of business continuity documentation and capabilities
  type: clause
  suggested_control_id: iso-22301-2019.8.6
  notes: ''
  text: 'The organization shall:

    a) evaluate the suitability, adequacy and effectiveness of its business impact analysis, risk assessment, strategies,
    solutions, plans and procedures;

    b) undertake evaluations through reviews, analysis, exercises, tests, post-incident reports and performance evaluations;

    c) conduct evaluations of the business continuity capabilities of relevant partners and suppliers;

    d) evaluate compliance with applicable legal and regulatory requirements, industry best practices, and conformity with
    its own business continuity policy and objectives;

    e) update documentation and procedures in a timely manner. These evaluations shall be conducted at planned intervals,
    after an incident or activation, and when significant changes occur.'
