    notes: ''
- id: '5.3'
  heading: Roles, responsibilities and authorities
  type: clause
  suggested_control_id: iso-22301-2019.5.3
  notes: ''
  text: 'Top management shall ensure that the responsibilities and authorities for relevant roles are assigned and communicated
    within the organization. Top management shall assign the responsibility and authority for:

    a) ensuring that the BCMSconforms to the requirements of this document;

    b) reporting on the performance of the BCMSto top management.'
  statements:
  - id: iso-22301-2019.5.3.a
    label: a)
    body: Top management shall ensure that the responsibilities and authorities for relevant roles are assigned and communicated
      within the organization. Top management shall assign the responsibility and authority for ensuring that the BCMSconforms
      to the requirements of this document.
    notes: ''
  - id: iso-22301-2019.5.3.b
    label: b)
    body: Top management shall ensure that the responsibilities and authorities for relevant roles are assigned and communicated
      within the organization. Top management shall assign the responsibility and authority for reporting on the performance
      of the BCMSto top management.
    notes: ''
- id: '6'
  heading: Planning
  type: clause
  suggested_control_id: iso-22301-2019.6
  notes: ''
  text: ''
- id: '6.1'
  heading: Actions to address risks and opportunities
  type: clause
  suggested_control_id: iso-22301-2019.6.1
  notes: ''
  text: ''
- id: 6.1.1
  heading: Determining risks and opportunities
  type: clause
  suggested_control_id: iso-22301-2019.6.1.1
  notes: ''
  text: 'When planning for the BCMS, the organization shall consider the issues referred to in 4.1 and the requirements referred
    to in 4.2 and determine the risks and opportunities that need to be addressed to:

    a) give assurance that the BCMScan achieve its intended outcome(s);

    b) prevent, or reduce, undesired effects;

    c) achieve continual improvement.'
  statements:
  - id: iso-22301-2019.6.1.1.a
    label: a)
    body: When planning for the BCMS, the organization shall consider the issues referred to in 4.1 and the requirements referred
      to in 4.2 and determine the risks and opportunities that need to be addressed to give assurance that the BCMScan achieve
      its intended outcome(s).
    notes: ''
  - id: iso-22301-2019.6.1.1.b
    label: b)
    body: When planning for the BCMS, the organization shall consider the issues referred to in 4.1 and the requirements referred
      to in 4.2 and determine the risks and opportunities that need to be addressed to prevent, or reduce, undesired effects.
    notes: ''
  - id: iso-22301-2019.6.1.1.c
    label: c)
    body: When planning for the BCMS, the organization shall consider the issues referred to in 4.1 and the requirements referred
      to in 4.2 and determine the risks and opportunities that need to be addressed to achieve continual improvement.
    notes: ''
- id: 6.1.2
  heading: Addressing risks and opportunities
  type: clause
  suggested_control_id: iso-22301-2019.6.1.2
  notes: ''
  text: 'The organization shall plan:

    a) actions to address these risks and opportunities;

    b) how to:

    1) integrate and implement the actions into its BCMSprocesses (see 8.1);

    2) evaluate the effectiveness of these actions (see 9.1).

    NOTE Risks and opportunities relate to the effectiveness of the management system. Risks related to disruption of the
    business are addressed in 8.2.'
  statements:
  - id: iso-22301-2019.6.1.2.a
    label: a)
    body: The organization shall plan actions to address these risks and opportunities.
    notes: ''
  - id: iso-22301-2019.6.1.2.b
    label: b)
    body: The organization shall plan how to.
    notes: ''
    statements:
    - id: iso-22301-2019.6.1.2.b.1
      label: 1)
      body: The organization shall plan how to integrate and implement the actions into its BCMSprocesses (see 8.1).
      notes: ''
    - id: iso-22301-2019.6.1.2.b.2
      label: 2)
      body: The organization shall plan how to evaluate the effectiveness of these actions (see 9.1).
      notes: ''
