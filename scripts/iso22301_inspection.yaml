  notes: ''
  text: '8.4.3.1 The organization shall document and maintain procedures for:

    a) communicating internally and externally to relevant interested parties, including what, when, with whom and how to
    communicate;

    NOTE The organization can document and maintain procedures for how, and under what circumstances, the organization communicates
    with employees and their emergency contacts.

    b) receiving, documenting and responding to communications from interested parties, including any national or regional
    risk advisory system or equivalent;

    c) ensuring the availability of the means of communication during a disruption; Copyright International Organization for
    Standardization Provided by IHS Markit under license with ANSI Licensee=PTT PLC Bangkok/5970713002, User=Krasaephol, Siwaporn
    No reproduction or lic Not for Resale, 04/20/2020 21:43:33 MDT network©ing pIeSrmOit te2d0 w1ith9ou t– Aenlsle rfroimg
    hIHtSs reserved

    d) facilitating structured communication with emergency responders;

    e) providing details of the organization’s media response following an incident, including a communications strategy;

    f) recording the details of the disruption, the actions taken and the decisions made. 8.4.3.2 Where applicable, the following
    shall also be considered and implemented:

    a) alerting interested parties potentially impacted by an actual or impending disruption;

    b) ensuring appropriate coordination and communication between multiple responding organizations. The warning and communication
    procedures shall be exercised as part of the organization’s exercise programme described in 8.5.'
