- id: '10.1'
  heading: Nonconformity and corrective action
  type: clause
  suggested_control_id: iso-22301-2019.10.1
  notes: ''
  text: '10.1.1 The organization shall determine opportunities for improvement and implement necessary actions to achieve
    the intended outcomes of its BCMS. Copyright International Organization for Standardization Provided by IHS Markit under
    license with ANSI Licensee=PTT PLC Bangkok/5970713002, User=Krasaephol, Siwaporn No reproduction or lic Not for Resale,
    04/20/2020 21:43:33 MDT network©ing pIeSrmOit te2d0 w1ith9ou t– Aenlsle rfroimg hIHtSs reserved 10.1.2 When a nonconformity
    occurs, the organization shall:

    a) react to the nonconformity, and, as applicable:

    1) take action to control and correct it;

    2) deal with the consequences;

    b) evaluate the need for action to eliminate the cause(s) of the nonconformity, in order that it does not recur or occur
    elsewhere, by:

    1) reviewing the nonconformity;

    2) determining the causes of the nonconformity;

    3) determining if similar nonconformities exist, or can potentially occur;

    c) implement any action needed;

    d) review the effectiveness of any corrective action taken;

    e) make changes to the BCMS, if necessary. Corrective actions shall be appropriate to the effects of the nonconformities
    encountered. 10.1.3 The organization shall retain documented information as evidence of:

    a) the nature of the nonconformities and any subsequent actions taken;

    b) the results of any corrective action.'
