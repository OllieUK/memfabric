  type: clause
  suggested_control_id: iso-22301-2019.7.2
  notes: ''
  text: 'The organization shall:

    a) determine the necessary competence of person(s) doing work under its control that affects its business continuity performance;

    b) ensure that these persons are competent on the basis of appropriate education, training, or experience; Copyright International
    Organization for Standardization Provided by IHS Markit under license with ANSI Licensee=PTT PLC Bangkok/5970713002, User=Krasaephol,
