- id: 8.4.4
  heading: Business continuity plans
  type: clause
  suggested_control_id: iso-22301-2019.8.4.4
  notes: ''
  text: '8.4.4.1 The organization shall document and maintain business continuity plans and procedures. The business continuity
    plans shall provide guidance and information to assist teams to respond to a disruption and to assist the organization
    with response and recovery. 8.4.4.2 Collectively, the business continuity plans shall contain:

    a) details of the actions that the teams will take in order to:

    1) continue or recover prioritized activities within predetermined time frames;

    2) monitor the impact of the disruption and the organization’s response to it;

    b) reference to the pre-defined threshold(s) and process for activating the response;

    c) procedures to enable the delivery of products and services at agreed capacity;

    d) details to manage the immediate consequences of a disruption giving due regard to:

    1) the welfare of individuals;

    2) the prevention of further loss or unavailability of prioritized activities;

    3) the impact on the environment. 8.4.4.3 Each plan shall include:

    a) the purpose, scope and objectives;

    b) the roles and responsibilities of the team that will implement the plan;

    c) actions to implement the solutions;

    d) supporting information needed to activate (including activation criteria), operate, coordinate and communicate the
    team’s actions;

    e) internal and external interdependencies;

    f) the resource requirements;

    g) the reporting requirements;

    h) a process for standing down. Each plan shall be usable and available at the time and place at which it is required.
    Copyright International Organization for Standardization Provided by IHS Markit under license with ANSI Licensee=PTT PLC
    Bangkok/5970713002, User=Krasaephol, Siwaporn No reproduction or networking permitted without license from IHS Not for
    Resale, 04/20/2020 21:43:33 MDT'
