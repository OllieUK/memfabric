- id: '8'
  heading: Operation
  type: clause
  suggested_control_id: iso-22301-2019.8
  notes: ''
  text: ''
- id: '8.1'
  heading: Operational planning and control
  type: clause
  suggested_control_id: iso-22301-2019.8.1
  notes: ''
  text: 'The organization shall plan, implement and control the processes needed to meet requirements, and to implement the
    actions determined in 6.1, by:

    a) establishing criteria for the processes;

    b) implementing control of the processes in accordance with the criteria;

    c) keeping documented information to the extent necessary to have confidence that the processes have been carried out
    as planned. The organization shall control planned changes and review the consequences of unintended changes, taking action
    to mitigate any adverse effects, as necessary. T8h.2e orBguansiiznaetsiosn mshpalal cetn saunrael tyhsaits oauntdso ruirscke
    da pssroecsessmseesn atnd the supply chain are controlled. i'
  statements:
  - id: iso-22301-2019.8.1.a
    label: a)
    body: The organization shall plan, implement and control the processes needed to meet requirements, and to implement the
      actions determined in 6.1, by establishing criteria for the processes.
    notes: ''
  - id: iso-22301-2019.8.1.b
    label: b)
    body: The organization shall plan, implement and control the processes needed to meet requirements, and to implement the
      actions determined in 6.1, by implementing control of the processes in accordance with the criteria.
    notes: ''
  - id: iso-22301-2019.8.1.c
    label: c)
    body: The organization shall plan, implement and control the processes needed to meet requirements, and to implement the
      actions determined in 6.1, by keeping documented information to the extent necessary to have confidence that the processes
      have been carried out as planned.
    notes: ''
- id: 8.2.1
  heading: General
  type: clause
  suggested_control_id: iso-22301-2019.8.2.1
  notes: ''
  text: 'The organization shall:

    a) implement and maintain systematic processes for analysing the business impact and assessing the risks of disruption;

    b) review the business impact analysis and risk assessment at planned intervals and when there are significant changes
    within the organization or the context in which it operates.

    NOTE The organization determines the order in which the business impact analysis and risk assessment are conducted. Copyright
    International Organization for Standardization Provided by IHS Markit under license with ANSI Licensee=PTT PLC Bangkok/5970713002,
    User=Krasaephol, Siwaporn No reproduction or networking permitted without license from IHS Not for Resale, 04/20/2020
    21:43:33 MDT'
  statements:
  - id: iso-22301-2019.8.2.1.a
    label: a)
    body: The organization shall implement and maintain systematic processes for analysing the business impact and assessing
      the risks of disruption.
    notes: ''
  - id: iso-22301-2019.8.2.1.b
    label: b)
    body: The organization shall review the business impact analysis and risk assessment at planned intervals and when there
      are significant changes within the organization or the context in which it operates.
    notes: ''
- id: 8.2.2
  heading: Business impact analysis
  type: clause
  suggested_control_id: iso-22301-2019.8.2.2
  notes: ''
  text: 'The organization shall use the process for analysing business impacts to determine business continuity priorities
    and requirements. The process shall:

    a) define the impact types and criteria relevant to the organization’s context;

    b) identify the activities that support the provision of products and services;

    c) use the impact types and criteria for assessing the impacts over time resulting from the disruption of these activities;

    d) identify the time frame within which the impacts of not resuming activities would become unacceptable to the organization;

    NOTE 1 This time frame can be referred to as the "maximum tolerable period of disruption (MTPD)".

    e) set prioritized time frames within the time identified in d) for resuming disrupted activities at a specified minimum
    acceptable capacity;

    NOTE 2 This time frame can be referred to as the "recovery time objective (RTO)".

    f) use this analysis to identify prioritized activities;

    g) determine which resources are needed to support prioritized activities;

    h) determine the dependencies, including partners and suppliers, and interdependencies of prioritized activities.'
  statements:
  - id: iso-22301-2019.8.2.2.a
    label: a)
    body: The organization shall use the process for analysing business impacts to determine business continuity priorities
      and requirements. The process shall define the impact types and criteria relevant to the organization’s context.
    notes: ''
  - id: iso-22301-2019.8.2.2.b
    label: b)
    body: The organization shall use the process for analysing business impacts to determine business continuity priorities
      and requirements. The process shall identify the activities that support the provision of products and services.
    notes: ''
  - id: iso-22301-2019.8.2.2.c
    label: c)
    body: The organization shall use the process for analysing business impacts to determine business continuity priorities
      and requirements. The process shall use the impact types and criteria for assessing the impacts over time resulting
      from the disruption of these activities.
    notes: ''
  - id: iso-22301-2019.8.2.2.d
    label: d)
    body: The organization shall use the process for analysing business impacts to determine business continuity priorities
      and requirements. The process shall identify the time frame within which the impacts of not resuming activities would
      become unacceptable to the organization.
    notes: ''
  - id: iso-22301-2019.8.2.2.e
    label: e)
    body: The organization shall use the process for analysing business impacts to determine business continuity priorities
      and requirements. The process shall set prioritized time frames within the time identified in d) for resuming disrupted
      activities at a specified minimum acceptable capacity.
    notes: ''
  - id: iso-22301-2019.8.2.2.f
    label: f)
    body: The organization shall use the process for analysing business impacts to determine business continuity priorities
      and requirements. The process shall use this analysis to identify prioritized activities.
    notes: ''
  - id: iso-22301-2019.8.2.2.g
    label: g)
    body: The organization shall use the process for analysing business impacts to determine business continuity priorities
      and requirements. The process shall determine which resources are needed to support prioritized activities.
    notes: ''
  - id: iso-22301-2019.8.2.2.h
    label: h)
    body: The organization shall use the process for analysing business impacts to determine business continuity priorities
      and requirements. The process shall determine the dependencies, including partners and suppliers, and interdependencies
      of prioritized activities.
    notes: ''
- id: 8.2.3
  heading: Risk assessment
  type: clause
  suggested_control_id: iso-22301-2019.8.2.3
  notes: ''
  text: 'The organization shall implement and maintain a risk assessment process.

    NOTE The process for risk assessment is addressed in ISO 31000. The organization shall:

    a) identify the risks of disruption to the organization’s prioritized activities and to their required resources;

    b) analyse and evaluate the identified risks;

    c) determine which risks require treatment.

    NOTE Risks in this subclause relate to the disruption of business activities. Risks and opportunities related to the effectiveness
    of the management system are addressed in 6.1.'
  statements:
  - id: iso-22301-2019.8.2.3.a
    label: a)
    body: The organization shall implement and maintain a risk assessment process. Identify the risks of disruption to the
      organization’s prioritized activities and to their required resources.
    notes: ''
  - id: iso-22301-2019.8.2.3.b
    label: b)
    body: The organization shall implement and maintain a risk assessment process. Analyse and evaluate the identified risks.
    notes: ''
  - id: iso-22301-2019.8.2.3.c
    label: c)
    body: The organization shall implement and maintain a risk assessment process. Determine which risks require treatment.
    notes: ''
- id: '8.3'
  heading: Business continuity strategies and solutions
  type: clause
  suggested_control_id: iso-22301-2019.8.3
  notes: ''
  text: ''
- id: 8.3.1
  heading: General
  type: clause
  suggested_control_id: iso-22301-2019.8.3.1
  notes: ''
  text: Based on the outputs from the business impact analysis and risk assessment, the organization shall identify and select
    business continuity strategies that consider options for before, during and after disruption. The business continuity
    strategies shall be comprised of one or more solutions.
- id: 8.3.2
  heading: Identification of strategies and solutions
  type: clause
  suggested_control_id: iso-22301-2019.8.3.2
  notes: ''
  text: 'Identification shall be based on the extent to which strategies and solutions:

    a) meet the requirements to continue and recover prioritized activities within the identified time frames and agreed capacity;
    Copyright International Organization for Standardization Provided by IHS Markit under license with ANSI Licensee=PTT PLC
    Bangkok/5970713002, User=Krasaephol, Siwaporn No reproduction or lic Not for Resale, 04/20/2020 21:43:33 MDT network©ing
    pIeSrmOit te2d0 w1ith9ou t– Aenlsle rfroimg hIHtSs reserved

    b) protect the organization’s prioritized activities;

    c) reduce the likelihood of disruption;

    d) shorten the period of disruption;

    e) limit the impact of disruption on the organization’s products and services;

    f) provide for the availability of adequate resources.'
  statements:
