  notes: ''
  text: Top management shall review the organization’s BCMS, at planned intervals, to ensure its continuing suitability, adequacy
    and effectiveness.
- id: 9.3.2
  heading: Management review input
  type: clause
  suggested_control_id: iso-22301-2019.9.3.2
  notes: ''
  text: 'The management review shall include consideration of:

    a) the status of actions from previous management reviews; Copyright International Organization for Standardization Provided
    by IHS Markit under license with ANSI Licensee=PTT PLC Bangkok/5970713002, User=Krasaephol, Siwaporn No reproduction or
    networking permitted without license from IHS Not for Resale, 04/20/2020 21:43:33 MDT

    b) changes in external and internal issues that are relevant to the BCMS;

    c) information on the BCMSperformance, including trends in:

    1) nonconformities and corrective actions;

    2) monitoring and measurement evaluation results;

    3) audit results;

    d) feedback from interested parties;

    e) the need for changes to the BCMS, including the policy and objectives;

    f) procedures and resources that could be used in the organization to improve the BCMS’ performance and effectiveness;

    g) information from the business impact analysis and risk assessment;

    h) output from the evaluation of business continuity documentation and capabilities (see 8.6);

    i) risks or issues not adequately addressed in any previous risk assessment;

    j) lessons learned and actions arising from near-misses and disruptions;

    k) opportunities for continual improvement.'
