- id: 6.2.2
  heading: Determining business continuity objectives
  type: clause
  suggested_control_id: iso-22301-2019.6.2.2
  notes: ''
  text: 'When planning how to achieve its business continuity objectives, the organization shall determine:

    a) what will be done;

    b) what resources will be required;

    c) who will be responsible;

    d) when it will be completed;

    e) how the results will be evaluated.'
