      will be evaluated.
    notes: ''
- id: '6.3'
  heading: Planning changes to the business continuity management system
  type: clause
  suggested_control_id: iso-22301-2019.6.3
  notes: ''
  text: 'When the organization determines the need for changes to the BCMS, including those identified in Clause 10, the changes
    shall be carried out in a planned manner. The organization shall consider:

    a) the purpose of the changes and their potential consequences;

    b) the integrity of the BCMS;

    c) the availability of resources;

    d) the allocation or reallocation of responsibilities and authorities.'
  statements:
  - id: iso-22301-2019.6.3.a
    label: a)
    body: When the organization determines the need for changes to the BCMS, including those identified in Clause 10, the
      changes shall be carried out in a planned manner. The organization shall consider the purpose of the changes and their
      potential consequences.
    notes: ''
  - id: iso-22301-2019.6.3.b
    label: b)
    body: When the organization determines the need for changes to the BCMS, including those identified in Clause 10, the
      changes shall be carried out in a planned manner. The organization shall consider the integrity of the BCMS.
    notes: ''
  - id: iso-22301-2019.6.3.c
    label: c)
    body: When the organization determines the need for changes to the BCMS, including those identified in Clause 10, the
      changes shall be carried out in a planned manner. The organization shall consider the availability of resources.
    notes: ''
  - id: iso-22301-2019.6.3.d
    label: d)
    body: When the organization determines the need for changes to the BCMS, including those identified in Clause 10, the
      changes shall be carried out in a planned manner. The organization shall consider the allocation or reallocation of
