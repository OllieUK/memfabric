- id: 8.3.3
  heading: Selection of strategies and solutions
  type: clause
  suggested_control_id: iso-22301-2019.8.3.3
  notes: ''
  text: 'Selection shall be based on the extent to which strategies and solutions:

    a) meet the requirements to continue and recover prioritized activities within the identified time frames and agreed capacity;

    b) consider the amount and type of risk the organization may or may not take;

    c) consider associated costs and benefits.'
  statements:
  - id: iso-22301-2019.8.3.3.a
    label: a)
    body: Selection shall be based on the extent to which strategies and solutions meet the requirements to continue and recover
      prioritized activities within the identified time frames and agreed capacity.
    notes: ''
  - id: iso-22301-2019.8.3.3.b
    label: b)
    body: Selection shall be based on the extent to which strategies and solutions consider the amount and type of risk the
      organization may or may not take.
    notes: ''
  - id: iso-22301-2019.8.3.3.c
    label: c)
    body: Selection shall be based on the extent to which strategies and solutions consider associated costs and benefits.
    notes: ''
- id: 8.3.4
  heading: Resource requirements
  type: clause
  suggested_control_id: iso-22301-2019.8.3.4
  notes: ''
  text: 'The organization shall determine the resource requirements to implement the selected business continuity solutions.
    The types of resources considered shall include, but not be limited to:

    a) people;

    b) information and data;

    c) physical infrastructure such as buildings, workplaces or other facilities and associated utilities;

    d) equipment and consumables;

    e) information and communication technology (ICT) systems;

    f) transportation and logistics;

    g) finance;

    h) partners and suppliers.'
  statements:
