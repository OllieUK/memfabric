- id: 5.2.3
  heading: Schutzziele
  type: clause
  suggested_control_id: din-spec-14027-2026.5.2.3
  notes: ''
  text: ''
- id: 5.2.3.1
  heading: Definition von Schutzzielen
  type: clause
  suggested_control_id: din-spec-14027-2026.5.2.3.1
  notes: ''
  text: 'Um Organisationswerte wirksam zu schützen, ist es erforderlich, für die jeweiligen Assets geeignete Schutzziele
    zu definieren. Diese sollten zunächst generisch (als strategische Schutzziele) und anschließend spezifisch für einzelne
    Werte (oper ative Sc hutzziele ) formulie rt w erden. Schut zziele könne n sic h auch aus re gulatorisch en Vorgabe n
    (wie z.B. beim S chutz Kritisc her Infrast rukturen ) ergeben. Ein bewährter Ansatz ist es, festzulegen und zu beschreiben,
    welche Ereignisse, Zustände oder Auswirkungen vermieden werden sollten bzw. keinesfalls eintreten dürfen. BEISPIEL Für
    strategische Schutzziele: Menschenleben und Gesundheit schützen, gesetzliche Aufgaben erfüllen, Funktionsfähigkeit
    aufrechterhalten; (hohe) wirtschaftliche Schäden abwenden, Imageschaden abwenden usw. Die Definition von Schutzzielen
    und Fehlertoleranzen sollte frühzeitig erfolgen, da sie die Grundlage für alle nac hfolgenden Sch utzmaßnahm en b ildet.
    ANMERKUNG Es ist zudem wichtig zu betonen, dass das bisherige Ausbleiben kritischer Ereignisse nicht automatisch auf ein
    wirksa mes B edr ohungs manage me nt schlie ßen l ässt .'
- id: 5.2.3.2
  heading: Bewertung der Assetkritikalität
  type: clause
  suggested_control_id: din-spec-14027-2026.5.2.3.2
  notes: ''
  text: 'Die Assetkritikalität beschreibt die potenziellen Auswirkungen sicherheitsrelevanter Vorfälle auf spezifische Organisationswerte.
    Eine Bewertung sollte für einzelne Assets oder logisch zusammengefasste Assetgruppen erfolgen. Grundlage hierfür ist
    die anwendungsspezifische Festlegung geeigneter Bewertungskriterien durch die Organisation. Relevante Auswirkungsdimensionen
    umfassen unter anderem:

    — finanzielle Schäden, die sich aus dem Verlust, der Beeinträchtigung oder dem Ausfall eines Assets ergeben können
    (z.B. Produktionsunterbrechung infolge technischer Störung oder Personalausfall);

    — Folgen für die Versorgung der Bevölkerung (z.B. durch den Ausfall kritischer Dienstleistungen);

    — regulatorische Auswirkungen;

    — Wiederbeschaffungszeiten kritischer Ressourcen, die die Betriebsfähigkeit beeinflussen;

    — Reputationsschäden,diedurchdenVorfalldasVertraueninterneroderexternerAnspruchsgruppenbeeinträchtigen;

    — personenbezogene Risiken, insbesondere Bedrohungen für Leib und Leben, etwa bei betriebsrelevanten Einrichtungen;

    — Kaskadeneffekte (sowohl intern als auch extern). Die Kritikalitätsbewertung sollte gewichtet erfolgen, indem unterschiedliche
    Einflussfaktoren nach ihrer Bedeutung skaliert berücksichtigt werden. Alternativ ist eine ungewichtete Betrachtung möglich,
    bei der alle Kriterien gleichrangig behandelt werden. Die Assetkritikalität sollte einer von vier Intensitätsstufen
    zugeordnet werden (A=sehrhoch bis D=niedrig). Diese Klassifizierung sollte auf Basis einer organisationsindividuell entwickelten
    Metrik erfolgen. Neben der initialen Bewertung der Assetkritikalität ist ein kontinuierlicher Bewertungsprozess erforderlich,
    der eine wiederkehrende Bewertung bestehender Assets und eine Initialbewertung neu hinzugekommener Assets sicherstellt.
    SoferneinBusinessContinuityManagement(BCM)etabliertist,solltendieBewertungenanalogindieBestimmung der Assetkritikalität
    einfließen.'
