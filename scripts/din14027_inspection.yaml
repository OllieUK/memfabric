- id: '6.3'
  heading: Schnittstellen
  type: clause
  suggested_control_id: din-spec-14027-2026.6.3
  notes: ''
  text: 'Der Abschnitt„Sicherheitslagebild“ hat Schnittstellen zu folgenden Abschnitten dieses Dokumentes:

    — Abschnitt11 „Standortsicherheit“;

    — Abschnitt15 „Reisesicherheit“;

    — Abschnitt17 „Know-how-Schutz“;

    — Abschnitt18 „Lieferkettensicherheit“;

    — Abschnitt9 „Störungs-, Notfallund Krisenmanagement“;

    — Abschnitt13 „Veranstaltungsschutz“;

    — Abschnitt5 „Schutzbedarfsermittlung“;

    — Abschnitt20 „Aufbau und Betrieb eines Sicherheitsmanagementsystem“. Es muss organisationsspezifisch auf weitere mögliche
    Schnittstellen zu anderen internen Organisationsbereichen geprüft werden. AbschnittB.3 zeigt eine Auflistung von internen
    Organisationsbereichen, die häufig als Schnittstellenpartner der Corporate Security wahrgenommen werden. Organisationsspezifisch
    muss ebenfalls geprüft werden, welche Bereiche der Organisation außerhalb der Corporate Security zu invol vieren sind.
    Det ails find en sich u .A im Z OES-Grü nbu ch zum „Inter disziplinär en L agebild in Echtzeit“.'
