- id: '10'
  heading: Business Continuity Management
  type: clause
  suggested_control_id: din-spec-14027-2026.10
  notes: ''
  text: ''
- id: '10.1'
  heading: Allgemeines
  type: clause
  suggested_control_id: din-spec-14027-2026.10.1
  notes: ''
  text: Organisationen können von Ereignissen betroffen sein, die weitreichende Auswirkungen auf materielle und immaterielle
    Werte haben und in der Folge die Wertschöpfung oder Aufgabenerfüllung unterbrechen können. Während solcher Ereignisse
    können die Vorbereitungen des Business Continuity Managements (BCM) die Stabilität der Organi sation und ihrer z eitk
    ritischen Prozes se s icherstell en und ein en Wiederanla uf betr offe ner Organisationsteile beschleunigen. Organisationen
    sollten großen Wert darauflegen, dass auch Lieferanten und Dienstleister wirksame Maßnahmen im Bereich BCM implementieren,
    um die Stabilität der Lieferketten und Services auch in Krisenzeiten sicherzustellen. DieAnzahlderAnforderungenvonInteressensgruppen,Gesetzen,RichtlinienundNormen,imUmfeldvonBCM
    nimmt stetig zu– ein Hinweis auf die wachsende Relevanz des Themas. Für Organisationen ergibt sich daraus dieChance,bestehendeBusinessContinuityInsellösungenineinintegriertesBusinessContinuityManagement
    System (BCMS) zu überführen. Die dargestellten Anforderungen in AnhangA sind operative Mindeststandards an die Bestandteile
    eines BCM undstehenimEinklangmitDINENISO22301.EskanndurchdieAnwendungvonDINENISO22301zusätzlich ausgebaut werden. In
    TabelleB.3 sind typische Bedrohungsszenarien nach Kategorien aufgelistet.
- id: '10.2'
  heading: Anforderungen
  type: clause
  suggested_control_id: din-spec-14027-2026.10.2
  notes: ''
  text: 'Das BCM zielt auf eine kulturelle Veränderung ab, nämlich darauf, die Widerstandsfähigkeit (Resilienz) gegenüber
    Ereignissen in die Organisationskultur einzubetten. Mit einem umfassend eingeführten BCM generieren Organisationen einen
    Mehrwert, da der Zweck der Organisation geschützt wird. Bei Ereignissen, wie dem Eintritt von Notfällen oder existenzgefährdenden
    Risiken (Krisen), begegnet die Organisation diesen vorbereitet. DieOrganisationsollteihrBCMineinemsichkontinuierlichverbesserndenKreislaufbetreiben.Dieserbesteht
    aus den Phasen Rahmenbedingungen und Organisation, Implementierung eines BCMS sowie Validierung und Weiterentwicklung.
    Im BCM wird eine Business Impact Analyse (BIA) durchgeführt, mit dem Fokus auf den Folgen eines Ausfalls von Ressourcen
    im Hinblick auf die Erbringung von Leistungen der Organisation. Gängige Beispiele sind Personal, Infrastruktur, Informationstechnik
    (IT) und Betriebliche Technologie (OT, en: Operational Technology). Die auf der Grundlage von der BIA und der Risikoanalyse
    erstellten Business Continuity Pläne zur Sicherstellung der Funktionsund Betriebsfähigkeit priorisierter Prozesse stellen
    eine wichtige Unterstützung für das Störungs-, Notfallund Krisenmanagement dar. Weitere Informationen finden sich im
    Anforderungskatalog (siehe TabelleA.7).'
- id: '10.3'
  heading: Schnittstellen
  type: clause
  suggested_control_id: din-spec-14027-2026.10.3
  notes: ''
  text: 'Der Abschnitt„Business Continuity Management“ hat Schnittstellen zu folgenden Abschnitten dieses Dokumentes:

    — Abschnitt9 „Störungs-, Notfallund Krisenmanagement“: Diese Bereiche sind eng miteinander verknüpft und arbeiten Hand
    in Hand, um die Widerstandsfähigkeit (Resilienz) der Organisation zu stärken. ANMERKUNG Die Verzahnung zwischen BCM
    und Risikomanagement ist ebenso eng und vielschichtig. Das Risikomanagement identifiziert, analysiert, bewertet und behandelt
    Risiken, die die Organisation betreffen könnten. Diese Informationen sind für BCM entscheide nd, um Lo ̈sung en und
    BC -Pläne zu en twic keln und zu im plement ieren. Es muss organisationsspezifisch auf weitere mögliche Schnittstellen
    zu anderen internen Organisationsbereichen geprüft werden. AbschnittB.3 zeigt eine Auflistung von internen Organisationsbereichen,
    die häufig als Schn ittstellen partner der Corporate Secu rity w ahrgenom men werden.'
  statements:
  - id: din-spec-14027-2026.10.3.stmt-1
    label: —
    body: 'Der Abschnitt„Business Continuity Management“ hat Schnittstellen zu folgenden Abschnitten dieses Doku- mentes Abschnitt9
      „Störungs-, Notfallund Krisenmanagement“: Diese Bereiche sind eng miteinander verknüpft und arbeiten Hand in Hand,
      um die Widerstandsfähigkeit (Resilienz) der Organisation zu stärken.'
    notes: ''
