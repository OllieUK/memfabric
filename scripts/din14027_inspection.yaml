- id: '14'
  heading: Bedrohungsmanagement
  type: clause
  suggested_control_id: din-spec-14027-2026.14
  notes: ''
  text: ''
- id: '14.1'
  heading: Allgemeines
  type: clause
  suggested_control_id: din-spec-14027-2026.14.1
  notes: ''
  text: Bedrohungsmanagement umfasst in der Regel das frühzeitige Erkennen, Bewerten und Entschärfen potenzieller Bedrohungen,
    die Prävention von u.a. zielgerichteter Gewalt durch geeignete Maßnahmen und Interventione n. Ein funktionierendes Bedrohungsmanagement
    bietet durch ein interdisziplinäres Vorgehen einen Lösungsansatz zur Verhinderung von Gewalt und erhöht durch seine
    Strukturen und sein Wirken auch die Wahrscheinlichkeit schwere Gewalttaten frühzeitig zu verhindern. Dabei umfasst das
    Bedrohungsmanagement üblicherweisesowohldirekteAndrohungenschwererStraftatenimSinnedesdeutschenStrafrechts,insbesonderevon
    Gewalttaten, als auch subtile Warnsignale. Damit zielt der Ansatz Bedrohungsmanagements auf die Verhinderung einer Realisierung
    von Gefahren für Leib, Leben sowie die Freiheit von Personen oder bedeutende Sachwerte ab. In TabelleB.3 sind typische
    Bedrohungsszenarien nach Kategorien aufgelistet. FürglobalagierendeOrganisationenistesempfehlenswertBedrohungeniminternationalenKontextzubewerten
    und kulturelle Unterschiede bei der Wahrnehmung und Mitteilung von Bedrohungen sowie länderspezifische rechtliche Rahmenbedingungen
    (z.B. Strafund Datenschutzrecht) ebenfalls zu berücksichtigen.
- id: '14.2'
  heading: Anforderungen
  type: clause
  suggested_control_id: din-spec-14027-2026.14.2
  notes: ''
  text: Ein effektives Bedrohungsmanagement ist üblicherweise in eine Sicherheitskultur eingebettet. Im Rahmen von Regelungen
    wie z.B. Policies werden Leitplanken gesetzt, die einerseits dem Bedrohungsmanagement ein sichtbaresMandatverleihenundzugleicheineninternenRahmenfürdieSanktionierungvonintolerablemVerhalten
    schaffen. Die Sensibilisierung aller Beschäftigten gekoppelt mit zielgruppenspezifischen Trainings sind weitereBausteineeineseffektivenBedrohungsmanagements.FührungskräfteundPersonalfunktionenspielen
    eineSchlüsselrolleimBedrohungsmanagement.SieerkennenfrühauffälligesVerhalten,leitenMaßnahmenein und fördern eine offene
    Kommunikationskultur. Daher ist ihre gezielte Qualifizierung unerlässlich. Die Bearbeitung von konkreten Sachverhalten
    erfolgt durch geschulte Bedrohungsmanager und Bedrohungsmanagerinnen.DerinterdisziplinäreAnsatzerfordertdabeieinbesonderesAugenmerkaufdieEinhaltungvon
    datenschutzrechtlichen Vorgaben zu legen. Dabei fällt ein besonderes Gewicht auf ein strukturiertes Fallmanagement. Dieses
    bildet das operative Rückgrat. Es umfasst die standardisierte Erfassung, Bewertung, DokumentationundNachverfolgungpotenziellbedrohlicherSachverhalte.ZentraleElementesindeintransparenter
    Eskalationsprozess,dierisikoorientierteMaßnahmenplanung,diekontinuierlicheReevaluationsowiedieenge Zusammenarbeit mit
    internen und externen Partnern. Ebenso gehört die Ansprechbarkeit (Erreichbarkeit) zu den zentralen Elementen. In international
    tätigen Organisationen wird empfohlen, dass die Fallbearbeitung standortübergreifend funktioniert– etwa durch einheitliche
    Kriterien, digitale Dokumentationstools und die Einbindung lokaler St ellen bei intern ation alen Fa ̈llen. Weitere Informationen
    finden sich im Anforderungskatalog (siehe TabelleA.11).
