- id: '17.2'
  heading: Anforderungen
  type: clause
  suggested_control_id: din-spec-14027-2026.17.2
  notes: ''
  text: 'Durch eine Kombination aus technischen, organisatorischen und rechtlichen Maßnahmen sollte die Organisation sicherstellen,
    dass sowohl fertige Produkte als auch neue Entwicklungen und Technologien umfassend geschützt werden. Insbesondere beim
    Produktschutz, müssen präventive und reaktive Ansätze entlang des gesamten Produktlebenszyklus und über alle Organisationsbereiche
    hinweg koordiniert werden. Für den Know-how-Schutz sind in Abhängigkeit zu den Schutzzielen und dem festgestellten Schutzniveau
    Anforderungen in folgenden Maßnahmenbereichen durchzuführen:

    — Organisatorische Vorbereitung des Know-how-Schutzes;

    — Schutzmaßnahmen für Know-how-, Produktund Prototypenschutz: Präventive, reaktiv, technologische, baulich-technische,
    organisatorische, produktspezifische und rechtliche Schutzmaßnahmen;

    — Maßnahmen zur Lauschabwehr;

    — Festlegung von Verantwortlichkeiten und Rollen;

    — Personelle Maßnahmen. Weitere Informationen finden sich im Anforderungskatalog (siehe TabelleA.15). Es ist zu beachten,
    dass der Know-how-Schutz insbesondere die Maßnahmen der Standortsicherheit, der Lieferkettensicherheit und der Integritätsprüfung
    beeinflussen kann.'
