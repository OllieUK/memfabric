  notes: ''
  text: 'Für die in 5.2.6.1 identifizierten, nicht akzeptablen Gefährdungen muss ein Schutzkonzept entwickelt werden, das
    Maß n ahmen zur Vermeidung , Min derung oder Ubertragung d ieser G efa ̈hrdungen bein haltet. Die M aßnahmen sollten auf
    den Ergebnissen der Bruttobewertung basieren und an die spezifischen Anforderungen der Organisation angepasst sein. Geeignete
    Maßnahmen sind gezielte Handlungen oder Strategien, die dazu dienen, Gefährdungen zu minimieren oder zu beseitigen. Sie
    lassen sich in drei Kategorien einteilen:

    — präventive Maßnahmen, die das Eintreten eines Risikos verhindern sollen (z.B. Zutrittskontrolle, kontinuierliches Risiko
    Monitoring);

    — reaktive Maßnahmen, die die Auswirkungen eines eingetretenen Vorfalls begrenzen (z.B. Notfallpläne oder Krisenkommunikation);

    — Intervention;

    — Detektion;

    — korrektive Maßnahmen, die auf die Ursachen eines Ereignisses abzielen, um ähnliche Vorfälle künftig zu vermeiden
    ( z.B. Prozessve rbe sser ung en oder S chulu ngen).'
