- id: '12.2'
  heading: Anforderungen
  type: clause
  suggested_control_id: din-spec-14027-2026.12.2
  notes: ''
  text: 'Bevor Schutzmaßnahmen ergriffen werden, muss eine umfassende Schutzbedarfsanalyse durchgeführt werden. Diese Analyse
    ist die Basis für ein durchdachtes Sicherheitskonzept mit maßgeschneiderten Schutzund Reaktionsstrategien, die die Sicherheitslage
    für exponierte Personen verbessern können. ANMERKUNG1 Auch eine Risikoanalyse im Rahmen des Risikomanagements kann als
    Grundlage herangezogen werden. Für den Personenschutz sind folgende Maßnahmen notwendig:

    — weiterführende Analysen (z.B. zur Sichtbarkeit der Person oder medizinischen Risiken);

    — Erstellung eines individuellen Sicherheitskonzeptes;

    — ggf. Initiierung einer behördlichen Einstufung;

    — Auswahl des qualifizierten Personals für den Personenschutz. ANMERKUNG2 WenneinePersonbehördlichalsexponierteingestuftwird,istesentscheidend,dassdiefürSicherheit
    zuständige Funktion der Organisation die Maßnahmen der Behörden unterstützt und eine vertrauensvolle Zusammenarbeit
    mit nationalen und internationalen Strafverfolgungsund Sicherheitsbehörden sicherstellt. Weitere Informationen finden
    sich im Anforderungskatalog „Personenschutz“ (siehe TabelleA.9).'
