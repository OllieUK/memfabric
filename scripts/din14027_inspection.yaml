- id: '4.3'
  heading: Zusammenspiel von Handlungsfeldbeschreibungen und Anforderungskatalogen
  type: clause
  suggested_control_id: din-spec-14027-2026.4.3
  notes: ''
  text: Zu jedem Handlungsfeld enthält der Abschnitterläuternden Fließtext, der Hintergründe, Ziele und wesentliche Uberlegungen
    darstellt. Ergänzend dazu findet sich in AnhangA ein tabellarischer Anforderungskatalog mit klar formulierten, prüfbaren
    Vorgaben. Diese Tabellen sind standardisierend und eignen sich als GrundlagefürAudits,interneReviewsoderdieLeistungserbringungdurchexterneDienstleister.DerFließtextbietet
    Orientierung, während die Tabellen Anforderungen spezifizieren. DierechtlichenAnforderungeninsbesondereausdemBereichArbeitsschutzsindgrundsätzlichzuberücksichtigen.
- id: '5'
  heading: Schutzbedarfsermittlung
  type: clause
  suggested_control_id: din-spec-14027-2026.5
  notes: ''
  text: ''
- id: '5.1'
  heading: Allgemeines
  type: clause
  suggested_control_id: din-spec-14027-2026.5.1
  notes: ''
  text: Ziel der Schutzbedarfsermittlung ist es, eine Hilfestellung für die Entwicklung eines systematischen, Ansatzes zur
    Identifikation und zum Schutz von Organisationswerten bereitzustellen. Es wird eine Methodik beschrieben, die es Organisationen
    ermöglicht, ihre wesentlichen Assets strukturiert zu analysieren, den Schutzbedarf auf Grundlage einer nachvollziehbaren
    Bewertung zu ermitteln und geeignete Schutzmaßnahmen zu implementieren. Der Schwerpunkt liegt auf der Bewertung der Organisationswerte
    hinsichtlich ihrer Kritikalität und der Bedrohungsintensität.
