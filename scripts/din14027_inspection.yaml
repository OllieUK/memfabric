  heading: Schnittstellen
  type: clause
  suggested_control_id: din-spec-14027-2026.16.3
  notes: ''
  text: 'Der Abschnitt„Integritätsprüfung“ hat Schnittstellen zu folgenden Abschnitten dieses Dokumentes:

    — Abschnitt7 „Sicherheitskultur und Kommunikation“;

    — Abschnitt8 „Interne Untersuchung“;

    — Abschnitt12 „Personenschutz“;

