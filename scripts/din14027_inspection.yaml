- id: 5.2.5.2
  heading: Bruttobewertung als Startsequenz
  type: clause
  suggested_control_id: din-spec-14027-2026.5.2.5.2
  notes: ''
  text: Die Bruttobewertung bildet den Ausgangspunkt für die systematische Analyse. Sie sollte auf Basis der bestehenden
    Schutzmaßnahmen erfolgen und beschreibt damit die aktuelle Sicherheitslage der Organisation im Hinblick auf die identifizierten
    Organisationswerte (IST-Zustand) und die Schutzziele. Bei Neubaumaßnahmen oder bei der Planung vollständig neuer Strukturen
    kann der IST-Zustand als hypothetischerAusgangspunktohnebestehendeSicherheitsmaßnahmenangenommenwerden.IndiesemFallwerden
    vorhandene Schutzmaßnahmen auf null gesetzt, um eine unvoreingenommene Bruttobetrachtung des Schutzbedarfs zu ermöglichen.
    AlsErgebnisderBruttobewertungergibtsichaufBasisderSchwachstellenanalyseeinklarerHandlungsbedarf für etwaige Schutzmaßnahmen.
