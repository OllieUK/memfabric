- id: '11.2'
  heading: Anforderungen
  type: clause
  suggested_control_id: din-spec-14027-2026.11.2
  notes: ''
  text: 'Maßnahmen zu Sicherstellung der Standortsicherheit umfassen einen abgestimmten Mix von baulichen, technischen, organisatorischen
    und personellen Schutzmaßnahmen und sind zur Erreichung der Schutzziele grundsätzlich für jede Organisation sinnvoll.
    Solche Maßnahmen werden insbesondere dann zwingend benötigt, wenn eine Organisation kritische Infrastrukturen/Anlagen
    betreibt, hochsensible Daten verarbeitet, wertvolle materielle oder immaterielle Güter lagert, sich in einer exponierten
    geografischen Lage befindet oder gesetzlichen bzw. regulatorischen Anforderungen an die physische Sicherheit unterliegt.
    Zu den Anforderungen an die Standortsicherheit gehören u.a.:

    — Perimeterschutz/Sicherung und Uberwachung der Grundstücksgrenze Zutrittsmanagement;

    — Personelle Bewachungsmaßnahmen;

    — Berücksichtigung sicherheitsrelevanter Aspekte bei Planung und Bau neuer Standorte und Anlagen Versorgungssicherheit.
    Weitere Informationen finden sich im Anforderungskatalog (siehe TabelleA.8).'
