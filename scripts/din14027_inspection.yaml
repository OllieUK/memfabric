- id: '13'
  heading: Veranstaltungsschutz
  type: clause
  suggested_control_id: din-spec-14027-2026.13
  notes: ''
  text: ''
- id: '13.1'
  heading: Allgemeines
  type: clause
  suggested_control_id: din-spec-14027-2026.13.1
  notes: ''
  text: Der Veranstaltungsschutz ist ein essenzieller Bestandteil zur Sicherstellung des reibungslosen Ablaufs von (internen
    oder externen) Veranstaltung der Organisation. Ziel ist es, exponierte Personen und die Allgemeinheit vor Bedrohungen
    im Sinne des All-Gefahren-Ansatzes während Veranstaltungen zu schützen. Ein besonderes Augenmerk liegt (je nach organisationsspezifischer
    Bewertung) insbesondere auf Straftaten. Je nach Organisation wird für verschiedene Veranstaltungstypen wie Gesellschafterversammlungen,
    Dienstversammlungen, Produktpräsentationen, Besuche hochrangiger Gäste und genehmigungspflichtige Veranstaltungen im
    Inland eine Veranstaltungssicherheit berücksichtigt. VeranstaltungsschutzumfasstpräventivesowiereaktiveMaßnahmenzurSicherstellungderSicherheitunddes
    Wohlbefindens der Teilnehmenden. Der Veranstaltungsschutz zielt darauf ab, sowohl physische Bedrohungen als auch logistische
    und reputationsbezogene Risiken zu minimieren. In TabelleB.3 sind typische Bedrohungsszenarien nach Kategorien aufgelistet.
- id: '13.2'
  heading: Anforderungen zum Leitfaden
  type: clause
  suggested_control_id: din-spec-14027-2026.13.2
  notes: ''
  text: 'Eine detaillierte Betrachtung ist in folgenden Regelwerken zu finden:

    — Muster-Versammlungsstättenverordnung (MVStättVO);

    — DGUV Information 215-310 Sicherheit bei Veranstaltungen und Produktionen. Viele Organisationen führen interne oder
    geschlossene Veranstaltungen durch, die nicht durch die MVStättVO geregelt sind. Die DGUVInformation 215-310 gilt für
    alle Veranstaltungen, bei denen in der gesetzlichen Unfallversicherung Versicherte mitwirken. Dieses Dokument enthält
    vertiefende Anforderungen und ergänzende Hinweise zu securityspezifischen Sicherh eitsaspekt en, die im Rahmen d es Veranstaltung
    ssch utzes zu ber ücksichtig en sind. Sie sollen einen Uberblick über sicherheitsrelevante Aspekte bieten, die bei der
    Planung und Durchführung von Veranstaltungen zu beac hten sind. BevorSchutzmaßnahmenergriffenwerden,wirdüblicherweiseeineumfassendeSchutzbedarfsanalysedurchgeführt.
    Diese Analyse ist die Basis für ein durchdachtes Sicherheitskonzept mit maßgeschneiderten Schutzund Reaktionsstrategien,
    die die Sicherheitslage für die Veranstaltung verbessern können. Für den Veranstaltungsschutz sind folgende Maßnahmen
    strukturiert durchzuführen:

    — veranstaltungsspezifische Risikoanalyse;

    — veranstaltungsspezifisches Sicherheitskonzept;

    — Sicherstellung der Kommunikation während der Veranstaltung;

    — Personalauswahl und Ausbildung;

    — Einlassund Zutrittskontrollen;

    — Objektschutz und Uberwachung;

    — medizinische Vorsorge;

    — Verkehrsund Transportmanagement;

    — Sicherstellung der Schnittstellen zum Notfallund Krisenmanagement;

    — Versicherungsschutz. Weitere Informationen finden sich im Anforderungskatalog (siehe TabelleA.10).'
