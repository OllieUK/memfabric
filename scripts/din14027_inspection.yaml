- id: 5.2.2.1
  heading: Grundlagen zu Organisationswerten
  type: clause
  suggested_control_id: din-spec-14027-2026.5.2.2.1
  notes: ''
  text: 'Die Identifikation relevanter Organisationswerte erfordert eine ganzheitliche Betrachtung aus unterschiedlichen Blickwinkeln.
    Der Blick sollte nicht nur auf notwendige Ressourcen und Werte für den Betrieb bzw. die Funk tionserfüllung ger ichtet
    sein, sonde rn a uch auf jene As pekte, die d ie Or ganisa tion im Kern ein ziga rtig machen. Für die Ermittlung der
    Organisationswerte sollten Organisationen sich an folgende Leitfragen orientieren:

    — Welche Faktoren machen die Organisation besonders wertvoll?

    — Worin besteht die Einzigartigkeit der Organisation im Kontext der eigenen Branche? ANMERKUNG Welche Fragen für eine
    Organisation wichtig sind, hängt stark von ihrer Branche und ihrem Arbeitsfeld ab. Deshalb können verschiedene Blickwinkel
    eingenommen werden: Zum Beispiel, welchen Beitrag die Organisation für die Gesellschaft leistet oder welchen wirtschaftlichen
    Wert sie schafft. Die Besonderheit einer Organisation kann sich auf unterschiedliche Weise zeigen (durch klassische Wettbewerbsvorteile,
    etwa exklusive Daten, spezielle Maschinen, einen guten Ruf, effiziente Abläufe oder eine besonders fehlerarme Produktion)
    oder durch eine gesellschaftlich unersetzbare Rolle, wenn sie Leistungen erbringt, die für die Allgemeinheit unverzichtbar
    sind.'
  statements:
  - id: din-spec-14027-2026.5.2.2.1.stmt-1
    label: —
    body: Die Identifikation relevanter Organisationswerte erfordert eine ganzheitliche Betrachtung aus unterschiedli- chen
      Blickwinkeln. Der Blick sollte nicht nur auf notwendige Ressourcen und Werte für den Betrieb bzw. die Funk tionserfüllung
