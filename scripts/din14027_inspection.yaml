- id: '18'
  heading: Lieferkettensicherheit
  type: clause
  suggested_control_id: din-spec-14027-2026.18
  notes: ''
  text: ''
- id: '18.1'
  heading: Allgemeines
  type: clause
  suggested_control_id: din-spec-14027-2026.18.1
  notes: ''
  text: 'Lieferketten sind zentral für den Erfolg von Organisationen, können gleichzeitig aber viele Verwundbarkeiten enthalten.
    Deshalb erfordert ihr Schutz besondere Beachtung. Da oftmals viele agierende Personen an einer Lieferkette beteiligt sind,
    ist ihr Schutz eine komplexe Herausforderung. Dieser Komplexität sollte mit standardisierten Sicherheitsmaßnahmen begegnet
    werden, um die Sicherheit entlang der Lieferkette einheitlich zuregelnundVertrauenzwischendenBeteiligtenzuschaffen.GleichzeitigsolltenSicherheitsmaßnahmenentlang
    der Lieferkette risikobasiert umgesetzt werden. ANMERKUNG Ein Risikomanagement ist z.B. in DINISO31000 beschrieben. Das
    Risikoprofil einer Lieferkette wird maßgeblich durch zwei zentrale Faktoren bestimmt: die Beschaffenheit/Art des Produkts
    und die geografischen Gegebenheiten der Transportwege. Hinsichtlich des Produkts spieleninsbesonderedieHöhederNachfragesowiedieMöglichkeiteinereffektivenWeiterveräußerungdurch
    kriminelle Akteure eine entscheidende Rolle. Liegenschaften und Transporte sind insbesondere dann Bedrohungen im Sinne
    des All-Gefahren-Ansatz ausgesetzt, wenn sie an Orten mit erhöhter Kriminalitätsrate, hoher Wahrscheinlichkeit auftretender
    Naturgefahren oder politisch-instabilen Systemen liegen. Die Aufgabe des Sicherheitsmanagements für Lieferketten ist
    es, eine angemessene Balance zwischen skalierbar anwendbaren Standards und risikobasierten Maßnahmen zu treffen. Die in
    diesem Abschnittdargelegten In TabelleB.3 sind typische Bedrohungsszenarien nach Kategorien aufgelistet.'
- id: '18.2'
