  suggested_control_id: din-spec-14027-2026.19.2
  notes: ''
  text: 'Der Einsatz von Dienstleistern und die damit einhergehende Notwendigkeit zur effektiven Steuerung ebenjener Dienstleistungen
    ist insbesondere dann erforderlich, wenn:

    — die Komplexität der Sicherheitsanforderungen die internen Kapazitäten übersteigt;

    — spezialisierte Fähigkeiten oder Technologien erforderlich sind, die nicht intern vorgehalten werden können;

    — (im Falle von Bewachungsdienstleistung) die Größe und Art des Standorts einen permanenten Personaleins atz er ford
    ern (z.B. durchgängige Bew achu ng);

    — ein temporär erhöhter Schutzbedarf, etwa bei Veranstaltungen oder in Zeiten erhöhter Bedrohung festgestellt wird.
    Neben finanziellen und rechtlichen Risiken kann eine mangelhafte Steuerung und Koordination externer Sicherheitsdienstleister
    erhebliche Sicherheitsrisiken hervorrufen und somit die Anfälligkeit für Kriminalitätsphänomene und S traftaten er
    höhen. Die in dies em Dokumen t au fgeführ ten Anforderun gen betreffen insbesondere Maßnahmen zu den Aspekten:

    — Allgemeines/Vorbereitungen;

    — Auswahl des Dienstleisters oder Lieferanten;

    — Onboarding des Dienstleisters oder Lieferanten;

    — Kontrolle/Steuerung des Dienstleisters oder Lieferanten. Weitere Informationen finden sich im Anforderungskatalog (siehe
    TabelleA.17).'
