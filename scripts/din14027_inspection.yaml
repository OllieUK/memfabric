  text: ''
- id: '8.1'
  heading: Allgemeines
  type: clause
  suggested_control_id: din-spec-14027-2026.8.1
  notes: ''
  text: Eine interne Untersuchung ist eine organisationsinterne Aktivität, welche das primäre Ziel hat, einen Sachverh alt
    mit a llen rechtlich z ulä ssige n Mitteln aufzuklären . Sekundär es Ziel i st es , einen ( rech tlich en) Ra hmen
    für potentielle Konsequenzen abzuleiten (z.B. arbeitsrechtliche Maßnahmen) und Korrekturmaßnahmen für festgestellte
    Schwachstellen vorzuschlagen. K l a re V o r g e he n s w e i s e n u n d P r oze s s e fu ̈r i n t e r n e U n t e r
    s u c h u n g e n s i n d f ür O r g a n i s a ti o n en e ss e n z ie l l , u m V o rfa ̈l le e ff e k t iv u n d r
    e c h t s k o n f o r m a u f zu k la ̈r e n . S i e s te l l e n s i c h e r, d a s s a l l e B et e i li g t e n f a
    ir u n d o b j e k t i v b e h a n delt werden u nd g esetzliche Anfo rderungen ei nge halten w erden . Gleic hze itig
    können hier durc h materie lle und immaterielle Risiken, wie Bußgelder, Haftungsrisiken und Reputationsschäden, reduziert
    werden. Durch standardisierte Abläufe können Vorfälle zügiger, effizienter und transparenter bearbeitet werden. Das
    stärkt das Vertrauen der Mitarbeitenden in die Integrität der Organisation und fördert eine offene Organisationskultur.
    Mitarbeitende wissen, dass Hinweise ernst genommen und vertraulich behandelt werden. Eine professionelle Aufarbeitung
    signalisiert auch gegenüber externen interessierten Parteien, dass die Organisation Verantwortung übernimmt. Zudem liefern
    interne Untersuchungen wichtige Erkenntnisse, um weitere Schäden von der OrganisationabzuwendenundzurPräventionzukünftigerVorfälle.HierdurchkönnenSchwachstellenerkannt
    und Prozesse gezielt verbessert werden. Klare Vorgaben für interne Untersuchungen leisten einen entscheidenden Beitrag
    zur rechtssicheren, nachhaltigen und verantwortungsvollen Organisationsführung. Grenzen für interne Untersuchungen ergeben
    sich unter anderem aus dem Persönlichkeitsrecht und dem Datenschutzrecht. In TabelleB.3 sind typische Bedrohungsszenarien
    nach Kategorien aufgelistet.
- id: '8.2'
  heading: Anforderungen
  type: clause
  suggested_control_id: din-spec-14027-2026.8.2
  notes: ''
  text: 'Interne Untersuchungen sind professionell, zeitnah, vertraulich und objektiv durchzuführen. In Abhängigkeit vom
    Kontext der internen Untersuchung ist diese gerichtsfest durchzuführen. Dies ist der Fall, falls strafoder zivilrechtliche
    Verfahren drohen oder eingeleitet wurden oder arbeitsrechtliche Konsequenzen auf Basis der internen Untersuchung erfolgen
    sollen. Zur Durchführung interner Untersuchungen muss ein uneingeschränkter Zugriff auf alle erforderlichen Informationen
    innerhalb der eigenen Organisation sichergestellt sein. Dies schließt auch den Zugang zu relevanten MitarbeitendenundOrtlichkeitenein.AllerelevantenFaktenfürdenSachverhaltderUntersuchungsindeinzubeziehenundzuberücksichtigen.ImZugederUntersuchungsindallengeltendenGesetzeundregulatorischen
    Anforderungen zu berücksichtigen. Maßnahmen zur effektiven Etablierung, Steuerung und Durchführung interner Ermittlungen
    sind:

    1) Aufbauorganisation: Etablierung einer (ad hoc) Aufbauorganisation zur strukturellen Ausgestaltung interner Untersuchungen
    innerhalb der Organisation. Sie sollte fachlich unabhängig, professionell sowie regelkonformagieren.MaßgeblichistinjedemFalldieVermeidungpotenziellerInteressenkonfliktesowie
    die strukturelle Unabhängigkeit vom operativen Geschäft.

    2) Beteiligte Stellen: Relevante interne und externe Akteure müssen in den Ablauf einer internen Untersuchung eingebunden
    bzw. einbezogen werden. Ihre Einbindung richtet sich nach rechtlichen Vorgaben, organisa torischen Zus tändi gkeiten
    sow ie dem konk reten Unter suchun gsan lass. Die Abstimm ung und das Zusammenspiel dieser Stellen sind entscheidend für
    eine effektive, regelkonforme und zielgerichtete Dur chführung. Eine gute V ernetzu ng d er ermittelnde n E inhe iten
    mit r elevanten Orga nisat ionseinheiten fördert die Effiz ienz , besc hleunigt Abs tim mungen und e rhöht die Q ual
    ität der Unt ersuchung insgesamt.

    3) Dokumentation: Im Rahmen interner Untersuchungen muss die lückenlose, nachvollziehbare und professionelle Aufzeichnung
    aller relevanten Untersuchungsschritte sichergestellt sein. Eine vollständige und strukturierte Dokumentation dient der
    internen Transparenz und Nachvollziehbarkeit und erfüllt potenzi e l l e A n f or d e r un g e n e x t e r n e r D r
    i t t er , e t w a im R a h m en g er ic h t li c he r o d e r b eh ö rd l ic h e r Ve r f a h re n . D ie E r s t e
    l l u n g d e r D o k u m e n t a t io n s o l l t e i n e n g e r A b s t im m u n g m i t d e r a u f tr a g g eb en
    d e n S t e l le e r f o lg e n , um Konsistenz, Vollständigkeit und strategische Anschlussfähigkeit sicherzustellen.
    Die Anforderungen an die Dokumentation orientieren sich zudem an öffentlich-rechtlichen Maßstäben. Daraus folgt das
    Gebot der Aktenmäßigkeit (siehe auch §12 Abs.2 GGO), wonach der Verlauf und Stand eines Vorgangs jederzeit aus den Akten
    nachvollziehbar sein muss.

    4) Kernprozess: Der grundlegende Prozess für die interne Ermittlung sollte aus folgenden aufeinander aufbauenden Prozessschritten
    bestehen: Initiale Bewertung und Plausibilisierung, Ermittlungsauftrag und Untersuchungsplanung, Maßnahmenvorbereitung
    und Informationssicherung, Auswertung und Bewertung der Ergebnisse, Be richtswesen und Dokume ntati on, Umsetzung von
    Maß nahmen, Pra ̈vent ion und strukturelle Verbesserungen, Kommunikation mit Behörden und interne Kommunikation.

    5) Qualifikation Investigator: Für die sachgerechte Durchführung, Bewertung und Steuerung von Untersuchunge n muss ein
    inte rdisz iplin äres Qualifikat ionsprofil erstel lt werden, da s juri stische, betr iebswirtschaftliche, e rmittl ung
    stechnische sowie kommunikative Fäh igkeite n vereint . Be dacht werde n sollten dabei folgende Faktoren:Fachliche Qualifikationen,
    Berufserfahrung und methodischer Erfahrungsschatz, Koordination und Führung interdisziplinärer Ermittlungsteams. Wenn
    interne Ressourcen oder Fachkompetenzen nicht ausreichen, ist die Einbindung externer Dienstleister eine sinnvolle Option.
    Die Steuerungsverantwortung verbleibt jedoch stets bei der Organisation selbst; insbesondere die finale Verantwortung
    kann nicht delegiert werden. Weitere Informationen finden sich im Anforderungskatalog (siehe TabelleA.3).'
