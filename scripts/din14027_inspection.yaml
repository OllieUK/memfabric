- id: '15'
  heading: Reisesicherheit
  type: clause
  suggested_control_id: din-spec-14027-2026.15
  notes: ''
  text: ''
- id: '15.1'
  heading: Allgemeines
  type: clause
  suggested_control_id: din-spec-14027-2026.15.1
  notes: ''
  text: 'Die Integration einer ganzheitlichen Reisesicherheit in die Corporate Security ist erforderlich, um Geschäftsziele
    auch mobil zu erreichen, indem Risiken wie physische Bedrohungen, Cyberangriffe und geopolitische GefahrenproaktivadressiertunddieGeschäftskontinuitätgewahrtwerden.SieumfasstzudemdenSchutzmitgeführterGüterundsensiblerInformationen(z.B.Prototypen,Know-how)undgehtdamitüberdenSchutzder
    Mitarbeitenden hinaus. Geschäftsreisen und Entsendungen in andere oder fremdeLänder und Regionen, sind Teil des täglichen
    Geschäftes. Egal ob es sich um die Teilnahme an einer Konferenz, ein Treffen mit Kunden oder einen Serviceeinsatz handelt,
    während einer Reise bewegt sich der Mitarbeitende außerhalb des fest definierten Arbeitsumfeldes, nicht mehr unter der
    unmittelbaren Obhut des Arbeitgebers. Trotzdem hat dieser sowohl die moralische als auch die gesetzliche Pflicht, dass
    Reisende unversehrt nach Hause kommen. Für Geschäftsreisende, die in einem Beschäftigungsverhältnis in Deutschland
    stehen, besteht regelmäßig der generelle gesetzliche Unfallversicherungsschutz aus dem Sozialgesetzbuch: Gesetzliche
    Unfallversicherung (SGBVII). Dieser Versicherungsschutz begrenzt sich bei Geschäftsreisen, im Inland wie im Ausland,
    auf solche Aktivitäten, die mit dem dienstlichen Geschäft in Verbindung stehen. Der Versicherungsschutz besteht gegebenenfalls
    auch in speziellen Gefahrensituationen. Maßgeblich für den Versicherungsschutz sind die Vorgaben des Unfallversicherungsträgers
    sowie die einschlägigen rechtlichen Regelungen. Die rechtlichen Anforderungen, insbesondere aus dem Bereich Arbeitsschutz,
    sind grundsätzlich zu berücksichtigen. Darüber hinaus gibt die DINISO31030 weitere Hinweise zur Reisesicherheit. DierechtlichenAnforderungeninsbesondereausdemBereichArbeitsschutzsindgrundsätzlichzuberücksichtigen.
    Bei dienstlichen Reisen– ob national oder international– unterscheidet sich der Schutzbedarf deutlich vom Alltag am Firmensitz.
    Ausschlaggebend sind dabei Faktoren wie Art der Organisation, Reiseziel, Tätigkeit vor Ort un d in dividuelle R isiken
    für die Orga nisa tion. Zusätzlich kommen teils unerwartete Ereignisse wie plötzliche Reiseunterbrechungen, extremes
    Wetter, soziale Unruhen, kriminelle Handlungen bis hin zu terroristischen Ereignissen dazu, einschließlich einer plötzlic
    h auftrete nden unerw arteten Erkr ank ung. Die se Aufzählung ist nur beisp ielhaft . Sie soll die V ielfalt an Gefahren
    und Risiken verdeutlichen, denen Mitarbeitende während dienstlicher Einsätze außerhalb des Firmens itzes ausgese tzt
    sein können – und wie die Organ isation er möglicht, Au fgaben un ter diesen Bedingungen sicher zu erfüllen. Diese
    dargestellten Maßnahmen im AnhangA sind operative Empfehlungen für den Schutz mitgeführter Güter und se nsibler Infor
    mationen und st ehen im E inkla ng mit DIN ISO31030. Di ese kön nen dur ch die Anwen dung von DINISO3 1030 zusätzlich
    erw eitert w er den. In diesem Dokument wird nicht die Sicherheit des Beschäftigten behandelt, sondern der Schutz mitgeführter
    Gu ̈ter und sensibler I nform ation en. In TabelleB.3 sind typische Bedrohungsszenarien nach Kategorien aufgelistet.'
- id: '15.2'
  heading: Anforderungen
  type: clause
  suggested_control_id: din-spec-14027-2026.15.2
  notes: ''
  text: 'Eine detaillierte Betrachtung ist u.a. in folgenden Regelwerken zu finden:

    — DINISO31030. DiesesDokumententhältvertiefendeAnforderungenundergänzendeHinweisezusecurityspezifischenSicherheitsaspekten,
    die im Rahmen der Reisesicherheit zu berücksichtigen sind. Sie dienen dem Schutz von mitgeführten Gütern und immateriellen
    Werten und sollen einen Uberblick über sicherheitsrelevante Aspekte bieten, die bei der Planung und Durchführung von
    Reisen zu beachten sind. FürOrganisationen,dieimAuslandtätigsind,istReisesicherheiteinzentralerBausteinderCorporateSecurity.
    Prozesse, durch welche Reisen frühzeitig erkannt, nach ihrer Dringlichkeit, Notwendigkeit und ihres Profils bewertet
    werden und begleitende Maßnahmen vor Reiseantritt eingeleitet werden können, sind Bestandteil eines umfassenden Konzeptes
    für Reisesicherheit. Idealerweise wird sichergestellt, dass auf Unvorhergesehenes reagiert werden kann, wenn es während
    einer Reise oder Entsendung zu Vorfällen kommt. Durch die Etablierung der Maßnahmen zur Reisesicherheit, weiß die Organisation
    jederzeit welche Reisen gerade getätigt werden und ist in der Lage festzustellen, ob sie von einem Vorfall betroffen
    ist. Zudem kann die Organisation unternehmerische Risiken frühzeitig feststellen, bewerten und in den Entscheidungsfindungsprozess
    einfließen lassen und so bestenfalls Störungen vermeiden oder auf ein Minimum reduzieren. Die Reisesicherheit umfasst
    Maßnahmen in folgenden Bereichen und Phasen der Reisen:

    — Organisation der Reisesicherheit;

    — Reisevorbereitung;

    — während der Reise;

    — Dokumentation und Uberprüfung. Weitere Informationen finden sich im Anforderungskatalog (siehe TabelleA.12).'
