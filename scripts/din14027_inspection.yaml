- id: '8.3'
  heading: Schnittstellen
  type: clause
  suggested_control_id: din-spec-14027-2026.8.3
  notes: ''
  text: 'Der Abschnitt„Interne Untersuchung“ hat Schnittstellen zu allen Abschnitten dieses Dokumentes insofern, dass diese
    als Eingangskanal für Hinweise für kriminelle Handlungen existiert. Von besonderer Relevanz sind:

    — Abschnitt7 „Sicherheitskultur und Kommunikation“: Zur Umsetzung von entsprechenden Lessons Learned im Sinne einer fundierten
    Prävention und strukturellen Verbesserungen sowie im Zuge der internen Kommunikation bei laufenden internen Untersuchungen.

    — Abschnitt14 „Bedrohungsmanagement“: Aufgrund der spezialisierten Expertise und des Umfangs von internen Untersuchungen
    wird hier oftmals auf externe Expertise und Ressourcen zurückgegriffen.

    — Abschnitt19 „Auswahl und Steuerung von sicherheitsbezogenen Dienstleistungen“. Es muss organisationsspezifisch auf weitere
    mögliche Schnittstellen zu anderen internen Organisationsbereichen geprüft werden. AbschnittB.3 zeigt eine Auflistung
    von internen Organisationsbereichen, die häufig als Schnittstellenpartner der Corporate Security wahrgenommen werden.'
