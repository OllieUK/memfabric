  suggested_control_id: din-spec-14027-2026.20.2
  notes: ''
  text: 'Die Einführung von Sicherheitsmaßnahmen zum Schutz der Organisation beinhaltet die Etablierung von Vorgaben, Strukturen,
    Prozessen und Vorgängen innerhalb einer Organisation. Dadurch soll die Verankerung der Maßna hmen zur St eigerung v on
    S icherheit un d Resilien z und die Schnittste lle zwisch en a llen sicherheitsr elevanten Tätigkeiten der Organisation
    sichergestellt werden. DieEtablierungeinesSicherheitsmanagementsystemsmussabderImplementationvonzweiAbschnittendies e
    s D o k u m e ntes kont inuierlich geprüft werden, damit siche rge ste llt werden kann, dass die Bereiche zus amm e n
    g re i fe n . Anforderungen an ein Sicherheitsmanagementsystem sind mindestens:

    — Etablierung des Sicherheitsmanagementsysteme;

    — Schnittstellenmanagement;

    — Reporting;

    — Bewertung und Uberwachung. Weitere Informationen finden sich im Anforderungskatalog (siehe TabelleA.18).'
