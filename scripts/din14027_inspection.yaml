- id: '7'
  heading: Sicherheitskultur und Kommunikation
  type: clause
  suggested_control_id: din-spec-14027-2026.7
  notes: ''
  text: ''
- id: '7.1'
  heading: Allgemeines
  type: clause
  suggested_control_id: din-spec-14027-2026.7.1
  notes: ''
  text: Eine gelebte Sicherheitskultur ist Bestandteil der Organisationskultur und ein zentraler Baustein für die nachhalti
    ge Resili enz von Organisat ion en. Sie basi ert d arauf, das Wissen, d ie M otiv ation und das Bewu sst sein aller Mitarbeitenden
    in Bezug auf Bedrohungen sowie den erstellten Schutzkonzepten konsequent zu fördern und zum Bestandteil der täglichen
    Arbeit zu machen. E i n e S t ei g e ru n g d e r R es i l i e n z k a n n o h n e de n B e i t ra g e in e s j e d en
    E i n z e ln e n d e r O rg a n is a t io n n i c h t e r f ol g e n . D a h e r m u s s d ie S ic h e rh e i t s k u
    l t u r z u e in e m se l b s t v e rs t a ̈n d l ic h e n B e s t a n d te i ld e r O rg a n is a ti o n s k u l t u
    r g e m a c h t werde n. In TabelleB.3 sind typische Bedrohungsszenarien nach Kategorien aufgelistet.
- id: '7.2'
  heading: Anforderungen
  type: clause
  suggested_control_id: din-spec-14027-2026.7.2
  notes: ''
  text: 'Die Sicherheitskultur beeinflusst maßgeblich das Verhalten und die Entscheidungen von Mitarbeitenden im UmgangmitBedrohungen.EinegestärkteSicherheitskulturkanndazubeitragen,dassBedrohungenfrühzeitig
    erkannt werden und Mitarbeitende und Organisation ein höheres Maß an Resilienz erreichen. Die Gestaltung einer wirksamen
    Sicherheitskultur erfordert, dass Informationen über Bedrohungen, verbindlicheRegelnundMaßnahmendokumentiertundzielgruppenorientiertleichtzugänglichbereitgestelltwerden
    müssen. Dies stellt sicher, dass sie von allen Mitarbeitenden verstanden und in der Praxis angewandt werden können.
    Maßnahmen, die zur Stärkung der Sicherheitskultur beitragen, sind:

    — kulturbildende Maßnahmen;

    — Sensibilisierung;

    — Schulung;

    — Ubungen;

    — Kommunikation;

    — Kooperation. Die Inhalte der Maßnahmen sind nach den angewendeten Abschnitten dieses Dokumentes zu definieren und auszugestalten.
    WeitereInformationenfindensichimAnforderungskatalog(sieheTabelleA.2).ZusätzlichwerdeninAnhangB Handlungsempfehlungen
    für einzelne Maßnahmen zur Förderung der Sicherheitskultur aufgezeigt und erläutert.'
