  text: DerAbschnitt„AufbauundBetriebeinesSicherheitsmanagementsystems“hatSchnittstellenzuallenAbschnitten dieses Dokumentes.
    Es muss organisationsspezifisch auf weitere mögliche Schnittstellen zu anderen internen Organisationsbereichen geprüft
