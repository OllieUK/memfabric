- id: '16'
  heading: Integritätsprüfung
  type: clause
  suggested_control_id: din-spec-14027-2026.16
  notes: ''
  text: ''
- id: '16.1'
  heading: Allgemeines
  type: clause
  suggested_control_id: din-spec-14027-2026.16.1
  notes: ''
  text: Integritätspüfungen, auch Pre-Employment-Screenings genannt, sind Teil des Prozesses einer sicherheitsorientierten
    Personalauswahl. Mittels Hinzuziehung öffentlich zugänglicher Quellen werden die Qualifikation, die Eignung und Vertrauenswürdigkeit
    von Bewerbern durch den zukünftigen Arbeitgeber objektiv überprüft. Dabei sollte die Prüfung nach der Empfehlung des
    Bundesamts für Verfassungsschutz (BfV) nach dem Grundsatz „authentisch, lückenlos und schlüssig“ erfolgen. Ein In-Employment
    Screening (IES) wird durchgeführt, während Mitarbeitende in der Organisation tätig sind, und dient der Uberprüfung
    von Vertrauenswürdigkeit und Eignung. Auch bei internen Bewerbungen sollte ein Screening-Prozess stattfinden, um sicherzustellen,
    dass Mitarbeitende für neue Positionen geeignet sind. Ziel ist es, mögliche Risiken zu minimieren und die Integrität
    der Mitarbeitenden sicherzustellen. Der Begriff Due Diligence oder Integritäts-Due-Diligence– auch bekannt als Third
    Party Due Diligence– bezeichnet die Einhaltung von Sorgfaltspflichten durch die Uberprüfung von Geschäftspartnern. Abhängig
    von der individuellen Bedrohungslage und evtl. regulatorischen Vorgaben, kann der erforderliche Detailgrad der Uberprüfung
    variieren; sich rein an öffentlich zugänglichen Quellen orientieren oder auch investigative Aspekte (investigative Due
    Diligence) beinhalten. Je nach Kontext und anwendbarer Norm können verschiedene Formen einer Integritätsprüfung erforderlich
    sein (siehe bspw. DINENISO/IEC27002). Ergänzend sind gegebenenfalls auch Vorgaben des Bundesamtesfür Sich erheit i n
    der Informationstechnik (BS I) zu berück sich tigen. In TabelleB.3 sind typische Bedrohungsszenarien nach Kategorien
    aufgelistet.
- id: '16.2'
  heading: Anforderungen
  type: clause
  suggested_control_id: din-spec-14027-2026.16.2
  notes: ''
  text: Ziel eines Pre-Employment Screenings und In-Employment-Screenings oder einer Due Diligence ist die Identifiz ierung
    und Minimierun g mögliche r Ris iken im Zusammenhang mi t Bew erber n, in ternen od er exte rnen Parteien, um beispielhaft
    finanzielle Schäden, Abfluss von Know-how, einen Reputationsverlust oder Nichterfüllung reg ulatorische A nforderun
    gen zu ver meiden . Auf diese Weise kann sichergestellt werd en, da ss die Aktivitäten der Organisation nach geltendem
    Recht und nach Vorgabe der Organisationsrichtlinien erfolgen. Im Rahmen der Due Diligence schreiben nationale und internationale
    Regelungen wie z.B. das EULie ferketteng eset z ode r der UK B ribery Act d ie Durchfu ̈hrun g von Due-Dilig ence bei
    best imm ten G escha ̈ften verpflichtend vor. Die Anforderungen an die Maßnahmen der Integritätsprüfung beziehen sich
    insbesondere auf die Etablierung von Vorgaben und V er antw ortlichkeite n, di e Implementation n otwendig er P rozesse
    zur D urc hfüh rung sowie zur Sicherstellung der Wirksamkeit. Weitere Informationen finden sich im Anforderungskatalog
    (siehe TabelleA.13 und TabelleA.14).
