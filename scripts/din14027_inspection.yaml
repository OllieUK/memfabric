    — Abschnitt7 „Sicherheitskultur und Kommunikation“;

    — Abschnitt9 „Störungs-, Notfallund Krisenmanagement“;

    — Abschnitt10 „Business Continuity Management“;

    — Abschnitt11 „Standortsicherheit“;

    — Abschnitt12 „Personenschutz“;

    — Abschnitt15 „Reisesicherheit“;

    — Abschnitt16 „Integritätsprüfung“;

    — Abschnitt18 „Lieferkettensicherheit“;

    — Abschnitt19 „Auswahl und Steuerung von sicherheitsbezogenen Dienstleistungen“. Es muss organisationsspezifisch auf weitere
    mögliche Schnittstellen zu anderen internen Organisationsbereiche n gep rüft werden. AbschnittB .3 zeigt ein e Auflistu
    ng von interne n Organisa tionsbere ichen, die häufig als Schnittstellenpartner der Corporate Security wahrgenommen werden.
    Externe Schnittstellen sind:

    — Polizeibehörden:ZusammenarbeitzurDurchführungvonSicherheitsmaßnahmenundUmgangmitVorfällen.

    — P r i va t e S i c h e r h e i ts d ienstleister: Bereitstellung zusätzlicher Sicherheitskräfte und Unterstützung
    bei der Si c h e r h e i t s p l a n u n g .

    — Offentliche Stellen: Genehmigungen und rechtliche Vorgaben für Veranstaltungen.'
