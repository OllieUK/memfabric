  suggested_control_id: din-spec-14027-2026.18.2
  notes: ''
  text: 'Neben den allgemeinen Anforderungen an die für Sicherheit zuständigen Funktion der Organisation stellt die Sicherheit
    der Lieferkette spezifische Anforderungen, die sich aus den Besonderheiten und Verwundbarkeiten logistischer Prozesse
    ableiten. Konzepte zur Sicherheit der Lieferkette müssen mindestens folgende Bereiche umfassen:

    — Strategie und Management;

    — Risikobewertung und -minderung;

    — Frachtund Warensicherheit;

    — Transportsicherheit;

    — Vorfallmanagement und Reaktion;

    — Lieferantenund Drittsicherheit;

    — Entsorgungsmanagement. B e i d e r P l a n u n g u n d U m s et z u n g v o n M a ß n a h m en is t s ic h e r zu s
    te ll e n , d a s s e in e u m f a s se n d e , l ü c k e n l os e u n d na c h v o l l z i e h b ar e D o k um e n t
