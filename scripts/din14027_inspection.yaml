- id: '17'
  heading: Know-how-Schutz
  type: clause
  suggested_control_id: din-spec-14027-2026.17
  notes: ''
  text: ''
- id: '17.1'
  heading: Allgemeines
  type: clause
  suggested_control_id: din-spec-14027-2026.17.1
  notes: ''
  text: 'Der Know-how-Schutz umfasst sämtliche Maßnahmen, die darauf abzielen, vertrauliches Wissen, geistiges Eigentum,
    Betriebsoder Geschäftsgeheimnisse sowie innovative Technologien und Prozesse vor Verlust, unbefugter Nutzung oder unerlaubter
    Weitergabe zu schützen. ANMERKUNG Ein Schutzziel, das durch den Know-how-Schutz behandelt werden kann, ist die Wettbewerbsfähigkeit
    einer Organisation langfristig zu erhalten, wirtschaftliche Schäden durch Know-how-Abfluss oder -Diebstahl zu verhindern
    und die Innovationskraft sowie den technologischen Vorsprung einer Organisation zu sichern. Der Know-how-Schutz baut auf
    den Erkenntnissen der Schutzbedarfsermittlung nach Abschnitt5 auf. Nur durcheinestrukturierteErfassungundBewertungderSchutzbedürftigkeitwirdsichergestellt,dassbesonders
    wichtiges Know-how zielgerichtet geschützt wird und unbeabsichtigte Schwachstellen im Sicherheitskonzept vermieden werden.
    Hierdurch wird die Organisation in die Lage versetzt. gezielt Maßnahmen zu ergreifen, die den spezifischen Anforderungen
    und Bedrohungen gerecht werden. Der Uberbegriff Know-how-Schutz wird in drei Kategorien unterschieden. Sie unterscheiden
    sich in ihrem Fokus und dem Zeitpunkt der Maßnahmen:

    — Know-how-Schutz: Schutz von nicht-öffentlichem Wissen und vertraulichen Informationen.

    — Produktschutz: Schutz von auf am Markt befindliche Produkte, erstreckt sich sowohl auf fertige Produkte als auch auf
    Ide en und Wis sen.

    — Prototypenschutz: Schutz in der Entwicklungsphase bis zur Markeinführung, umfasst sowohl physische Prototypen (z.B.
    Testmodelle, Baugruppen) als auch digitale Entwürfe (z.B. CAD-Zeichnungen, Produktionsverfahren). Mehr Informationen
    zur Unterscheidung sind in AbschnittB.2 abgebildet. Die dargestellten Anforderungen in AnhangA sind operative Mindeststandards
    für ein Sicherheitsmanagementsystem und stehen im Einklang mit DINENISO/IEC27000. Es kann durch die Anwendung von DINENISO/IEC2
    7000 zusätzl ich ausgebau t we rden. Er umfasst sowohl physische Prototypen (z.B. Testmodelle, Baugruppen) als auch digitale
    Entwürfe (z.B. CA D-Zeichn ungen, P roduktion sverfahren) . Der S chutz setzt b ereits in der fr ühe n Ent wicklun gsphase
    an und erstreckt sich bis zur Markteinführung des Produkts.'
