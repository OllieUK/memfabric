- id: '20.1'
  heading: Allgemeines
  type: clause
  suggested_control_id: din-spec-14027-2026.20.1
  notes: ''
  text: 'Zur Umsetzung umfassender Maßnahmen zur Stärkung der physischen Resilienz von Organisationen ist die Etablierung
    eines Sicherheitsmanagementsystems (CSMS, en: Corporate Security Managementsystem) von umfassende r Bede utung. Das Sicherheitsmanagementsystem
    umfasst die Gesamtheit aller der Steuerung unterliegenden Prozesse und Ress ourcenundsollzurgelenktenEr reichun gein esdefiniert
    enRe ifeg radesbeitr agen.DasSicher heitsman agement im übe rgeo rdn ete n Kontext umfasst alle koord inierten Ta ̈tigkeiten
    zu m Lenken u nd Leiten einer Organisation in Bezug auf Sicherheit und Resilienz. Die dargestellten Anforderungen in AnhangA
    sind operative Mindeststandards für ein Sicherheitsmanagementsystem und stehen im Einklang mit DINISO28000. Es kann durch
    die Anwendung von DINISO28000 zusätzlich au sgeb aut wer de n. In TabelleB.3 sind typische Bedrohungsszenarien nach Kategorien
    aufgelistet.'
