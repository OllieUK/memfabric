- id: 5.2.4.1
  heading: Bewertung der Bedrohungsintensität
  type: clause
  suggested_control_id: din-spec-14027-2026.5.2.4.1
  notes: ''
  text: Die Bewertung der Bedrohungsintensität erfolgt auf Basis einer ganzheitlichen Betrachtung potenzieller Bedrohungslagen,
    die zu einer Beeinträchtigung der Schutzziele führen könnten und muss je Asset oder Assetgruppe bestimmt werden. Dabei
    müssen sowohl abstrakte als auch relevante Bedrohungen, bestehende Schwachstellen innerhalb der Organisation sowie die
    Expositionierung der Assets gegenüber den identifizierten Bedrohungen berücksichtigt werden. Die Kombination aus identifizierten
    Bedrohungen und vorhandenen Schwachstellen führt zur Ableitung einer konkreten Gefährdung. Diese bildet die Grundlage
    für die nachgelagerte Bewertung und die Auswahl geeigneter Schutzmaßnahmen. Abstrakte Bedrohungen entstehen häufig aus
    komplexen, dynamischen und schwer vorhersehbaren Konstellationen. Sie sind nicht unmittelbar sichtbar, können sich aber
    durch technologische, gesellschaftliche, oder geopolitisc he Entw icklun gen verstär ken. Ihre Identifi katio n er forder
    t ein strategisch es, vorausschaue ndes Verständnis fu ̈r potenzielle B edrohungssz enar ien. Darüber hinaus müssen
    organisationsspezifische Bedrohungen differenziert analysiert werden. Branchenspezifische, geografische und operationelle
    Besonderheiten helfen dabei, die Vielzahl möglicher Bedrohungen auf jene zu reduzieren, die für die Organisation bzw.
    den jeweiligen Standort tatsächlich relevant sind. Zur Bewertung der Bedrohungsintensität ist eine systematische Methodik
    erforderlich, die eine assetbezogene Einschätzung ermöglicht. Neben einer initialen Bewertung sollte ein kontinuierlicher
    Prozess etabliert werden, der bestehende Assets regelmäßig erneut und neu hinzugekommene initial bewertet. DieBedrohungsintensitätergibtsichausmehrerenEinflussfaktoren:JemehrrelevanteVektoreneinAssetaufweist,jehöherdieEintrittswahrscheinlichkeiteinesVorfallsundjegrößerdieExpositiondesAssetsgegenüber
    einer Bedrohung (z.B. aufgrund seines Werts oder seiner geographischen Lage), desto höher ist die Bedrohungsintensität.
    Die Bewertung kann– analog zur Kritikalitätsbewertung– gewichtet oder ungewichtet erfolgen.DieBedrohungsintensitätsollteeinervonvierIntensitätsstufen(A=sehrhochbisD=niedrig)zugeordnet
    werden. Diese Klassifizierung sollte auf Basis einer organisationsindividuell entwickelten Metrik erfolgen.
