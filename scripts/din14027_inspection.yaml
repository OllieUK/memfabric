- id: '6'
  heading: Sicherheitslagebild
  type: clause
  suggested_control_id: din-spec-14027-2026.6
  notes: ''
  text: ''
- id: '6.1'
  heading: Allgemeines
  type: clause
  suggested_control_id: din-spec-14027-2026.6.1
  notes: ''
  text: EinSicherheitslagebildisteinequalitative,quantitativeund/odervisuelleDarstellungundAnalysesicherheitsrelevanter Sachverhalte
    für die Organisation, die kontinuierlich erfolgt. Es umfasst die Erfassung, Bewertung, Dokumentation und Darstellung
    relevanter Informationen, die die aktuelle Sicherheitslage der Organisation betreffen, einschließlich potenzieller Bedrohungen,
    Risiken und bereits eingetretener sicherheitsrelevanter Vorfälle. Umfang, Form, Gestaltung und Bereitstellung des Sicherheitslagebildes
    sind vom Informationsbedarf der jeweiligen Empfänger/Nutzer abhängig. Der Zweck des Sicherheitslagebildes ist die Identifizierung
    von potenziellen Bedrohungen und Transparenz über diese zu schaffen. Dies ermöglicht der Organisationsleitung, informierte
    Entscheidungen im Sinne der Organisationsziele zu treffen. In TabelleB.3 sind typische Bedrohungsszenarien nach Kategorien
    aufgelistet.
- id: '6.2'
  heading: Anforderungen
  type: clause
  suggested_control_id: din-spec-14027-2026.6.2
  notes: ''
  text: 'Insgesamt müssen für die Erstellung eines Sicherheitslagebildes fünf Phasen durchlaufen werden. Die Phasen müsse
    n vollstä ndig du rchlaufen w erden , dürfen aber im Hinb lick a uf Inten sität, Umfan g und Tie fe a n die indi viduelle
    n Anforderu ngen der Org anisatio n oder d as Sc hu tzniveau einz elner Asse ts angep asst werde n. D as Sicherheitslagebild
    erfordert die Erstellung notwendiger Governance-Grundlagen, den Aufbau eines Monitoringsystems sowie die Etablierung eines
    Monitoringprozesses.

    1) Bedarfsanforderung: Die Organisationsleitung stellt sicher, dass die Informationsanforderung und Bedarfsermittlung
    erfo lgt. Es ist zu beschreiben , wer welche Infor mat ion in welcher Form wan n zu welchem Zweck benötigt. Der Bedarf
    kann temporär oder auch kontinuierlich sein und kann sich je nach Asset und Zielgruppe des Sicherheitslagebildes unterscheiden
    (siehe AnhangA „Anforderungskatalog Sicherheitslagebild“ Nr. 1.2 bis 1.6).

    2) Informationssammlung und -gewinnung: Eine systematische und andauernde Sammlung von Informationenistvonentscheiden
    derB edeutung.Inf orma tionensindso woh lorganisation sinternals auc h-extern einzuholen.ExterneQuellenkönnenüberbefreundeteOrganisationen,persönlicheNetzwerke,Dienstleister,Behörde
    nundof fenverfu ̈gbareQ uelle n(Medienus w.)generiertwe rden.Interne Quellensta mmenvon MitarbeitendenundinternenSystemen.SoferndieInformationssammlungnichtselbstständigerfolgt,darf
    ein externer Dienstleister konsultiert werden (siehe AnhangA „Anforderungskatalog Sicherheitslagebild“ Nr. 2.4 bis 2.1
    1).

    3) Bewertung der Informationen: Bei der Bewertung der Informationen muss die potenzielle Bedrohung für die Organ isat
    ion im Vordergru nd s tehe n. Die Bewe rtun g umfasst folge nde A spek te: Situatio nsbeschreibung nach den 5 W’s (Wer,
    Was, Wo, Wann, Warum), Bewertung der Situation, bei Bedarf die Erstellung e in e r P r o gn o se , e in e B e w e r tu
    n g d e r Au s w i r k u n g e n a u f d i e O r g a n is a t io n u n d der identifizierten Assets ( s ie h e A n h an
    g A „A n f o r d er u n g sk a ta l o g Si c h e r h e it s l ag e b i l d “ N r. 2 . 1 2 b i s 2 .1 6 ) .

    4) Erstellung und Weitergabe von Lageprodukten: Zur Produkterstellung werden die Ergebnisse der vorherigen Phase in einem
    geeigneten und idealerweise zuvor festgelegten Format als ganzheitliches ProduktzusammengefasstunddenStakeholdernzurVerfügunggestellt,umdiesebeiderjeweiligenEntscheidungsfindung
    zu unterstützen. Produkte sind bspw. ein wöchentlicher Lagebericht oder vierteljährlicher Bedrohungskatalog (siehe
    AnhangA „Anforderungskatalog Sicherheitslagebild“ Nr. 2.17 bis 2.31).

    5) Evaluation und Feedback: Eine kontinuierliche Evaluation sowie ein Feedback müssen vorgenommen werden, um eine Verbesserung
    der Prozesse und der Qualität der Produkte herbeizuführen. Dazu gehört auch die Informationsverteilung an andere Organisationsteile,
    die sich mit Bedrohungen und Gefährdungen auseinandersetzen (siehe AnhangA „Anforderungskatalog Sicherheitslagebild“
    Nr. 3.1 bis 3.2). Weitere Informationen finden sich im Anforderungskatalog (siehe TabelleA.1).'
