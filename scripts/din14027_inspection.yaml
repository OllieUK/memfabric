- id: 5.2.2.2
  heading: Identifikation relevanter Organisationswerte
  type: clause
  suggested_control_id: din-spec-14027-2026.5.2.2.2
  notes: ''
  text: 'Für die systematische Bestimmung des Schutzbedarfs müssen alle wesentlichen bzw. relevanten Organisationswerte
    identifiziert, strukturiert und klassifiziert werden. Ziel dieser Maßnahme ist es, eine transparente Ubersicht über schutzwürdige
    Werte zu schaffen und deren Relevanz für die Organisation bewertbar zu machen. Zusätzlich zur Erfassung der Organisationswerte
    ist die Zuordnung der jeweils verantwortlichen Stelle (z.B. Rolle oder Funktion) erforderlich. Dies ermöglicht eine klare
    Verantwortungsstruktur sowie die gezielte EinbindungrelevanterFachbereicheindenweiterenProzess.ZurKategorisierungsolltenorganisationsspezifisch
    definierte Assetklassen verwendet werden. Eine mögliche Gruppierung umfasst beispielsweise folgende Kategorien:

    — Personen und Funktionen;

    — Dokumente und Informationen;

    — Projekte und Organisationsfunktionen;

    — IT-Applikationen und Infrastruktur;

    — Liegenschaften (einschließlich spezieller Bereiche wie Labore, RZ);

    — Produktionsmittel;

    — physische Werte z.B. Material.'
