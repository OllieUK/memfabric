- id: '5.3'
  heading: Schnittstellen
  type: clause
  suggested_control_id: din-spec-14027-2026.5.3
  notes: ''
  text: 'Im Zuge der fortlaufenden Bewertung sind die Bereiche des Business Continuity Managements (BCM) und der Lageführung
    einzubinden. Zugehörige Schnittstellen sind zu definieren. Weiterhin sollten die in diesem Abschnittbeschriebenen Schritte
    immer dann durchlaufen werden, wenn angemessene Schutzmaßnahmen für definierte Organisationswerte und/oder Prozesse sowie
    der Einhaltung der Schutzzie le abzuleiten sind. D ies trifft insbe sondere auf folgend e Bereiche zu:

    — Abschnitt11 „Standortsicherheit“;

    — Abschnitt12 „Personenschutz“;

    — Abschnitt13 „Veranstaltungssicherheit“;

    — Abschnitt14 „Bedrohungsmanagement“;

    — Abschnitt15 „Reisesicherheit“;

    — Abschnitt16 „Integritätsprüfung/Insider Risk Management“;

    — Abschnitt17 „Know-How-Schutz“;

    — Abschnitt18 „Lieferkettensicherheit“.'
