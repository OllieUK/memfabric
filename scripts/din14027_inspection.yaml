      body: DiesesDokumententhältvertiefendeAnforderungenundergänzendeHinweisezusecurityspezifischenSicher- heitsaspekten,
        die im Rahmen der Reisesicherheit zu berücksichtigen sind. Sie dienen dem Schutz von mitge- führten Gütern und
        immateriellen Werten und sollen einen Uberblick über sicherheitsrelevante Aspekte bie- ten, die bei der Planung und
        Durchführung von Reisen zu beachten sind. FürOrganisationen,dieimAuslandtätigsind,istReisesicherheiteinzentralerBausteinderCorporateSecurity.
        Prozesse, durch welche Reisen frühzeitig erkannt, nach ihrer Dringlichkeit, Notwendigkeit und ihres Profils bewertet
        werden und begleitende Maßnahmen vor Reiseantritt eingeleitet werden können, sind Bestandteil eines umfassenden Konzeptes
        für Reisesicherheit. Idealerweise wird sichergestellt, dass auf Unvorhergesehe- nes reagiert werden kann, wenn es
        während einer Reise oder Entsendung zu Vorfällen kommt. Durch die Etablierung der Maßnahmen zur Reisesicherheit,
        weiß die Organisation jederzeit welche Reisen gerade getätigt werden und ist in der Lage festzustellen, ob sie von
        einem Vorfall betroffen ist. Zudem kann die Organisation unternehmerische Risiken frühzeitig feststellen, bewerten
        und in den Entscheidungsfindungs- prozess einfließen lassen und so bestenfalls Störungen vermeiden oder auf ein Minimum
        reduzieren. Die Reisesicherheit umfasst Maßnahmen in folgenden Bereichen und Phasen der Reisen Dokumentation und Uberprüfung.
      notes: ''
- id: '15.3'
  heading: Schnittstellen
  type: clause
  suggested_control_id: din-spec-14027-2026.15.3
  notes: ''
  text: 'Der Abschnitt„Reisesicherheit“ hat Schnittstellen zu folgenden Abschnitten dieses Dokumentes:

    — Abschnitt5 „Schutzbedarfsermittlung“;

    — Abschnitt6 „Sicherheitslagebild“;

    — Abschnitt7 „Sicherheitskultur und Kommunikation“;

    — Abschnitt9 „Störungs-, Notfallund Krisenmanagement“;

    — Abschnitt10 „Business Continuity Management“;

    — Abschnitt12 „Personenschutz“;

    — Abschnitt13 „Veranstaltungsschutz“;

    — Abschnitt19 „Auswahl und Steuerung von sicherheitsbezogenen Dienstleistungen“. Es muss organisationsspezifisch auf weitere
    mögliche Schnittstellen zu anderen internen Organisationsbereichen geprüft werden. AbschnittB.3 zeigt eine Auflistung
    von internen Organisationsbereichen, die häufig als Schnittstellenpartner der Corporate Security wahrgenommen werden.
    Diese Schnittstellen sind notwendig, um in den angebunde nen Organisati onsberei chen eine optima le Wirku ng zu erzielen,
    da si e ber eits vor der Reise aktiviert werden müssen– sei es durch automatisierte Prozesse oder durch menschliche Interaktion.
    Externe Schnittstellen sind:

    — Assisteure für Reisesicherheit und Reisemedizin: Bereitstellung von Dienstleistungen, Unterstützung im BereichderSicherheitundderMedizin,LogistikimAuslandsowie(digitalen)WerkzeugenzurUmsetzung
    der Reisesicherheitsrichtlinie in der Organisation.

    — Sicherheitsdienstleister: Bereitstellung von Sicherheitskräften oder Transport im Ausland.'
