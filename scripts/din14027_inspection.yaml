- id: '9.2'
  heading: Anforderungen
  type: clause
  suggested_control_id: din-spec-14027-2026.9.2
  notes: ''
  text: 'Trotz aller präventiven Maßnahmen können schadhafte Ereignisse eintreten und die Funktionsfähigkeit einer Organisation
    beeinträchtigen. Um die Auswirkungen solcher Ereignisse abzumildern und zu kontrollieren, benötigteineOrganisationreaktiveStruktureninFormeinesStörungs-,Notfall-undKrisenmanagements.Darüber
    hinaus können regulatorische Anforderungen bestehen, die solche Strukturen erfordern. Die Organisation muss mindestens
    Maßnahmen zur Sicherstellung der

    — Verantwortlichkeiten der obersten Leitung der Organisation,

    — Vorbereitung,

    — Bewältigung,

    — Nachbereitung und Sicherstellung der Wirksamkeit, sowie

    — Schulungen und Trainings implementieren, dokumentieren und kommunizieren. Weitere Informationen finden sich im Anforderungskatalog
    (siehe TabelleA.4, TabelleA.5 und TabelleA.6).'
  statements:
  - id: din-spec-14027-2026.9.2.stmt-1
    label: —
