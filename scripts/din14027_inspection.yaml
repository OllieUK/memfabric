      beeinträchtigen. Um die Auswirkungen solcher Ereignisse abzumildern und zu kontrollieren, benötigteineOrganisationreaktiveStruktureninFormeinesStörungs-,Notfall-undKrisenmanagements.Dar-
      über hinaus können regulatorische Anforderungen bestehen, die solche Strukturen erfordern. Die Organisation muss mindestens
