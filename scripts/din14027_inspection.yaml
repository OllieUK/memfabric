  text: Organisationen sehen sich einer Vielzahl von Bedrohungen ausgesetzt, die aus wirtschaftlichen oder anderen Erwägungen
    heraus nicht alle präventiv mitigiert oder verhindert werden können. Je nach (potenzieller) SchweredesEreignissesdientdasStörungs-,Notfall-,oderKrisenmanagementeinerOrganisationdazu,Ereignisse
    rea ktiv zu bewältig en, bz w. d eren Ausw irkunge n abz umildern. Während Störungen im Rahmen der Regelorganisation
    durch vordefinierte Prozeduren zu bewältigen sind, benötigen Notfälle und Krisen eine besondere Aufbauorganisation
    in Form dedizierter Notfalloder Krisenstäbe. Dabei sind Notfälle Ereignisse,die eine sofortigeReaktion erfordern,um
    Schäden oder Verluste zu minimieren und sind mit speziellen Notfallplänen zu bewältigen. Eine Krise hingegen ist komplexer
