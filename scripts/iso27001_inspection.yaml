  type: clause
  suggested_control_id: iso-27001-2022.6.1
  notes: ''
  text: ''
- id: 6.1.1
  heading: General
  type: clause
  suggested_control_id: iso-27001-2022.6.1.1
  notes: ''
  text: 'When planning for the information security management system, the organization shall consider the issues referred
    to in 4.1 and the requirements referred to in 4.2 and determine the risks and opportunities that need to be addressed
    to:

    a) ensure the information security management system can achieve its intended outcome(s);

    b) prevent, or reduce, undesired effects;

    c) achieve continual improvement. The organization shall plan:

    d) actions to address these risks and opportunities; and

    e) how to

    1) integrate and implement the actions into its information security management system processes; and

    2) evaluate the effectiveness of these actions.'
  statements:
