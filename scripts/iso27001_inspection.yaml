- id: '5.3'
  heading: Organizational roles, responsibilities and authorities
  type: clause
  suggested_control_id: iso-27001-2022.5.3
  notes: ''
  text: 'Top management shall ensure that the responsibilities and authorities for roles relevant to information security
    are assigned and communicated within the organization. Top management shall assign the responsibility and authority for:

    a) ensuring that the information security management system conforms to the requirements of this document;

    b) reporting on the performance of the information security management system to top management.

    NOTE Top management can also assign responsibilities and authorities for reporting performance of the information security
    management system within the organization.'
  statements:
  - id: iso-27001-2022.5.3.a
    label: a)
    body: Top management shall ensure that the responsibilities and authorities for roles relevant to information security
      are assigned and communicated within the organization. Top management shall assign the responsibility and authority
      for ensuring that the information security management system conforms to the requirements of this document.
    notes: ''
  - id: iso-27001-2022.5.3.b
    label: b)
    body: Top management shall ensure that the responsibilities and authorities for roles relevant to information security
      are assigned and communicated within the organization. Top management shall assign the responsibility and authority
      for reporting on the performance of the information security management system to top management.
    notes: ''
- id: '6'
  heading: Planning
  type: clause
  suggested_control_id: iso-27001-2022.6
  notes: ''
  text: ''
- id: '6.1'
