- id: 6.1.3
  heading: Information security risk treatment
  type: clause
  suggested_control_id: iso-27001-2022.6.1.3
  notes: ''
  text: 'The organization shall define and apply an information security risk treatment process to:

    a) select appropriate information security risk treatment options, taking account of the risk assessment results;

    b) determine all controls that are necessary to implement the information security risk treatment option(s) chosen;

    NOTE 1 Organizations can design controls as required, or identify them from any source.

    c) compare the controls determined in 6.1.3 b) above with those in Annex Aand verify that no necessary controls have been
    omitted;

    NOTE 2 Annex Acontains a list of possible information security controls. Users of this document are directed to Annex
    Ato ensure that no necessary information security controls are overlooked.

    NOTE 3 The information security controls listed in Annex Aare not exhaustive and additional information security controls
    can be included if needed.

    d) produce a Statement of Applicability that contains:

    — the necessary controls (see 6.1.3 b) and c));

    — justification for their inclusion;

    — whether the necessary controls are implemented or not; and

    — the justification for excluding any of the Annex Acontrols.

    e) formulate an information security risk treatment plan; and

    f) obtain risk owners’ approval of the information security risk treatment plan and acceptance of the residual information
    security risks. The organization shall retain documented information about the information security risk treatment process.

    NOTE 4 The information security risk assessment and treatment process in this document aligns with the principles and
    generic guidelines provided in ISO 31000 .'
  statements:
  - id: iso-27001-2022.6.1.3.a
    label: a)
    body: The organization shall define and apply an information security risk treatment process to select appropriate information
      security risk treatment options, taking account of the risk assessment results.
    notes: ''
  - id: iso-27001-2022.6.1.3.b
    label: b)
    body: The organization shall define and apply an information security risk treatment process to determine all controls
      that are necessary to implement the information security risk treatment option(s) chosen.
    notes: ''
  - id: iso-27001-2022.6.1.3.c
    label: c)
    body: The organization shall define and apply an information security risk treatment process to compare the controls determined
      in 6.1.3 b) above with those in Annex Aand verify that no necessary controls have been omitted.
    notes: ''
  - id: iso-27001-2022.6.1.3.d
    label: d)
    body: The organization shall define and apply an information security risk treatment process to produce a Statement of
      Applicability that contains.
    notes: ''
    statements:
    - id: iso-27001-2022.6.1.3.d.stmt-1
      label: —
      body: The organization shall define and apply an information security risk treatment process to produce a Statement
