- id: '1'
  heading: Scope
  type: clause
  suggested_control_id: iso-27001-2022.1
  notes: ''
  text: This document specifies the requirements for establishing, implementing, maintaining and continually improving an
    information security management system within the context of the organization. This document also includes requirements
    for the assessment and treatment of information security risks tailored to the needs of the organization. The requirements
    set out in this document are generic and are intended to be applicable to all organizations, regardless of type, size
    or nature. Excluding any of the requirements specified in Clauses 4 to 10 is not acceptable when an organization claims
    conformity to this document.
