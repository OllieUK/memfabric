- id: '4'
  heading: Context of the organization
  type: clause
  suggested_control_id: iso-27001-2022.4
  notes: ''
  text: ''
- id: '4.1'
  heading: Understanding the organization and its context
  type: clause
  suggested_control_id: iso-27001-2022.4.1
  notes: ''
  text: 'The organization shall determine external and internal issues that are relevant to its purpose and that affect its
    ability to achieve the intended outcome(s) of its information security management system.

    NOTE Determining these issues refers to establishing the external and internal context of the organization considered
    in Clause 5.4.1 of ISO 31000:2018 .'
- id: '4.2'
  heading: Understanding the needs and expectations of interested parties
  type: clause
  suggested_control_id: iso-27001-2022.4.2
  notes: ''
  text: 'The organization shall determine:

    a) interested parties that are relevant to the information security management system;

    b) the relevant requirements of these interested parties;

    c) which of these requirements will be addressed through the information security management system.

    NOTE The requirements of interested parties can include legal and regulatory requirements and contractual obligations.'
  statements:
  - id: iso-27001-2022.4.2.a
    label: a)
    body: The organization shall determine interested parties that are relevant to the information security management system.
    notes: ''
  - id: iso-27001-2022.4.2.b
    label: b)
    body: The organization shall determine the relevant requirements of these interested parties.
    notes: ''
  - id: iso-27001-2022.4.2.c
    label: c)
    body: The organization shall determine which of these requirements will be addressed through the information security
      management system.
    notes: ''
- id: '4.3'
  heading: Determining the scope of the information security management system
  type: clause
  suggested_control_id: iso-27001-2022.4.3
  notes: ''
  text: 'The organization shall determine the boundaries and applicability of the information security management system to
    establish its scope. When determining this scope, the organization shall consider:

    a) the external and internal issues referred to in 4.1;

    b) the requirements referred to in 4.2;

    c) interfaces and dependencies between activities performed by the organization, and those that are performed by other
    organizations. The scope shall be available as documented information.'
  statements:
  - id: iso-27001-2022.4.3.a
    label: a)
    body: The organization shall determine the boundaries and applicability of the information security management system
      to establish its scope. When determining this scope, the organization shall consider the external and internal issues
      referred to in 4.1.
    notes: ''
  - id: iso-27001-2022.4.3.b
    label: b)
    body: The organization shall determine the boundaries and applicability of the information security management system
      to establish its scope. When determining this scope, the organization shall consider the requirements referred to in
      4.2.
    notes: ''
  - id: iso-27001-2022.4.3.c
    label: c)
    body: The organization shall determine the boundaries and applicability of the information security management system
      to establish its scope. When determining this scope, the organization shall consider interfaces and dependencies between
      activities performed by the organization, and those that are performed by other organizations.
    notes: ''
- id: '4.4'
  heading: Information security management system
  type: clause
  suggested_control_id: iso-27001-2022.4.4
  notes: ''
  text: The organization shall establish, implement, maintain and continually improve an information security management system,
    including the processes needed and their interactions, in accordance with the requirements of this document.
- id: '5'
  heading: Leadership
  type: clause
  suggested_control_id: iso-27001-2022.5
  notes: ''
  text: ''
- id: '5.1'
  heading: Leadership and commitment
  type: clause
  suggested_control_id: iso-27001-2022.5.1
  notes: ''
  text: 'Top management shall demonstrate leadership and commitment with respect to the information security management system
    by:

    a) ensuring the information security policy and the information security objectives are established and are compatible
    with the strategic direction of the organization;

    b) ensuring the integration of the information security management system requirements into the organization’s processes;

    c) ensuring that the resources needed for the information security management system are available;

    d) communicating the importance of effective information security management and of conforming to the information security
    management system requirements;

    e) ensuring that the information security management system achieves its intended outcome(s);

    f) directing and supporting persons to contribute to the effectiveness of the information security management system;

    g) promoting continual improvement; and

    h) supporting other relevant management roles to demonstrate their leadership as it applies to their areas of responsibility.

    NOTE Reference to “business” in this document can be interpreted broadly to mean those activities that are core to the
    purposes of the organization’s existence.'
  statements:
  - id: iso-27001-2022.5.1.a
    label: a)
    body: Top management shall demonstrate leadership and commitment with respect to the information security management system
      by ensuring the information security policy and the information security objectives are established and are compatible
      with the strategic direction of the organization.
    notes: ''
  - id: iso-27001-2022.5.1.b
    label: b)
    body: Top management shall demonstrate leadership and commitment with respect to the information security management system
      by ensuring the integration of the information security management system requirements into the organization’s processes.
    notes: ''
  - id: iso-27001-2022.5.1.c
    label: c)
    body: Top management shall demonstrate leadership and commitment with respect to the information security management system
      by ensuring that the resources needed for the information security management system are available.
    notes: ''
  - id: iso-27001-2022.5.1.d
    label: d)
    body: Top management shall demonstrate leadership and commitment with respect to the information security management system
      by communicating the importance of effective information security management and of conforming to the information security
      management system requirements.
    notes: ''
  - id: iso-27001-2022.5.1.e
    label: e)
    body: Top management shall demonstrate leadership and commitment with respect to the information security management system
      by ensuring that the information security management system achieves its intended outcome(s).
    notes: ''
  - id: iso-27001-2022.5.1.f
    label: f)
    body: Top management shall demonstrate leadership and commitment with respect to the information security management system
      by directing and supporting persons to contribute to the effectiveness of the information security management system.
    notes: ''
  - id: iso-27001-2022.5.1.g
    label: g)
    body: Top management shall demonstrate leadership and commitment with respect to the information security management system
      by promoting continual improvement.
    notes: ''
  - id: iso-27001-2022.5.1.h
    label: h)
    body: Top management shall demonstrate leadership and commitment with respect to the information security management system
      by supporting other relevant management roles to demonstrate their leadership as it applies to their areas of responsibility.
    notes: ''
- id: '5.2'
  heading: Policy
  type: clause
  suggested_control_id: iso-27001-2022.5.2
  notes: ''
  text: 'Top management shall establish an information security policy that:

    a) is appropriate to the purpose of the organization;

    b) includes information security objectives (see 6.2) or provides the framework for setting information security objectives;

    c) includes a commitment to satisfy applicable requirements related to information security;

    d) includes a commitment to continual improvement of the information security management system. The information security
    policy shall:

    e) be available as documented information;

    f) be communicated within the organization;

    g) be available to interested parties, as appropriate.'
  statements:
  - id: iso-27001-2022.5.2.block-1
    label: block-1
    body: Top management shall establish an information security policy that.
    notes: ''
