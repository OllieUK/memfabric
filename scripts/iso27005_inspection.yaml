- id: 10.4.3
  heading: Documented information about results
  type: clause
  suggested_control_id: iso-27005-2022.10.4.3
  notes: ''
  text: 'Input: The information security risk assessment and treatment results. Action: Information about the information
    security risk assessment and treatment results should be documented and retained. Trigger: ISO/IEC 27001 requires documented
    information about the information security risk assessment and treatment results. Output: Documented information about
    the information security risk assessment and treatment results. Implementation guidance: As organizations are required
    to perform risk assessments at planned intervals or when significant changes are proposed or occur, there should at least
    be evidence of a schedule, and risk assessments being performed in accordance with that schedule. If a change is proposed,
    or has occurred, then there should be evidence of the performance of an associated risk assessment. Otherwise, the organization
    should explain why the change is significant or not. Documented information about the information security risk assessment
    results should contain:

    a) the identified risks, their consequence and likelihood;

    b) the identity of the risk owner(s);

    c) the results of applying the risk acceptance criteria;

    d) the priority for risk treatment. Recording of the rationale for risk decisions is also recommended, in order to both
    learn from error in individual cases and facilitate continual improvement. Documented information about the information
    security risk treatment results should contain:

    — identification of the necessary controls;

    — where appropriate and available, evidence that these necessary controls act to modify risks, so as to meet the organization’s
    risk acceptance criteria.'
