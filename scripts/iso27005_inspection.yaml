- id: '10.5'
  heading: Monitoring and review
  type: clause
  suggested_control_id: iso-27005-2022.10.5
  notes: ''
  text: ''
- id: 10.5.1
  heading: General
  type: clause
  suggested_control_id: iso-27005-2022.10.5.1
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 9.1. The organization’s monitoring process (see ISO/IEC 27001:2022,
    9.1) should encompass all aspects of the risk assessment and risk treatment processes for the purposes of:

    a) ensuring that the risk treatments are effective, efficient and economical in both design and operation;

    b) obtaining information to improve future risk assessments;

    c) analysing and learning lessons from incidents (including near misses), changes, trends, successes and failures;

    d) detecting changes in the internal and external context, including changes to risk criteria and the risks themselves,
    which can require revision of risk treatments and priorities;

    e) identifying emerging risks. Retained risk scenarios, coming from the risk management activities, can be transposed
    into monitoring scenarios in order to ensure an effective monitoring process. Further details about monitoring scenarios
    are given in A.2.7.'
  statements:
  - id: iso-27005-2022.10.5.1.a
    label: a)
    body: Ensuring that the risk treatments are effective, efficient and economical in both design and operation.
    notes: ''
  - id: iso-27005-2022.10.5.1.b
    label: b)
    body: Obtaining information to improve future risk assessments.
    notes: ''
  - id: iso-27005-2022.10.5.1.c
    label: c)
    body: Analysing and learning lessons from incidents (including near misses), changes, trends, successes and failures.
    notes: ''
  - id: iso-27005-2022.10.5.1.d
    label: d)
    body: Detecting changes in the internal and external context, including changes to risk criteria and the risks themselves,
      which can require revision of risk treatments and priorities.
    notes: ''
  - id: iso-27005-2022.10.5.1.e
    label: e)
    body: Identifying emerging risks.
    notes: ''
- id: 10.5.2
  heading: Monitoring and reviewing factors influencing risks
  type: clause
  suggested_control_id: iso-27005-2022.10.5.2
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 9.1. Input: All risk information obtained from the risk management
    activities. Action: Risks and their factors (i.e. value of assets, consequences, threats, vulnerabilities, likelihood
    of occurrence) should be monitored and reviewed to identify any changes in the context of the organization at an early
    stage, and to maintain an overview of the complete risk picture. Trigger: Reviewing organizational policy and any detection
    of changes to the current operating or threat environment. Output: Continual alignment of the management of risks with
    the organization’s business objectives, and with risk acceptance criteria. Implementation guidance: ISO/IEC 27001:2022,
    9.1, requires organizations to evaluate their information security performance (and ISMSeffectiveness). In accordance
    with this requirement, organizations should use their risk treatment plan(s) as a subject for their performance evaluations.
    To do this, an organization should first define one or more information needs, e.g. to describe what top management wishes
    to know about the organization’s ability to defend itself against threats. Using this as a top-level specification, an
    organization should then determine the measurements that it needs to make and how such measures should be combined in
    order to satisfy the information need. Risks are not static. Event scenarios, asset values, threats, vulnerabilities,
    likelihoods and consequences can change abruptly without any indication. Constant monitoring should be carried out to
    detect these changes. This can be supported by external services that provide information regarding new threats or vulnerabilities.
    Organizations should ensure the continual monitoring of relevant factors, such as:

    a) new sources of risk, including freshly reported vulnerabilities in IT;

    b) new assets that have been included in the risk management scope;

    c) necessary modification of asset values (e.g. due to changed business requirements);

    d) identified vulnerabilities to determine those becoming exposed to new or re-emerging threats;

    e) changes in patterns of use of existing or new technologies that can open up new possible opportunities for attack;

    f) changes in laws and regulations;

    g) changes in risk appetite and perceptions of what is now acceptable and what is no longer acceptable;

    h) information security incidents, both inside and outside of the organization. New sources of risk or changes in likelihood
    or consequences can increase risks previously assessed. Review of low and retained risks should examine each risk separately,
    and all such risks as an aggregate as well, to assess their potential accumulated consequence. If risks no longer fall
    into the low or acceptable risk category, they should be treated using one or more of the options in 8.2. Factors that
    affect the likelihood of the occurrence of events and their corresponding consequences can change, as can factors that
    affect the suitability or cost of the various treatment options. Major changes affecting the organization should be a
    reason for a more specific review. The risk monitoring activities should be regularly repeated and the selected options
    for risk treatment should be reviewed periodically. New threats, vulnerabilities or changes in likelihood or consequences
    can increase risks previously assessed as low ones. Review of low and retained risks should consider each risk separately,
    and all such risks as an aggregate as well, to assess their potential accumulated consequence. If risks do not fall into
    the low or acceptable risk category, they should be treated using one or more of the options considered in Clause 8. Factors
    that affect the likelihood of the occurrence of threats and their corresponding consequences can change, as can factors
    that affect the suitability or cost of the various treatment options. Major changes affecting the organization should
    be reason for a more specific review. The risk monitoring activities should be regularly repeated and the selected options
    for risk treatment should be reviewed periodically. The outcome of risk monitoring activities can be input to other risk
    review activities. The organization should review all risks regularly, and when major changes are proposed or occur in
    accordance with ISO/IEC 27001:2022, Clause 8.'
  statements:
  - id: iso-27005-2022.10.5.2.a
    label: a)
    body: New sources of risk, including freshly reported vulnerabilities in IT.
    notes: ''
  - id: iso-27005-2022.10.5.2.b
    label: b)
    body: New assets that have been included in the risk management scope.
    notes: ''
  - id: iso-27005-2022.10.5.2.c
    label: c)
    body: Necessary modification of asset values (e.g. due to changed business requirements).
    notes: ''
  - id: iso-27005-2022.10.5.2.d
    label: d)
    body: Identified vulnerabilities to determine those becoming exposed to new or re-emerging threats.
    notes: ''
  - id: iso-27005-2022.10.5.2.e
    label: e)
    body: Changes in patterns of use of existing or new technologies that can open up new possible opportunities for attack.
    notes: ''
  - id: iso-27005-2022.10.5.2.f
    label: f)
    body: Changes in laws and regulations.
    notes: ''
  - id: iso-27005-2022.10.5.2.g
    label: g)
    body: Changes in risk appetite and perceptions of what is now acceptable and what is no longer acceptable.
    notes: ''
  - id: iso-27005-2022.10.5.2.h
    label: h)
    body: Information security incidents, both inside and outside of the organization.
    notes: ''
- id: '10.6'
  heading: Management review
  type: clause
  suggested_control_id: iso-27005-2022.10.6
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 9.3. Input: Results of information security risk assessment(s),
    status of information security risk treatment plan. Action: The results of information security risk assessment and status
    of the information security risk treatment plan should be reviewed to confirm that residual risks meet risk acceptance
    criteria, and that the risk treatment plan addresses all relevant risks and their risk treatment options. Trigger: Apart
    of scheduled calendar of review activities. Output: Changes of the risk acceptance criteria and the criteria for performing
    information security risk assessments, updated information security risk treatment plan or SOA.'
- id: '10.7'
  heading: Corrective action
  type: clause
  suggested_control_id: iso-27005-2022.10.7
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 10.1. Input: The risk treatment plan is proving ineffective, meaning
    that the residual risk will remain at unacceptable levels after the treatment plan is complete. Action: Revise the risk
    treatment plan and implement it to modify the residual risk to an acceptable level. Trigger: The decision for revising
    the risk treatment plan. Output: Arevised risk treatment plan and its implementation. Implementation guidance: Nonconformities
    related to effectiveness of the risk treatment plan can be raised by an internal or external audit, or through monitoring
    and indicators. The treatment plan should be revised to reflect:

    — the outcomes of the information security risk treatment process;

    — progressive implementation of the plan (e.g. a control is implemented as-specified, as-designed, as- built);

    — identified difficulties in implementation of controls (e.g. technical or financial issues, inconsistencies with internal
    or external factors such as privacy considerations). There are also cases where even if the residual risks are acceptable
    after the treatment plan is complete, the users will reject its use, or attempt to circumvent because these controls are
    not accepted by the u3s8ers in terms of ease of use (e.g. not ergonomic, too complicated or too long). The organization
    should review the effectiveness of the revised treatment plan.'
  statements:
  - id: iso-27005-2022.10.7.stmt-1
    label: —
    body: The outcomes of the information security risk treatment process.
    notes: ''
  - id: iso-27005-2022.10.7.stmt-2
    label: —
    body: Progressive implementation of the plan (e.g. a control is implemented as-specified, as-designed, as- built).
    notes: ''
  - id: iso-27005-2022.10.7.stmt-3
    label: —
    body: Identified difficulties in implementation of controls (e.g. technical or financial issues, inconsistencies with
      internal or external factors such as privacy considerations).
    notes: ''
- id: '10.8'
  heading: Continual improvement
  type: clause
  suggested_control_id: iso-27005-2022.10.8
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 10.2 Input: All risk information obtained from the risk management
    activities. Action: The information security risk management process should be continually monitored, reviewed and improved
    as necessary. Trigger: Organization seeks to improve and mature from the lessons learnt during the information security
    risk management process. Output: Continual relevance of the information security risk management process to the organization’s
    business objectives or updating the process. Implementation guidance: Ongoing monitoring and review that the context,
    the outcome of the risk assessment and risk treatment, as well as management plans, remain relevant and appropriate to
    the circumstances is necessary to ensure that the information security risk management process is correct. The organization
    should make sure that the information security risk management process and related activities remain appropriate in the
    present circumstances and are followed. Any agreed improvements to the process, or actions necessary to improve compliance
    with the process, should be notified to the responsible managers. These managers should be given assurance that no risk
    or risk element is overlooked or underestimated and that the necessary actions are taken and decisions are made to provide
    a realistic risk understanding and ability to respond. It should be noted that the change management process should continually
    provide feedback to the risk management process in order to ensure that variations to information systems able to modify
    risks are promptly taken into account, even modifying risk assessment activities to properly evaluate them. Additionally,
    the organization should regularly verify the criteria used to measure the risk. This verification should ensure that all
    elements are still valid and consistent with business objectives, strategies and policies, and that changes to the business
    context are taken into consideration adequately during the information security risk management process. This monitoring
    and review activity should address (but not be limited to):

    — legal and environmental context;

    — competition context;

    — risk assessment approach;

    — asset value and categories;

    — consequence criteria;

    — likelihood criteria;

    — risk evaluation criteria;

    — risk acceptance criteria;

    — total cost of ownership;

    — necessary resources. The organization should ensure that risk assessment and risk treatment resources are continually
    available to review risk, to address new or changed threats or vulnerabilities, and to advise management accordingly.
    Risk management monitoring can result in modifying or adding to the approach, methodology or tools used depending on:

    — the organization’s risk maturity;

    — changes identified;

    — risk assessment iteration;

    — the aim of the information security risk management process (e.g. business continuity, resilience to incidents, compliance);

    — the object of the information security risk management process (e.g. organization, business unit, information process,
    its technical implementation, application, connection to the internet). The risk management cycles related to the scope
    of risk assessment and risk treatment are presented in 5.2.'
