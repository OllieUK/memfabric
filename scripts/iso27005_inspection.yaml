- id: '5'
  heading: Information security risk management
  type: clause
  suggested_control_id: iso-27005-2022.5
  notes: ''
  text: ''
- id: '5.1'
  heading: Information security risk management process
  type: clause
  suggested_control_id: iso-27005-2022.5.1
  notes: ''
  text: 'The information security risk management process is presented in Figure 1.

    NOTE This process is based on the general risk management process defined in ISO 31000. As Figure 1 illustrates, the information
    security risk management process can be iterative for risk assessment and/or risk treatment activities. An iterative approach
    to conducting risk assessment can increase depth and detail of the assessment at each iteration. The iterative approach
    provides a good balance between minimizing the time and effort spent in identifying controls, while still ensuring that
    risks are appropriately assessed. Context establishment means assembling the internal and external context for information
    security risk management or an information security risk assessment. If the risk assessment provides sufficient information
    to effectively determine the actions required to modify the risks to an acceptable level, then the task is complete and
    the risk treatment follows. If the information is insufficient, another iteration of the risk assessment should be performed.
    This can involve a change of context of the risk assessment (e.g. revised scope), involvement of expertise in the relevant
    field, or other ways to collect the information required to enable risk modification to an acceptable level (see "risk
    decision point 1" in Figure 1). Risk treatment involves an iterative process of:

    — formulating and selecting risk treatment options;

    — planning and implementing risk treatment;

    — assessing the effectiveness of that treatment;

    — deciding whether the remaining risk is acceptable;

    — taking further treatment if not acceptable. It is possible that the risk treatment does not immediately lead to an acceptable
    level of residual risks. In this situation, another attempt to find further risk treatment can be performed, or there
    can be another iteration of the risk assessment, either as a whole or in parts. This can involve a change of context of
    the risk assessment (e.g. by a revised scope) and involvement of expertise in the relevant field. Knowledge about relevant
    threats or vulnerabilities can lead to better decisions about suitable risk treatment activities in the next iteration
    of the risk assessment (see "risk decision point 2" in Figure 1). Context establishment is discussed in detail in Clause
    6, risk assessment activities in Clause 7 and risk treatment activities in Clause 8. Other activities necessary for managing
    information security risks are discussed in Clause 10.'
  statements:
  - id: iso-27005-2022.5.1.stmt-1
    label: —
    body: The information security risk management process is presented in Figure 1. Formulating and selecting risk treatment
      options.
    notes: ''
  - id: iso-27005-2022.5.1.stmt-2
    label: —
    body: The information security risk management process is presented in Figure 1. Planning and implementing risk treatment.
    notes: ''
  - id: iso-27005-2022.5.1.stmt-3
    label: —
    body: The information security risk management process is presented in Figure 1. Assessing the effectiveness of that treatment.
    notes: ''
  - id: iso-27005-2022.5.1.stmt-4
    label: —
    body: The information security risk management process is presented in Figure 1. Deciding whether the remaining risk is
      acceptable.
    notes: ''
  - id: iso-27005-2022.5.1.stmt-5
    label: —
    body: The information security risk management process is presented in Figure 1. Taking further treatment if not acceptable.
    notes: ''
- id: '5.2'
  heading: Information security risk management cycles
  type: clause
  suggested_control_id: iso-27005-2022.5.2
  notes: ''
  text: 'The risk assessment and the risk treatment should be updated on a regular basis and based on changes. This should
    apply to, the entire risk assessment and the updates can be divided into two risk management cycles:

    — strategic cycle, where business assets, risk sources and threats, target objectives or consequences to information security
    events are evolving from changes in the overall context of the organization. This can result as inputs for an overall
    update of the risk assessment or risk assessments and the risk treatments. It can also serve as an input for identifying
    new risks and initiate completely new risk assessments;

    — operational cycle, where the above-mentioned elements serves as input information or changed criteria that will affect
    a risk assessment or assessment where the scenarios should be reviewed and updated. The review should include updating
    of the corresponding risk treatment as applicable. The strategic cycle should be conducted at longer time basis or when
    major changes occur while the operational cycle should be shorter depending on the detailed risks that are identified
    and assessed as well as the related risk treatment. The strategic cycle applies to the environment in which the organization
    seeks to achieve its objectives, while the operational cycle applies to all risk assessments considering the context of
    the risk management process. In both cycles, there can be many risk assessments with different contexts and scope in each
    assessment.'
  statements:
  - id: iso-27005-2022.5.2.block-1
    label: block-1
    body: The risk assessment and the risk treatment should be updated on a regular basis and based on changes. This should
      apply to, the entire risk assessment and the updates can be divided into two risk management cycles.
    notes: ''
