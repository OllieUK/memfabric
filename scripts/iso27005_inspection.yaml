- id: 6.4.3
  heading: Criteria for performing information security risk assessments
  type: clause
  suggested_control_id: iso-27005-2022.6.4.3
  notes: ''
  text: ''
- id: 6.4.3.1
  heading: General
  type: clause
  suggested_control_id: iso-27005-2022.6.4.3.1
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 6.1.2 a) 2). Risk assessment criteria specify how the significance
    of a risk is determined in terms of its consequences, likelihood and level of risk. Information security risk assessment
    criteria should take into account the appropriateness of risk management activities. Considerations for achieving this
    include:

    a) the classification level of information;

    b) the quantity, and any concentration of information;

    c) the strategic value of the business processes that make use of the information;

    d) the criticality of the information and assets related to information involved;

    e) operational and business importance of availability, confidentiality and integrity;

    f) the expectations and perceptions of interested parties (e.g. top management);

    g) negative consequences such as loss of goodwill and reputation;

    h) consistency with the organizational risk criteria. Risk assessment criteria, or a formal basis for defining them, should
    be standardized across the organization for all types of risk assessment, as this can facilitate the communication, comparison
    and aggregation of risks associated with multiple business domains. Information security risk assessment criteria typically
    include:

    — consequences;

    — likelihood;

    — level of risk.'
