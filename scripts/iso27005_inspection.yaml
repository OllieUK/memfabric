- id: '7.3'
  heading: Analysing information security risks
  type: clause
  suggested_control_id: iso-27005-2022.7.3
  notes: ''
  text: ''
- id: 7.3.1
  heading: General
  type: clause
  suggested_control_id: iso-27005-2022.7.3.1
  notes: ''
  text: 'Risk analysis has the objective to determine the level of the risk. ISO 31000 is referenced in ISO/IEC 27001 as a
    general model. ISO/IEC 27001:2022, 6.1.2, requires that for each identified risk, the risk analysis is based on assessing
    the consequences resulting from the risk and assessing the likelihood of the risk to determine a level of risk. Techniques
    for risk analysis based on consequences and likelihood can be:

    a) qualitative, using a scale of qualifying attributes (e.g. high, medium, low); or

    b) quantitative, using a scale with numerical values (e.g. monetary cost, frequency or probability of occurrence); or

    c) semiquantitative, using qualitative scales with assigned values. Risk analysis should be targeted at those risks and
    controls that, if managed successfully, improve the likelihood of the organization achieving its objectives. It is easy
    to spend significant time on a risk assessment, notably the assessment of likelihoods and consequences. To enable efficient
    decision- making on the management of risks, it can be sufficient to use initial, and rough estimates of likelihood and
    consequence.'
  statements:
  - id: iso-27005-2022.7.3.1.a
    label: a)
    body: Risk analysis has the objective to determine the level of the risk. ISO 31000 is referenced in ISO/IEC 27001 as
      a general model. ISO/IEC 27001:2022, 6.1.2, requires that for each identified risk, the risk analysis is based on assessing
      the consequences resulting from the risk and assessing the likelihood of the risk to determine a level of risk. Techniques
      for risk analysis based on consequences and likelihood can be qualitative, using a scale of qualifying attributes (e.g.
      high, medium, low).
    notes: ''
  - id: iso-27005-2022.7.3.1.b
    label: b)
    body: Risk analysis has the objective to determine the level of the risk. ISO 31000 is referenced in ISO/IEC 27001 as
      a general model. ISO/IEC 27001:2022, 6.1.2, requires that for each identified risk, the risk analysis is based on assessing
      the consequences resulting from the risk and assessing the likelihood of the risk to determine a level of risk. Techniques
      for risk analysis based on consequences and likelihood can be quantitative, using a scale with numerical values (e.g.
      monetary cost, frequency or probability of occurrence).
    notes: ''
  - id: iso-27005-2022.7.3.1.c
    label: c)
    body: Risk analysis has the objective to determine the level of the risk. ISO 31000 is referenced in ISO/IEC 27001 as
      a general model. ISO/IEC 27001:2022, 6.1.2, requires that for each identified risk, the risk analysis is based on assessing
      the consequences resulting from the risk and assessing the likelihood of the risk to determine a level of risk. Techniques
      for risk analysis based on consequences and likelihood can be semiquantitative, using qualitative scales with assigned
      values.
    notes: ''
- id: 7.3.2
  heading: Assessing potential consequences
  type: clause
  suggested_control_id: iso-27005-2022.7.3.2
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 6.1.2 d) 1). Input: Alist of identified relevant event or risk
    scenarios, including identification of risk sources, and business processes, business objectives and consequence criteria.
    Furthermore, lists of all existing controls, their effectiveness, implementation and usage status. Action: The consequences
    resulting from the failure to adequately preserve confidentiality, integrity or availability of information should be
    identified and assessed. Trigger: Assessment of the consequences becomes necessary when:

    — it has not been done before;

    — the list produced by “risk identification” is changed;

    — risk owners or interested parties have changed the units in which they want consequences to be specified; or

    — changes in the scope or context are determined that affect consequences. Output: Alist of potential consequences related
    to risk scenarios with their consequences related to assets or events, depending on the approach applied. Implementation
    guidance: Failure to adequately preserve the security of information can lead to loss of its confidentiality, integrity
    or availability. Loss of confidentiality, integrity or availability can have further consequences for the organization
    and its objectives. Consequence analysis can be performed bottom up from the information security consequences by considering
    what can happen if there is a loss of confidentiality, integrity or availability of the information in question. Typically,
    the risk owner can estimate the consequence if the event occurs. The following elements should be taken into consideration:

    — estimation (or measure based on experience) of the losses (time or data) due to the event as result of interrupting
    or disturbing operations;

    — estimation/perception of severity of the consequence (e.g. expressed in money);

    — recovery costs depending on whether recovery can be done internally (by the risk owner team), or there is a need to
    call an external entity.'
