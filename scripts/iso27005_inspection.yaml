- id: '6.1'
  heading: Organizational considerations
  type: clause
  suggested_control_id: iso-27005-2022.6.1
  notes: ''
  text: NOTE This subclause relates to ISO/IEC 27001:2022, 4.1. An organization is defined as person or group of people that
    has its own functions with responsibilities, authorities and relationships to achieve its objectives. An organization
    is not necessarily a company, other corporate body or legal entity, it can also be a subset of a legal entity (e.g. the
    ITdepartment of a company), and can be considered as the “organization” within the context of ISMS. It is important to
    understand that risk appetite, defined as the amount of risk an organization is willing to pursue or accept, can vary
    considerably from organization to organization. For instance, factors affecting an organization’s risk appetite include
    size, complexity and sector. Risk appetite should be set and regularly reviewed by top management. The organization should
    ensure that the role of the risk owner is determined in terms of the management activities regarding the identified risks.
    Risk owners should have appropriate accountability and authority for managing identified risks.
- id: '6.2'
  heading: Identifying basic requirements of interested parties
  type: clause
  suggested_control_id: iso-27005-2022.6.2
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 4.2. The basic requirements of relevant interested parties should
    be identified, as well as the status of compliance with these requirements. This includes identifying all the reference
    documents that define security rules and controls and that apply within the scope of the information security risk assessment.
    These reference documents can include, but are not limited to:

    a) ISO/IEC 27001:2022, Annex A;

    b) additional standards that cover ISMS;

    c) additional standards applicable to a specific sector (e.g. financial, healthcare);

    d) specific international and/or national regulations;

    e) the organization’s internal security rules;

    f) security rules and controls from contracts or agreements;

    g) security controls implemented based on previous risk treatment activities. Any non-compliance with the basic requirements
    should be explained and justified. These basic requirements and their compliance should be the input for the likelihood
    assessment and for the risk treatment.'
  statements:
  - id: iso-27005-2022.6.2.a
    label: a)
    body: ISO/IEC 27001:2022, Annex A.
    notes: ''
  - id: iso-27005-2022.6.2.b
    label: b)
    body: Additional standards that cover ISMS.
    notes: ''
  - id: iso-27005-2022.6.2.c
    label: c)
    body: Additional standards applicable to a specific sector (e.g. financial, healthcare).
    notes: ''
  - id: iso-27005-2022.6.2.d
    label: d)
    body: Specific international and/or national regulations.
    notes: ''
  - id: iso-27005-2022.6.2.e
    label: e)
    body: The organization’s internal security rules.
    notes: ''
  - id: iso-27005-2022.6.2.f
    label: f)
    body: Security rules and controls from contracts or agreements.
    notes: ''
  - id: iso-27005-2022.6.2.g
    label: g)
