- id: 7.3.4
  heading: Determining the levels of risk
  type: clause
  suggested_control_id: iso-27005-2022.7.3.4
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 6.1.2 d) 3). Input: Alist of risk scenarios with their consequences
    related to assets or events and their likelihood (quantitative or qualitative). Action: The level of risk should be determined
    as a combination of the assessed likelihood and the assessed consequences for all relevant risk scenarios. Trigger: Determining
    levels of risk becomes necessary if the information security risks are to be evaluated. Output: Alist of risks with level
    values assigned. Implementation guidance: The level of risk can be determined in many possible ways. It is commonly determined
    as a combination of the assessed likelihood and the assessed consequences for all relevant risk scenarios. Alternative
    calculations can include an asset value as well as likelihood and consequence. In addition, the calculation is not necessarily
    linear, e.g. it can be likelihood squared combined with consequence. In any case the level of risk should be determined
    using the criteria established as described in 6.4.3.4.'
- id: '7.4'
  heading: Evaluating the information security risks
  type: clause
  suggested_control_id: iso-27005-2022.7.4
  notes: ''
  text: ''
- id: 7.4.1
  heading: Comparing the results of risk analysis with the risk criteria
  type: clause
  suggested_control_id: iso-27005-2022.7.4.1
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 6.1.2 e) 1). Input: Alist of risk criteria and risks with level
    values assigned. Action: Level of risks should be compared against risk evaluation criteria, particularly risk acceptance
    criteria. Trigger: Comparing the results of risk analysis with the risk criteria becomes necessary if the information
    security risks are to be prioritized for treatment. Output: Alist of suggestions for decisions on additional actions regarding
    the management of risks. Implementation guidance: Once the risks have been identified and both likelihood and severity
    of consequence values assigned, organizations should apply their risk acceptance criteria to determine whether or not
    the risks can be accepted. If they cannot be accepted, then they should be prioritized for treatment. To evaluate risks,
    organizations should compare the assessed risks with the risk criteria defined during the establishment of context. Risk
    evaluation decisions should be based on the comparison of assessed risk with defined acceptance criteria, ideally taking
    into account the degree of confidence in the assessment. In some cases, such as the frequent occurrence of relatively
    low consequence events, it can be helpful to consider their cumulative effect over some timescale of interest, rather
    than the risk of each event considered individually, as this can provide a more realistic representation of overall risks.
    There can be uncertainties in defining the boundary between those risks that require treatment and those that do not.
    Under certain circumstances, using a single level as the acceptable level of risk that divides risks that require treatment
    from those which do not is not always appropriate. In some cases, it can be more effective to include an element of flexibility
    into the criteria by incorporating additional parameters such as cost and effectiveness of possible controls. The levels
    of risk can be validated based on consensus among risk owners and business and technical specialists. It is important
    that risk owners have a good understanding of the risks they are accountable for that accords with the results of objective
    assessment. Consequently, any disparity between assessed levels of risk and those perceived by risk owners should be investigated
    to determine which better approximates to reality.'
- id: 7.4.2
  heading: Prioritizing the analysed risks for risk treatment
  type: clause
  suggested_control_id: iso-27005-2022.7.4.2
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 6.1.2 e) 2). Input: Alist of the results of risks compared with
    risk criteria. Action: The risks on the list should be prioritized for risk treatment, considering assessed levels of
    risks. Trigger: Prioritizing the analysed risks for risk treatment becomes necessary if the information security risks
    are to be treated. Output: Alist of prioritized risks with risk scenarios that lead to those risks. Implementation guidance:
    Risk evaluation uses the understanding of risk obtained by risk analysis to make proposals for deciding about the next
    step to take. Those should refer to:

    — whether a risk treatment is required;

    — priorities for risk treatment considering assessed levels of risks. Risk criteria used to prioritize risks should consider
    the objectives of the organization, contractual, legal and regulatory requirements and the views of relevant interested
    parties. Prioritization as taken in the risk evaluation activity are mainly based on the acceptance criteria.'
  statements:
  - id: iso-27005-2022.7.4.2.stmt-1
    label: —
    body: Whether a risk treatment is required.
    notes: ''
  - id: iso-27005-2022.7.4.2.stmt-2
    label: —
    body: Priorities for risk treatment considering assessed levels of risks.
    notes: ''
- id: '8'
  heading: Information security risk treatment process
  type: clause
  suggested_control_id: iso-27005-2022.8
  notes: ''
  text: ''
- id: '8.1'
  heading: General
  type: clause
  suggested_control_id: iso-27005-2022.8.1
  notes: ''
  text: The input of the information security risk treatment is based on the risk assessment process outcomes in the form
    of a prioritized set of risks to be treated, based on risk criteria. The output of this process is a set of necessary
    information security controls [see ISO/IEC 27001:2022, 6.1.3 b)] that are to be deployed or enhanced in relation to one
    another, in accordance with the risk treatment plan [see ISO/IEC 27001:2022, 6.1.3 e)]. Deployed in this way, the effectiveness
    of the risk treatment plan is to modify the information security risk facing the organization so that it meets the organization’s
    criteria for acceptance.
- id: '8.2'
  heading: Selecting appropriate information security risk treatment options
  type: clause
  suggested_control_id: iso-27005-2022.8.2
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 6.1.3 a). Input: Alist of prioritized risks with event or risk
    scenarios that lead to those risks. Action: Risk treatment options should be chosen. Trigger: Selecting appropriate information
    security risk treatment options becomes necessary if no risk treatment plan is existing or the plan is incomplete. Output:
    Alist of prioritized risks with the selected risk treatment options. Implementation guidance: Several options for risk
    treatment include:

    — risk avoidance, by deciding not to start or continue with the activity that gives rise to the risk;

    — risk modification, by changing the likelihood of the occurrence of an event or a consequence or changing the severity
    of the consequence;

    — risk retention, by informed choice;

    — risk sharing, by splitting responsibilities with other parties, either internally or externally (e.g. sharing the consequences
    via insurance); EXAMPLE 1 An example of risk avoidance is an office location situated in a flood-zone, where there is
    the potential of a flood and resultant damages to the office and restrictions to the availability of and/or access to
    the office. The relevant physical controls can prove insufficient to reduce this risk, in which case, the treatment option
    of risk avoidance can be the best available option. This can involve closing or stopping operation of that office. EXAMPLE
    2 Another example of risk avoidance is choosing not to collect certain information from individuals so that it is not
    necessary for the organization to manage, store and transmit the information in its information systems. In the case of
    risk sharing, at least one control is required to modify the likelihood or consequence, but the organization delegates
    the responsibility of implementing the control to another party. Risk treatment options should be selected based on the
    outcome of the risk assessment, the expected costs for implementing these options and the expected benefits from these
    options, both individually and in the context of other controls. Risk treatment should be prioritized according to levels
    of risk as defined, time constraints and necessary sequence of implementations, and risk evaluation outcomes established
    in 7.4. While choosing the option, it can be considered how a particular risk is perceived by affected parties, and the
    most appropriate ways of communicating risk to these parties.'
  statements:
  - id: iso-27005-2022.8.2.stmt-1
    label: —
    body: Risk avoidance, by deciding not to start or continue with the activity that gives rise to the risk.
    notes: ''
  - id: iso-27005-2022.8.2.stmt-2
    label: —
    body: Risk modification, by changing the likelihood of the occurrence of an event or a consequence or changing the severity
      of the consequence.
    notes: ''
  - id: iso-27005-2022.8.2.stmt-3
    label: —
    body: Risk retention, by informed choice.
    notes: ''
  - id: iso-27005-2022.8.2.stmt-4
    label: —
    body: Risk sharing, by splitting responsibilities with other parties, either internally or externally (e.g. sharing the
      consequences via insurance).
    notes: ''
- id: '8.3'
  heading: Determining all controls that are necessary to implement the information security
  type: clause
  suggested_control_id: iso-27005-2022.8.3
  notes: ''
  text: 'risk treatment options

    NOTE This subclause relates to ISO/IEC 27001:2022, 6.1.3 b). Input: Alist of prioritized risks with the selected risk
    treatment options. Action: Determine all controls, from the chosen control sets as selected from an appropriate source,
    that are necessary for treating the risks based on the risk treatment options chosen, such as to modify, retain, avoid
    or share the risks. Trigger: ISMSconformity; managing information security risks. Output: All necessary controls. Implementation
    guidance: Special attention should be given to determine the necessary controls. Each control should be checked to determine
    if it is necessary by asking:

    — what effect this control has on the likelihood or consequence of this risk;

    — in which way the control maintains the risk level. Only controls that have more than a negligible effect on the risk
    should be designated as “necessary”. One or more controls should be applied to every risk evaluated as requiring treatment.
    There are many sources of control sets. They can be found in ISO/IEC 27001:2022, Annex A, in sector- specific codes of
    practice (e.g. ISO/IEC 27017) and other national, regional, industrial control sets. An organization can also determine
    one or more “custom” controls (see ISO/IEC 27003). If a custom control is defined, the control wording should accurately
    and fairly describe what the control is and how it operates. As applicable and appropriate, this wording can usefully
    include such aspects as:

    — is it a documented control;

    — who owns the control;

    — how it is monitored;

    — how it can be evidenced;

    — any exceptions;

    — frequency of operation of the control;

    — the tolerance for the control;

    — if it is not obvious then the reason why the control exists. If the control is outside the tolerance, the control is
    not operating effectively enough to manage the identified risk. EXAMPLE 1 “Adocumented malware management process is in
    place, owned by the ITsecurity manager. This excludes Macs and is monitored through the vendor console with reports on
    performance sent weekly to the CIO.” Such a detailed approach to control wording can be useful if the custom controls
    are also intended to support the organization in control assurance reporting. However, it is more important that the wording
    of controls should have meaning to people in the organization and help them make decisions about the management of those
    controls and associated risks. The determination of controls can include new controls not yet implemented, or can include
    using controls that exist in the organization. However, a control that is already in operation should not automatically
    be included in the risk assessment because:

    — the control is not necessary to manage one or more information security risks;

    — it can be a control that does in some way help manage one or more information security risks but is not sufficiently
    effective to be included in the risk assessment or managed by the ISMS, or;

    — it can be currently operating for reasons not related to information security (e.g. quality, efficiency, effectiveness
    or compliance), or;

    — it is currently operating but from an information security perspective can be removed as it does not have enough effect
    to justify its continuing status as an essential control. If a control is used for purposes other than solely the management
    of information security risks, care should be taken to ensure that the control is managed to achieve the information security
    objectives as well as the non-information security objectives. EXAMPLE 2 Internal CCTVto control quality of the production
    process as well as for information security reasons (to protect from fraud). When determining controls from an existing
    control set (e.g. ISO/IEC 27001:2022, Annex A, or a sector specific control list) the wording of the control should match
    what is necessary to manage the risk and accurately reflect what the control is or should be. If the overall approach
    is to use an existing control set (e.g. ISO/IEC 27001:2022, Annex A, or a sector specific control list) and the control
    set does not contain a control that accurately describes the necessary control, then consideration should be given to
    defining a custom control that accurately describes the control. Controls can be classified as preventive, detective and
    corrective:

    a) preventive control: a control that is intended to prevent the occurrence of an information security event that can
    lead to the occurrence of one or more consequences;

    b) detective control: a control that is intended to detect the occurrence of an information security event;

    c) corrective control: a control that is intended to limit the consequences of an information security event. Control-type
    describes whether a control acts, or intends to act, to prevent or detect an event or react to its consequence(s). EXAMPLE
    3 An information security policy is a control that maintains risk, but policy compliance is intended to reduce the likelihood
    of the occurrence of risk and can be therefore categorized as being preventive. The utility of categorizing controls as
    preventive, detective and corrective lies in their use, to ensure the construction of risk treatment plans are resilient
    to control failures. Provided there is an appropriate mix of preventive, detective and corrective controls:

    — detective controls should mitigate risk if the preventive controls fail;

    — corrective controls should mitigate risk if the detective controls fail;

    — preventive controls should reduce the likelihood that the corrective controls should ever have to be used. When utilizing
    controls, organizations should first decide if it is possible to detect the occurrence of an event. If that is the case,
    detective controls should be implemented. If it is not possible to detect an event, detective controls can be ineffective,
    with no way of telling whether a preventive control is working. EXAMPLE 4 If it is not clear if a computer has become
    part of a “botnet”, it cannot be known if the controls being used to prevent it becoming part of a botnet work as intended.
    Detective controls can work as appropriate but they can still be ineffective. EXAMPLE 5 Implementing Intrusion Detection/Prevention
    Systems can be an effective way to prevent malware traversing the network but they are of no use if there is no monitoring
    of the systems/alerts to action in the event there is an outbreak that is not contained. In general, detective controls
    are ultimately ineffective in instances where they can be bypassed, or where their notification does not result in appropriate
    action. Corrective controls should be looked at next. If the detective controls fail, then there is likely to be one or
    more undesirable consequences. Implementation of the corrective controls can assist in the limitation of those consequences.
    Although corrective controls take effect after the onset of the consequence, it is often necessary to deploy them well
    in advance of the occurrence of any event. EXAMPLE 6 Hard disk encryption does not prevent a laptop from being stolen
    or subsequent attempts to extract the data. It does, however, reduce the severity of the consequences linked to a disclosure.
    The control, of course, needs to be deployed before the laptop is stolen. The categorization of controls is not absolute
    and depends on the context in which use of a control is described. EXAMPLE 7 Backup does not prevent the occurrence of
    an event that would otherwise result in data loss (e.g. a disc head crash or loss of a laptop), but it does assist to
    reduce the consequence. Some organizations can therefore consider this to be a corrective control rather than a preventive
    control. Similarly, encryption does not prevent the loss of information, but if the event is described as “personal data
    revealed to attacker”, then encryption is a preventive, rather than a corrective control. The order in which the controls
    addressing the risks are organized depends on various factors. Many techniques can be used. It is the respective risk
    owners’ responsibility to decide the balance between the costs of investing in controls and assuming consequences in case
    the risks are materialized. The identification of existing controls can determine that these controls exceed current needs.
    Acost– benefit analysis should be undertaken before removing redundant or unnecessary controls (especially if the controls
    have high maintenance costs). Since controls can influence each other, removing redundant controls can reduce the overall
    security in place. Controls should not be included in the risk treatment unless they are necessary controls to manage
    one or more of the identified information security risks. Acontrol should have an effect on the consequence or likelihood
    of the identified information security risks. Controls should not be included in the risk treatment if they are operating
    for reasons not related to information security. Consideration should be given to controls that are implemented but known
    to have some weaknesses. If the assessment of all the risks that a control with weaknesses is managing are within the
    acceptance criteria, then it is not necessary to improve the control. Even though the control is not operating fully effectively,
    it is not always necessary to improve it to make it fully effective. It should not be assumed that all controls must operate
    at full effectiveness for the organization to manage its risks successfully. It is possible to specify that each individual
    control has a level of tolerance for failure below which the control can be regarded as not operating effectively enough
    to manage the identified risks. As long as the control is operating inside the tolerance, it does not need any improvement.'
