- id: '7.2'
  heading: Identifying information security risks
  type: clause
  suggested_control_id: iso-27005-2022.7.2
  notes: ''
  text: ''
- id: 7.2.1
  heading: Identifying and describing information security risks
  type: clause
  suggested_control_id: iso-27005-2022.7.2.1
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 6.1.2 c) 1). Input: Events that can negatively influence the achievement
    of information security objectives in the organization or in other organizations. Action: Risks associated with the loss
    of confidentiality, integrity and availability of information should be identified. Trigger: Risk owners, interested parties
    and/or experts detect, or have a need to search for, new or changed events or situations that can affect the achievement
    of the information security objectives. Output: Alist of identified risks. Implementation guidance: Risk identification
    is the process of finding, recognizing and describing risks. This involves the identification of risk sources and events.
    The aim of risk identification is to generate a list of risks based on those events that can prevent, affect or delay
    the achievement of information security objectives. The risks identified should be those that, if they materialize, can
    have an effect on the achievement of the objectives. ISO/IEC 27001:2022, 6.1.2 c), requires the organization to define
    and apply an information security risk assessment process that identifies the information security risks. There are two
    approaches commonly used to perform risk identification.

    a) Event-based approach: identify strategic scenarios through a consideration of risk sources, and how they use or impact
    interested parties to reach those risk’s desired objective.

    b) Asset-based approach: identify operational scenarios, which are detailed in terms of assets, threats and vulnerabilities.
    In an event-based approach, the underlying concept is that risks can be identified and assessed through an evaluation
    of events and consequences. Events and consequences can often be determined by a discovery of the concerns of top management,
    risk owners and the requirements identified in determining the context of the organization (ISO/IEC 27001:2022, Clause
    4). Interviews with top management and those people in the organization who have a responsibility for a business process
    can assist in identifying not only the relevant events and consequences, but also the risk owners. An event-based approach
    can establish high level or strategic scenarios without spending a considerable amount of time in identification of assets
    on a detailed level. This allows the organization to focus its risk treatment efforts on the critical risks. Evaluation
    of events using this approach can make use of historical data where risks remain unchanging for long periods, and allows
    the interested parties involved to reach their objectives. However, in the case of risks for which historical data are
    not available or reliable, the advice based on knowledge and experience of experts or investigation of risk sources can
    assist evaluation. With an asset-based approach, the underlying concept is that risks can be identified and assessed through
    an inspection of assets, threats and vulnerabilities. An asset is anything that has value to the organization and therefore
    requires protection. Assets should be identified, taking into account that an information system consists of activities,
    processes and information to be protected. The assets can be identified as the primary and the supporting assets according
    to their type and priority, highlighting their dependencies, as well as their interactions with their risk sources and
    the organization’s interested parties. Athreat exploits a vulnerability of an asset to compromise the confidentially,
    integrity and/or availability of corresponding information. If all valid combinations of assets, threats and vulnerabilities
    can be enumerated within the scope of the ISMS, then, in theory, all the risks would be identified. For further steps
    of risk assessment, a list of assets associated with information and information-processing facilities should be drawn
    up. The asset-based approach can identify asset-specific threats and vulnerabilities and allows the organization to determine
    specific risk treatment on a detailed level. More information on both approaches is given in Annex A. In principle, the
    two approaches differ only in regard to the level at which identification is initiated. Both approaches can describe the
    same risk scenario, e.g. where an information asset is at the detail level and a business exposure is at the general level.
    Identifying the contributory risk sources using an event-based assessment typically requires drilling down from the general
    level of the scenario to the detail level, but an asset-based assessment typically searches upwards from the asset to
    the scenario, in order to provide visibility regarding how consequences accumulate. Risk identification is critical, because
    an information security risk that is not identified at this stage is not included in further analysis. Risk identification
    should consider risks regardless of whether their source is under the control of the organization, even if no specific
    risk sources are evident. Particularly when assessing complex risk scenarios, iterative risk assessment should be conducted.
    The first round should concentrate on high- level observations and successive rounds should address additional levels
    of detail until root causes of risks can be identified. Any other risk identification approach can be used as long as
    it ensures the production of consistent, valid and comparable results, fulfilling the requirement of ISO/IEC 27001:2022,
    6.1.2 b). Management of information security risks should not be constrained by arbitrary or restrictive views of how
    risks should be structured, grouped, aggregated, split or described. Risks can appear to overlap or be subsets or specific
    instances of other risks. However, controls for individual risks should be considered and identified separately from wider
    risks or aggregated risks for the purposes of risk treatment. EXAMPLE 1 An example of two overlapping risks: (1) there
    is a risk of a fire in the head office; (2) there is a risk of a fire affecting the operation of the accounts department
    where the accounts department is in head office but also in several other buildings. An example of specific instances
    of a risk: (1) there is a data loss incident; (2) there is a data loss incident of personal data. The second risk is a
    specific instance of the first risk, but it is likely to have different attributes and controls to the first risk, and
    it can be important to manage it separately from the much wider first risk. Aggregation of risks should not be undertaken
    unless they are relevant to each other at the level at which the organization''s context is being considered. It can be
    necessary to consider separately risks which are merged for the purpose of overall risk management budgeting, when planning
    treatment options, as different controls can be needed to manage them. EXAMPLE 2 Adata centre can be subject to several
    independent hazards: flooding, fire, electric power spikes and vandalism. To estimate the overall level of corporate risk,
    the individual risks of these events can be combined into an overall level of risk, but as each of these events require
    different controls to manage the risk, they should be considered and identified separately for the purposes of risk treatment.
    Risks (combinations of likelihoods and consequences) cannot always be aggregated directly.'
  statements:
  - id: iso-27005-2022.7.2.1.a
    label: a)
    body: 'Event-based approach: identify strategic scenarios through a consideration of risk sources, and how they use or
      impact interested parties to reach those risk’s desired objective.'
    notes: ''
  - id: iso-27005-2022.7.2.1.b
    label: b)
    body: 'Asset-based approach: identify operational scenarios, which are detailed in terms of assets, threats and vulnerabilities.'
    notes: ''
- id: 7.2.2
  heading: Identifying risk owners
  type: clause
  suggested_control_id: iso-27005-2022.7.2.2
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 6.1.2 c) 2). Input: List of identified risks. Action: Risks should
    be associated to risk owners. Trigger: Identification of risk owners becomes necessary when:

    — it has not been done before;

    — there is a change in personnel in the relevant business area where the risks reside; Output: List of risk owners with
    associated risks. Implementation guidance: Top management, the security committee, process owners, functional owners,
    department managers and asset owners can be the risk owners. An organization should use the organizational risk assessment
    process (if established) regarding identifying risk owners, otherwise it should define criteria for identifying risk owners.
    Such criteria should take into consideration that risk owners:

    — are accountable and have the authority for managing the risks they own, i.e. they should have a position in the organization
    that allows them to actually exercise this authority;

    — understand the issues at hand, and are in a position to make informed decisions (e.g. regarding how to treat the risks).
    The level of risk and to what asset the risk should apply can serve as the basis for identifying risk owners. The allocation
    should take place as part of the risk assessment process.'
  statements:
