- id: '4'
  heading: Structure of this document
  type: clause
  suggested_control_id: iso-27005-2022.4
  notes: ''
  text: 'This document is structured as follows:

    — Clause 5: Information security risk management;

    — Clause 6: Context establishment;

    — Clause 7: Information security risk assessment process;

    — Clause 8: Information security risk treatment process;

    — Clause 9: Operation;

    — Clause 10: Leveraging related ISMSprocesses. Except for the descriptions given in general subclauses, all risk management
    activities as presented from Clause 7 to Clause 10 are structured as follows: Input: Identifies any required information
    to perform the activity. Action: Describes the activity. Trigger: Provides guidance on when to start the activity, for
    example because of a change within the organization or according to a plan or a change in the external context of the
    organization. Output: Identifies any information derived after performing the activity, as well as any criteria that such
    output should satisfy. Guidance: Provides guidance on performing the activity, keyword and key concept.'
