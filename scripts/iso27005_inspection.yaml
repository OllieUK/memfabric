- id: 7.3.3
  heading: Assessing likelihood
  type: clause
  suggested_control_id: iso-27005-2022.7.3.3
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 6.1.2 d) 2). Input: Alist of identified relevant event or risk
    scenarios, including identification of risk sources, and business processes, business objectives and likelihood criteria.
    Additionally, lists of all existing controls, their effectiveness, implementation and usage status. Action: The likelihood
    of occurrence of possible or actual scenarios should be assessed and expressed using established likelihood criteria.
    Trigger: Along with consequence, assessing the likelihood is a key activity of the risk assessment process when determining
    the level of risk. Assessment of the likelihood becomes necessary when:

    — it has not been done before;

    — changes in the scope or context are determined that can affect likelihood;

    — vulnerabilities are discovered in implemented controls;

    — control effectiveness tests/audits result in unexpected outcomes;

    — changes are discovered in the threat environment (e.g. new threat actors/sources). Output: Alist of events or risk scenarios
    complemented by likelihoods that these occur. Implementation guidance: After identifying the risk scenarios, it is necessary
    to analyse the likelihood of each scenario and consequence occurring, using qualitative or quantitative analysis techniques.
    Assessing the likelihood is not always easy and should be expressed in different ways. This should take into account how
    often the risk sources occur or how easily some of them (e.g. vulnerabilities) can be exploited, considering:

    — experience and applicable statistics for risk source likelihood;

    — for deliberate risk sources: the degree of motivation [e.g. the viability (cost/benefit) of the attack] and capabilities
    (e.g. the level of the skill of possible attackers), which change over time, resources available to possible attackers,
    and influences on possible attackers such as serious crime, terrorist organizations or foreign intelligence, as well as
    the perception of attractiveness and vulnerability of information for a possible attacker;

    — for accidental risk sources: geographical factors (e.g. proximity to dangerous facilities or activities), the possibility
    of natural disasters such as extreme weather, volcanic activity, earthquakes, flooding, tsunami and factors that can influence
    human errors and equipment malfunction;

    — known weaknesses and any compensating controls, both individually and in aggregation;

    — existing controls and how effectively they reduce known weaknesses. Estimation of likelihood is intrinsically uncertain,
    not only because it considers things that have not yet happened and are therefore not fully known, but also because likelihood
    is a statistical measure and is not directly representative of individual events. The three basic sources of assessment
    uncertainty are:

    — personal uncertainty originating in the judgement of the assessor, which derives from variability in the mental heuristics
    of decision making;

    — methodological uncertainty, which derives from the use of tools that inevitably model events simplistically;

    — systemic uncertainty about the anticipated event itself, which derives from insufficient knowledge (in particular, if
    evidence is limited or a risk source changes with time). To increase the reliability of estimating likelihood, organizations
    should consider using:

    a) team assessments rather than individual assessments;

    b) external sources, such as information security breach reports;

    c) scales with range and resolution appropriate to the organization''s approach;

    d) unambiguous categories, such as “once a year”, rather than “infrequent”. When assessing the likelihood of events, it
    is important to recognize the difference between independent and dependent events. The likelihood of events that depend
    on each other is conditioned by the relationship between them (e.g. a second event can be inevitable if a first event
    occurs) so that separate assessment of both their likelihoods is not necessary. The likelihood of relevant independent
    events are all essential contributors to the likelihood of a consequence to which they contribute. EXAMPLE The likelihood
    of a Denial-of-Service attack on a server depends on the current threat landscape and the vulnerability and accessibility
    of the server. However, the likelihood of malicious packets can be 100 % once the attack has started and its assessment
    does not help the assessment of the likelihood of the Denial-of- Service attack. To avoid unnecessary complexity of assessment,
    it is important to identify any dependencies between the events contributing to a risk scenario and in the first instance
    to assess the likelihoods of those events that are independent of each other. The overall likelihood of business consequences
    of an information security event typically depends on the likelihood of potentially several lower-level contributory events
    and their consequences. Rather than attempting to estimate the likelihood of business consequences in a single high-level
    assessment, it can be more valid to start by aggregating the likelihoods of the individually assessed lower-level events
    that contribute to it.'
