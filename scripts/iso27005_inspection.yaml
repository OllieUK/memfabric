- id: 8.6.2
  heading: Approval by risk owners
  type: clause
  suggested_control_id: iso-27005-2022.8.6.2
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 6.1.3 f). Input: Risk treatment plan(s). Action: Approval of risk
    treatment plan(s) by risk owners. Trigger: The need for risk treatment plan(s) to be approved. Output: Approved risk treatment
    plan(s). Implementation guidance: The information security risk treatment plan should be approved by the risk owners once
    it is formulated. Risk owners should also decide on the acceptance of residual information security risks. This decision
    should be based on defined risk acceptance criteria. The results of the risk assessment, the risk treatment plan and the
    remaining risks should be understandable to the risk owners so that they can discharge their accountabilities properly.'
- id: 8.6.3
  heading: Acceptance of the residual information security risks
  type: clause
  suggested_control_id: iso-27005-2022.8.6.3
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 6.1.3 f). Input: Approved risk treatment plan(s) and risk acceptance
    criteria. Action: Determine whether the residual risks are acceptable. Trigger: The need for the organization to decide
    on retaining residual risks. Output: Accepted residual risks. Implementation guidance: In order to determine the residual
    risks, risk treatment plans should feed into the follow up assessment of residual likelihood and consequence. The proposed
    controls outlined in the risk treatment plans and related effectiveness should be considered in light of whether they
    will reduce the likelihood or the consequence, or both, and whether the level of residual risks is allocated to the risks.
    The level of residual risks is then considered by the risk owner to determine whether the residual risks are acceptable.
    Risk treatment plans should describe how assessed risks are to be treated to meet risk acceptance criteria. In some cases,
    the level of residual risk does not always meet risk acceptance criteria, because the criteria being applied do not take
    into account prevailing circumstances. EXAMPLE It can be argued that it is necessary to retain risks because the benefits
    accompanying the risks are an important business opportunity, or because the cost of risk modification is too high. However,
    it is not always possible to revise the risk acceptance criteria in a timely manner. In such cases, risk owners can retain
    risks that do not meet normal acceptance criteria. If this is necessary, the risk owner should explicitly comment on the
    risks and include a justification for the decision to override normal risk acceptance criteria. Risk acceptance can involve
    a process to achieve endorsements of treatments prior to a final risk acceptance decision. It is important for risk owners
    to review and approve proposed risk treatment plans and resulting residual risks, and record any conditions associated
    with such approval. Depending on the risk assessment process and risk acceptance criteria, this can require a manager
    with a higher level of authority than the risk owner to agree to the risk acceptance. It can take some time to implement
    a plan to treat assessed risks. Risk criteria can allow levels of risk to exceed a desired threshold to a defined extent
    if there is a plan in place to reduce that risk in an acceptable time. Risk acceptance decisions can take into account
    timeframes in risk treatment plans and whether or not risk treatment implementation progress is in line with what is planned.
    Some risks can vary over time (regardless of whether this change is due to implementation of a risk treatment plan). Risk
    acceptance criteria can consider this and have risk acceptance thresholds that depend on the length of time that an organization
    can be exposed to an assessed risk.'
- id: '9'
  heading: Operation
  type: clause
  suggested_control_id: iso-27005-2022.9
  notes: ''
  text: ''
- id: '9.1'
  heading: Performing information security risk assessment process
  type: clause
  suggested_control_id: iso-27005-2022.9.1
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 8.2. Input: Documents about the information security risk assessment
    process including risk assessment and risk acceptance criteria. Action: The risk assessment process should be performed
    in accordance with Clause 7. Trigger: The need of the organization to assess risks, at planned intervals or based on events.
    Output: Evaluated risks. Implementation guidance: The information security risk assessment process defined and applied
    in ISO/IEC 27001:2022, 6.1, should be integrated into the organizational operations and it should be performed at planned
    intervals or when significant changes are proposed or occur. The information security risk assessment process should take
    into account the criteria established in ISO/IEC 27001:2022, 6.1.2 a). The intervals at which the risk assessment is performed
    should be appropriate to the ISMS. When a significant change of the ISMS (or its context) or a change in the threat landscape
    (e.g. a new type of information security attack) has occurred, the organization should determine if this change requires
    an additional information security risk assessment. When making plans for routine risk assessments, organizations should
    take account of any calendar that applies to their general business processes and associated budget cycles. EXAMPLE If
    there is an annual budget cycle, the organization can be required to submit funding requests at a certain time of year.
    Funds are then granted (diminished or denied) later. If the procurement processes are involved, there can be another budget
    cycle before risk treatment recommendations can be implemented and their effectiveness assessed prior to the next routine
    risk assessment. In such cases, risk assessments should be scheduled:

    a) to make their risk treatment recommendations in time for funding application;

    b) to be reassessed following the results of budget allocations;

    c) to perform the next routine assessment, once recommendations have been implemented, after any procurement activity.'
  statements:
  - id: iso-27005-2022.9.1.a
    label: a)
    body: To make their risk treatment recommendations in time for funding application.
    notes: ''
  - id: iso-27005-2022.9.1.b
    label: b)
    body: To be reassessed following the results of budget allocations.
    notes: ''
  - id: iso-27005-2022.9.1.c
    label: c)
    body: To perform the next routine assessment, once recommendations have been implemented, after any procurement activity.
    notes: ''
- id: '9.2'
  heading: Performing information security risk treatment process
  type: clause
  suggested_control_id: iso-27005-2022.9.2
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 8.3. Input: Evaluated risk(s). Action: The risk treatment process
    should be performed in accordance with Clause 8. Trigger: The need of the organization to treat risks, at planned intervals
    or based on events. Output: Retained or accepted residual risks. Implementation guidance: ISO/IEC 27001:2022, 8.3, specifies
    requirements for organizations to implement their risk treatment plans. Considerations included in 8.6 are also relevant
    to this subclause.'
- id: '10'
  heading: Leveraging related ISMSprocesses
  type: clause
  suggested_control_id: iso-27005-2022.10
  notes: ''
  text: ''
- id: '10.1'
  heading: Context of the organization
  type: clause
  suggested_control_id: iso-27005-2022.10.1
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, Clause 4. Input: Information on the organization, its internal
    and external context. Action: All relevant data should be considered to identify and describe internal and external issues
    influencing information security risk management and requirements of interested parties. Trigger: ISO/IEC 27001:2022 specifies
    requirements for such information to be able to establish information security objectives. Output: Risk-related internal
    and external issues influencing information security risk management. Implementation guidance: The organization should
    have a high-level (e.g. strategic) understanding of the important issues that can affect the ISMS, either positively or
    negatively. It should further know the internal and external context that is relevant to its purpose and that affect its
    ability to achieve the intended outcome of its ISMS. The intended outcomes should ensure preservation of the confidentiality,
    integrity and availability of information by applying the risk management process and knowing which risks are adequately
    managed. To reliably identify risks, the organization should understand in sufficient detail the circumstances in which
    the organization operates. This means the organization should gather information concerning the internal and external
    context of the organization, its interested parties and their requirements (see ISO/IEC 27001:2022, 4.1 and 4.2). Gathering
    this information should be done before any attempt is made by the organization to assess its information security risks,
    or indeed any other risks that can affect the intended outcome of the ISMS (see ISO/IEC 27001:2022, 6.1.1). The organization
    should consider all internal and external risk sources. The organization’s understanding of interested parties that are
    opposed to the organization and their interests is highly relevant. EXAMPLE 1 An example of an interested party with interests
    that are opposed to the organization’s objectives is the attacker. The attacker desires an organization with weak security
    level. The organization takes account of this party’s interest by having the opposite (strong security level), i.e. the
    organization considers possible conflicts with the objectives of the ISMS. The organization ensures, through effective
    information security controls, that these interests are not met. Interfaces with services or activities that are not completely
    within the scope of the ISMSshould be considered in the organization’s information security risk assessment. EXAMPLE 2
    An example of such a situation is the sharing of assets (e.g. facilities, ITsystems and databases) with other organizations
    or the outsourcing of a business function. How other relevant factors influencing information security are considered
    depends on the organization’s choice of risk identification and analysis methods. The organization’s information security
    objectives (see ISO/IEC 27001:2022, 6.2) can constrain the risk acceptance criteria (e.g. the acceptable level of risk
    can be a function of the potential rewards associated with different business activities). Furthermore, the information
    security policy can constrain risk treatment (e.g. certain risk treatment options can be excluded by that policy).'
- id: '10.2'
  heading: Leadership and commitment
  type: clause
  suggested_control_id: iso-27005-2022.10.2
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 5.1. Input: Information on information security risk assessment
    results or information security risk treatment results requiring approval or endorsement. Action: Appropriate level of
    management should consider results related to information security risks, to decide on or endorse further actions. Trigger:
    ISO/IEC 27001 requires appropriate level of management to be involved in all information security risk related activities.
    Output: Information security risk related decisions or endorsement. Implementation guidance: Top management is accountable
    for managing risks and should lead and drive risk assessments, including:

    — ensuring that the necessary resources are allocated to managing risk;

    — assigning authority, responsibility and accountability at appropriate levels within the organization as it relates to
    risk management;

    — communicating with appropriate interested parties.'
  statements:
  - id: iso-27005-2022.10.2.stmt-1
    label: —
    body: Ensuring that the necessary resources are allocated to managing risk.
    notes: ''
  - id: iso-27005-2022.10.2.stmt-2
    label: —
    body: Assigning authority, responsibility and accountability at appropriate levels within the organization as it relates
      to risk management.
    notes: ''
  - id: iso-27005-2022.10.2.stmt-3
    label: —
    body: Communicating with appropriate interested parties.
    notes: ''
- id: '10.3'
  heading: Communication and consultation
  type: clause
  suggested_control_id: iso-27005-2022.10.3
  notes: ''
  text: 'NOTE 1 This subclause relates to ISO/IEC 27001:2022, 7.4.

    NOTE 2 ISO/IEC 27001refers directly to the communication part of this activity. Input: Information on risks, their causes,
    consequences and their likelihood identified through the risk management processes. Action: Information on risks, their
    causes, consequences, their likelihood and the controls being taken to treat them should be communicated to, or obtained
    from, the external and internal interested parties. Trigger: ISO/IEC 27001requires such communication. Output: Relevant
    interested parties’ perceptions and continual understanding of the organization’s information security risk management
    process and results. Implementation guidance: The communication and consultation activity aims to achieve agreement on
    how to manage risks by exchanging and/or sharing information about risk with the risk owners and other relevant interested
    parties. The information includes, but is not limited to, the existence, nature, form, likelihood, consequence, significance,
    treatment and acceptance of risks. ISO/IEC 27001:2022, 6.1.2 c) 2), requires that owners of the information security risks
    be identified. Risk ownership can be deliberately confused or concealed. Even when risk owners can be identified, they
    can be reluctant to acknowledge that they are responsible for the risks that they own, and obtaining their participation
    in the risk management process can be difficult. There should be a defined communication procedure for informing those
    concerned about risk ownership. ISO/IEC 27001:2022, 6.1.3 f), requires the risk owners to approve the risk treatment plan(s)
    and to decide on the acceptance of residual risks. Communication between risk owners and staff responsible for the implementation
    of the ISMSis an important activity. There should be an agreement on how to manage risks by exchanging and/or sharing
    information about risk with the risk owners, and perhaps other interested parties and decision-makers. The information
    includes, but is not limited to, the existence, nature, form, likelihood, significance, treatment and acceptance of risks.
    Communication should be bi-directional. Depending on the nature and sensitivity of the risk(s), there can be a need to
    limit some information about risks, their assessment and treatment on a need-to-know basis to those responsible for identifying,
    assessing and treating them. Risk communication should be controlled on a “need to know” basis, taking into account the
    level of detail required by different interested parties, in consultation with the risk owners or potential owners, with
    the aim of avoiding publicizing the more sensitive risks and their associated known weaknesses. Perceptions of risk can
    vary due to differences in assumptions, concepts, needs, issues and concerns of the appropriate interested parties as
    they relate to risk or the issues under discussion. Interested parties are likely to make judgments on the acceptance
    of risk, based on their perception of risk. This is especially important to ensure that the interested parties’ perceptions
    of risk, as well as their perceptions of benefits, can be identified and documented and the underlying reasons clearly
    understood and addressed. Communication and consultation concerning risks can result in improved interested parties’ engagement
    with what is being done and appropriate interested parties taking ownership of decisions and outcomes. Communication and
    consultation with interested parties, as criteria are developed and as methods for risk assessment are selected, can also
    improve ownership of outcomes by interested parties. Interested parties are less likely to question the outcomes of processes
    that they have helped design. As a result, the likelihood that they accept findings and support action plans is often
    increased. In cases where interested parties are managers, this can build commitment to achieving risk management objectives
    and providing the necessary resources. Risk communication should be carried out in order to:

    — provide assurance of the outcome of the organization’s risk management;

    — collect risk information;

    — share the results from the risk assessment and present the risk treatment plan;

    — avoid or reduce both the occurrence and consequence of information security breaches due to the lack of mutual understanding
    among risk owners and interested parties;

    — support risk owners;

    — obtain new information security knowledge;

    — coordinate with other parties and plan responses to reduce the consequences of any incident;

    — give a sense of responsibility to risk owners and other parties with a legitimate interest at risk;

    — improve awareness. An organization should develop risk communication plans for normal operations as well as for emergencies.
    The risk communication and consultation activity should be performed continually. The coordination between major risk
    owners and relevant interested parties can be achieved by the formation of a committee where debate about risks, their
    prioritization and appropriate treatment, and acceptance can take place. Risk communications can be voluntarily forwarded
    to external third parties for enabling better risk management or response coordination or awareness and can also be required
    by regulators or business partners under certain circumstances. It is important to cooperate with the appropriate public
    relations or communications unit within the organization to coordinate all tasks related to risk communication. This is
    crucial in the event of crisis communication activation, e.g. in response to particular incidents.'
  statements:
  - id: iso-27005-2022.10.3.stmt-1
    label: —
    body: Provide assurance of the outcome of the organization’s risk management.
    notes: ''
  - id: iso-27005-2022.10.3.stmt-2
    label: —
    body: Collect risk information.
    notes: ''
  - id: iso-27005-2022.10.3.stmt-3
    label: —
    body: Share the results from the risk assessment and present the risk treatment plan.
    notes: ''
  - id: iso-27005-2022.10.3.stmt-4
    label: —
    body: Avoid or reduce both the occurrence and consequence of information security breaches due to the lack of mutual understanding
      among risk owners and interested parties.
    notes: ''
  - id: iso-27005-2022.10.3.stmt-5
    label: —
    body: Support risk owners.
    notes: ''
  - id: iso-27005-2022.10.3.stmt-6
    label: —
    body: Obtain new information security knowledge.
    notes: ''
  - id: iso-27005-2022.10.3.stmt-7
    label: —
    body: Coordinate with other parties and plan responses to reduce the consequences of any incident.
    notes: ''
  - id: iso-27005-2022.10.3.stmt-8
    label: —
    body: Give a sense of responsibility to risk owners and other parties with a legitimate interest at risk.
    notes: ''
  - id: iso-27005-2022.10.3.stmt-9
    label: —
    body: Improve awareness.
    notes: ''
- id: '10.4'
  heading: Documented information
  type: clause
  suggested_control_id: iso-27005-2022.10.4
  notes: ''
  text: ''
- id: 10.4.1
  heading: General
  type: clause
  suggested_control_id: iso-27005-2022.10.4.1
  notes: ''
  text: NOTE This subclause relates to ISO/IEC 27001:2022, 7.5. ISO/IEC 27001 specifies requirements for organizations to
    retain documented information concerning the risk assessment process (see ISO/IEC 27001:2022, 6.1.2) and results (see
    ISO/IEC 27001:2022, 8.2); the risk treatment process (ISO/IEC 27001:2022, 6.1.3) and results (ISO/IEC 27001:2022, 8.3).
- id: 10.4.2
  heading: Documented information about processes
  type: clause
  suggested_control_id: iso-27005-2022.10.4.2
  notes: ''
  text: 'Input: Knowledge on the information security risk assessment and treatment processes in accordance with Clauses 7
    and 8, defined by the organization. Action: Information about the information security risk assessment and treatment processes
    should be documented and retained. Trigger: ISO/IEC 27001 requires documented information about the information security
    risk assessment and treatment processes. Output: Documented information required by interested parties (e.g. certification
    body) or determined by the organization as being necessary for the effectiveness of the information security risk assessment
    process or information security risk treatment process. Implementation guidance: Documented information about the information
    security risk assessment process should contain:

    a) a definition of the risk criteria (including the risk acceptance criteria and the criteria for performing information
    security risk assessments);

    b) reasoning for the consistency, validity and comparability of results;

    c) a description of the risk identification method (including the identification of risk owners);

    d) a description of the method for analysing the information security risks (including the assessment of potential consequences,
    realistic likelihood and resultant level of risk);

    e) a description of the method for comparing the results with the risk criteria and the prioritization of risks for risk
    treatment. Documented information about the information security risk treatment process should contain descriptions of:

    — the method for selecting appropriate information security risk treatment options;

    — the method for determining necessary controls;

    — how ISO/IEC 27001:2022, Annex A, is used to determine that necessary controls have not been inadvertently overlooked;

    — how risk treatment plans are produced;

    — how risk owners’ approval is obtained.'
  statements:
  - id: iso-27005-2022.10.4.2.block-1
    label: block-1
    body: 'Input: Knowledge on the information security risk assessment and treatment processes in accordance with Clauses
      7 and 8, defined by the organization. Action: Information about the information security risk assessment and treatment
      processes should be documented and retained. Trigger: ISO/IEC 27001 requires documented information about the information
      security risk assessment and treatment processes. Output: Documented information required by interested parties (e.g.
      certification body) or determined by the organization as being necessary for the effectiveness of the information security
      risk assessment process or information security risk treatment process. Implementation guidance: Documented information
