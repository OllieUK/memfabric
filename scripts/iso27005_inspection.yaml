- id: 6.4.3.2
  heading: Consequence criteria
  type: clause
  suggested_control_id: iso-27005-2022.6.4.3.2
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 6.1.2 a) 2). ISO/IEC 27001 is concerned with the consequences
    which are directly or indirectly affected by the preservation or loss of confidentiality, integrity and availability of
    information in the scope of the ISMS. Consequence criteria should be developed and specified in terms of the extent of
    damage or loss, or harm to an organization or individual resulting from the loss of confidentiality, integrity and availability
    of information. When defining consequence criteria, the following should especially be considered:

    a) loss of life or harm to individuals or groups;

    b) loss of freedom, dignity or right to privacy;

    c) loss of staff and intellectual capital (skills and expertise);

    d) impaired internal or third-party operations (e.g. damage to a business function or process);

    e) effects to plans and deadlines;

    f) loss of business and financial value;

    g) loss of business advantage or market share;

    h) damage to public trust or reputation;

    i) breaches of legal, regulatory or statutory requirements;

    j) breaches of contracts or service levels;

    k) adverse impact on interested parties;

    l) negative impact on the environment, pollution. Consequence criteria define how an organization categorizes the significance
    of potential information security events to the organization. It is essential to determine how many categories of consequences
    are used, how they are defined, and what consequences are associated with each category. Usually, consequence criteria
    are different for different organizations depending on the organization’s internal and external context. EXAMPLE 1 The
    maximum amount the organization is prepared to write off in a fiscal year and the minimum amount in the same period that
    would force it into liquidation can create realistic upper and lower limits of an organization''s consequence scale expressed
    in monetary terms. This context-dependent range can then be divided into several consequence categories, the number and
    distribution of which should depend on the risk perception and appetite of the organization. Monetary consequence scales
    are commonly expressed in a logarithmic scale such as in decades or powers of (e.g. 100 to 1 000; 1 to 10 000, etc.),
    but alternative quantization schemes can be used where they fit the organization''s context better. Because consequences
    in different domains or departments of an organization can initially be expressed in various ways rather than strictly
    in monetary terms, it is useful if these various expressions can be cross-referenced to a common anchoring scale to ensure
    approximately equivalent levels of consequence in the different domains are correctly compared with each other. This should
    enable an aggregation of risks across domains to be performed. EXAMPLE 2 Adata breach, as well as possibly impacting individual
    privacy, can result in the loss of confidentiality, integrity or availability of information in the scope of the ISMS.
    This can also lead to non- compliance with applicable data protection legislation. Potential consequences range from information
    loss, loss of information-related assets and information process, to loss of operational business goals and projected
    business.'
  statements:
  - id: iso-27005-2022.6.4.3.2.a
    label: a)
