- id: 6.4.2
  heading: Risk acceptance criteria
  type: clause
  suggested_control_id: iso-27005-2022.6.4.2
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 6.1.2 a) 1). In risk evaluation, risk acceptance criteria should
    be used to determine whether a risk is acceptable or not. In risk treatment, risk acceptance criteria can be used to determine
    whether the proposed risk treatment is sufficient to reach an acceptable level of risk, or if further risk treatment is
    needed. An organization should define levels of risk acceptance. The following should be considered during development:

    a) consistency between the information security risk acceptance criteria and the organization’s general risk acceptance
    criteria;

    b) the level of management with delegated authority to make risk acceptance decisions is identified;

    c) risk acceptance criteria can include multiple thresholds, and authority for acceptance can be assigned to different
    levels of management;

    d) risk acceptance criteria can be based on likelihood and consequence alone, or can be extended to also consider the
    cost/benefit balance between prospective losses and the cost of controls;

    e) different risk acceptance criteria can apply to different classes of risk (e.g. risks that can result in non-compliance
    with regulations or laws are not always retained, while acceptance of risks can be allowed if the acceptance is a result
    of a contractual requirement);

    f) risk acceptance criteria can include requirements for future additional treatment (e.g. a risk can be retained on a
    short-term basis even when the level of risk exceeds the risk acceptance criteria if there is approval and commitment
    to take action to implement a chosen set of controls to reach an acceptable level within a defined time period);

    g) risk acceptance criteria should be defined based upon the risk appetite that indicates amount and type of risk that
    the organization is willing to pursue or retain;

    h) risk acceptance criteria can be absolute or conditional depending on the context. Risk acceptance criteria should be
    established considering the following influencing factors:

    — organizational objectives;

    — organizational opportunities;

    — legal and regulatory aspects;

    — operational activities;

    — technological constraints;

    — financial constraints;

    — processes;

    — supplier relationships;

    — human factors (e.g. related to privacy). The list of influencing factors is not exhaustive. The organization should
    consider the influencing factors based on the context. Asimple acceptance criterion (yes/no) does not always suffice in
    practice. In many cases, the decision to accept risk can be made at specific levels of risk (specific combinations of
    likelihood and consequence). However, there can be circumstances where it is necessary to set thresholds of acceptance
    for extreme consequences regardless of their likelihood, or extremely high likelihoods regardless of consequences, where
    the effect on the organization primarily results from one or the other. For example, acceptance of a rare event that wipes
    out the stock value of a company, or a constant drain on resources resulting from the need to control frequent minor infractions
    of a policy, should be considered primarily based on which of the two factors have the dominant effect on the organization.
    Consequently, risk acceptance criteria should ideally include consideration of likelihood and consequence independently,
    as well as costs of management, rather than merely level of risk as a combination of likelihood and consequence. An organization
    with a keen risk appetite can set a higher threshold of acceptance, thereby accepting more risks than an organization
    with a lower risk appetite. This protects the organization from over-control, i.e. having so many information security
    controls that they prevent the ability of the organization to achieve its objectives. Risk acceptance criteria can differ
    depending on how long the risks are expected to exist (e.g. the risks can be associated with a temporary or short-term
    activity). The risk criteria should be kept under review and updated as necessary as a result of any changes in the context
    of information security risk management. EXAMPLE Asmall company can initially have a keen risk appetite but as it grows,
    it can lower its risk appetite. The risk acceptance criteria should be approved by the authorized management level.'
  statements:
  - id: iso-27005-2022.6.4.2.block-1
    label: block-1
    body: .
    notes: ''
    statements:
