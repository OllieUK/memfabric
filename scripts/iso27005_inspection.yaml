- id: 6.4.3.3
  heading: Likelihood criteria
  type: clause
  suggested_control_id: iso-27005-2022.6.4.3.3
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 6.1.2 a) 2). Determining likelihood criteria depends on aspects
    such as:

    a) accidental or natural events;

    b) the degree of exposure of relevant information or the asset related to information to the threat;

    c) the degree to which vulnerability of the organization is exploited;

    d) technology failure;

    e) human acts or omissions. Likelihood can be expressed in probabilistic terms (the chance that an event will occur in
    a given time frame) or in frequentist terms (the notional average number of occurrences in a given time frame). The likelihood
    expressed in terms related to frequency is often used when it is communicated, although only the likelihood expressed
    in probabilistic terms can be used when aggregation of likelihoods is performed. Likelihood criteria should cover the
    predictably manageable range of anticipated event likelihoods. Beyond the limits of practicable manageability, it is typically
    only necessary to recognize that one or another limit has been exceeded in order to make an adequate risk management decision
    (designation as an extreme case). If finite scales are too wide, this typically results in excessively coarse quantization
    and can lead to error in assessment. This is particularly the case where likelihoods fall into the high end of exponentially
    represented scales, as the increments in the upper ranges are intrinsically very wide. Although almost anything is “possible”,
    the risk sources that should be given primary attention are those with likelihoods most relevant to the organization''s
    context and the scope of its ISMS.'
  statements:
  - id: iso-27005-2022.6.4.3.3.a
    label: a)
    body: Accidental or natural events.
    notes: ''
  - id: iso-27005-2022.6.4.3.3.b
    label: b)
    body: The degree of exposure of relevant information or the asset related to information to the threat.
    notes: ''
  - id: iso-27005-2022.6.4.3.3.c
    label: c)
    body: The degree to which vulnerability of the organization is exploited.
    notes: ''
  - id: iso-27005-2022.6.4.3.3.d
    label: d)
    body: Technology failure.
    notes: ''
  - id: iso-27005-2022.6.4.3.3.e
    label: e)
    body: Human acts or omissions.
    notes: ''
- id: 6.4.3.4
  heading: Criteria for determining the level of risk
  type: clause
  suggested_control_id: iso-27005-2022.6.4.3.4
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 6.1.2 a) 2). The purpose of scales for level of risk is to help
    risk owners to decide about retaining or otherwise treating risks and to prioritize them for risk treatment. The assessed
    level of a particular risk should help the organization to determine the urgency for addressing that risk. Depending on
    the situation, it is recommended to consider the inherent level of risk (without considering any controls), or the current
    level of risk (allowing for the effectiveness of any controls already implemented). The organization should develop a
    risk ranking, taking into account the following:

    a) the consequence criteria and likelihood criteria;

    b) the consequences that information security events can have on strategic, tactical and operational levels (this can
    be defined as worst case or in other terms provided the same basis is used consistently);

    c) legal and regulatory requirements, and contractual obligations;

    d) risks that appear beyond the boundaries of the organization''s scope, including unforeseen effects on third parties.
    Criteria for level of risk are necessary in order to evaluate analysed risks. Criteria for level of risk can be qualitative
    (e.g. very high, high, medium, low) or quantitative (e.g. expressed in terms of expected value of monetary loss, loss
    of lives or market share over a given period of time). EXAMPLE Risks can be quantified as annual loss expectancy, i.e.
    the average monetary value of the consequence per year taken over the next year. Whether quantitative or qualitative criteria
    are used, evaluation scales should ultimately be anchored to a reference scale that is understood by all interested parties,
    and both risk analysis and risk evaluation should include at least periodic formal calibration against the reference scale
    to ensure validity, consistency and comparability of results. If a qualitative approach is used, the levels of any qualitative
    scale should be unambiguous, its increments should be clearly defined, the qualitative descriptions for each level should
    be expressed in objective language and the levels should not overlap. When different scales are used (e.g. to address
    risks in different business domains), there should be an equivalency to allow comparable results.'
  statements:
  - id: iso-27005-2022.6.4.3.4.a
    label: a)
    body: The consequence criteria and likelihood criteria.
    notes: ''
  - id: iso-27005-2022.6.4.3.4.b
    label: b)
    body: The consequences that information security events can have on strategic, tactical and operational levels (this can
      be defined as worst case or in other terms provided the same basis is used consistently).
    notes: ''
  - id: iso-27005-2022.6.4.3.4.c
    label: c)
    body: Legal and regulatory requirements, and contractual obligations.
    notes: ''
  - id: iso-27005-2022.6.4.3.4.d
    label: d)
    body: Risks that appear beyond the boundaries of the organization's scope, including unforeseen effects on third parties.
    notes: ''
- id: '6.5'
  heading: Choosing an appropriate method
  type: clause
  suggested_control_id: iso-27005-2022.6.5
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 6.1.2 b). In general, the information security risk management
    approach and methods should be aligned with the approach and methods used to manage the other risks of the organization.
    The chosen approach should be documented. According to ISO/IEC 27001:2022, 6.1.2 b), the organization in the scope of
    the ISMSis required to ensure that repeated information security risk assessments produce consistent, valid and comparable
    results. It means the chosen method should ensure the following properties of results:

    — consistency: assessments of the same risks performed by different persons, or by the same persons on different occasions,
    in the same context, should produce similar results;

    — comparability: risk assessment criteria should be defined to ensure that assessments performed for different risks produce
    comparable results when representing equivalent levels of risk;

    — validity: assessments should produce the results that accord as closely as possible with reality. Operational risk management
    methods are typically used for information security risk management. The method chosen can use any appropriate approach
    with respect to the use of residual risk. The most commonly used approaches for information security risk management use
    current risk when assessing the likelihood and consequence of risks.'
  statements:
  - id: iso-27005-2022.6.5.stmt-1
    label: —
    body: 'Consistency: assessments of the same risks performed by different persons, or by the same persons on different
      occasions, in the same context, should produce similar results.'
    notes: ''
  - id: iso-27005-2022.6.5.stmt-2
    label: —
    body: 'Comparability: risk assessment criteria should be defined to ensure that assessments performed for different risks
      produce comparable results when representing equivalent levels of risk.'
    notes: ''
  - id: iso-27005-2022.6.5.stmt-3
    label: —
    body: 'Validity: assessments should produce the results that accord as closely as possible with reality.'
    notes: ''
- id: '7'
  heading: Information security risk assessment process
  type: clause
  suggested_control_id: iso-27005-2022.7
  notes: ''
  text: ''
- id: '7.1'
  heading: General
  type: clause
  suggested_control_id: iso-27005-2022.7.1
  notes: ''
  text: 'The organization should use the organizational risk assessment process (if established) to assess risks to information
    or to define an information security risk assessment process. Risk assessment enables risk owners to prioritize risks
    aligned with the treatment perspective, based primarily on their consequences and likelihood or other established criteria.
    The context of the risk assessment should be determined including a description of scope and purpose as well as internal
    and external issues that affect the risk assessment. Risk assessment consists of the following activities:

    a) risk identification, which is a process to find, recognize and describe risks (further details on risk identification
    are provided in 7.2);

    b) risk analysis, which is a process to comprehend the types of risk and to determine the level of risk. Risk analysis
    involves consideration of the causes and sources of risk, the likelihood that a specific event occurs, the likelihood
    that this event has consequences and the severity of those consequences (further details on risk analysis are provided
    in 7.3);

    c) risk evaluation, which is a process to compare the results of risk analysis with risk criteria to determine whether
    the risk and/or its significance is acceptable and to prioritize the analysed risks for risk treatment. Based on this
    comparison, the need for treatment can be considered (further details on risk evaluation are provided in 7.4). The risk
    assessment process should be based on methods (see 6.5) and tools designed in sufficient detail to ensure, as far as is
    possible, consistent, valid and reproducible results. Furthermore, the outcome should be comparable, e.g. to determine
    whether the level of risk increased or decreased. The organization should ensure that its information security risk management
    approach aligns with the organizational risk management approach, so that any information security risks can be compared
    with other organizational risks and not only considered in isolation. ISO/IEC 27001 does not mandate a particular approach
    to be used to fulfil the requirements in ISO/IEC 27001:2022, 6.1.2. Nevertheless, there are two main approaches for assessment:
    an event- based approach and an asset-based approach. They are discussed in more detail in 7.2.1.'
  statements:
  - id: iso-27005-2022.7.1.a
    label: a)
    body: The organization should use the organizational risk assessment process (if established) to assess risks to information
      or to define an information security risk assessment process. Risk assessment enables risk owners to prioritize risks
      aligned with the treatment perspective, based primarily on their consequences and likelihood or other established criteria.
      The context of the risk assessment should be determined including a description of scope and purpose as well as internal
      and external issues that affect the risk assessment. Risk assessment consists of the following activities risk identification,
      which is a process to find, recognize and describe risks (further details on risk identification are provided in 7.2).
    notes: ''
  - id: iso-27005-2022.7.1.b
    label: b)
    body: The organization should use the organizational risk assessment process (if established) to assess risks to information
      or to define an information security risk assessment process. Risk assessment enables risk owners to prioritize risks
