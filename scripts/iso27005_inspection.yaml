- id: '6.3'
  heading: Applying risk assessment
  type: clause
  suggested_control_id: iso-27005-2022.6.3
  notes: ''
  text: NOTE This subclause relates to ISO/IEC 27001:2022, 4.3. Organizations can perform risk assessments embedded within
    many different processes, such as project management, vulnerability management, incident management, problem management,
    or even on an impromptu basis for a given identified specific topic. Regardless of how risk assessments are performed,
    they should collectively cover all the issues relevant to the organization within the scope of an ISMS. The risk assessment
    should help the organization make decisions about the management of the risks that affect the achievement of its objectives.
    This should therefore be targeted at those risks and controls that, if managed successfully, will improve the likelihood
    of the organization achieving its objectives. More information about the context of an ISMSand the issues to be understood
    through risk assessment is given in ISO/IEC 27003.
- id: '6.4'
  heading: Establishing and maintaining information security risk criteria
  type: clause
  suggested_control_id: iso-27005-2022.6.4
  notes: ''
  text: ''
- id: 6.4.1
  heading: General
  type: clause
  suggested_control_id: iso-27005-2022.6.4.1
  notes: ''
  text: 'ISO/IEC 27001:2022, 6.1.2 a), specifies requirements for organizations to define their risk criteria, i.e. the terms
    of reference by which they evaluate the significance of the risks that they identify and make decisions concerning risks.
    ISO/IEC 27001 specifies requirements for an organization to establish and maintain information security risk criteria
    that include:

    a) the risk acceptance criteria;

    b) criteria for performing information security risk assessments. In general, to set risk criteria, the following should
    be considered:

    — the nature and type of uncertainties that can affect outcomes and objectives (both tangible and intangible);

    — how consequence and likelihood will be defined, predicted and measured;

    — time-related factors;

    — consistency in the use of measurements;

    — how the level of risk will be determined;

    — how combinations and sequences of multiple risks will be taken into account;

    — the organization’s capacity. Further considerations on risk criteria are presented in Annex A.'
