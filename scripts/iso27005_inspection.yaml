      The context of the risk assessment should be determined including a description of scope and purpose as well as internal
      and external issues that affect the risk assessment. Risk assessment consists of the following activities risk analysis,
      which is a process to comprehend the types of risk and to determine the level of risk. Risk analysis involves consideration
      of the causes and sources of risk, the likelihood that a specific event occurs, the likelihood that this event has consequences
      and the severity of those consequences (further details on risk analysis are provided in 7.3).
    notes: ''
