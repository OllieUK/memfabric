        the cost/benefit balance between prospective losses and the cost of controls.
      notes: ''
    - id: iso-27005-2022.6.4.2.block-1.e
      label: e)
      body: Different risk acceptance criteria can apply to different classes of risk (e.g. risks that can result in non-compliance
        with regulations or laws are not always retained, while acceptance of risks can be allowed if the acceptance is a
        result of a contractual requirement).
      notes: ''
    - id: iso-27005-2022.6.4.2.block-1.f
      label: f)
      body: Risk acceptance criteria can include requirements for future additional treatment (e.g. a risk can be retained
        on a short-term basis even when the level of risk exceeds the risk acceptance criteria if there is approval and commitment
        to take action to implement a chosen set of controls to reach an acceptable level within a defined time period).
      notes: ''
    - id: iso-27005-2022.6.4.2.block-1.g
      label: g)
      body: Risk acceptance criteria should be defined based upon the risk appetite that indicates amount and type of risk
        that the organization is willing to pursue or retain.
      notes: ''
    - id: iso-27005-2022.6.4.2.block-1.h
      label: h)
