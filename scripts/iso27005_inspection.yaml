- id: '8.4'
  heading: Comparing the controls determined with those in ISO/IEC 27001:2022, Annex A
  type: clause
  suggested_control_id: iso-27005-2022.8.4
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 6.1.3 c). Input: All necessary controls (see 8.3). Action: Compare
    all necessary controls with those listed in ISO/IEC 27001:2022, Annex A. Trigger: Identification of any missing controls
    becomes necessary if risk treatment plans are formulated. Output: All controls applicable to the risk treatment. Implementation
    guidance: ISO/IEC 27001:2022, 6.1.3 c), requires an organization to compare the controls that it has determined as being
    necessary to implement its chosen risk treatment options with the controls listed in ISO/IEC 27001:2022, Annex A. The
    purpose of this is to act as a safety check to verify that no necessary controls have been omitted from the risk assessment.
    This safety check is not in place to identify any omitted controls from ISO/IEC 27001:2022, Annex A, in the risk assessment.
    It is a safety check to identify any missing necessary controls from any source by comparing the controls with other standards
    and lists of controls. Omitted controls identified during this check can be sector specific or custom controls or from
    ISO/IEC 27001:2022, Annex A. The guidelines for determining controls in 8.3 should be followed when considering if any
    missing controls should be added to the risk assessment. EXAMPLE It is important that a control that is already operating
    in the organization is not automatically added into the risk assessment without further consideration. It is important
    to remember that this comparison of the controls is undertaken using the risk assessment and is not undertaken using the
    Statement of Applicability. The principle is to look at each risk in turn and compare the controls determined as necessary
    for the risk with the controls in ISO/IEC 27001:2022, Annex A, to help identify if there are any missing necessary controls
    for each risk.'
- id: '8.5'
  heading: Producing a Statement of Applicability
  type: clause
  suggested_control_id: iso-27005-2022.8.5
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 6.1.3 d). Input: All controls applicable to the risk treatment
    (see 8.4). Action: Produce a Statement of Applicability. Trigger: Documentation of all necessary controls, their justification
    and implementation status. Output: Statement of Applicability. Implementation guidance: In accordance with ISO/IEC 27001:2022,
    6.1.3 d), the Statement of Applicability (SOA) should contain at least:

    a) the necessary controls;

    b) justification for their inclusion;

    c) whether they are implemented or not;

    d) justification for exclusions of controls from ISO/IEC 27001:2022, Annex A. The SOAcan easily be produced by examining
    the risk assessment to identify the necessary controls and risk treatment plan to identify those that are planned to be
    implemented. Only controls identified in the risk assessment can be included in the SOA. Controls cannot be added to the
    SOAindependent of the risk assessment. There should be consistency between the controls necessary to realize selected
    risk treatment options and the SOA. The SOAcan state that the justification for the inclusion of a control is the same
    for all controls and that they have been identified in the risk assessment as necessary to treat one or more risks to
    an acceptable level. No further justification for the inclusion of a control is needed for any of the controls. The implementation
    status of all of the controls contained in the SOAcan be stated as “implemented”, “partially implemented” or “not implemented”.
    This can be either individually against each control or as an overall statement. EXAMPLE The SOAcontains the statement:
    “All the controls have been implemented”. No additional analysis or information is required to complete the SOA.'
  statements:
  - id: iso-27005-2022.8.5.a
    label: a)
    body: The necessary controls.
    notes: ''
  - id: iso-27005-2022.8.5.b
    label: b)
    body: Justification for their inclusion.
    notes: ''
  - id: iso-27005-2022.8.5.c
    label: c)
    body: Whether they are implemented or not.
    notes: ''
  - id: iso-27005-2022.8.5.d
    label: d)
    body: Justification for exclusions of controls from ISO/IEC 27001:2022, Annex A.
    notes: ''
- id: '8.6'
  heading: Information security risk treatment plan
  type: clause
  suggested_control_id: iso-27005-2022.8.6
  notes: ''
  text: ''
- id: 8.6.1
  heading: Formulation of the risk treatment plan
  type: clause
  suggested_control_id: iso-27005-2022.8.6.1
  notes: ''
  text: 'NOTE This subclause relates to ISO/IEC 27001:2022, 6.1.3 e). Input: Results from risk assessments. Action: Formulate
    risk treatment plan. Trigger: The need of the organization to treat risks. Output: Risk treatment plan. Implementation
    guidance: The purpose of this activity is to create plan(s) for treating specific sets of the risks that are on the list
    of prioritized risks (see Clause 7). Arisk treatment plan is a plan to modify risk such that it meets the organization’s
    risk acceptance criteria (see 6.4.2). There are two possible interpretations of the term “plan” in the context of risk
    treatment. The first is a project plan, i.e. a plan to implement the organization’s necessary controls. The second is
    a design plan, i.e. the plan that not only identifies necessary controls but also describes how the controls interact
    with their environment and each other to modify risks. In practice, both can be used. Once the controls are in place,
    the project plan ceases to have any value other than as a historical record, whereas the design plan is still useful.
    Every risk that needs treatment should be treated in one of the risk treatment plans. An organization can choose to have
    several risk treatment plans, which together implement all required aspects of risk treatment. These can be organized
    on the basis of where the information resides (e.g. one plan for the data centre, another for mobile computing, etc.),
    by asset (e.g. different plans for different asset classifications) or by events (such as those used when assessing risk
    using the event-based method). While creating the risk treatment plan, organizations should consider the following:

    — priorities in relation with the level of risk and urgency of treatment;

    — whether different types of controls (preventive, detective, corrective) or their composition are applicable;

    — whether it is necessary to wait for a control to be settled before starting to implement a new one on the same asset;

    — whether there is a delay between the time the control is implemented and the moment where it is fully effective and
    operational. For each treated risk the treatment plan should include the following information:

    — the rationale for selection of the treatment options, including the expected benefits to be gained;

    — those who are accountable and responsible for approving and implementing the plan;

    — the proposed actions;

    — the resources required, including contingencies;

    — the performance indicators;

    — the constraints;

    — the required reporting and monitoring;

    — when actions are expected to be undertaken and completed;

    — implementation status. The risk treatment plan actions should be ranked by priority in relation with the level of risk
    and urgency of treatment. The higher the level of risk, and in some cases the frequency of risk occurrence, the sooner
    the control is to be implemented. For each listed risk within the risk treatment plan, detailed implementation information
    should be tracked and can include but is not limited to:

    — names of risk owners and persons responsible for the implementation;

    — implementation dates or timelines;

    — control activities planned to test the implementation result;

    — implementation status;

    — cost level (investment, operation).'
