  - id: sabsa-2018.matrix-service-management.logical.location
    title: SM Logical — Service Catalogue Management
    body: "Configuration (CMDB) Management; Capacity Planning; Availability Management"
    note: "CMDB lands under Location because the configuration database is the logical map of where components exist and how they are connected — it is the 'logical locator' for infrastructure. Capacity and availability planning are inseparable from that map: you cannot plan capacity without knowing the topology. Its main matrix pair, Logical × Location (Domain Definitions; Inter-domain Associations & Interactions), defines the domain topology that the CMDB operationally tracks. The architecture defines the domains; the CMDB in this SM cell maintains the live record of what populates them."
