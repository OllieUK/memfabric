#
# Cell bodies are taken verbatim (or near-verbatim) from R101 Tables 2 and 3.
# Each layer in R101 has two rows: an abstract label row (short perspective
# titles) and a content row (full cell text). The body field uses the content
# row; the title field uses the abstract label for that perspective.
#
# Architecture principle: SABSA is the Sherwood Applied BUSINESS Security
# Architecture. Descriptions are taken from R101 directly — they are
# business-focused by design. Security implications derive from the
# business context; they are not the starting point.
#
# description_status: curated — requires Oliver review before seeding.
# Seeder refuses to load any row still at draft-curated.

