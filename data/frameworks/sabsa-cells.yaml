    note: "One layer below SM Contextual × Location (supply chain execution), this conceptual SM cell is where the business footprint is planned and maintained as an architectural model — the abstract map of where the organisation operates, supplies from, and is accessed. Its main matrix pair, Conceptual × Location (Security Domain Concepts & Framework), is where that footprint becomes the trust domain model from which security boundaries are derived. Together: business footprint planned here → trust domains derived there."
