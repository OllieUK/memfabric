# data/frameworks/business-attributes-w100-ict.yaml
#
# W100 ICT Business Attributes — Figure 4 (p.20)
# Source: TSI-W100-SABSA-White-Paper.pdf, Figure 4 "The SABSA Taxonomy of ICT Business Attributes"
#
# Structure: 7 ict-group nodes + 86 ict-leaf nodes
#
# Group → Tier-1 root mapping (curated, WP-113 Phase 3):
#   user           → null     (spans confidentiality, availability, integrity — no single clean parent)
#   management     → null     (spans availability, accountability, integrity — no single clean parent)
#   operational    → ba-availability  (available, recoverable, productive, detectable all converge here)
#   risk-management→ ba-accountability (access-controlled, auditable, authenticated, authorised converge here)
#   legal-regulatory → null   (admissible, compliant, regulated span multiple primitives)
#   technical-strategy → null (architecture/vendor decisions span all primitives)
#   business-strategy  → null (business outcomes span multiple primitives; no single clean parent)
#
# NOTE: Where group→root is null, the group hangs under the sabsa-2018 Framework root.
# These mappings are deliberately conservative — do not force spurious parent edges.

# ──────────────────────────────────────────────────────────────
# ICT Group nodes (7) — tier=ict-group
# ──────────────────────────────────────────────────────────────

