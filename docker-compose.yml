networks:
  memfabric-net:
    driver: bridge

services:
  memfabric-db:
    image: memgraph/memgraph-mage:3.9.0
    container_name: memfabric-db
    command: ["--log-level=INFO"]
    ports:
      - "127.0.0.1:7687:7687"
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import socket; s=socket.create_connection(('127.0.0.1',7687),timeout=2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - memgraph_lib:/var/lib/memgraph
      - memgraph_log:/var/log/memgraph
      - memgraph_etc:/etc/memgraph
    networks: [memfabric-net]
    restart: unless-stopped

  memfabric-lab:
    image: memgraph/lab:3.9.0
    container_name: memfabric-lab
    depends_on:
      memfabric-db:
        condition: service_healthy
    environment:
      - QUICK_CONNECT_MG_HOST=memfabric-db
      - QUICK_CONNECT_MG_PORT=7687
    networks: [memfabric-net]
    restart: unless-stopped

  memfabric-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memfabric-api
    environment:
      - MEMGRAPH_HOST=memfabric-db
      - EMBEDDING_LOCAL_FILES_ONLY=true
      - AGENT_ID=claude-code
      - SCHEDULER_ENABLED=true
      # Secrets (API_KEYS, MEMGRAPH_PASSWORD, etc.) come from the env file.
      # Never store token values here.
    env_file:
      - path: /opt/stacks/env/services-env/memfabric.env
        required: false
    volumes:
      - hf_cache:/root/.cache/huggingface:ro
    depends_on:
      memfabric-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 90s
    networks: [memfabric-net]
    restart: unless-stopped
    mem_limit: 4g
    cpus: "2.0"
    pids_limit: 256

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: memfabric-tunnel
    command: tunnel run
    env_file:
      - path: /opt/stacks/env/services-env/memfabric.env
        required: false
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN}
    depends_on:
      memfabric-api:
        condition: service_healthy
    networks: [memfabric-net]
    restart: unless-stopped
    mem_limit: 128m
    cpus: "0.25"

volumes:
  memgraph_lib:
  memgraph_log:
  memgraph_etc:
  hf_cache:
  # On fresh installs, Compose creates these volumes automatically.
  # On the homeserver, they were pre-created and populated via volume import
  # (data migration). Compose adopts them regardless — warnings are harmless.
