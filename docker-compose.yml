version: "3.8"

services:
  memgraph:
    image: memgraph/memgraph-mage:3.9.0
    container_name: memgraph-mage
    ports:
      - "7687:7687"   # Bolt protocol
      - "7444:7444"   # HTTP / REST
    command: ["--log-level=INFO"]
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import socket, sys; s=socket.create_connection(('127.0.0.1',7687),timeout=2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - memgraph_lib:/var/lib/memgraph
      - memgraph_log:/var/log/memgraph
      - memgraph_etc:/etc/memgraph

  lab:
    image: memgraph/lab:3.9.0
    container_name: memgraph-lab
    ports:
      - "3000:3000"   # Memgraph Lab UI
    depends_on:
      memgraph:
        condition: service_healthy
    environment:
      - QUICK_CONNECT_MG_HOST=memgraph
      - QUICK_CONNECT_MG_PORT=7687

volumes:
  memgraph_lib:
  memgraph_log:
  memgraph_etc:
