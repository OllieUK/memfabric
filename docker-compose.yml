services:
  memgraph:
    image: memgraph/memgraph-mage:3.9.0
    container_name: memgraph-mage
    ports:
      - "7687:7687"   # Bolt protocol
      - "7444:7444"   # HTTP / REST
    command: ["--log-level=INFO"]
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import socket; s=socket.create_connection(('127.0.0.1',7687),timeout=2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - memgraph_lib:/var/lib/memgraph
      - memgraph_log:/var/log/memgraph
      - memgraph_etc:/etc/memgraph

  lab:
    image: memgraph/lab:3.9.0
    container_name: memgraph-lab
    ports:
      - "3000:3000"   # Memgraph Lab UI
    depends_on:
      memgraph:
        condition: service_healthy
    environment:
      - QUICK_CONNECT_MG_HOST=memgraph
      - QUICK_CONNECT_MG_PORT=7687

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memory-api
    environment:
      - MEMGRAPH_HOST=memgraph
      - EMBEDDING_LOCAL_FILES_ONLY=true
      - AGENT_ID=claude-code
      - SCHEDULER_ENABLED=true
      # Secrets (e.g. MEMGRAPH_PASSWORD) must be passed via shell env at
      # compose-up time, not stored here. Example:
      #   MEMGRAPH_PASSWORD=secret docker compose up -d
    volumes:
      - ${HF_CACHE_DIR:-/home/oliver/.cache/huggingface}:/root/.cache/huggingface:ro
    depends_on:
      memgraph:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 90s
    restart: unless-stopped
    mem_limit: 4g
    cpus: "2.0"
    pids_limit: 256

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    container_name: memory-caddy
    ports:
      - "8443:8443"
    environment:
      # Passed from host shell env at compose-up time — never stored here.
      # Set these in .env (read by your shell) before running docker compose up -d.
      - CF_API_TOKEN=${CF_API_TOKEN}
      - CF_ZONE_ID=${CF_ZONE_ID}
      - CADDY_DOMAIN=${CADDY_DOMAIN:-memfabric.carr-it.net}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 128m
    cpus: "0.25"
    pids_limit: 64

volumes:
  memgraph_lib:
  memgraph_log:
  memgraph_etc:
  caddy_data:
  caddy_config:
